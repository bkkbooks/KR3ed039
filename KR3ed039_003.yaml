body:
  text: 卷三虛損勞瘵門第十八敘曰百病皆足以致虛損勞瘵治之者必究其因是疾也自昔神良之醫每難措手所謂病已成而後藥之譬之渴而穿井鬥而鑄兵不亦晚乎以故歷朝醫哲撰述勞瘵方論往往狃於隅見大都未純求其發理精確以為來學之準則者蓋無全書焉今考四十三方聊實諸證云爾擴而充之則變化百出在人心而已黃耆湯黃耆四兩人參白朮桂心各二兩附子二十銖生薑八兩大棗十枚五臟皆有勞勞其肺者短氣虛寒皮毛枯澀津液不通氣力損乏脈來遲緩者此方主之肺主氣久於悲哀喘咳則成肺勞肺勞故令氣短而聲不長氣為陽陽虛則寒故令虛寒肺主皮毛肺勞則無津液以充膚澤毛故令枯澀氣有餘則物潤津氣不足則無以化液故令口乾而津液不通氣壯則強氣餒則弱今肺為勞傷故氣力損乏脈來遲者為寒緩者為虛黃耆人參甘溫者也故能補氣經曰損其肺者益其氣是故用之桂心附子辛熱者也氣虛則陰湊之而為寒熱能壯氣是故用之白朮薑棗脾胃藥也經曰虛則調其母脾是肺之母是故用之是方也以上件皆是虛寒之證故為合宜若肺熱脈數者非所宜也合主二母散二母散知母去毛炒貝母去心略炒各五錢共為末肺勞有熱不能服補氣之劑者此方主之治肺有二法氣虛而陰湊之則如前方之溫補金衰而火乘之則如此方之滋陰宜溫補者易愈宜滋陰者難療蓋火來乘金謂之賊邪將作肺痿甚是難治是方也二母皆苦寒之品苦能堅金寒能勝熱故昔人主之人參固本丸人參二兩天門冬去心炒麥門冬去心炒生地黃淨洗熟地黃各四兩肺勞虛熱此方調之本猶根也肺主氣而氣根于丹田肺畏火而制火必本於腎水故用人參益氣二冬清氣熟地補腎生地涼腎制之為丸用之於下所謂壯水之主以制陽光是也非固本而何或問補腎何以用人參余曰大氣周流無臟不有故人參之用亦無處不宜今得滋陰之品以君之則亦下行而補下矣天王補心丹人參去蘆白茯苓去皮玄參炒丹參炒遠志炒桔梗各五錢生地黃四兩淨洗五味子炒當歸酒洗麥門冬去心炒天門冬去心炒柏子仁炒酸棗仁炒各一兩過勞其心忽忽喜忘大便難或時溏利口內生瘡者此方主之心者神明之臟過於憂愁思慮久久則成心勞心勞則神明傷矣故忽忽喜忘心主血血濡則大便潤血燥故大便難或時溏利者心火不足以生脾土也口內生瘡者心虛而火內灼也人參養心氣當歸養心血天麥門冬所以益心津生地丹玄所以解心熱柏仁遠志所以養心神五味棗仁所以收心液茯苓能補虛桔梗能利膈諸藥專於補心勞心之人宜常服也此方之傳未考所自偈云昔者志公和尚日夕講經鄧天子憫其勞也錫以此方因得名焉載在經藏今未辨其真偽異日廣求佛典而搜之犀角地黃湯生犀角鎊生地黃白芍藥牡丹皮勞心動火吐血衄血者此方主之心屬火而主脈過勞其心則火妄動而血湧溢越竅而出則為吐為衄者勢也經曰治病必求其本故以涼心之藥主之生犀能解心熱生地能涼心血白芍丹皮酸寒之物也酸者入肝寒者勝熱所以心病而治肝者肝是心之母木能生火故從肝而治之乃迎奪之兵也四物粱米湯粱米稻米黍米各一升蠟如彈丸大後入以化為度心勞吐衄久服寒涼之劑因壞脾胃者此方主之心是脾之母脾是心之子脾因寒涼而壞則必盜母氣以自養而心益病矣求其不殆得乎故宜調脾益胃調脾者莫如穀氣故用稻粱黍米復用蠟者取其厚腸胃云爾此療子益母之義昔之良醫皆用之半夏湯半夏制宿薑各二兩茯苓去皮白朮土炒杏仁去皮尖炒橘皮去白芍藥炒各五錢竹葉二十片大棗五枚脾勞四肢不用五臟皆乖脹滿肩息舌根苦直不能咽唾者此方主之脾主消磨水穀若勞倦之後病瘥之餘遇適口之味過於饜飫脾弱不能消磨勞於運化久久則成脾勞脾主四肢故令四肢不用五臟皆受氣於脾脾勞而傷則五臟皆無以稟氣故乖而失其常經曰脾主行氣於三陰脾勞則三陰之氣皆滯塞不行故令脹滿三陰之氣至胸中而還故令肩息脾之經脈上膈挾咽連舌本散舌下故令舌根苦直不能咽唾半夏甘辛甘則益脾辛則散滯宿薑等之一以醒脾一以製半夏之毒爾脾喜燥而畏濕故用白朮燥脾茯苓滲濕脾喜通而惡塞故用杏仁利氣橘皮泄氣竹葉氣清能去土中之火芍藥味酸能瀉土中之木大棗之用取其甘而益脾爾補中益氣湯人參甘草炙各一錢升麻五分黃耆一錢五分炙當歸白朮炒陳皮去白柴胡各五分勞倦傷脾中氣不足懶於言語惡食溏泄日漸瘦弱者此方主之脾主四肢故四肢勤動不息又遇飢餒無穀氣以養則傷脾傷脾故令中氣不足懶於言語脾氣不足以勝穀氣故惡食脾弱不足以剋制中宮之濕故溏泄脾主肌肉故瘦弱五味入口甘先入脾是方也參耆歸朮甘草皆甘物也故可以入脾而補中氣中氣者脾胃之氣也人生與天地相似天地之氣一升則萬物皆生天地之氣一降則萬物皆死故用升麻柴胡為佐以升清陽之氣所以法象乎天地之升生也用陳皮者一能疏通脾胃一能行甘溫之滯也是證黃耆建中湯亦可主用見傷寒門枸杞酒枸杞子一斗酒二斗同煎肝勞面目青口苦精神不守恐畏不能獨臥目視不明者此方主之肝者將軍之官謀慮出焉故謀而不決拂而數怒久久則勞其肝肝東方之色也病則色徵於面目故令面目色青口苦者肝移熱於腑而膽汁上溢也肝藏魂肝勞則邪居魂室故令精神不守且恐畏不能獨臥也肝氣通於目肝和則能辨五色矣今肝為勞傷故令目視不明經曰味為陰味厚為陰中之陰枸杞味厚故足以養厥陰之陰煮以純酒取其浹洽氣血而已他如六味地黃丸亦可主用古謂肝腎之病同一治又謂虛則補其母腎是肝之母故地黃丸亦宜六味地黃丸加黃柏知母方熟地黃八兩山茱萸去核炙山藥各四兩澤瀉牡丹皮去木白茯苓各三兩黃柏鹽炒知母鹽炒各二兩腎勞背難俯仰小便不利有餘瀝囊濕生瘡小腹裡急便赤黃者此方主之腎者藏精之臟也若人強力入房以竭其精久久則成腎勞腎主精精主封填骨髓腎精以入房而竭則骨髓日枯矣故背難俯仰前陰者腎之竅腎氣足則能管攝小便而溺溺惟宜腎氣怯則欲便而不利既便而有餘瀝斯之謂失其開合之常也腎者水臟傳化失宜則水氣留之水氣留之則生濕熱故令囊濕生瘡也小腹裡急者此真水枯而真火無制真水枯則命門之相火無所畏真火無制故灼膀胱少腹之筋膜而作裡急也便赤黃者亦皆火之所為熟地山萸味厚者也味厚為陰中之陰故足以補腎間之陰血山藥茯苓甘淡者也甘能制濕淡能滲濕故足以去腎虛之陰濕澤瀉丹皮鹹寒者也咸能潤下寒能勝熱故足以去腎間之濕熱黃柏知母苦潤者也潤能滋陰苦能濟火故足以服龍雷之相火夫去其灼陰之火滋其濟火之水則腎間之精血日生矣王冰曰壯水之主以制陽光此之謂也豬膏酒豬膏薑汁各二升熬取三升再入酒酒五合和煎分三服五勞之外又稱六極筋極之狀令人數轉筋十指爪甲皆痛苦倦不能久立宜此方主之筋極者數勞四肢筋液耗竭名曰筋極極者甚於勞之名也筋既竭其津液則失其潤養而作徑急故令人數轉筋也爪甲筋之餘也筋屬木木極則金承之故令十指爪甲皆痛亦枝枯萌萎之象也苦倦不能久立者筋敗不能束骨也是疾也若以草木之藥治之卒難責效師曰膏以養筋故假豬膏以潤養之等以薑汁者非辛不足以達四末故也復熬以酒者以酒性善行能浹洽氣血無所不之故用之以為煎也人參養榮湯人參去蘆黃耆炙陳皮白芍藥酒炒當歸酒洗甘草炙白茯苓五味子炒遠志去心白朮炒桂心熟地黃脈極者忽忽喜忘少顏色眉發墮落此方主之脈者血之府脈極者血脈空虛之極也此由失血所致心主血脈脈極則無血以養心故令忽忽喜忘榮血有餘則令人悅澤顏色榮血不足則令人色夭而顏色少也眉發者血之所養養血不足故令眉發墮落人參黃耆白朮茯苓甘草陳皮皆補氣藥也榮血不足而補氣此大易之教陰生於陽之義也陰者五臟之所主故用當歸澤脾芍藥調肝熟地滋腎五味益肺遠志寧心五臟和而陰血自生矣桂性辛熱熱者入心而益火辛者入經而利血又心為生脈之原故假之引諸藥入心而養榮血於脈耳十全大補湯人參黃耆白朮白芍藥熟地黃茯苓當歸川芎甘草各等分桂心少許肉極者肌肉消瘦皮膚枯稿此方主之肉極由於陰火久灼者難治宜別主六味地黃丸若由飲食勞倦傷脾而致肉極者宜大補氣血以充之經曰氣主煦之血主濡之故用人參白朮黃耆茯苓甘草甘溫之品以補氣氣盛則能充實於肌肉矣用當歸川芎芍藥地黃肉桂味厚之品以補血血生則能潤澤其枯矣生脈散人參麥門冬去心五味子炒等分氣極者正氣少邪氣多多喘少言此方主之肺主氣正氣少故少言邪氣多故多喘此小人道長君子道消之象也人參補肺氣麥冬清肺氣五味斂肺氣一補一清一斂養氣之道畢矣名曰生脈者以脈得氣則充失氣則弱故名之東垣云夏月服生脈散加黃耆甘草令人氣力湧出若東垣者可以醫氣極矣虎骨酒虎骨一具通炙取黃焦汁盡碎如雀腦糯米三石入虎骨倍用曲如釀酒法釀之酒熟封頭五十日開飲之骨極者腰脊酸削齒痛手足煩疼不欲行動此方主之腎主骨骨極者骨內空虛之極也故令腰脊酸削齒者骨之餘故齒亦痛手足煩疼不欲行動皆骨內空虛之徵也以骨治骨求其類也以虎骨治骨取其壯也釀之以酒者取酒性善漬直徹於骨也褚澄云男子天癸未至而御女則四肢有未滿之處異日必有難狀之疾其骨極之類乎龜鹿二仙膠鹿角血取者十斤龜板五斤枸杞子三十兩人參十五兩上件用鉛壇如法熬膠初服酒化錢半漸加至三錢空心下精極者夢泄遺精瘦削少氣目視不明此方主之精氣神有身之三寶也師曰精生氣氣生神是以精極則無以生氣故令瘦削少氣氣少則無以生神故令目視不明龜鹿稟陰氣之最完者其角與板又其身聚氣之最勝者故取其膠以補陰精用血氣之屬劑而補之所謂補以類也人參善於固氣氣固則精不遺枸杞善於滋陰陰滋則火不泄此藥行則精日生氣日壯神日旺矣加味逍遙散當歸白芍藥白朮柴胡茯神甘草各一錢丹皮山梔各七分六極之外又有七傷一曰大怒逆氣傷肝肝傷則少血目暗宜此方主之經曰肝者將軍之官故主怒怒則氣逆氣逆則血亦逆故少血眼者肝之竅又曰目得血而能視今肝傷少血故令目暗越人云東方常實故肝臟有瀉而無補即使逆氣自傷疏之即所以補之也此方名曰逍遙亦是疏散之意柴胡能升所以達其逆也芍藥能收所以損其過也丹梔能瀉所以伐其實也木盛則土衰白朮甘草扶其所不勝也肝傷則血病當歸所以養其血也木實則火燥茯神所以寧其心也安神丸黃連一兩五錢酒潤硃砂一兩水飛當歸酒洗生地黃酒洗炙甘草各五錢二曰憂愁思慮傷心心傷則苦驚喜忘夜不能寐此方主之憂愁思慮則火起於心心傷則神不安故苦驚心主血心傷則血不足故喜忘心愈傷則憂愁思慮愈不能去故夜不能寐苦可以瀉火故用黃連重可以鎮心故用硃砂生地涼心當歸養血炙甘草者所以益脾脾是心之子用之欲其不食氣於母故爾歸脾湯人參白茯苓龍眼肉酸棗仁黃耆白朮各二錢遠志一錢木香炙甘草當歸各五分三曰飲食太飽傷脾脾傷則面黃善臥宜此方主之脾者倉廩之官故飲食太飽則傷之中央土色入通於脾脾傷則其本色自見故面黃神者中氣之所生脾傷則神亦倦故善臥內經曰五味入口甘先入脾參耆苓朮甘草皆甘物也故用之以補脾虛則補其母龍眼肉酸棗仁遠志所以養心而補母脾氣喜快故用木香脾苦亡血故用當歸此主食去脾傷之方也若停食之方則以消磨之劑主之而不專於補益矣附子理中湯人參甘草炙附子制乾薑炒白朮四曰形寒飲冷傷肺肺傷則短氣咳嗽脈來微遲者宜此方主之形寒者形氣虛寒也飲冷者復飲冷物也熱則氣壯寒則氣怯今肺為寒冷所傷故令氣短水寒射肺肺不能容故令咳嗽脈來微者為虛遲者為寒損其肺者益其氣故用參朮甘草寒者溫之故用附子乾薑白通加人尿豬膽汁湯蔥白四莖乾薑一兩附子一枚人尿五合豬膽汁一合五曰久坐濕地傷腎腎傷則短氣腰痛厥逆下冷陰脈微者宜此方主之腎者水臟濕其類也故感之易入而易傷凡人呼吸之氣呼出心與肺吸入腎與肝腎傷則吸微故令短氣腰者腎之府腎傷而腰痛者其勢也濕為陰其氣寒陰並於下則陽格於上故厥逆而下冷尺為陰陰脈微者下部寒也乾薑附子熱物也可以回陽燥濕師曰太陽中天則寒者溫濕者燥故薑附可以治寒濕蔥白辛溫可使通腎氣人尿豬膽性寒而質陰用之者一可以制薑附之熱而不使其燥烈於上焦無病之分一可以同寒濕之性而引薑附直達下焦受病之區此佐以所利和以所宜乃兵家之嚮導也玉屏風散黃耆防風各一兩白朮二兩六曰風雨寒濕傷形形傷則皮膚枯稿宜此方主之外冒風雨則寒濕不免矣以外得之故令傷形而皮膚枯稿然皮膚之間衛氣之所居也靈樞經曰衛氣者所以溫分肉充皮膚肥腠理而司開闔者也故峻補其衛氣而形斯復矣黃耆甘溫補表之聖藥也得防風而功愈速故以防風等之白朮益脾脾主肌肉故以白朮倍之三藥者皆補氣之品內經曰形不足者溫之以氣此之謂也方名曰玉屏風亦是以其補益衛氣足以為吾身之倚襲爾升陽益胃湯羌活獨活防風柴胡白朮茯苓黃耆人參半夏甘草陳皮黃連澤瀉白芍藥七曰大怒恐懼傷志志傷則恍惚不樂宜此方主之怒則氣上恐則氣下一怒一恐拂於膻中則志意不得舒暢故曰傷志志者腎之所主而暢於膻中膻中者兩乳之間心君之分也心者神明之所出故令恍惚膻中者喜樂之所出故令不樂下者舉之郁者達之故用羌活獨活防風柴胡升舉之品氣乖於中脾胃受病故用參耆苓朮橘半甘芍調胃之品方內有澤瀉則陷下之邪可泄方內有黃連則膻中之逆可平磁石火內煅紅入醋淬七次為末入藥古人於腎虛腰疼方中每用磁石時方多不用之然磁石性能引鐵則用之者亦是假其引肺金之氣入腎使其子母相生爾水得金而清則相火不攻自去矣嗚呼醫之神妙在於幽微此言可與知者道也六味地黃丸熟地黃八兩山茱萸肉山藥各四兩白茯苓去皮牡丹皮澤瀉各三兩腎虛不能制火者此方主之腎非獨水也命門之火併焉腎不虛則水足以制火虛則火無所制而熱證生矣名之曰陰虛火動河間氏所謂腎虛則熱是也今人足心熱陰股熱腰脊痛率是此證老人得之為順少年得之為逆乃咳血之漸也熟地黃山茱萸味厚者也經曰味厚為陰中之陰故能滋少陰補腎水澤瀉味甘鹹寒甘從濕化咸從水化寒從陰化故能入水臟而瀉水中之火丹皮氣寒味苦辛寒能勝熱苦能入血辛能生水故能益少陰平虛熱山藥茯苓味甘者也甘從土化土能防水故用之以制水臟之邪且益脾胃而培萬物之母也互考見咳嗽門崔氏八味丸淮熟地黃八兩山茱萸肉山藥各四兩牡丹皮白茯苓澤瀉各三兩肉桂附子各一兩腎間水火俱虛者此方主之君子觀象於坎而知腎俱水火之道焉故曰七節之旁中有小心小心少火也又曰腎有兩枚左為腎右為命門命門相火也相火即少火耳夫一陽居於二陰為坎水火併而為腎此人生與天地相似也今人入房盛而陽事愈舉者陰虛火動也陽事先萎者命門火衰也真水竭則隆冬不寒真火息則盛夏不熱故人樂有藥餌焉是方也熟地山萸丹皮澤瀉山藥茯苓前之地黃丸也所以益少陰腎水肉桂附子辛熱物也所以益命門相火水火得其養則二腎復其天矣互考見小便不禁門補腎丸杜仲薑汁炒牛膝陳皮各二兩黃柏鹽酒炒龜板酥炙各四兩夏加五味子一兩炒冬加乾薑五錢此亦滋腎陰之方也黃柏龜板杜仲牛膝皆濡潤味厚物也故能降而補陰復用陳皮假以疏滯夏加五味者扶其不勝之金也冬加乾薑者壯其無光之火也經曰無伐天和此之謂爾補天丸黃柏龜板各四兩杜仲牛膝陳皮各二兩夏加五味子炒一兩冬加乾薑五錢人胞一具酒洗蒸爛搗丸男女交合非時天癸虛損者此方主之此即前方補腎丸加人胞也天癸者男之精女之血先天得之以成形後天得之以有生者也故曰天癸補腎丸前考已悉人胞者亦精血之所融結乃無極之極未生之天也已生之後天癸虛損補以草木之藥非其類也卒難責效人胞名曰混沌皮則亦天耳以先天之天而補後天之天所謂補以類也故曰補天虎潛丸一名補陰丸黃柏鹽酒炒知母炒熟地黃各三兩龜板四兩酥炙虎脛骨一兩酥炙鎖陽當歸各一兩半陳皮去白白芍藥酒炒牛膝各二兩羊肉為丸此亦治陰分精血虛損之方也虎陰也潛藏也是方欲封閉精血故曰虎潛人之一身陽常有餘陰常不足黃柏知母所以滋陰地黃歸芍所以養血牛膝能引諸藥下行鎖陽能使陰精不泄龜得天地之陰氣最厚故用以補陰虎得天地之陰氣最強故用以壯骨陳皮所以行滯而羊肉之用取其補也互考見疝門滋陰大補丸熟地黃二兩川牛膝山藥各一兩五錢山茱萸肉杜仲薑汁炒去絲白茯苓巴戟天去心五味子炒小茴香炒肉蓯蓉遠志去心各一兩石菖蒲枸杞子各五錢紅棗肉為丸此陰陽平補之劑也地黃牛膝杜仲山萸五味枸杞滋陰藥也巴戟蓯蓉茴香遠志石蒲山藥茯苓紅棗養陽藥也滋陰者潤而不寒養陽者溫而不熱丹溪翁立方之穩大都如此中年之人服之殊當補火丸生硫黃一斤豬臟二尺將硫黃為細末盡實臟中爛煮二時取出去臟蒸餅為丸如梧子大每服十丸日漸加之冷勞病瘠血氣枯竭齒落不已四肢倦怠語言不足者此方主之凡人之身有真火焉寄於右腎行於三焦出入於甲膽聽命於天君所以溫百骸養臟腑充七竅者皆此火也是火也萬物之父故曰天非此火不足以生萬物人非此火不能以有生若此火一熄則萬物無父故肉衰而瘠血衰而枯骨衰而齒落筋衰而肢倦氣衰而言微矣硫黃火之精也故用之以補火然其性過熱有毒故用豬臟爛煮以解之或曰世方以寒涼之品治勞而硫黃又世人罕用今治勞而用之誰不驚異余曰寒因熱用熱因寒用有熊氏之經也湯液云硫黃亦號將軍能破邪歸正返滯還清挺出陽精消陰化魄而生魂則先醫亦嘗頌之矣戴元禮氏丹溪之高弟也有言曰諸寒涼皆滯惟有黃連寒而不滯諸熱藥皆燥惟有硫黃熱而不燥則戴氏亦嘗頌之矣奈何拂吾心之理而求同俗乎昔仁和吏早衰服之年逾九十此往昔之驗也表之類編他如范文正公之金液丹得效之玉真丸和劑之來復丹半硫丸靈砂丹百選之二氣丹活人之返陰丹楊氏之紫霞丹往往皆用之但其所主者各有攸當茲不贅爾凡服硫黃者忌豬血羊血牛血及諸禽獸之血慎之石膏散石膏一味細末如面每夕新汲水服方寸匕取身無熱為度熱勞附骨蒸熱四肢微瘦有汗脈長者此方主之熱勞之證豈曰盡屬陰虛亦有陽邪外襲傳入於骨不能泄越內作骨蒸令人先寒後熱久久漸成羸瘦有汗者胃家實也脈長者陽邪證也石膏寒而清肅者也可以療裡熱以故外臺集之處州吳醫用之睦州鄭迪功之妻驗之名醫録載之所以開蒙後學也至矣或問東垣言血虛身熱證象白虎誤服白虎者必死非石膏之謂乎余曰若新産失血飢困勞倦之病合禁用之若內熱有汗脈長者則不在禁也甘梨漿勞瘵脈數燥渴日瘦者宜服之蓋天一生水所以養萬物者也若火盛而水滅令人五液乾枯則甘梨漿可以急救之此物匪惟可以救急曾有回生起死者師云生用之可以涼五火熟用之可以滋五臟童便咳血者以童便一物主之咳血是肺中有竅肺是清虛之臟纖芥不容一有其竅則血滲入肺矣愈滲愈咳愈咳愈滲此為難治褚澄云以寒涼治之百不一生以溲溺治之百不一死故特表而出之又曰血雖陰類運之者其和陽乎所以示人者深矣股肉割股之事古昔有之蓋賢婦急於舅姑夫子之疾而祈一念以格天爾至唐開元間陳藏器撰本草拾遺云人肉治瘵疾自是閭閻益多割股至有假名干譽而為之者嗚呼同類固不可食虧體豈曰事親且俞扁淳華上世神良之醫也未聞用人肉以治疾而閔損曾參之孝亦未嘗割股所以來要名之行者藏器其作之矣柴前梅連散柴胡前胡烏梅胡黃連各三錢豬膽一枚豬髓一條韭白五分童便二盞風勞骨蒸久而不痊咳嗽吐血盜汗遺精脈來弦數者此方主之此治因風成勞者也蓋風者百病之長乃天之陽氣也主疏泄萬物故在表則令人出汗在肺則令人咳嗽在肝則令人吐血在腎則令人遺精附骨則令人蒸熱盜汗是論也靈樞函其妙自漢唐以至宋元諸醫皆未竟其説無惑乎治勞瘵者之難其人也柴胡解不表不里之風胡連清入肌附骨之熱前胡主脾肺表裡之邪褚澄氏曰酸能入骨則烏梅之用亦可以收斂骨蒸豬膽所以養陰豬髓所以養骨童便所以濟火韭白辛熱少用之以使嚮導經曰甚者從之此之謂也秦艽鱉甲散秦艽知母當歸各半兩鱉甲一兩烏梅一枚青蒿五葉柴胡地骨皮各一兩風勞骨蒸壯熱肌肉消瘦此方主之風陽氣也故在表則表熱在裡則裡熱附骨則骨蒸壯熱久蒸則肌肉消瘦無風不作骨蒸此昆之立言也羅謙甫氏之主此方蓋有神契者矣柴胡秦艽風藥也能驅肌骨之風骨皮知母寒品也能療肌骨之熱鱉陰類也甲骨屬也骨以及骨則能為諸藥之嚮導陰以養陰則能退陰分之骨蒸烏梅味酸能引諸藥入骨而收其熱青蒿苦辛能從諸藥入肌而解其蒸復有當歸一以養血一以導諸藥入血而除熱於陰爾柴胡衍義云柴胡本經並無一字治勞今人治勞方中鮮有不用者凡此誤世甚多斯言也謂病原不同不可一概而施之爾故又繼之曰如經驗方中治勞熱青蒿煎丸用柴胡正合宜耳又尾之曰服之無有不效世人因前言而概不用柴胡雖當用者亦必不用嗚呼藏器一言舉世割股丹溪一出衆口滋陰衍義片詞柴胡未棄更不求其證脈而可否之此之謂侏儒觀場隨衆喧喝爾求其真知則未也三黃丸黃芩酒炒春四夏秋六冬三兩黃連酒炒春四夏五秋三冬一兩大黃酒浸九蒸曬春三秋二夏一冬五兩消渴羸瘦不生肌肉其人善谷者此方主之上件皆火證也火炎則水乾故令消渴燥萬物者莫熯乎火故令羸瘦不生肌肉火甚則速於傳化故善谷芩連大黃苦寒物也寒能勝熱苦能瀉火火去而陰自生陰生而肌肉自長矣麥煎散鱉甲醋炙柴胡生地黃大黃煨常山當歸赤茯苓乾漆炒焦石膏各一兩白朮甘草各半兩小麥五十粒有汗加麻黃根一兩共為末每服三錢少男室女孀婦郁勞骨蒸內熱風血攻疰四肢者此方主之此攻郁勞之方也少男思其女而不得則有留精室女思其男而不得則有留血孀婦有所思則氣結而有留瘀其理一而已謂之留者精血已離其位但留於經脈關要之區陰寒氣血留行之道也氣陽也阻而塞之則積陽為熱故令蒸蒸骨熱血陰也阻而塞之則積陰為疰故令四肢攻疰曰風血攻疰四肢者風血內搏四肢無力而倦怠浮腫也鱉甲乾漆攻堅削積之品也所以治精血之留結柴胡石膏解肌清熱之藥也所以去骨蒸之內熱思則火結於心包故用常山以開其結鬱則氣留於六腑故用大黃以推其陳當歸生地生新血也白朮甘草致新氣也赤茯苓所以導丙丁之邪浮小麥所以止骨蒸之汗而麻黃根之加乃以其形中閉為止汗之最捷爾東坡云此黃州吳判官之方也療骨蒸肌熱盜汗極效吳君寶之不肯妄傳也雖然此攻擊之劑惟少男室女孀婦真氣完固始可用之若男婦交接氣弱者猶禁與也桃仁丸桃仁一百二十枚去皮尖雙仁不用只此一味杵丸平旦井花水下隔日一服百日不得食肉骨蒸日久者此方主之骨蒸日久則絡有留血不去其瘀諸藥不效外臺此方以桃仁獨味為丸所以消留瘀也亦是超人之見大黃蟅蟲丸大黃十兩蒸黃芩二兩炒乾地黃半兩杏仁去皮尖蠐螬炒虻蟲去翅炒各一升甘草三兩乾漆炒桃仁去皮尖各一兩芍藥四兩水蛭百枚炙黃蟅蟲去頭足半升上十二味為末蜜丸如小豆大日三服每服酒下五丸仲景云五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目暗黑緩中補虛大黃蟅蟲丸主之夫濁陰不降則清陽不升者天地之道也小人不退則君子不進者家國之道也故蒸熱之久內有乾血乾血不去則新血不生者人身之道也是方也乾漆桃仁虻蟲水蛭蠐螬蟅蟲去幹血之品也君以大黃是聽令於將軍矣佐以芍藥地黃生新血也佐以杏仁甘草致新氣也佐以黃芩驅遊熱而堅腸胃也仲景為百代醫宗良有識矣今世人一遇五勞羸瘦用滋陰而不愈則坐以待斃嗚呼術豈止於此耶百勞丸當歸炒乳香沒藥人參各一錢大黃四錢蒸水蛭炙黃虻蟲去翅足炒各十四枚上為末煉蜜作丸如梧子大都作一服可百丸五更百勞水下取下惡物為度服白粥十日百勞水者用杓揚之百遍即甘瀾水也一切勞瘵積滯不經藥而成壞證者此方主之此齊大夫傳張仲景之方也疾不經藥而成壞證則中氣尚未壞也有積滯者蒸熱之久內仍乾血也故乳香沒藥大黃蟅蟲水蛭皆消瘀逐敗之品用當歸所以生新血用人參所以固元氣耳此與蟅蟲丸若合一轍皆推陳致新之義也五尸傳疰門第十九敘曰五疰之説惟古昔神良之醫言之未登神良之堂鮮不起而笑之矣嗚呼知鬼神之原自昔難之彼笑者未必其無見也蓋曰拘於鬼神者不足以言至德云爾今著六考益滋斯世之笑不笑者尚謂我哉死人枕即死人腦後骨也得半朽者良用畢置之原處病人顏色聲音形證與脈不合於病者名曰鬼疰宜此方主之鬼疰是病人為邪鬼所憑而致疾也顏色不合於病者面生五色而含愧赧也聲音不合於病者語言不倫於理而涉幽微也形不合於病者動搖跳躍而無內熱也證不合於病者為患詭異不合於病情也脈不合於病者乍大乍小乍長乍短也凡此五者不必悉備但有一焉便為鬼疰即邪祟之謂也然人鬼異途不相為類鬼亦何樂於附人哉能引之以類則脫然舍人而就鬼矣故死人枕鬼物也以此物煎湯飲之則鬼邪觸類而出大瀉數行而愈者勢也此之謂病氣衰去歸其所宗用畢即以其枕送還原處者一則使邪疰之氣有所依歸一則勿以療人而傷鬼也古有徐嗣伯劉大用者常驗之矣志之於後以便觀者徐嗣伯者劉宋時人徐文伯之弟也有人患滯冷積年不瘥嗣伯診之曰尸疰也當得死人枕煮服之於是往古冢取枕枕已一邊腐缺煮服之即瘥後秣陵人張景年十五腹脹面黃衆醫不能療以問嗣伯嗣伯曰此石蛔耳極難療當得死人枕煮服之依語煮枕以湯投之下蛔蟲頭堅如石者五升病即瘥後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覓死人枕煮服之服竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱瘥者何也答曰尸疰者鬼氣狀而未起故令人沉滯得死人枕促之魂氣飛越不得復附體故尸疰可瘥石蛔者久蛔也醫療既癖蛔蟲轉堅世間藥不能遣所以須鬼物驅之然後可散故令煮死人枕也夫邪氣入肝故使眼痛而見魍魎應須鬼物以勾之故用死人枕也氣因枕去故復埋於冢間宋季韶州南七十里鄉曰古田有富家婦人抱異疾常日無他苦每遇微風吹拂則股間有一點奇癢搔不停手已而舉體皆然逮於發厥三日醒及坐有聲如咳其身乍前乍後若搖拽之狀率以百數始定又經日困臥不知人纍夕方愈至不敢出戶更十醫弗效劉大用視之曰吾行其證矣先與藥一服取數珠一串來病家莫知何用也當婦人搖動時記而數之覺微減然後云是名鬼疰因入神廟為邪鬼所憑致精采蕩越法當用死人枕煎湯飲之既飲大瀉數行宿疴脫然大用云枕用畢即送還原處遲留則令人癲狂但借其氣耳昆謂二醫者古昔神良之流也知鬼神之原故能察識異疾諸醫以口耳之識執方以治之其不效也固宜獺肝葛洪云鬼疰是五尸之一疰其病變動有若干種大略使人寒熱淋瀝沉沉默默不得知所苦無處不惡積年纍月漸就沉滯以至於死傳於旁人乃至滅門覺如是候者急治獺肝一具陰乾杵末服方寸匕日三未止再作肘後亦云此方神良夫獺一獸也其肝能治鬼疰此何以故哉凡物惡人而闢處夜出而晝伏者皆陰類也以陰類而治幽隱之疾大易所謂同氣相求內經所謂衰之以屬是也獺有五臟六腑而獨用其肝者肝為厥陰其主藏魂用之尤精良也諺稱鴟梟能療心頭氣痛亦是假陰類以療幽隱爾獺爪屑許學士本事方云宣和間天慶觀一法師行考石極精嚴時一婦人投狀率患人所附須臾召至附語云非我為患別是一鬼亦因病人命衰為祟耳渠今已成形在患人肺中為蟲食其肺系故令吐血聲嘶師掠之此蟲還有畏忌否久而無語再掠之良久云容某説惟畏獺爪屑為末酒調服之則去矣患家如其言而得愈此豫所目見者也夫獺肝獺爪一體也肝極獺之陰爪極獺之陽肝蘊獺之精爪利獺之用故皆為盡妙鰻煎稽神録云有人多得勞疾相因傳死者數人後一女子病生置之匱中釘之沉於江冀絶傳染之患流之金山有漁人異之引至岸見一女子猶然活因取置漁舍多得鰻鱺魚食之病愈遂為漁人之妻又越州鏡湖邵長者女十八染瘵疾纍年刺灸無不求治醫亦不效有漁人趙十煮鰻羹與食食竟內熱之病皆無矣世人得此二説凡遇瘵疾即以鰻魚食之率多不效昆謂鰻魚之性天和則伏風洶則動是逐風之鱗也若用之以療風尸無不愈者若概以之治瘵則恐不能風尸者五疰之一其證淫濯四肢不知痛之所在每發昏沉得風雪便作漸就危篤以至於死也傳勞百一選方天靈蓋二錢炙黃為末年深沉泥漬朽者良虎糞內骨一錢酥炙殺虎於大腸內取者亦可青蛇腦小豆許酥炙色變為度無此亦可鱉甲酥炙黃色一兩九肋者尤良安息香半斤桃仁一枚去皮尖上件皆為細末檳榔一枚別為細末麝香一分別研青蒿六兩取近藁三四寸者豉三百粒蔥根二寸一個拍東引桃柳李桑枝各七莖如箸大長各七寸細銼楓葉二十一片童子小便半升上件先將青蒿桃柳李桑枝楓葉蔥豉以官升量水三升煎至半升許去渣入天靈蓋虎糞內骨青蛇腦鱉甲安息香桃仁童子小便同煎取汁去渣有四五合將檳榔麝香同研勻調作一服早晨溫服被覆取汗恐汗內有細蟲以帛拭之即焚相次須瀉必有蟲下如未死以大火焚並棄長流水內所用藥切不得令病人知日後亦然十來日後氣體復原再進一服皆如前法至無蟲而止百一選方云袁州寄居武節郎李應本湘州法司有男女三人長子因議買宅入無人所居之室忽覺心動背寒凜凜遂成瘵疾既死次女尋病又傳於第三子證候一同應大恐每日祈神設飯以齋雲水冀遇異人且許謝錢三十萬後遇一道人傳以此方不受一錢而去且教以祈於城隍以為陰助遂如其言下蟲七枚其色如紅爊肉而腹白長約一寸闊七八分前鋭後方腹下近前有口身之四周有足若魚骨細如針尖而曲已死試取火焚之以鐵火箸扎刺不能入病勢頓減後又用一劑得小蟲四枚自此遂安昆謂天靈蓋人蟲之尸物也虎糞內骨毛蟲之尸物也青蛇腦鱗蟲之尸物也鱉甲介蟲之尸物也二五之精各從其類故假尸物以療五尸疰疾此大易所謂同氣相求內經所謂衰之以屬是也東引桃柳李桑枝出乎震者也得天地升生之氣故能匡正而闢不祥楓葉青蒿相見乎離者也得天地長養之氣故能止陽而驅邪熱蔥根豆豉表藥也能疏腠而開鬼門麝香安息竄藥也能利竅而消疰惡檳榔能殺三蟲桃仁能除惡敗童子小便者以其得少陽之完氣一能去邪火一能致新氣也蘇合香丸白朮炒青木香烏犀角香附子炒去毛丁香硃砂研水飛訶黎勒煨去皮白檀香安息香另為末無灰酒一升熬膏麝香研蓽茇龍腦研沉香各二兩薰陸香另研一兩蘇合香油入安息香膏內蜜丸蠟固聽用古稱尸疰有五飛尸遁尸風尸沉尸注尸也宜此方主之本事云飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哀哭便發風尸者淫濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纏骨結臟衝心脅每發絞切遇寒冷便發注尸者舉身沉重精神錯雜常覺昏廢每節氣至輒變大惡是方也香能辟邪惡故用沉檀腦麝安息薰陸蘇油青木香附溫能壯胃氣故用蓽茇丁香朱能闢鬼魅故用硃砂甘能守中氣故用白朮酸能致新液故用訶黎犀能主蟲疰故用生犀互考見中風門死人枕天靈蓋敗龜板紅鉛説昔徐嗣伯用死人枕取半朽者用畢曰復埋故處師云天靈蓋非出神農本經不得已而用則取年深漬朽者均之仁人之言也蓋醫仁術也使其明而利人幽而禍鬼如陰責何故昔人推此心以及物凡於藥內宜用禽蟲之類皆取自死者如用龜板而曰敗龜板是也孫真人曰殺生以求生去生益遠皆所以全此心之仁也近世術家有導取紅鉛者使童女內服壯陽泄陰之藥外用異術以取之往往致瘵是殺人而療人也豈同仁之德耶氣門第二十敘曰氣血人身之二儀也氣為主而血為配故曰氣化即物生氣變即物易氣盛即物壯氣弱即物衰氣正即物和氣亂即物病氣絶即物死是氣之當養也明矣一或失治則衰且亂病且死故考五方以治氣獨參湯人參二兩煩躁脈微者加童便一卮身寒脈微者加附子三錢諸虛氣弱危急者此方主之氣者萬物之所資始也天非此氣不足以長養萬物人非此氣不足以有生故曰一息不運則機緘窮一毫不續則霄壤判是以病而至於危急良醫以氣為首務也人參味甘性溫得天地衝和之氣以成形故用之以補沖和之氣使其一息尚存則可以次第而療諸疾矣煩躁加童便者虛而有火也身寒加附子者回其孤陽也雖然虛實之辨不可不察獨參但可以療虛耳若實證危急猶然攻之故越人有實實之戒四君子湯人參白朮白茯苓炙甘草各二錢面色萎白言語輕微四肢無力脈來虛弱者此方主之夫面色萎白則望之而知其氣虛矣言語輕微則聞之而知其氣虛矣四肢無力則問之而知其氣虛矣脈來虛弱則切之而知其氣虛矣如是則宜補氣是方也人參甘溫質潤能補五臟之元氣白朮甘溫健脾能補五臟之母氣茯苓甘溫而潔能致五臟之清氣甘草甘溫而平能調五臟愆和之氣四藥皆甘溫甘得中之味溫得中之氣猶之不偏不倚之君子也故曰四君子六君子湯人參白朮茯苓甘草半夏陳皮氣虛痰氣不利者此方主之內經曰壯者氣行則愈怯者著而成病東南之土卑濕人人有痰然而不病者氣壯足以行其痰也若中氣一虛則不足以運痰而痰證見矣是方也人參白朮茯苓甘草前之四君子也所以補氣乃半夏則燥濕以制痰陳皮則利氣以行痰耳名之曰六君子者表半夏之無毒陳皮之弗悍可以與參苓朮草比德云爾補中益氣湯人參去蘆炙甘草各一錢黃耆一錢五分炙升麻三分白朮炒當歸陳皮柴胡各五分困乏勞倦傷其中氣者此方主之中脾也坤也萬物之母氣陽也乾也萬物之父過於困乏勞倦則百骸皆虛百骸既虛必盜父母以自養而中氣大傷矣不有以補之則形氣不幾於絶乎故用白朮甘草之平補者以補中用人參黃耆之峻補者以益氣土欲燥則當歸隨以潤之氣欲滯則陳皮隨以利之而升麻柴胡者所以升乎甲膽乙肝之氣也蓋甲乙者東方生物之始甲乙之氣升則木火土金水次第而生生矣二十四味流氣飲和劑陳皮青皮甘草炙厚朴薑製紫蘇香附各四兩大腹皮丁香皮檳榔木香草果莪朮炮肉桂藿香各一兩半人參麥門冬白朮赤茯苓枳殼炒石菖蒲木瓜白芷半夏各一兩木通上件每服五錢腹中氣滯痞悶不快胸膈走痛者此方主之氣陽也升降出入法乾之行健不息使氣無留滯斯無痛苦若人也以寒熱怒恚喜憂愁七氣干之則痞悶痛楚之疾生爾今夫寒則氣收收則氣不流矣故用丁皮肉桂草果之屬溫而行之熱則氣亢亢則氣不流矣故用麥門冬赤茯苓木通之屬清而導之怒則氣逆逆則氣不流矣故用檳榔枳殼厚朴木瓜之屬抑而下之恚則氣積積則氣不流矣故用青皮陳皮腹皮木香莪朮之屬快而利之喜則氣緩緩則氣不流矣故用人參白朮甘草之屬補而益之憂則氣沉沉則氣不流矣故用白芷紫蘇之屬升而浮之愁則氣鬱鬱則氣不流矣故用香附菖蒲半夏藿香之屬利而開之或問七氣之來豈能並至方以二十四味何示人以弗精專也余曰氣證與諸證不同諸證者痰血積食屬於有形故著於一處偏於一隅可以單方治也若夫七情之氣屬於無形上下左右散聚無常故集辛香之品而流動之雖二十四味不厭其繁譬之韓侯之兵多多益善云爾血證門第二十一敘曰血營氣衛胥有義焉陰在內陽之守也故曰營陽在外陰之衛也故曰衛二者宜調而不宜病血一不調則營守乎中者反出於外而敗之微者迫於熱盛者真陽不足以運血而衛亦敗也今考名方二十八首酌而用之則調元之手矣四物湯當歸酒洗熟地黃各三錢川芎酒洗一錢五分白芍藥酒炒二錢血不足者此方調之氣血人身之二儀也天地之道陽常有餘陰常不足人與天地相似故陰血難成而易虧是方也當歸芍藥地黃味厚者也味厚為陰中之陰故能生血川芎味薄而氣清為陰中之陽故能行血中之氣然草木無情何以便能生血所以謂其生血者以當歸芍藥地黃能養五臟之陰川芎能調營中之氣五臟和而血自生耳若曰四物便能生血則未也師云血不足者以此方調之則可若上下失血太多氣息幾微之際則四物禁勿與之所以然者四物皆陰陰者天地閉塞之令非所以生萬物者也故曰禁勿與之當歸補血湯當歸二錢黃耆一兩男婦肌熱目赤面紅煩渴引飲脈來洪大而虛重按全無者此方主之血實則身涼血虛則身熱或以肌困勞役虛其陰血則陽獨治故令肌熱目赤面紅煩渴引飲此證純象傷寒家白虎湯之證但脈大而虛非大而長為可辨爾內經所謂脈虛血虛是也當歸味厚為陰中之陰故能養血而黃耆則味甘補氣者也今黃耆多於當歸數倍而曰補血湯者有形之血不能自生生於無形之氣故也內經曰陽生陰長是之謂爾東垣云此證誤服白虎者必死當須識此勿令誤之獨參湯人參去蘆二兩凡上下失血過多脈微欲絶者急以此方主之血者氣之守氣者血之衛相偶而不相離者也一或失血過多則氣為孤陽亦幾於飛越矣故令脈微欲絶斯時也有形之血不能速生幾微之氣所宜急固故用甘溫之參以固元氣所以權輕重於緩急之際也故曰血脫益氣古聖人之法或者不達此理見其失血而主四物湯則川芎之香竄能散幾微之氣而當歸芍藥地黃皆滋陰降下之品不能生血於一時反以失救死之權而遺人夭殃矣醫云乎哉八珍湯人參去蘆白朮炒茯苓去皮炙甘草當歸酒洗川芎酒洗芍藥酒炒地黃血氣俱虛者此方主之人之身氣血而已氣者百骸之父血者百骸之母不可使其失養者也是方也人參白朮茯苓甘草甘溫之品也所以補氣當歸川芎芍藥地黃質潤之品也所以補血氣旺則百骸資之以生血旺則百骸資之以養形體既充則百邪不入故人樂有藥餌焉犀角地黃湯生犀角鎊生地黃白芍藥牡丹皮吐衄不止者此方主之口出血曰吐鼻出血曰衄火逆於中血隨火上有此二證然吐血責之腑衄血責之經求其實則皆炎上之火也火者心之所司故用生犀生地以涼心而去其熱心者肝之所生故用丹皮芍藥以平肝而瀉其母此窮源之治也今人治吐血者以涼水濯其兩足此釜底抽薪之意也治衄血者以涼水拊其後頸此責其火於太陽經也皆是良法互考見咳嗽門痘門四生丸生荷葉生艾葉生地黃生柏葉四件爛搗丸如雞子大每服一丸陽乘於陰血熱妄行或吐或衄此方亦良統而論之生之則寒則四生皆能去火析而論之則荷艾輕香去火於氣芐柏質實瀉火於陰火去則血歸經而吐衄愈矣黃連解毒湯黃連黃芩黃柏梔子各三錢炒陽毒上竅出血者此方主之治病必求其本陽毒上竅出血則熱為本血為標能去其熱則血不必治而自歸經矣故用芩梔柏苦寒解熱之物以主之然惟陽毒實火用之為宜若陰虛之火則降多亡陰苦從火化而出血益甚是方在所禁矣人中白新瓦上逼干溫湯調下三錢衄血不止者此方主之人中白即本草溺白垽也其味鹹寒咸則能入血寒則能勝熱其味厚於人便故其奏功尤捷生地黃自然汁取生芐十餘斤只用新布拭淨搗絞取汁勿用生水洗之吐衄不止者此方亦良東垣曰生地黃涼心火之血熱瀉脾土之濕熱止鼻中之衄熱除五心之煩熱故吐衄之疾取自然汁呷之血涼而止茜根散茜根阿膠黃芩側柏葉生地黃各一兩炙甘草五錢陰虛衄血者此方主之陰陽之在人平則治偏則病若腎陰一虛則陽勝矣故載血上行而令衄是方也阿膠能補虛黃芩能養陰甘草能緩急茜根側柏生地黃則皆去血中之熱能生陰於火亢之時者也黃芩芍藥湯黃芩炒白芍藥酒炒甘草各三錢陰火載血上行衄而不止者此方亦主黃芩之苦能降火芍藥之酸能收陰甘草之甘能緩急止衄散黃耆六錢赤茯苓白芍藥當歸生地黃阿膠各三錢飢困勞役動其虛火致衄不止者此方主之飢困勞役而動其火其人本虛可知矣虛火可補故用黃耆當歸阿膠甘溫之品以補之然赤茯苓能導丙丁白芍藥能收陰氣生地黃能涼血熱三物者去血中之熱自是沖和與芩連苦寒之劑殊別實火宜用連芩虛火則惟此類為宜也或問虛火實火何以辨之余曰聲高氣壯為實火言而微終日復言為虛火人參飲子人參黃耆各一錢五分麥門冬當歸甘草白芍藥各一錢五味子九粒暑月衄血此方主之內經曰必先歲氣無伐天和故時當暑月則肺金受克令人乏氣之時也理宜清金益氣清金故用麥門五味益氣故用甘草參耆芍藥之酸所以收其陰當歸之辛所以歸其血此亦虛火可補之例也榴花散百葉榴花曬乾為末衄不止者以此末吹入鼻中立止榴花之紅有使入血榴花之澀可使止血一夫當關此藥近之丹溪咳血方青黛飛栝蔞仁去油訶子肉海粉去砂山梔炒黑等分咳嗽痰血者此方蜜丸噙化肺者至清之臟纖芥不容有氣有火則咳有痰有血則嗽咳者有聲之名嗽者有物之義也青黛山梔所以降火栝蔞海粉所以行痰訶子所以斂肺然而無治血之藥者火去而血自止也人溺咳血者宜此一物飲之褚澄齊之聖醫也其遺書曰咳血不易醫喉不容物毫髮必咳血滲入喉愈滲愈咳愈咳愈滲飲溲溺則百不一死服寒涼則百不一生吾於是乎師其言矣聖餅子青黛一錢杏仁四十枚去皮尖以黃耆煎湯炒黃色二味研作餅子入柿餅內濕紙包煨連柿餅研細米飲調服咯血者此方主之咯血者咯而出血責之脾胃也青黛去土中之火杏仁利中宮之氣氣利火去則不咯不咯則不血矣荷葉散荷葉不拘多少焙乾為末咯血此方亦良氣分有火則令人咯久久咯之則動其血褚氏曰血雖陰類運之者其和陽乎荷葉有仰盂之形得震卦之象有輕香之氣得清和之體故能和陽定咯而運血大補丸黃柏一物炒褐色作丸嘔血者此方主之嘔與咯不同聲出於上焦為咯重而短也聲出於下焦為嘔濁而長也黃柏苦而潤苦故能瀉火潤故能就下也側柏散側柏葉一味為末米飲調下三錢此亦治嘔血之方也側陰象也柏遇寒而不凋得陰氣之最厚也故能入陰而瀉嘔逆之火然其性微香則其妙又能和陽而不偏於陰矣此其所以為良也晚漱治牙宣牙宣者齒根出血也此以肥甘之熱致病每於晚膳後以茶漱而潔之則病愈矣小薊飲子小薊生地黃滑石通草蒲黃炒藕節淡竹葉當歸梔子炒甘草各半兩下焦結熱血淋者此方主之下焦之病責於濕熱法曰病在下者引而竭之故用生地梔子涼而導之以竭其熱用滑石通草竹葉淡而滲之以竭其濕用小薊藕節蒲黃消而逐之以去其瘀血當歸養血於陰甘草調氣於陽古人治下焦瘀熱之病必用滲藥開其溺竅者圍師必缺之義也小薊琥珀散小薊琥珀等分為末此亦治血淋之方也薊根能治下焦瘀血琥珀能治膀胱結熱牛膝膏牛膝三斤煎膏一斤空心鹽水化下四錢此亦血淋之方也牛膝質潤而苦鹹形實而修長質潤故能活血苦鹹故能勝熱形實故能就下修長故能導小腸而利膀胱玄胡索散玄胡索一兩朴硝三分分二次服此治陽邪陷入下焦令人尿血之方也陽邪者熱病傷寒之毒也下焦者陰血所居陽邪入之故令尿血玄胡索味苦而辛苦故能勝熱辛故能理血佐以朴硝取其鹹寒利於就下而已胃風湯人參去蘆白朮炒茯苓去皮川芎洗淨當歸酒洗白芍藥炒桂炒等分風邪入於腸胃泄下鮮血或腸胃濕毒下如豆汁瘀血者此方主之風陽邪也血得之則善行故下鮮血濕陰邪也血得之則敗壞故如豆汁氣血虛而後邪湊之故用人參白朮茯苓以補氣用川藥當歸芍藥以養血肉桂之辛可以散風邪肉桂之熱可以熯濕毒血藥得之可以調營氣藥得之可以益衛又曰白朮茯苓能壯脾而療濕川芎肉桂能入血而驅風槐花散槐花炒側柏葉荊芥穗枳殼麩炒等分共為末每服三錢空心下腸風臟毒下血此方主之槐花側柏能涼大腸之血荊芥枳殼能療大腸之風風熱相搏者治之良酒煮黃連丸黃連十二兩好酒五升煮乾為末作丸每服三錢濕熱酒毒令人便血者此方主之黃連苦寒枯燥之物也苦寒故能勝熱枯燥故能勝濕而必煮以酒者非酒不能引之入血也柏灰散側柏葉一味春東夏南秋西冬北取來燒灰調下三錢臟毒下血不止者此方主之臟毒之初宜涼血涼血皆苦寒之藥久久則氣寒而血益不固矣法曰澀可以固脫故用柏灰之澀以止之四時採之必辨其方者取其得氣之厚也他如干柿餅燒灰亦良人參樗皮散人參去蘆樗根白皮等分每末三錢臟毒挾熱下血日久不止者此方主之臟毒腸毒也挾熱者謂挾客熱與飲酒之類也日久不止則氣亦虛而不足以固血矣故用人參之甘以補氣樗根之澀以固血補以舉之澀以劫之雜霸之治也脫肛門第二十二敘曰脫肛一也有寒熱之判焉又能進之而辨氣血中之寒熱則精藝者也今考古方三首表其要者爾丹溪脫肛方人參黃耆川芎當歸升麻久瀉脫肛者此方主之瀉久則傷氣下多則亡陰是氣血皆虧矣故令廣腸虛脫氣不足者補之以甘溫故用參耆陰不足者養之以厚味故用芎歸下者舉之故用升麻舉肛丸半夏天南星枯白礬各五錢枯紅礬雞冠花炒白附子各五兩訶子肉煅黑附子生枳殼各一兩蝟皮二枚炙栝蔞一枚燒存性胡桃仁十五枚燒存性共為末醋糊作丸空心溫酒下三十丸泄瀉虛寒脫肛者此方主之濕盛則濡瀉久瀉則胃虛胃虛則臟寒臟寒則無陽以升舉故令肛腸脫而不上燥能去濕故用半夏南星枯能制濕故用紅白枯礬溫能暖臟故用黑白附子乃若雞冠花刺蝟皮枳殼所以驅風而訶子栝蔞胡桃仁之灰取其澀以固脫也收肛散熊膽五分孩兒茶三分冰片一分共為細末乳調塗肛上熱汁下而肛收矣熱瀉脫肛者用此方塗之良熱則肛門澀澀則便不易出不易出則令人努責努責之久則令脫肛此與寒脫不同者此則肛門澀寒脫則洞泄而不澀也苦可以勝熱故用熊膽澀可以固脫故用兒茶辛可以拔邪故用冰片嘔吐門第二十三敘曰嘔有聲長聲短之辨吐有見痰見食之分參之以脈證合之以顏色問之以從來始為無失毋但曰嘔吐小疾而忽之常見肝實之證令人嘔吐不已而死者茲考六方志其略爾二陳加山梔黃連生薑湯半夏陳皮去白茯苓甘草炙山梔子炒黑黃連炒生薑等分胃中有熱膈上有痰令人嘔吐者此方主之有聲之謂嘔有物之謂吐聲者氣與火也物者痰與涎也半夏燥痰濕茯苓滲痰濕陳皮利痰氣甘草益脾氣此二陳治痰之旨也苦可以瀉火故用梔子辛可以行滯故用生薑六君子湯人參白朮茯苓甘草各二錢半夏陳皮各一錢久病胃虛聞穀氣而嘔者此方主之胃者水穀之海倉廩之官也故胃強則善谷胃弱則聞谷而嘔經曰安穀者昌失谷者亡奈之何而不急治乎故人參白朮茯苓甘草氣味甘溫可以益胃陳皮半夏氣味辛利可以破嘔理中加丁香湯人參白朮炒甘草炙丁香乾薑炒嘔吐腹痛者此方主之嘔吐而痛即止者為火嘔吐而痛不止者為寒然寒則收引胡然能吐師曰寒勝格陽故令吐也治寒以熱故用丁香乾薑之溫吐多損氣故用人參白朮甘草之補竹茹湯葛根三錢半夏制竹茹各二錢甘草一錢傷寒正汗後餘熱留於陽明少陽必令作嘔此方主之陽明胃也少陽膽也有辨焉口渴者熱在胃口苦者熱在膽也兼而有之則二經均有留熱矣是方也乾葛清胃竹茹清膽半夏破逆甘草調陽雄礬瓜蒂散雄黃明礬苦瓜蒂炒各五分共為末酒服嘔而流涎脈平者蟲家證也主此方吐之蟲動則流涎胃癢則令嘔脈平者得平人無病之脈不遲不數無寒無熱也雄黃氣悍明礬苦澀殺蟲之品也佐以瓜蒂之善湧則蟲立吐而出矣又曰實而能吐者主以此方虛而不能吐者宜主傷寒門烏梅丸六味地黃丸熟地黃八兩山茱萸山藥各四兩牡丹皮白茯苓澤瀉各三兩蜜丸陰虛於下令人多嘔者主此方鹽湯吞之脈解篇曰諸陽氣浮無所依從故嘔咳上氣喘此陰虛於下而令孤陽上浮爾是方也熟地山萸質潤味厚可使滋陰丹皮澤瀉氣味鹹寒可制陽光山藥茯苓味甘而淡可使調中土是六物者皆有益於陰也故主之厄逆門第二十四敘曰厄逆一也中下判焉中焦厄逆其聲短水穀之病也下焦厄逆其聲長虛邪相搏也今考古方三首辨其上下察其虛實則十全之工矣若厄逆日久而且吞酸則翻胃之前驅也從火治之橘皮竹茹湯橘皮竹茹各一升人參生薑各半兩甘草炙二兩大棗三十枚大病後厄逆不已脈來虛大者此方主之厄逆者由下達上氣逆作聲之名也大病後則中氣皆虛餘邪乘虛入里邪正相搏氣必上騰故令厄逆脈來虛大虛者正氣弱大者邪熱在也是方也橘皮平其氣竹茹清其熱甘草和其逆人參補其虛生薑正其胃大棗益其脾丁香柿蒂竹茹湯丁香三粒柿蒂竹茹各三錢陳皮一錢大病後中焦氣塞下焦厄逆此方主之大病後五臟皆傷升降失常故令中焦痞塞五臟之陰既傷則少陽之火奮於下故令下焦厄逆直衝清道而上也是方也丁香陳皮辛溫者也理中氣之痞塞竹茹柿蒂苦寒者也療下焦之厄逆或問降逆何以不用梔柏余曰此少陽虛邪非實邪也故用竹茹柿蒂之味薄者以主之若梔柏味厚則益戕其中氣痞塞不益盛乎古人蓋亦深權之矣木香調氣散木香檀香白蔻仁丁香各三兩砂仁四兩甘草炙藿香各半兩共為末每服二錢鹽湯下中焦厄逆者此方主之中焦者水穀之海倉廩之區也其厄逆責之穀氣故用砂仁蔻仁以化食木香丁香檀香藿香以調氣甘草以和中鹽湯以潤下或問中焦厄逆與下焦厄逆何以辨余曰彼則由於大病後此則得之飲食後也又中焦之厄逆輕而短下焦之厄逆惡而長其辨判然矣翻胃門第二十五敘曰翻胃一證古今難之若胃脘未枯皆為可治借曰枯之則從容用藥猶可久延若造次不察病理非惟無益而又害之矣今著六考宜於言外而變通之韭汁牛乳飲韭汁牛乳等分時呷之胃脘有死血乾燥枯稿食下作痛翻胃便祕者此方主之翻胃者胃不能安穀食下即出之名也嗜酒燥暴之人多有此疾胃脘有死血者醇酒漬胃久積瘀熱之所致也乾燥枯稿者燥急心熱之所致也有枯燥故令食下作痛有積熱故令翻胃便祕韭汁味辛能消瘀行血牛乳甘溫能養血潤燥驢尿一物飲驢尿每服呷二合鬱火翻胃者此方主之火鬱於中治以辛香開胃之藥益滋其燥非所宜也驢尿辛膻可使開鬱然為濁陰之所降則可以濟火矣唐貞觀中許奉御及柴蔣等時稱名醫奉敕治翻胃竭其術竟不能療漸至羸憊死在旦夕忽有術士云服驢子小便極驗旦服二合午食惟吐一半晡時又服二合人定時食粥吐即定後奏知大內中五六人患翻胃同服一時俱瘥盧和著丹溪纂要謂入驢尿以防生蟲此未究理者也螺泥丸取田中大螺不拘多少用新水養之取其吐出之泥陰乾為丸每服三十丸藿香湯下積熱翻胃此方亦良螺性至涼泥性至冷故可用之清胃吞以藿香湯假其辛芳開胃而已九蒸大黃諸逆衝上皆屬於火故用大黃酒潤九蒸曬之取其無傷胃氣而能去火此久練之將軍也附子散附子一枚乾薑煎湯潤七次為末每服三錢寒痰翻胃者此方主之膈上有寒痰壅塞中下二焦之氣陰遏其陽蓄極而通則令翻胃附子辛熱能解寒痰寒痰既解則氣道疏通而無蓄極之陽矣故翻胃頓除三花神祐丸甘遂芫花大戟拌溫炒各半兩黑醜二兩取頭末大黃一兩輕粉一錢共為末水丸每服五丸漸加五丸以快利為度積痰滿胃食下即吐宜主此方胃中純是痰則遏下焦少陽之火蓄極而通必作翻胃者勢也以平劑治之則經年不效故聚甘遂芫花大戟黑醜大黃峻厲之品以下之方內有輕粉一可以逐風涎一可以解遂芫戟醜之辛烈此大毒類聚為丸瞑眩之劑也惟聲重脈來有力者能行之若言微脈來無力者勿輕與也噎膈門第二十六敘曰近代醫籍翻胃噎膈混作一證今考於漢唐之上有翻胃有噎有膈要之翻胃自是不同而噎而膈則可混一而治也考方八首明者辨之深師七氣湯乾薑黃芩桂心半夏甘草橘皮乾地黃芍藥各二兩桔梗三兩枳實五枚人參一兩吳茱萸五合氣噎膈者此方主之噎膈者有物噎塞防礙飲食之名今人與翻胃渾然無辨非古也深師孫真人之傳也七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣也氣者運行不息之物故氣行則治氣鬱則病沖和則治乖戾則病是方也辛可以行氣故用乾薑肉桂吳萸半夏陳皮之辛苦可以降氣故用黃芩枳實桔梗之苦脾虛則不能運氣故用人參甘草以益脾肝腎弱則不能吸氣故用地黃以滋腎芍藥以和肝韭汁飲生韭汁醇酒等分每服二合日二血噎膈者此方主之漢醫但稱噎稱膈而已後之方書稱五噎五膈五噎者氣噎憂噎勞噎食噎思噎也五膈者憂膈恚膈氣膈寒膈熱膈也立言雖曰有五説證其實未周今不拘其説只據世人所有之證而訂其方焉血噎膈者或因跌撲或因大怒血積胸膈久久凝結令人妨礙飲食得熱則寬得寒則痛是也生韭汁能解蓄血之瘀結佐以醇酒行其勢也栝蔞實丸栝蔞仁枳殼製半夏桔梗薑汁米糊為丸痰噎膈者此方主之痰隨氣上亦隨氣下故栝蔞枳殼桔梗皆下氣藥也痰以濕生必以燥去故半夏者燥濕之品也或問桔梗為諸藥之舟楫浮而不沉者也何以下氣余曰甘者戀膈苦者下氣輕者上浮苦者下降此藥之性也桔梗甘而苦為陽中之少陰故初則戀膈久則下氣矣痰盛者宜於痰門諸方消息之回令丸黃連六兩吳茱萸一兩水煮少時曬乾共末為丸火噎膈者此方主之此即左金丸也曰回令者黃連之苦能勝熱可以回其火令也以吳茱萸之辛熱佐之取其反佐以從治爾食鬱越鞠丸山楂神麯砂仁香附童便制蒼朮米泔浸七日撫芎梔子食噎膈者此方主之食不自膈也或由氣塞或由火鬱然後停食而作食膈故用香附蒼朮撫芎以順氣梔子以瀉火山楂神麯砂仁以消食昔齊王中子諸嬰兒病煩憊食不下時嘔沫倉公視之曰食膈病也作下氣湯以飲之其方今不可考矣若芩連枳朮丸木香檳榔丸義亦近之蒜齏酢太平御覽云華他行道見一人病噎嗜食而不得下家人車載欲往就醫他聞其呻吟駐車往視語之曰向來道旁賣餅者有蒜齏大酢從取三升飲之病即當瘥即如他言立吐蛇一條懸之車邊欲造他他尚未還他家小兒戲門前迎見自相謂曰客車邊有物必是遇我公也疾者前入見他壁懸此蛇輩以十數昆謂蒜味辛熱為陽中之陽能令人氣實悶亂而自吐若蛇蟲蠱瘕猶為宜之褚氏傳曰褚澄以蒜一升吐李道念之雞雛齊諧記云郭坦之兒食蒜一畦吐消食籠於頃刻蒜之妙用如此今之醫者罕能知之或問何以不用瓜蒂散余曰傷寒內熱者宜吐以瓜蒂散之苦寒蟲瘕痼冷者宜吐以蒜酢之辛熱人知苦能吐熱而不知熱能吐寒故特表而出之染靛廣五行記永徽中絳州有僧病噎防食數年臨死遺言令破喉視之得一物似魚而有兩頭遍體悉是肉鱗致鉢中跳躍不止以諸味投鉢中皆化為水時寺中方刈藍作靛試取少靛致鉢中此蟲繞鉢畏走須臾化為水昆謂此蟲濕熱所生濕從土化熱從火化靛之為物色青而性寒是稟東方之木色與北方之水味最厚者也水足以制火木足以剋土此五行之理也故足以化濕熱之蟲自有五行以來上而萬象下而萬類一為剋制無不化之況於此蟲乎楮實湯南唐烈祖因食飴喉中噎國醫皆莫能愈時吳廷紹尚未知名進楮實湯一服疾失去群醫默識之他日取用皆不驗或叩之答曰噎因甘起故以楮實湯治之其方今不可考但發此二句便知其為良醫內經曰甘者令人中滿故其氣上溢奈何不作嗌乎又曰酸勝甘則治法思過半矣情志門第二十七敘曰情志過極非藥可愈須以情勝故曰怒傷肝悲勝怒喜傷心恐勝喜思傷脾怒勝思憂傷肺喜勝憂恐傷腎思勝恐內經一言百代宗之是無形之藥也今考神良之醫士十一事明者觸類而通之則術在我矣文摯齊人也齊威王病發使召文摯摯至謂太子曰王病怒則愈王若即殺臣奈何太子曰無慮我當救之文摯於是不時來見王及來不脫履而登床王大怒使左右持下將烹之後及太子叩頭請救王怒遂解赦摯因此病愈所以然者王之病得於思故以怒勝之魏志云有一郡守病華他以其人甚怒則瘥乃受其貨而不加功無何棄去留書罵之守果大怒令人追殺守子知之囑吏勿逐瞋恚不已吐黑血數升而愈所以然者守之病亦本于思也經曰思則氣結氣結者陰翳之根也故用暴怒以傷其陰使之歸於平調而已邵氏聞見録云州監軍病悲思其子迎赫允治之允告其子曰法當甚悸即愈時通守李宋卿御史嚴甚監軍內所畏也允與其子請於宋卿一造問責其過失監軍惶怖汗出疾乃愈蓋悲思則氣結驚怖則氣浮浮則氣不結矣此亦以情相勝也趙知則太原人因喜成疾巢氏醫脈之為之驚異出取藥竟不與之數日趙悲哭辭家人曰處世不久矣巢知其將愈使人慰之詰其故引素問恐勝喜以對可謂得玄關者也一婦正産之時收生婦以溫水進之誤進鹿角脂鹿角脂女子塗鬢物也因哇而舌出産後數日不能收醫藥屢不應甄立言最後至以硃砂塗其舌仍命作産子狀以兩婦人掖之乃使人潛於壁外多捧缶器向危處擲地作聲聲聞而舌收矣所以然者恐則氣下故也先用硃砂塗其舌者恐其驚氣入心故為未然之防爾韓丞相疾天方不雨更十醫罔效左友信最後至脈已則以指計甲子曰某日當雨竟出韓疑曰豈謂吾疾不可為耶何言雨而不及藥我也既而其夕果雨韓喜起而行乎庭達旦疾若脫去乃召左至而問之對曰公相之疾以憂得之私計公相忠且仁方今久旱必為民憂以旱為憂必以雨而瘳理固宜然何待藥而愈耶此亦素問喜勝憂也一女許婚後夫經商二年不歸因不食困臥如癡無他病竟日向壁而臥其父迎丹溪翁治之告以故翁脈畢謂其父曰此思則氣結也藥難獨治得喜可解不然令其怒於是掌其面誣以外情果大怒而號泣者三時令解之即求食矣所以然者悲則氣消怒則勝思故也翁謂其父曰病雖瘥得喜方已乃諭以夫回既而果然疾亦不舉一縣差拿犯人以鐵索項所犯至縣行至中途其犯投河而死犯家告差人索騙威逼至死及能脫罪未免破財憂憤成病如醉如癡謬言妄語無復知識其主延戴念仁視之戴云此以費財而病必以得財而愈乃命作三錫錠如銀狀預置於泥溝之中候其至時詐以鎖鑰誤墮其中命探之乃出三錫錠主曰銀也吾不用此弗義之財悉以與汝其差握視不置病遂日愈此亦喜勝憂也一女子母甚是相愛既嫁而母死遂思念不已精神短少懨懨嗜臥諸藥不應其夫延韓世良治之韓曰此病得之於思藥不易愈當以術治之乃賄一巫婦授以祕語一日夫謂妻曰汝之念母如此不識彼在地下亦念汝否吾當他往汝盍求巫婦卜之妻欣諾遂召巫至焚者禮拜而母靈降矣一言一默宛然其母之生前也女遂大泣母叱之曰勿泣汝之生命克我我遂早死我之死皆汝之故今在陰世欲報汝仇汝病懨懨實我所為我生則與爾母子死則與爾寇仇矣言訖女改容大怒詬之曰我因母病母反害我我何樂而思之自是而病愈矣此亦以情療之也談植素謹言為韶州佐一日會堂屬官筵中有蘿蔔頗大衆羡之談曰尚有大如人者衆皆笑以為無談悔恨自咎曰人不見如是大者而吾以是語之宜其以吾言為妄且笑也因而憂憤連日不能食其子煌讀書達事思父素不輕言因愧赧成疾必實所言始可療病遂遣人至家取蘿蔔如人大者至官所復會堂屬強父扶疾而陪酒至數巡以車載至席前衆皆驚訝其父大喜厥旦疾愈此亦素問喜勝憂也何解陳留人也一日與河南尹樂廣會飲於趙修武宅酒至數杯忽見杯底有似一小蛇咽之入口亦不覺有物但每每思而疑之日久覺心疼自思小蛇長大食其五臟醫藥不愈久之又會酒趙宅才執杯又見小蛇乃置杯細視之見趙宅梁上有角弓卻是弓梢影於酒底因此解疑其疾遂無此以情疑而病必以疑解而瘥向來以藥治之皆無驗也
