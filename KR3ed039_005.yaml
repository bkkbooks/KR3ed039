body:
  text: 卷五痿痹門第四十五敘曰痿痹二病也今詳內經亦有稱痹為痿者故合而為一考方八首舉其略耳盡其變化則在醫之方寸焉肺熱湯羚羊角玄參射干薄荷芍藥升麻柏皮各三錢生地黃一合梔子仁四錢竹茹二錢肺鳴葉焦令人色白毛敗發為痿躄脈來短數者宜此方主之痿猶萎也痿躄者手足不用之義肺鳴者火來乘金不得其平而自鳴今之喘急是也葉焦者火盛金衰故葉焦也色白者肺病而色自見也毛敗者肺主皮毛病故折敗也發為痿躄者肺主氣氣者萬物之父肺者五臟之天所以出納天地衝和之氣而百骸資始者也肺病則百骸失其天而無以資始矣故令人手足痿躄脈來短者肺之真臟脈也脈來數者火來乘金也斯證也持於冬死於夏十有九危然而主是方者冀其為十中之一爾羚羊玄參射干涼膈之品也肺居膈上故能清肺熱薄荷升麻者辛涼之品也金鬱則泄之故用其辛涼以解肺中鬱熱柏皮能益腎水腎水益則子可以救母生地能涼心血心君涼則火不之乘金梔子竹茹能泄肝腎中相火相火熄則肺金可清芍藥味酸和肝之品也肝和則不至於侮肺侮肺者謂金本以制木今肺金自病肝木乘其虛而輕侮之臣強之象勢使然也人尿肺痿者取人尿無時呷之良於諸藥蓋天一生水地二生火人尿潤下鹹寒人身之天地一也故可以交吾身之坎離濟吾身之水火或者因其穢而拒之悲夫未聞道者也三補丸黃連黃芩黃柏等分為丸心氣熱下脈厥而上色赤絡脈滿溢樞紐折挈脛縱而不任地者名曰脈痿宜此方主之心者君主之官也內經曰君火以名相火以位言君火正其名而無為相火守其位以聽命故心氣熱下脈厥而上者此相火聽命於君也色赤者心病而色自見也絡脈滿溢者孫絡充滿而溢於表炎上作火之象也樞紐折挈者言肢節折挈而不便乃陽光用事邪居百節故耳脛縱不任地者脈溢於上則下脈空虛而痿弱故脛縱而不任地也脈空而痿故曰脈痿是方也黃連瀉心火黃柏瀉相火黃芩瀉五臟之遊火火去則脈不厥逆各循其經而手足用矣正考見火門龍膽瀉肝湯柴胡一錢人參知母麥門冬天門冬草龍膽山梔子生甘草黃連各五分黃芩七分五味子七粒肝氣熱色青爪枯口苦筋膜乾而攣急者名曰筋痿宜此方主之肝者東方木也色青者肝病而色自見也肝主筋爪者筋之餘肝熱故令爪枯也口苦者膽為肝之腑咽為之使膽熱則汁上溢於咽故令口苦也肝主筋膜筋膜乾則燥而攣攣急則手足不用故曰筋痿是方也黃芩黃連山梔膽草皆足以瀉肝火君之以柴胡則能條達乎肝膽矣木盛而兼燥金之化故令攣急天麥門冬知母五味味厚而潤者也故足以養筋而潤燥若生甘草人參者所以養乎陽氣也經曰陽氣者精則養神柔則養筋是故用之互考見火門蠲痹湯羌活赤芍藥酒炒薑黃酒炒甘草各五分黃耆當歸酒炒防風各二錢五分有漸於濕以水為事痹而不仁發為肉痹者此方主之濕氣著於肌肉則營衛之氣不榮令人痹而不仁即為肉痿肉痿即肉痹也是方也防風羌活風藥也用之所以勝濕經曰營血虛則不仁故用當歸以養營又曰衛氣虛則不用故用黃耆以益衛用夫赤芍薑黃者活其濕傷之血也用夫甘草者益其濕傷之氣也六味地黃丸如黃柏知母方熟地黃八兩山茱萸去核山藥各四兩牡丹皮白茯苓澤瀉各三兩黃柏知母各二兩腎氣熱則腰脊不舉骨枯而髓減發為骨痿宜此方主之腎者水臟無水則火獨治故令腎熱腎主督脈督脈者行於脊裡腎壞則督脈虛故令腰脊不舉骨枯髓減者枯涸之極也腎主骨故曰骨痿是方也熟地黃山茱萸味厚而能生陰黃柏知母苦寒而能瀉火澤瀉丹皮能去坎中之熱茯苓山藥能制腎間之邪王冰曰壯水之主以制陽光此方有之矣正考見虛損勞瘵門四君子湯人參白朮茯苓甘草陽明虛宗筋失養不能束骨而利機關令人手足痿弱者此方主之陽明者胃也胃為土土者萬物之母易曰至哉坤元萬物資生若胃土一虛則百骸失養而絶其生氣矣故宗筋縱馳不能束骨而利機關令人手足痿弱是方也人參甘草甘溫之品也甘者土之味溫者土之氣故足以益陽明白朮茯苓燥滲之品也燥之則土不濡滲之則土不濕故足以益脾胃凡人大病之後手足痿弱者率是陽明虛也能於胃而調養之則繼東垣之武矣八味丸熟地黃八兩山茱萸去核山藥各四兩牡丹皮去木白茯苓澤瀉各三兩附子鹽煮肉桂鹽炒各一兩入房太甚宗筋縱馳發為陰痿者此方主之腎坎象也一陽居於二陰為坎故腎中有命門之火焉凡人入房甚而陰事作強不已者水衰而火獨治也陰事柔痿不舉者水衰而火亦敗也丹溪曰天非此火不足以生萬物人非此火不能以有生奈之何而可以無火乎是方也附子肉桂味厚而辛熱味厚則能入陰辛熱則能益火故能入少陰而益命門之火熟地黃山茱萸味厚而質潤味厚則能養陰質潤則能壯水故能滋少陰而壯坎中之水水欲實則澤瀉丹皮之鹹酸可以引而瀉之水欲實則山藥茯苓之甘淡可以滲而制之水火得其養則腎官不弱命門不敗而作強之官得其職矣天雄附子川烏硫黃蜀椒蛇床子韭子小茴香八物考痿證大都主熱痹證大都主寒然痿證亦有寒者痹證亦有熱者此不可泥也內經曰淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣之竭痹聚在肝淫氣肌絶痹聚在脾此五證者非溫藥不足以療之也宜於天雄附子川烏硫黃蜀椒蛇床子韭子小茴香輩消息之厥證門第四十六敘曰六經皆有厥證率是火爾今表雜證之厥數條以示大者若傷寒陰厥陽厥宜於傷寒方考求之六物附子湯附子肉桂防己各四錢炙甘草二錢白朮茯苓各三錢陽氣衰於下令人寒厥從五趾至膝上寒者此方主之進退消長者陰陽之理也故陽氣衰乏者陰必湊之令人五趾至膝上皆寒名曰寒厥寒厥者寒氣逆於下也附子肉桂辛熱之品也故用之以壯元陽而防己甘草白朮茯苓甘溫燥滲之品也可佐之以平陰翳大補丸黃柏一物炒褐色為末作丸陰氣衰於下令人足下熱熱氣循陰股而上者名曰熱厥此方主之陽消則陰長陰退則陽進故陰氣衰於下則陽往湊之令人足下熱也熱盛則循三陰經而上逆因謂之熱厥黃柏味苦而厚為陰中之陰故能補陰氣之不足瀉熱氣之有餘王冰曰壯水之主以制陽光此方之謂也八味順氣散白朮人參白芷白茯苓臺烏藥青皮陳皮各一錢甘草五分七氣拂鬱令人手足厥冷者此方主之氣者人身之陽也一有拂鬱則陽氣不能回達故令手足厥冷是方也白芷臺烏青皮陳皮開鬱順氣之品也可以宣發諸陽人參白朮茯苓甘草補中益氣之品也可以調其不足經曰邪之所湊其氣必虛是故用夫補爾人參固本丸人參二兩天門冬麥門冬生地黃熟地黃各四兩內經曰陽氣者煩勞則張精絶闢積於夏使人煎厥宜此方主之諸動屬陽故煩勞則擾乎陽而陽氣張大陽氣張大則勞火亢矣火炎則水乾故令精絶是以遷延闢積至於夏月內外皆熱水益虧而火益亢孤陽厥逆如煎如熬故曰煎厥是方也生熟地黃能救腎水而益陰精天麥門冬能扶肺金而清夏氣人參能固真元而療煩勞以之而治煎厥誠曲當之方也蒲黃湯蒲黃一兩炒褐色清酒十爵沃之溫服內經曰大怒則形氣絶而血苑於上使人薄厥宜此方主之肝藏血而主怒怒則火起於肝載血上行故令血苑於上苑亂也搏雷風相搏之搏血氣亂於胸中相搏而厥逆也蒲黃能消瘀安血清酒能暢氣和榮故用之以主是證二十四味流氣飲和蘇合香丸尸厥者破陰絶陽形靜如死醫者不知針石宜此二方主之尸厥者五尸之氣暴疰於人亂人陰陽氣血上有絶陽之絡下有破陰之紐形氣相離不相順接故令暴蹶如死所謂一息不運則機緘窮一毫不續則霄壤判也昔虢太子病此扁鵲以針石尉烙治之而愈今之醫者多不識針石苟臨是證將視其死而不救歟故用二十四味流氣飲和蘇合香丸主之使其氣血流動陽無絶絡陰無破紐則亦五會之針五分之尉八減之劑爾流氣飲見氣門蘇合香丸見風門五疰門痙門第四十七敘曰痙風勝之病也而寒濕每兼之然疏風之物不可獨用獨用則筋益燥而痙益堅此養血之品所必加也方藥三考惟同志者廣之小續命湯麻黃去節人參黃芩酒炒芍藥酒炒川芎酒洗防己杏仁去皮尖炒桂枝淨洗甘草各一錢防風附子炒去皮臍各五分病強痓者此方主之痓痙字之誤也強痙者堅強而徑直頸項牽急而背反張也此以風寒濕三者客於太陽傷其大筋筋牽而急故令痙也然得之風濕者令人有汗不惡寒名曰柔痙昔人以桂枝加葛根湯主之是也得之寒者令人無汗惡寒名曰剛痙昔人以葛根湯主之是也是方也有麻黃杏仁則可以發表散寒有桂枝芍藥則可以解肌驅風有防風防己則可以驅邪勝濕有人參甘草則可以益氣柔筋有川芎黃芩則可以和陰去熱乃附子之熱可以溫經而亦可以去濕者也正考見中風門十全大補湯人參黃耆蜜炙茯苓白芍藥酒炒白朮炒當歸酒洗甘草炙熟地黃川芎等分桂枝少許發汗過多因而致痙者此方主之瘡家雖身疼不可發汗發汗則痙者亦此方主之上件皆是過亡津液無以養筋筋牽而急故令百節強痙耳經曰陽氣者精則養神柔則養筋故用人參白朮茯苓黃耆甘草之甘溫者以益陽氣又曰手得血而能握足得血而能步故用當歸川芎芍藥地黃桂枝之味厚者以養陰血桂枝勾玄云以桂熬成濃汁著於諸木嫩苗之上必致萎謝故痙者筋病也肝木主筋藥內用桂可以伐肝緩筋所謂木得桂而柔也以故痙病宜之癇門第四十八敘曰癇沉疴也一月數發者易治周年一發者難治此虛實之判也實者即攻之虛者先補可也考方三首識其大耳臨證變化豈曰拘之續命湯加紫蘇陳皮方竹瀝一升二合生薑汁五合生苄汁一升龍齒末防風麻黃各四兩防己附子炮石膏桂枝各二兩陳皮去白紫蘇各半兩癇疾者發則仆地悶亂無知嚼舌吐沫背反張目上視手足搐搦或作六畜聲者是也宜此方主之癇疾者風痰之故也風陽氣也內經曰陽之氣以天地之疾風名之故其發也暴然所以令人仆地者厥氣並於上上實下虛清濁倒置清濁倒置故令人僕悶亂無知者濁邪干乎天君而神明壅閉也舌者心之苗而脾之經絡連於舌本陽明之經絡入上下齒縫中故風邪實於心脾則舌自挺風邪實於陽明則口自噤一挺一噤故令嚼舌吐沫者風熱盛於內也此風來潮洶之象背反張目上視者風在太陽經也足太陽之經起於睛明挾脊而下風邪干之則實而徑急故目上視而背反張也手足搐搦者風屬肝木肝木主筋風熱盛於肝則一身之筋牽挈故令手足搐搦也搐者四肢屈曲之名搦者十指開握之義也或作六畜聲者風痰鼓其氣竅而聲自變也譬之弄笛焉六孔閉塞不同而宮商別異是也是方也有麻黃桂枝防風紫蘇則可以泄在經之邪有竹瀝薑汁陳皮則可以行痰涎之滯有苄汁石膏則可以清心肺之熱有龍齒可以安魂有防己可以通塞其夫沉痼之痰非附子不足以行其滯而其大熱之性又足以益火之源而消陰翳譬之太陽中天幽谷之翳障無不消滅此古人用附子之意也利驚丸青黛輕粉各一錢牽牛末五錢天竺黃二錢上件為末蜜丸黍米大每服一錢得利止後服驚癇氣實者此丸與之癇疾之原得之於驚或在母腹之時或在有生之後必以驚恐而致疾故曰驚癇蓋恐則氣下驚則氣亂恐氣歸腎驚氣歸心並於心腎則肝脾獨虛肝虛則生風脾虛則生痰畜極而通其法也暴故令風痰上湧而癇作矣經曰實者瀉之故用竺黃青黛以瀉肝牽牛輕粉以瀉脾瀉肝所以驅風瀉脾所以驅涎茶子吐法癇證宜下宜吐茶子苦而善湧能吐頑痰用者宜取一升搗爛煎湯五倍之令患人先一夕勿食夜膳次早以帛束其少腹於無風處飲而行之得大吐便止不必盡劑癲狂門第四十九敘曰癲狂皆失心也經曰主不明則十二官危故視聽言動皆失其職初病者宜瀉其實久病者宜安其神茲考名方八首而古人之治法見矣大黃一物湯大黃四兩酒浸一宿水三升煎之分三服不已再作癲狂病者此方主之多怒為癲多喜為狂癲者精神不守言語錯亂妄見妄言登高罵詈是也狂之始發少臥少飢自賢自貴妄笑妄動登高而歌棄衣而走是也癲病者責邪之並於肝狂病者責邪之並於心也此皆實證宜瀉而不宜補故用大黃以瀉之取其苦寒無物不降可以瀉實又必數日後方可與食但得寧靜便為吉兆不可見其瘦弱減食便以溫藥補之及以飲食飽之病必再作戒之戒之緩與之食方為得體故曰損其穀氣則病易愈所以然者食入於陰長氣於陽故也麻仁煎麻仁四升水六升煎七合空心服癲風者此方與之三劑效麻仁潤藥也多與之令人通利故足以瀉癲風然可以濟火可以澤肝可以潤脾可以濡腎有攻邪去病之能無虛中壞氣之患足稱良也苦參丸苦參一物為末蜜丸梧子大每服十五丸薄荷湯下發狂無時披頭大叫欲殺人不避水火者此方主之上件諸證皆神明內亂也故古人病狂謂之失心苦參主心腹結氣故足以治時熱狂言生鐵落黃帝問曰有病怒狂者此病安生岐伯對曰生於陽也帝曰陽何以使人狂岐伯曰陽氣者暴折而難決故善怒也病名曰陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵落為飲夫生鐵落者下氣疾也昆謂怒者肝木之志也鐵落金之體也木欲實金當平之此其所以用鐵落也靈苑方硃砂酸棗仁乳香散辰砂光明有牆壁者一兩酸棗仁半兩微炒乳香光瑩者半兩癲疾失心者將此三物為末都作一服溫酒調下善飲者以醉為度勿令吐服藥訖便安置床枕令臥病淺者半日至一日覺病深者三二日覺令人潛伺之不可驚觸使覺待其自醒則神魂定矣萬一驚寤不可復治唐相國寺僧允惠患癲疾失心經半年遍服名醫藥不效僧俗兄潘氏家富召孫思邈療之孫曰今夜睡著明後日便愈也潘曰但告投藥報恩不忘孫曰有咸物但與師吃待酒卻來道夜分僧果渴孫至遂求溫酒一角調藥一服與之有頃再索酒與之半角其僧遂睡兩晝夜乃覺人事如故潘謝孫問其治法孫曰衆人能安神矣而不能使神昏得睡此乃靈苑方中硃砂酸棗仁乳香散也人不能用耳正肅吳公少時心病服此一劑五日方寤遂瘥本事方以此方加人參一兩名寧志膏煉蜜作丸如彈子大每服一丸薄荷湯化下樓師云族人因兵火失心制此方與之服二十粒愈親舊多傳去服之皆驗昆謂重可以去怯故硃砂能鎮心安神酸可使收引故棗仁能斂神歸心香可使利竅故乳香能豁達心志必酒調盡醉者欲其行藥力而成莫大之功也許學士加人參者亦謂人參能寧心爾白金丸白礬三兩鬱金七兩須四川蟬腹者為真二共為末糊丸梧桐子大每服五六十丸溫湯下本事方云昔有一婦人癲狂失心數年不愈後遇至人授此方初服覺心胸有物脫去神氣灑然再服頓愈至人云此病因憂鬱得之痰涎包絡心竅此藥能去郁痰昆按白礬鹹寒可以軟頑痰鬱金苦辛可以開結氣驚氣丸附子木香白殭蠶白花蛇橘紅天麻麻黃各半兩乾葛二兩麝香五分腦子二分硃砂一錢留少許為衣天南星薑汁浸一宿紫蘇葉各一兩上件為末煉蜜丸如龍眼大每服一丸金銀薄荷湯下本事方云戊寅年軍中一人犯法褫衣將受刑而得釋精神頓失如癡豫與一丸服訖而寐及覺病已失矣提轄張載揚其妻因避寇失心已數年豫授此方不終劑而愈又黃彥奇妻狂厥者逾十年諸醫不驗豫授此方去附子加鐵粉亦不終劑而愈昆謂殭蠶花蛇天麻南星可以豁風痰麝香腦子木香陳皮可以通臟竅附子所以正元陽硃砂所以安神志麻黃乾葛紫蘇所以疏表而泄其驚氣也以鐵粉而易附子者亦以金能平木而責厥為肝逆故耳雲母此物性寒質重而明寒可以勝熱重可以鎮心明可以安神故紀朋用之湯液以療開元宮人驚悸怔忡門第五十敘曰驚悸怔忡心疾也心為一身之主萬化之源失而不治則十二官次第而失職所謂主不明則十二官危也故考古人之方五首以表大法欲養其心者尚酌而劑之養心湯黃耆白茯苓茯神半夏曲當歸川芎各半兩柏子仁酸棗仁炒人參遠志去心薑汁炒五味子辣桂各二錢半甘草炙四錢每服五錢心血虛少神氣不寧令人驚悸怔忡者此方主之心主血而藏神故方寸靈臺名曰神室神室血少而空虛則邪氣襲之令人如有驚悸而怔怔忡忡不自寧也內經曰陽氣者精則養神故用人參黃耆茯神茯苓甘草以益氣又曰靜則神藏燥則消亡故用當歸遠志柏仁酸棗仁五味子以潤燥養氣所以養神潤燥所以潤血若川芎者所以調肝而益心之母半夏曲所以醒脾而益心之子辣桂辛熱從火化也易曰火就燥故能引諸藥直達心君而補之經謂之從治是也亦有加檳榔赤茯苓者因其停水為悸加之以導利水氣耳非停水者不之用也寧志丸人參白茯苓白茯神酸棗仁酒浸半日隔紙炒當歸遠志柏子仁琥珀各半兩乳香石菖蒲硃砂各二錢五分蜜丸梧子大每服三十丸氣血虛夢中多驚者此方主之重可以去怯故用硃砂明可以安神故用琥珀香可以利竅故用乳香菖蒲氣可以生神故用參苓茯神仁可以歸心故用柏仁棗仁酸可使養津故用遠志潤可以益血故用當歸硃砂安神丸硃砂五錢水飛另研黃連酒洗六錢生地黃一錢五分炙甘草當歸各二錢五分夢中驚悸心神不安者此方主之夢中驚悸者心血虛而火襲之也是方也硃砂之重可使安神黃連之苦可使瀉火生苄之涼可使清熱當歸之辛可使養血乃甘草者一可以緩其炎炎之焰一可以養氣而生神也治異夢多驚外有二法一於髻中戴粗大靈砂一紗囊一於枕中置真麝香一囊皆能杜絶異夢而療夜魘朱雀丸白茯神二兩沉香五錢驚氣怔忡者此方主之因驚而得者名曰驚氣怔忡內經曰驚則氣亂宜其怔怔忡忡如物之撲也是方也茯神之甘平可以寧心沉香之堅實可使下氣氣下則怔忡瘥矣密陀僧一物散每服匕許驚氣入心喑不能語者此方主之有人伐薪山間為狼所逐喑不能言一醫授以此方茶調服尋愈又一軍人採藤於谷為惡蛇所逢趨歸證狀亦同以此方與之亦愈蓋此物鎮重而燥重故可以鎮心燥故可以劫其驚痰健忘門第五十一敘曰以虛無寂滅為宗則弗忘而學忘以家國天下為念則健念而懼其忘君子有天下國家之責奈何而可忘耶此健忘之方所必考也歸脾湯人參黃耆龍眼肉酸棗仁茯苓白朮遠志各一錢炙甘草木香當歸各五分思慮過多勞傷心脾令人健忘者此方主之心藏神脾藏意思慮過度而傷心脾則神意有虧而令健忘也是方也人參黃耆白朮茯苓甘草甘溫物也可以益脾龍眼肉酸棗仁遠志當歸濡潤物也可以養心燥可以入心香可以醒脾則夫木香之香燥又可以調氣於心脾之分矣心脾治寧復有健忘者乎丸劑宜主虛損勞瘵門天王補心丹孔子大聖枕中方敗龜甲酥炙遠志去心苗九節菖蒲去毛龍骨研末入雞腹中煮一宿上四件等分為末每服一錢酒調下日三學問易忘此方與之令人聰明凡人多識不忘者心血足而無所蔽也若心血不足邪氣蔽之則傷其虛靈之體而學問易忘矣龜介蟲之靈物也龍鱗蟲之靈物也用龜甲龍骨者假二物之靈以養此心之靈欲其同氣相求云爾遠志辛溫味厚辛溫可使入心味厚可使養陰菖蒲味辛氣清味辛則利竅氣清則通神以之而治易忘斯近理矣是方也出於孫真人千金方其來必有所自但曰孔子大聖之方則未敢是非也痛風門第五十二敘曰風者百病之長以其善行而數變也痛風有寒有濕有痰有血而惟以風名者得非以其善行數變長於諸邪之故乎今考名方五首而痛風之情狀見矣丹溪主上中下通用痛風方南星薑製黃柏酒炒蒼朮泔浸七日各二兩神麯炒川芎各一兩桃仁去皮尖雙仁白芷龍膽草防己各五錢羌活威靈仙酒拌桂各三錢紅花酒洗一錢五分此治痛風之套劑也有濕痰死血而風寒襲之風則善走寒則善痛所以痛者濕痰死血留結而不通也所以走痛者風氣行天之象也是方也南星燥一身之痰蒼朮燥上下之濕羌活去百節之風而白芷則驅風之在面威靈仙驅風之在手桂枝驅風之在臂防己驅濕之在股川芎利血中之氣桃仁紅花活血中之瘀龍膽黃柏去濕中之熱乃神麯者隨諸藥而消陳腐之氣也然羌活白芷威靈桂枝親上藥也防己杏仁龍膽黃柏親下藥也二者並用則上行者亦可以引之而下下行者亦可以引之而上顧人用之何如耳二妙散黃柏乳潤蒼朮米泔浸七日等分共為末每用酒調下三錢濕熱作痛不拘上下此方用之每良蒼朮妙於燥濕黃柏妙於去熱二物皆有雄壯之性亦簡易之方也趕痛湯乳香沒藥地龍酒炒香附童便浸桃仁紅花甘草節牛膝酒浸當歸羌活五靈脂酒淘去土瘀血濕痰畜於肢節之間而作痛者此方主之肢節之間筋骨之會空竅之所也故邪易居之是方也桃仁紅花牛膝當歸養血而活血也乳香沒藥五靈脂散結而定痛也羌活所以驅風香附所以理郁乃地龍者濕土所化之物同類相從故能達濕邪結滯之區甘草節者取其性平能和營衛而緩急痛之勢也或問濕痰瘀血何以辨之余曰肢節沉重者是濕痰晚間病重者是瘀血豨蘞丸事考唐江陵節度使成訥進豨蘞丸方云臣有弟欣年三十一中風就枕五年百醫不瘥有道人鍾緘者因睹此患曰可餌豨蘞丸必愈其藥多生沃壤高三尺許節葉相對五月間收洗去土摘其葉及枝頭九蒸九曝不必太燥但取蒸為度杵為末煉蜜丸梧子大空心溫酒米飲下二三十丸所患忽加不得憂慮至四千丸必復如故五千丸當復丁壯臣依法修合與欣服果如其言鍾緘又言此藥與本草所述功效相異蓋出處盛在江東彼土民呼豬為豨呼臭為蘞必緣此藥如臭蘞氣故以為名久經蒸曝蘞氣自泯每當服多須吃飯三五匙壓之奉宣付醫院詳録又知益州張詠進豨蘞丸表云臣因在龍興觀掘得一碑內說修養氣術並藥二件依方差人訪問採覓其草頗有異金稜銀線素根紫荄對節而生蜀號火鍁莖葉頗類蒼耳誰知至賤之中乃有殊常之效臣自吃至百服眼目輕明即至千服鬚髮俱黑筋胃較健效驗多端臣本州有都押衙羅守一曾中風隨馬失音不語臣與十服其病立痊又和尚智嚴年七十忽患偏風口眼喎斜時時吐涎臣與十服亦便得瘥今合一百劑差職員史元奏進義考見中風門桑枝煎桑枝一小升細切炒香以水三大升煎取二升一日服盡無時諸痛風者服此方良圖經云桑枝性平不冷不熱可以常服療中風體癢乾溼腳氣及風氣四肢拘攣上氣眼昏肺氣嗽消食利小便久服輕身聰明耳目令人光澤兼療口乾抱朴子仙經云一切仙藥不得桑枝煎不服許學士云政和間豫嘗病兩臂痛服諸藥不效依此作數劑臂痛尋愈癘風門第五十三敘曰癘風一證古今難之是以斯世之妄治者多也深達癘風之奧者潔古東垣二人而已余皆未有言也今考古人之方六首庶幾乎精練之奇哉愈風丹苦參四兩為末土蝮蛇白花蛇烏梢蛇頭尾全者各一條酒浸二三日去骨陰乾為末皂角五斤去皮弦以無灰酒浸一宿取出用水熬膏上以苦參蝮蛇白花烏梢四味為末將皂角膏和丸如梧桐子大每服七十丸以玉屏風散煎湯吞下輕者三蛇得一即效不必全也癘風手足麻木毛落眉脫遍身癩疹搔癢成瘡者此方主之癘風者天地殺物之風燥金之氣也故令瘡而不膿燥而不濕燥金之體澀故一客於人則營衛之行滯令人不仁而麻木也毛落眉脫者燥風伐其營衛而表氣不固也遍身癩疹者上氣下血俱病也諸痛屬實諸癢屬虛癘風之癢固多有蟲而衛氣之虛不可誣也是證也主燥劑以疏風則反以助邪往往血枯而死故求古方之潤劑以主之白花烏梢土蝮三蛇者血氣之屬也用血氣之屬以驅風豈不油然而潤乎然其性中有毒同氣相求直達癘風毒舍之處豈不居然而效乎皂角之性善於潔身則亦可以潔病苦參之性善於去熱則亦可以去風昔人吞以防風通聖散此方乃汗下之劑也非營衛虛者所宜今以玉屏風散更之則黃耆可以排膿補表防風可以利氣疏邪白朮可以實脾而補肌矣換肌散白花蛇烏梢蛇酒浸各一宿地龍去土各三兩當歸酒製蒼朮米泔浸七日木鱉子去殼細辛蔓荊子白芷赤芍藥威靈仙天麻天門冬川芎甘菊花何首烏紫參荊芥穗沙參石菖蒲胡麻炒苦參不灰木草烏炙甘草白蒺藜定風草即天麻苗木賊各一兩上件共為末每服五錢食後酒調下多飲為妙大風年深不愈眉毛墮落鼻梁崩壞額顱腫破者此方主之身半以上天之陽也病則氣受之氣受之則上病故眉落鼻壞而顱破也高巔之上惟風可到故用細辛白芷天麻蔓荊威靈荊芥甘菊木賊川芎蒺藜木鱉子定風草諸物者氣味輕清可以親上可以驅風可以勝濕乃不灰木石菖蒲草烏蒼朮則直可以療濕矣若苦參紫參沙參何首烏皆用之以解毒當歸甘草門冬赤芍胡麻皆養血清氣於驅風燥濕之隊者也地龍者泥蟠之物濕土所化也故能引諸藥以就濕白花烏梢者奔騰之類風動之象也故能君諸藥以驅風此易所謂云從龍風從虎也凌霄散蟬殼地龍炒白殭蠶炒全蠍炒各七個凌霄花半兩上為末每服二錢熟酒調下無時嘗坐於浴室湯中一時許服藥神良癘風此方常獲奇效癘風攻鑿氣血木石不能獲效者非其類也故用血氣之屬能主風者以治之蟬蛻主風熱地龍主風濕殭蠶全蠍主風毒凌霄花主風壞之血斯五物者皆有微毒用之以治癘風所謂衰之以屬也然必坐於浴室湯中服藥者所以開泄腠理使邪氣有所出爾補氣瀉榮湯升麻連翹各六分生地黃黃芩各四分當歸蘇木全蠍地龍黃耆黃連各三分桔梗五分甘草一錢半人參二分胡桐淚一分桃仁三枚麝香少許虻蟲一枚去翅足微炒水蛭二枚炒煙盡此東垣治癘風之方也補氣瀉榮治癘風之妙旨也衛氣虛而邪襲故用人參黃耆甘草以補氣營血壞而為癘故用虻蟲水蛭桃仁蘇木以消瘀全蠍地龍引諸藥至風濕結聚之處乃麝香者利關竅而無所不之升麻連翹桔梗入氣而解其熱黃連黃芩入臟而清其氣當歸地黃入血而調其新若胡桐淚者用之以除大毒之熱又足以殺癘風之蟲而除頑腫也蚺蛇泉州有客盧元欽患大風惟鼻根未倒屬五月五日官取蚺蛇膽欲進或言肉可以治風遂取一截蛇肉食之三五日漸可百日平復蓋蛇之奔騰疾走皆風象也故為逐風之鱗或嫌其毒而唾之不知醫之所取者妙在其毒也易曰同氣相求有此蛇毒方能就彼癘毒如水流濕火就燥各從其類耳內經曰衰之以屬正是此意皂角刺癘風眉發墮落者取皂角刺九蒸九曬為末每服酒下二錢久服眉發再生肌膚悅潤眼目倍明喉閉第五十四敘曰喉者氣之關隘也通則利塞則害無問其標本而當急治焉者也今考八方於後皆古人已試之程規觸類而通之則活人之機亹亹矣雄黃解毒丸雄黃一兩鬱金一錢巴豆十四粒去油皮共末為丸每服五分津液下纏喉急閉者此方主之纏喉急閉軀命之所關也急治則生緩治則死是方也雄黃能破結氣巴豆能下稠涎鬱金能散惡血能此三者閉其通矣丹溪翁生平不用厲藥而此方者其不得已而用之乎稀涎散獵牙皂角四條去黑皮白礬一兩共為末每服三字喉閉數日不能食者以此方吐之涎盡病愈皂角之辛利能破結氣白礬之鹹苦能湧稠涎數數湧之涎去而病失矣甘桔防風湯甘草五錢桔梗防風各三錢咽痛者此方主之甘草之甘能緩喉中之急桔梗之苦能下喉中之氣防風之辛能散喉中之壅火刺纏喉風法用巴豆油塗紙上捻成條子以火點著才煙起即吹滅之令患人張口帶火刺於喉間俄頃吐出紫血半合即時氣寬能言及啖粥飲蓋火氣熱處巴油皆到火以散之巴以瀉之煙以葉之乃一舉而三善之方也針急喉閉方於患人手大指外邊指甲後一韭葉許針之出血男左女右取之血出即效如大段危急兩手大指俱針之其效甚捷蓋喉嚨者肺之系所針之處乃少商也為肺之井穴故出血而愈喉中紅赤用針出血法凡患人喉中紅赤宜用針從旁針之出血即愈所以必欲旁針者避夫啞門穴犯之令人失音故耳筆針名醫録云李王公主患喉癰數日痛腫飲食不下召到醫官盡言須用刀針潰破公主聞用刀針哭不肯治痛迫水穀不入忽有一草澤醫曰某不用刀針只用筆頭蘸藥癰上霎時便潰公主喜令召之方兩次上藥遂潰出膿血一盞余便寬兩日瘡無事令供其方醫云乃以針系筆心中輕輕劃破而潰之爾他無方也巧匠取喉鉤宋鹹平中職方魏公在潭州有數子弟皆幼因相戲以一釣竿垂鉤用棗作餌登陸釣雞雛一子學之而誤吞其鉤至喉中急引之而鉤須已逆不能出命諸醫不敢措手魏公大怖遍問老婦必能經歷時有一老婦人年餘九十歲言亦未嘗見此切料有識者可出之時郡中莫都料性甚巧令聞魏公魏公呼老婦責之曰吾子誤吞鉤莫都料何能出之老婦曰聞醫者意也莫都料曾在水中打碑塔添仰瓦魏公悅親屬勉之曰試詢之遂召莫都料至沉思良久曰要得一蠶繭及念珠一串公與之都料遂將繭剪如錢用物柔其四面以油潤之中通一小竅貫之鉤經次貫念珠三五枚令兒正坐開口漸加念珠引之至喉覺至系鉤處用力向下一推其鉤以下而脫即向上急出之見繭錢向下裹定鉤須須臾而出並無所損魏公大喜遂厚賂之公曰心明者意必大巧意明者心必善醫頭病門第五十五敘曰頭者身之元首一有疾苦無問標本宜先治之失而不治雖有股肱弗能用矣今考十方以治頭所以尊元首而用股肱也有醫責者尚知務哉加味二陳湯半夏陳皮茯苓黃芩酒炒甘草川芎細辛黃連酒炒薄荷蒼耳膽南星頭痛常發者名曰頭風偏於一邊而痛者名曰偏頭風宜此方主之丹溪云濕土生痰痰生熱熱生風是以頭風為病多見於嗜酒之人也偏於一邊而痛者其說有二焉一則曰氣血有虛實左屬血分右屬氣分也一則曰身半以上天氣居之天不足西北故俱感於邪而右甚也是方也半夏陳皮茯苓甘草治痰之二陳湯也加南星之燥皆所以治痰耳而黃芩黃連者用其苦寒以治熱也若川芎細辛薄荷蒼耳皆治風之品也高巔之上惟風可到是故用之辛夷散辛夷南星蒼耳酒芩川芎頭風鼻塞者此方主也鼻氣通乎天清陽往來之竅也風盛則氣壅故令鼻塞內經曰清陽出上竅又曰氣薄則發泄辛夷川芎蒼耳皆清陽氣薄之品也故可透氣竅佐以南星者醒其風痰佐以酒芩者清其風熱也三五七散細辛一兩半防風四兩乾薑炮二兩附子三枚山茱萸去核茯苓各三兩共為細末每服二錢溫酒食前調下大寒中於風府令人頭痛項筋緊急者此方主之風府腦後之穴督脈之所主也寒者天地嚴凝之氣故令項筋緊急乾薑附子辛熱之物也可以散真寒細辛防風氣薄之品也可使至高巔山萸養督脈之陰茯苓和督脈之陽河圖之義奇者為陽偶者為陰此方名曰三五七者以補陽為義也半夏白朮天麻湯半夏姜炒陳皮去白麥芽各七分半人參白參炒黃耆炙蒼朮米泔浸七日天麻白茯苓神麯炒澤瀉各五分黃柏一分半乾薑二分痰厥頭痛目眩者此方主之痰厥者濕痰厥逆而上也痰氣逆則上實故令頭痛目眩者目前如見黑色也東垣曰頭痛苦甚謂之足太陰痰厥非半夏不能除眼黑頭旋風虛內作非天麻不能療人參黃耆之甘溫可以瀉火亦可以補中蒼朮白朮之苦甘可以去濕亦可以健脾澤瀉茯苓能利濕淫之邪神麯麥芽能消水穀之滯橘皮乾薑所以開胃調中而黃柏者取其苦辛能療少火在泉發燥也丹溪治頭眩方南星半夏枳殼桔梗陳皮甘草茯苓黃芩痰火頭眩者此方主之痰之生也原於濕故用半夏南星以燥濕茯苓以滲濕甘草健脾以制濕痰之滯也原於氣故用陳皮以利氣桔梗以下氣枳殼以破氣氣滯則積而有餘氣有餘便是火故用黃芩以瀉火香橘飲木香白朮橘皮半夏曲茯苓砂仁丁香炙甘草氣滯不能運痰而作頭眩者此方主之木香丁香砂仁橘皮所以行氣白朮半夏甘草茯苓所以健脾脾運則痰運氣行則痰行清空膏羌活防風各一兩黃連一兩酒炒黃芩三兩酒製川芎五錢柴胡七錢炙甘草一兩五錢上件共為末每服二錢茶湯調如膏搽在口內少用白湯送下風熱頭痛者此方主之風者天之陽氣也人身六陽之氣皆聚於頭復感於風是重陽而實矣故令熱痛辛甘發散為陽故用羌活陳風川芎柴胡甘草乃黃芩黃連者苦寒之品也以羌活之屬君之則能去熱於高巔之上矣八珍湯人參白朮茯苓甘草當歸川芎芍藥地黃血虛頭痛眩暈此方主之氣血人身之陰陽也兩相得則治一有失則病故陰血虛損則陽氣獨治陽氣親上故令頭痛眩暈是方也當歸川芎芍藥地黃味厚養血之品也復用人參白朮茯苓甘草甘溫之品以養氣者何哉太極之妙陰生於陽故兼用此輩以益氣耳或問頭痛而用人參陽邪不益亢乎余曰虛火可補人參黃耆之類此之謂也瓜蒂散搐鼻法苦瓜蒂赤小豆等分濕熱淫於巔頂之上頭目偏痛者令病人噙水一口以此藥一字吹入痛邊鼻中泄出黃水即減苦能湧泄故用瓜蒂燥能勝濕故用赤豆實者瀉之故行搐法乃直搗巢穴之兵也凡云一字者二分半也取一文四字之義出血法唐高宗苦風眩頭重目不能視疾甚召秦鳴鶴張文中診之鳴鶴曰風毒上攻若刺頭出少血即愈矣天后自簾中怒曰此可斬也天子頭上豈是試出血處耶上曰醫之議病理不加罪且吾頭重悶殆不能忍出血未必不佳命刺之鳴鶴刺百會及腦戶出血上曰吾目明矣言未畢後自簾中頂禮拜謝之曰此天賜我師也躬負繒寶以遺鳴鶴昆謂諸痛為實理宜瀉之內經言出血者屢矣必以血變而止今南人惡於針石每畏出血北人猶然行之經曰惡於針石者不足與言至巧故醫之巧者必兼針石嗚呼丹溪之賢不知針石今世人群然以醫之大成稱之此子禽之賢子貢也使翁作於九原則一言以為不知必於斯人而示之矣腹痛門第五十六敘曰腹中者中氣之所居也一有疾痛則壞中氣百骸十二官胡然受氣而榮養乎故考名方十一首以治腹痛二姜丸乾薑炮良薑等分腹痛脈遲者此方主之腹痛之由有數種今曰脈遲則知寒矣故用乾薑良薑之辛熱者以主之辛可以破滯熱可以散寒不滯不寒痛斯失矣丁香止痛散丁香小茴香良薑炒甘草此亦治寒氣腹痛之方也寒氣入經澀而稽遲故令腹痛經曰得炅則痛立止炅熱也故用丁香茴香良薑之辛熱者以主之而復佐以甘草者和中氣於痛損之餘也鹽湯探吐法燒鹽半升溫湯五大升和服探吐諸腹痛連於脅膈手足冷脈來伏匿者此方主之凡腹痛連於脅膈多是飲食痰飲填塞至陰抑遏肝膽之氣肝者將軍之官膽者少陽上升之令抑之不得敷暢兩實相搏令人自痛所以痛連脅膈者少陽之經行於兩脅厥陰肝脈貫於膈也手足冷者少陽之氣不敷也脈來伏者為痛甚陽氣閉藏之象也經曰木鬱則達之故用吐法咸能軟堅故用燒鹽扶陽助胃湯附子二錢炮人參草豆蔻乾薑白芍藥炙甘草官桂各一錢五分吳茱萸陳皮白朮益智各五分客寒犯胃胃脘當心而痛脈來沉遲者此方主之客寒犯胃多是飲食寒冷或因食後呼吸冷氣所致脈來沉者為里遲者為寒是方也附子乾薑官桂吳茱萸草豆蔻益智仁辛熱之品也用之所以扶陽邪之所湊其氣必虛故用人參白朮甘草甘溫之品以助胃用芍藥者取其味酸能瀉土中之木用陳皮者取其辛香能利腹中之氣三因七氣湯半夏薑汁製五錢茯苓四錢厚朴三錢薑汁炒紫蘇二錢七氣相干陰陽不得升降攻衝作痛者此方主之三因者內因外因不內外因也七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣也以三因而鬱七氣升降有妨則攻衝而痛是方也紫蘇之辛芳可使散七氣厚朴之苦溫可使下七氣半夏之辛溫茯苓之淡滲可使平水穀相干之七氣桂枝加大黃湯桂枝洗淨炒甘草生薑各三兩芍藥六兩大棗十二枚大黃一兩腹中寒熱不調而大痛者此方主之寒熱不調而大痛者先食熱物後食寒物二者不調而令大痛之類也是方也桂枝能散真寒大黃能瀉實熱芍藥能健脾而和肝甘草能調中而益氣生薑可使益胃大棗可使和脾玄胡酒玄胡索一兩為末炒香清酒一升淬入溫服婦人氣血攻刺疼痛連於脅膈者此方主之玄胡索味苦辛苦能降氣辛能散血淬之以酒則能達乎經脈矣韭汁酒韭菜汁清酒等分和服脅膈常時疼痛得熱則減得寒則增者此方主之上件證死血也故用韭汁消瘀清酒行滯小胃丹芫花好醋拌勻炒黑不令焦大戟長流水煮一時洗淨曬乾甘遂洗淨曬各半兩黃柏三兩焙乾大黃酒潤蒸熟曬乾一兩五錢上件為末粥丸麻子大每服二三十丸臨臥津液吞下或白湯一口送下取其膈上之濕痰以意消息之欲利則空心服痰涎蓄積胃脘胸腹作痛者此方主之小消也小胃者消去胃中之痰物也甘遂芫花大戟能下十二經之濕痰大黃佐之下行黃柏制其辛烈是方也大毒之劑攻殺擊刺之兵也善用則治弗善用之則亂故醫者人之司命實實虛虛弗可弗察也雄檳丸雄黃白礬檳榔等分共為末飯丸黍米大每服五分食遠下腹中乾痛有時者蟲痛也此方主之干痛者不吐不瀉而但痛也有時者淡食而飢則病厚味而飽則否也浮粟經曰腹疾干痛有時當為蟲此之謂也是方也雄黃白礬檳榔皆殺蟲之良劑也故主之蟲盛者以吐下驅蟲之劑加之視人虛實可也冰煎理中丸宋徽廟常食冰因致腹痛國醫進藥俱不效乃召泗州楊吉老脈之吉老曰宜主理中丸上曰服之屢矣不驗吉老曰所進湯使不同陛下之疾得之食冰今臣以冰煎藥此欲已其受病之原也果一服而瘳昆謂是義也大易所謂同氣相求內經所謂衰之以屬也自非吉老之良烏能主此脅痛門第五十七敘曰脅者肝膽之區也肝為盡陰膽無別竅怒之則氣無所泄郁之則火無所越故病證恆多今考名方三首示大觀爾抑青丸黃連一味茱萸湯潤一宿曝乾為末作丸左脅作痛者此方主之肝東方木也南面而立則左為東矣故左脅為肝之部位所以痛者木氣實也木欲實金當平之以黃連瀉去心火使金無所畏自足以平肝故曰抑青此古人實則瀉其子治之以其所水勝也小柴胡湯柴胡黃芩人參甘草半夏生薑大棗兩脅作痛者此方主之少陽膽經行於兩脅故兩脅作痛責之少陽是方也柴胡味辛而氣溫辛者金之味故足以平木溫者春之氣故足以入少陽佐以黃芩瀉其實也佐以半夏破其滯也而必用夫人參甘草者恐木病傳脾而先實其土也用夫生薑大棗者調其營衛不令經氣壅滯也嚴氏推氣散枳殼桂心片子薑黃各半兩炙甘草一錢五分肝氣脅痛此方主之肝藏血而主怒故病則氣血俱病越人云東方常實實則可以瀉矣故用枳殼破其氣薑黃利其鬱桂心能引二物至於痛處又曰木香桂而柔以故用之乃甘草者取其和緩之氣以調肝木之急爾腰痛門第五十八敘曰腰者腎之府水火之司有生之根也善調之則根固而葉榮不善調之則根枯而葉萎考方四首而治腰之大者見矣青娥丸加黃柏知母方破故紙酒浸少時略炒川萆薢童便浸一宿杜仲薑汁炒斷絲黃柏鹽水炒知母酒炒牛膝去蘆各四兩胡桃肉去皮炮八兩蜜丸腎虛腰痛者此方主之腎坎象也水火併焉水衰則陽光獨治而令腎熱火衰則陰翳襲之而令腎寒水火俱衰則土氣乘之而邪實於腎均之令人腰痛也是方也破故紙杜仲胡桃味厚而溫黃柏知母牛膝味厚而寒溫者可使養陽寒者可使養陰均之味厚則均之能走下部矣若萆薢者苦燥之品足以利水土之邪而平其氣也曰青娥者涵陽之坎也假之以名方明其全夫水火之真爾獨活寄生湯獨活細辛牛膝桑寄生如無用續斷秦艽茯苓桂心白芍藥酒炒人參防風熟地黃杜仲薑汁炒斷絲川芎酒洗當歸酒洗甘草各三兩每服五錢腎氣虛弱肝脾之氣襲之令人腰膝作痛屈伸不便冷痹無力者此方主之腎水臟也虛則肝脾之氣湊之故令腰膝實而作痛屈伸不便者筋骨俱病也靈樞經曰能屈而不能伸者病在筋能伸而不能屈者病在骨故知屈伸不便為筋骨俱病也冷痹者陰邪實也無力者氣血虛也是方也獨活寄生細辛秦艽防風桂心辛溫之品也可以升舉肝脾之氣肝脾之氣升則腰膝弗痛矣當歸熟地白芍川芎杜仲牛膝者養陰之品也可以滋補肝腎之陰肝腎之陰補則足得血而能步矣人參茯苓甘草者益氣之品也可以長養諸臟之陽諸臟之陽生則冷痹去而有力矣腎著湯乾薑茯苓各四錢炙甘草白朮炒各二錢腎著於濕腰冷如冰若有物者此方主之腎主水脾主濕濕勝則流必歸於坎者勢也故曰腎著腰為腎之府濕為陰之氣故令腰冷如冰若有物者實邪著之也乾薑辛熱之物辛得金之燥熱得陽之令燥能勝濕陽能暴濕故象而用之白朮甘草甘溫之品也甘得土之味溫得土之氣土勝可以制濕故用以佐之白茯苓甘淡之品也甘則益土以防水淡則開其竅而利之此圍師必缺之義也豬腰青鹽杜仲方豬腰一具青鹽三錢杜仲末五錢先將豬腰剖開後入青鹽杜仲於內濕紙包裹煨熟空心服之小小腰痛此方主之易曰方以類取物以群分故豬腰可以補腰經曰五味入口咸先入腎故青鹽可以就下杜仲辛甘益腎之物也君以豬腰佐以青鹽則直走腎而補之矣七疝門第五十九敘曰疝隱疾也證有七七者皆有虛實今考七方志七疝耳若虛實之辨則在夫人之變通也吳茱萸加附子湯吳茱萸生薑各三錢人參一錢大棗二枚附子二錢水煎涼服寒疝腰痛牽引睪丸屈而不伸尺內脈來沉遲者此方主之故稱七疝寒水筋血氣狐㿗也寒疝之由必是寒客下體如坐於卑冷涉於寒淵之所致也寒氣自外入內束其少火郁其肝氣故令腰痛痛而牽引睪丸者肝之經絡環陰器故也寒主收引故令屈而不伸尺內主腰脈來沉遲皆陰脈也寒亦明矣故用吳茱萸附子之辛熱者以溫其寒用生薑大棗之辛溫者以和其氣邪傷之後其正必虛人參之補可以去其虛矣升陽除濕湯柴胡羌活蒼朮黃耆各一錢五分防風升麻藁本炙甘草各一錢蔓荊子七分當歸獨活各五分水疝者腎囊腫大陰汗不絶宜此方主之子和云水疝者得之飲水醉酒勞於使內其言當矣蓋飲水醉酒則濕氣勝勞於使內則腎氣虛腎氣虛則濕勝而流坎者勢也故令腎囊腫大如水晶陰汗不絶如罅漏也內經曰下者舉之又曰風能勝濕是方也柴胡羌活蒼朮防風升麻藁本蔓荊獨活皆味辛而氣清風藥也亦升藥也故可以勝濕可以升陽而黃耆之甘可使托其陷下之氣甘草之溫可使培其防水之土當歸之潤可使調榮血於風藥之隊也泄瀉門胃苓湯亦可酌用伏龍肝摻法此即灶心土也土足以防水燥足以勝濕水疝者以此物細末摻之腎囊亦良法也甘草梢黑豆湯生甘草梢二兩黑豆半斤水五倍煎去半空心服筋疝者此方主之筋疝者莖筋挈痛挺脹不堪也子和云此以邪術得之邪術者房術春方之故也治宜解毒緩急故用甘草梢黑豆以主之按摩法外腎因撲損而傷睪丸偏大有時疼痛者中有瘀血名曰血疝宜於夜分之時自以一手托其下一手按其上由輕至重玩弄百回彌月之間瘀血盡散陳氣皆行誠妙術也雖年深日久無不愈之虎潛丸黃柏鹽酒炒知母鹽酒炒熟地黃各三兩白芍藥酒炒陳皮鹽水潤曬乾牛膝各二兩龜板四兩酥炙鎖陽酒潤曬乾當歸各一兩半酒洗虎脛骨一兩干酥羊肉為丸氣疝者拂鬱則睪丸腫大悲哀則不藥而消宜此方主之邪之所湊常乘其虛拂鬱而睪丸腫大者肝氣乘腎之虛也悲哀不藥而消者氣有所泄也先醫云肝腎之病同一治故黃柏知母熟地芍藥牛膝當歸鎖陽味厚之品也可以補腎亦可以補肝龜得天地之陰氣最厚虎得天地之陰氣最雄以血氣中之陰類以補陰欲其同氣相求耳陰皮者取其能推陳腐之氣羊肉者取其能補五臟之陽也或問何以不用橘核仁細辛枳實川楝子青皮之輩余曰此皆破氣藥也昔醫固多用之然而治標云爾況蹈重虛之戒乎氣實者用之可也補中益氣湯加黃柏知母方人參黃耆白朮當歸升麻柴胡陳皮甘草黃柏知母狐疝者晝則氣出而腎囊腫大令人不堪夜則氣入而腫脹皆消少無疾苦宜此方主之病愈而止狐之為物也晝則出穴而溺夜則入穴而溺以斯證肖之故曰狐疝夫晝陽也夜陰也晝病而夜否者氣病而血不病也故用人參黃耆白朮甘草以益氣方內有升麻柴胡則能舉其陷下之陽方內有黃柏知母則能益夫不足之坎當歸味辛可以活其壅滯之血陳皮氣芳可以利其陳腐之氣或問何以不主辛香流氣之劑余曰本以氣不足而致疾復以流氣之劑主之非惟無益而又害之矣或又曰然則子和流氣之劑非歟余曰吾惟酌之於理而已胡泥乎子和㿗疝無治法㿗疝者頑疝也睪丸雖大而無疾苦也此以父子相傳得於有生之初已然非若有生之後三因所致之疾也故不必主治或有先是㿗疝後來疼痛疾苦者此兼前件六證也宜於前方消息之腳氣門第六十敘曰腳氣類傷寒則察之難腳氣能令人死則治之難一病而有二難是非可以淺淺論腳氣矣考方八首同志者尚教我哉防己飲木通防己蒼朮鹽炒生地黃酒炒白朮檳榔黃柏酒炒甘草梢川芎犀角腳氣憎寒壯熱者此方主之腳氣者濕熱在足而作氣痛也濕熱分爭濕勝則令人憎寒熱勝則令人壯熱此其為證亦有兼頭疼者頗類傷寒惟其得病之始本於腳氣為異耳又不可以腳腫為拘亦有痛而不腫者名曰乾腳氣亦有緩縱不隨者名曰緩風亦有疼痛不仁者名曰濕痹亦有轉筋攣急者名曰風毒此在醫者體會而辨證爾各有治法不同大抵腳氣之疾壅疾也喜通而惡塞故孫真人曰腳氣之疾皆由氣實而死終無一人以服藥致虛而殂故腳氣之人皆不得大補亦不得大瀉是方也木通防己檳榔通劑也可以去塞犀角黃柏生地黃甘草梢寒劑也可以去熱蒼白二術燥劑也可以去濕然川芎能散血中之氣犀角能利氣中之血先痛而後腫者氣傷血也重用川芎先腫而後痛者血傷氣也重用犀角若大便實者加桃仁小便澀者加牛膝內熱加芩連時熱加石膏有痰加竹瀝全在活法初勿拘也凡腳氣臨心喘急不止嘔吐不休者皆死水犯火故也越婢湯石膏一兩白朮半兩麻黃七錢半附子半個甘草二錢腳氣痛腫寒熱相搏脈來沉細者此方主之氣不得通則痛血不得行則腫此腳氣之所以為壅疾也寒熱相搏者邪氣與正氣相激搏也脈來沉者為里細者為陰名曰越婢者越以發越為義婢卑也是方能發越至卑之氣故以越婢名之石膏性寒而重寒能勝熱重能就下附子味辛而熱辛能行壅熱能壯氣佐之以麻黃則寒熱之壅皆從汗孔而泄矣用白朮甘草取其氣味溫平能致沖和之氣於發越之餘耳而甘草獨少者恐其性緩多之不能速達於卑下之區也六物附子湯附子桂心防己各四錢甘草炙二錢白朮茯苓各三錢水煎冷服寒濕腳氣疼痛不仁兩尺脈來沉細者此方主之此痹證也內經曰寒氣勝者為痛痹濕氣勝者為著痹今疼痛不仁是寒而且著也兩尺主兩足脈來沉者為里遲者為寒是方也用桂心附子溫其寒防己白朮制其濕甘草茯苓脾家藥也扶土氣之不足制濕氣之有餘然必冷服者欲附桂之性行於下而不欲其橫於上也椒湯洗法川椒一兩蔥一握姜如掌大一塊槌碎水一盆煎湯洗之凡人患寒濕腳氣疼痛不體者內服煎劑外宜以此湯熏洗之川椒辛熱能療寒濕之痹薑蔥辛溫能利肌膚之氣又曰諸腳氣者皆壅疾也洗之無有不良當歸拈痛湯當歸知母酒炒豬苓澤瀉白朮防風各一錢炙甘草黃芩酒炒羌活茵陳各一兩升麻苦參酒炒人參葛根蒼朮各二錢腳氣疼腫濕熱發黃者此方主之腳氣內壅故令疼腫濕熱不得泄越故令發黃是方也羌活防風升麻葛根蒼朮皆辛散之劑也可以泄越壅塞之腳氣苦參黃芩茵陳知母皆苦寒之品也可以解除內壅之濕熱乃澤瀉豬苓白朮淡滲物耳能導利下焦之濕當歸人參甘草者所以養血於敗壞之餘益氣於泄越之後也升陽順氣湯升麻柴胡草豆蔻陳皮去白當歸各一錢黃耆四分半夏人參各三分甘草柏皮各五分神麯一錢五分脾氣虛弱胃氣下注令人足跗氣腫者此方主之脾雖具坤靜之德而有乾健之運故脾氣衝和則升清降濁無跗腫也脾氣一虛土不制水則胃中水穀之氣下注隨經而下令人跗腫是方也半夏甘草所以益脾人參黃耆所以益氣神麯豆蔻所以消磨水穀升麻柴胡所以升舉胃氣當歸能使諸藥歸脾陳皮能利中宮之氣而柏皮者取其味厚能引升麻柴胡下走足跗而升舉其陷下之陽爾杉木湯杉木節一大升橘葉一升無葉用皮檳榔七枚火伏槌碎童便三大升共煮一升半分二服得快利停後服唐柳子厚救死方云元和十二年二月得乾腳氣夜成痞絶左脅有塊大如石且死因大寒不知人三日家人號哭滎陽鄭洵美傳杉木湯服半食頃大下三次氣通塊散病蓋死矣會有救者因得不死恐他人不幸有類豫病故以方傳焉昆謂此云乾腳氣者謂腳氣入腹不得通泄也腳氣干於肝則左脅有塊腳氣干於脾則令人痞腳氣干於心則令人絶病絶於夜者夜氣助其陰邪也因大寒不知人者陰進而陽不舒也是方也杉木節質重而氣芳質重則能達下氣芳則能疏壅橘葉味苦而厚過於青皮檳榔質實而重等於鐵石味厚則泄質重則降故能令邪氣大下童便鹹寒物也咸則能引邪氣以走濁陰寒則能平熱氣使不上逆經曰道之遠者制大其服故其量數五升云敷螺法醫說云白石董守約苦腳氣攻注或告之槌數螺敷兩股上便覺冷氣趨下至足而安蓋螺性能泌別清濁故能療腳氣濕熱也宣州木瓜顧安中廣德人久患腳氣筋急腿腫行履不得因至湖州附船船中先有一袋物為腿疼痛遂將腿擱之袋上微覺不痛及筋寬而不急乃問艄人袋中何物應曰木瓜自此腳氣頓愈噫藥氣相感且能愈疾則用藥當病者從可知矣眼疾門第六十一敘曰眼五官之一也匪明則無以作哲故眼重焉醫眼有專科亦以其重耳今考名方十五首夫人酌其宣而用之則復明之一助也消風養血湯荊芥蔓荊子菊花白芷麻黃去節桃仁去皮尖紅花酒炒防風川芎各五分當歸酒洗草決明石決明白芍藥酒炒甘草各一錢眼痛赤腫者此方主之痛者邪氣實也赤者風熱傷血也腫者風熱注之也是方也荊芥菊花蔓荊白芷麻黃防風川芎可以消風亦可以去熱風熱去則赤腫去矣桃仁紅花當歸芍藥草石決明可以消瘀可以養血亦可以和肝瘀消則不痛養血和肝則復明乃甘草者和諸藥而調目氣也益陰腎氣丸熟地黃二兩生地黃山藥山茱萸當歸梢五味子牡丹皮柴胡各五錢澤瀉茯神各二錢五分腎虛目暗不明者此方主之精生氣氣生神故腎精一虛則陽光獨治陽光獨治則壯火食氣無以生神令人目暗不明王冰曰壯水之主以制陽光故用生熟地黃山萸五味歸梢澤瀉丹皮味厚之屬以滋陰養腎滋陰腎火自降養腎則精自生乃山藥者所以益脾而培萬物之母茯神者所以養神而生明照之精柴胡者所以升陽而致神明之氣於睛明之窠也孫思邈云中年之後有目疾者宜補而不宜瀉可謂開斯世之蒙矣東垣此方其近之療本滋腎丸黃柏酒炒知母酒炒等分共末為丸空心鹽湯下百丸此亦治腎虛目暗之方也眼者肝之竅肝木臟也得水則榮失水則枯故用黃柏知母之味厚者以滋腎水所謂虛則補其母也是方也雖曰補腎亦瀉之之類也脾強目暗者宜主之脾胃壞者非所宜也干熟地黃丸人參一錢當歸身酒黃芩各五錢干熟地黃一兩柴胡八錢生地黃酒洗一錢半炙甘草天門冬去心地骨皮枳殼麩炒黃連酒炒五味子各三錢血弱不能養心心火旺盛肝木自實瞳子散大視物不清者此方主之肝者心之母心火旺盛故令肝木自實肝主風心主火瞳子散大風火動搖之象也瞳子者主照物今而散大宜其視物不清矣越人云實則瀉其子虛則補其母火是肝之子故用芩連骨皮生地以瀉火水是肝之母故用熟地門冬五味以滋水內經曰陽氣者精則養神故又以人參甘草益其陽氣而枳殼者所以破其滯泥柴胡者所以升其清陽也清升而目自明矣經曰目得血而能視故又以當歸佐之補陽湯肉桂一錢去皮知母炒當歸酒洗生地黃酒洗白茯苓澤瀉陳皮各三錢白芍藥酒炒白朮炒人參黃耆炙防風羌活獨活熟地黃甘草各一兩柴胡二兩青白目翳者此方主之陽不勝其陰則生目翳所謂陰盛陽虛則九竅不通乃陰埃障日之象也是方也人參黃耆白朮茯苓甘草陳皮甘溫益氣之品也固所以補陽柴胡羌活獨活防風辛溫散翳之品也亦所以補陽知母當歸生熟地黃芍藥澤瀉雖曰養陰亦所以濟夫羌防柴獨使不散其真陽耳是亦所以補陽也用肉桂者取其辛熱熱者火之象可以散陰翳辛者金之味可以平肝木蓋眼者肝木之竅以故用之百點膏蕤仁去皮尖三錢防風八錢黃連淨二兩當歸身甘草各六錢前藥銼細以水五碗同煎半乾去渣再煎至滴水不散以淨蜜等分加入又熬少時為度日可五七次用之名曰百點膏蓋欲使藥力相繼耳東垣云張濟氏病翳六年以至遮蔽瞳仁視物有云風之象因用此藥而效按此五藥蕤仁能散結氣當歸能活滯血防風能散風邪黃連能攻久熱甘草能和氣血乃蜜則潤之而已光明洗眼方古青錢十文黃連一錢杏仁七枚去皮艾葉三片上藥用水一盅煎去其半澄清一宿次日頻頻洗之良凡患風熱眼眶紅爛者此方洗之銅性清肅可以勝熱明目黃連苦燥可以瀉熱堅膚艾葉辛溫可使驅風勝濕杏仁辛潤可使利氣澤皮本事羊肝丸黃連一兩白羊肝一具煮爛二共為丸梧子大每服二十丸忌豬肉冷水本事方云諸目疾翳障青盲此方皆治唐崔承元者居官時治一死囚出而活之囚後數年以病死崔後為內障所苦喪明逾年後半夜嘆息獨坐忽聞階除窸窣之聲崔問為誰徐曰是昔蒙出死之囚生不能報公今來獻目疾方耳遂以前方言訖而沒崔依此合服不數月復明昆謂眼者肝之竅肝木自實則病眼邪害空竅也越人云實則瀉其子故用黃連以瀉心能瀉其心則子食氣於母而肝弗實矣目也豈不瑩然而明乎然必劑以羊肝者取其為血氣之屬同類相從用之補肝非若草木之性偏一而失沖和也類說羊肝丸夜明砂淨洗蟬蛻木賊去節當歸各一兩羊肝四兩上藥以前四物研為細末以羊肝水煮爛搗如泥入前四物拌和丸如梧子大食後溫湯下五十丸明州定海人徐道享者事母至孝因患赤眼而食蟹遂成內障凡歷五年雖抱眼疾篤孝弗衰忽夢一僧人授以此方制而服之百日復明昆謂夜明砂能攻目中惡血當歸身能生目中新血蟬蛻能去目中翳障木賊能散目中翳熱乃羊肝者同類相從能引四物入肝而利其竅也孝道感格故致神方所謂誠能動天也蠐螬明目晉盛彥之母失明食必自哺母既病久婢僕數見捶撻心懷忿焉伺彥他出取蠐螬炙而飼之母食以為美藏以示彥彥見之抱母痛哭母目豁然而開若有神者昆謂蠐螬能攻惡血若目中血障者用之必然神良若用之概治目疾則弗驗也真人明目丸生地黃熟地黃川椒去目及閉口者微炒等分共為末蜜丸梧子大每服五十丸空心鹽米飲下江陵傅氏目昏多淚家貧鬻紙為業性喜雲水見必邀迎一日有客方巾布袍過之授以此方治目如方修服不一月目明夜能視物昆謂腎主目之瞳子腎水虛竭故令目昏肝之液為淚肝有風熱故令淚出是方也生地所以涼肝熟地所以補腎乃川椒者味辛而熱可以療肝腎之痹氣痹氣者濕熱著而不散之氣也又於空心之時以鹽飲吞之宜其直達肝腎之區矣病在標而治其本可謂神於病情者此其所以為真人之與歟鼉龍點眼方豬膽一枚銀銚中微火熬成膏再入冰腦米許點入眼中郭太尉者真州人久患目盲有白翳膜遮睛遍服眼藥無能效者有親仲監稅在常州守官聞張鼉龍之名因薦於太尉太尉請張視之曰豫眼緣熱藥過多乃生外障視物昏黑更無所睹醫者以肝腎虛損治之愈盲張曰請太尉將藥點眼並服之一月取翳微消後果一月翳退雙目如舊因求點藥方乃只用前件修制點入眼中微覺翳輕後又將豬膽白膜皮曝乾捻作繩子燒灰待冷點翳云盛者亦能治之此方甚好勿妄傳昆謂豬膽汁者甲木之精也可以瑩潤乙竅冰腦者辛溫之品也可以旋開目翳膜灰者化爛之品也可以消去翳膜二百味花草膏羯羊膽出其中再填入好蜜拌勻蒸之候乾入鉢細研為膏福州人病目兩瞼赤濕流淚或痛或癢晝不能視物夜不可近燈兀兀癡坐其友趙謙子春語之曰是為爛緣血風眼也我有一藥正治此疾名曰二百味花草膏病者驚曰用藥品如是世上方書所未有豈易遽辦君直相戲耳趙曰我適間有藥當以與君攜一錢匕堅凝成膏使以匙抄少許入口一日淚止二日腫消三日痛定豁然而愈乃往謁趙致謝且叩其名物趙笑以前方授之曰以蜜採百花羊食百草故隱其名以眩人耳昆謂內熱則瞼赤肝熱則出泣微熱則癢熱盛則痛或痛或癢皆火之故也氣熱則神濁昏冒故令晝不能視物陽勝者善惡火故令不可以近燈光此經所謂天明則日月不明邪害空竅也羯羊膽苦物也足以勝熱蜜潤物也足以濟火然曰入口不曰入眼則固服食之劑耳用之者使頻頻噙之藥力相繼為良明目六事方損讀書減思慮專內觀簡外事旦起晚夜早眠晉範寧常苦目痛就張湛求方湛書此六事仍尾之曰上方宋陽子少得其術以授魯東門伯次授左丘明遂世世相傳以及卜子夏晉左太衝凡此諸賢並有目疾得此方之用熬以神火下以氣篩蘊於胸中七日然後納諸方寸修之一時近可數其目睫遠可察夫簾垂長服不已洞見牆壁之外非但明目乃亦延年許學士評之曰審如是而行之非可謂之嘲謔真明目之奇方也目疾者戒沐頭宜濯足昆謂此二句者先醫之格言也太極之道動而生陽靜而生陰沐頭則上動矣必生陽而損目況夫濕氣難乾乘風而梳拂不已則風濕襲於首而並於目甚者至於喪明此沐頭之宜戒也然何以宜濯足也足太陽之經根於足之小趾端上貫於睛明足少陽之經根於足大趾歧骨間上貫於瞳子窖足陽明之經根於足中指內間上貫於承泣易曰水流濕火就燥若能以溫水濯其兩足則頭目間之熱邪亦能引之而下況夫溫濯之餘腠理疏泄又足以瀉經中之邪是亦去病之一助也故曰宜濯足耳疾門第六十二敘曰耳以司聽匪聽弗聰也君子有思聰之責者胡然而使褒如乎故考四方以治耳千金腎熱湯磁石煅紅淬七次白朮牡蠣各五兩甘草一兩生地黃汁蔥白各一升麥門冬芍藥各四兩大棗十五枚水九升煎三升分三服腎熱耳中膿血不聞人聲者此方主之耳者腎之竅故腎熱則令人病耳生膿出血不聞人聲也是方也磁石能引肺金之氣下降於腎腎得母氣自然清肅而病日愈生地汁麥門冬白芍藥所以滋腎陰而瀉腎熱乃蔥白者所以引腎氣上通於耳也牡蠣鹹寒能軟堅而破結氣得蔥白引之入耳則能開聽戶而消膿血乃白朮甘草大棗者健脾之品也所以培萬物之母益土氣而制腎邪爾千金補腎丸人參黃耆當歸山茱萸牡丹皮芍藥桂心遠志巴戟天菟絲子細辛蓯蓉附子熟地黃蛇床子茯苓甘草乾薑澤瀉石斛各二兩石菖蒲一兩防風一兩半羊腎二枚千金云勞聾氣聾風聾虛聾毒聾久聾耳鳴者此方主之勞聾者勞火鼓其聽戶也氣聾者經氣滯塞於聽戶也風聾者風熱閉其聽戶也虛聾者氣血虛耗而神不用也毒聾者膿血障礙妨於聽戶也久聾者病非一日邪氣痹聚也凡是聾者勢必耳鳴故總系其耳鳴也味之甘者可以補虛亦可以卻勞人參黃耆羊腎山萸乾地菟絲巴戟蓯蓉澤瀉芍藥當歸茯苓甘草均味甘之品也能療虛聾勞聾味之辛者可以驅風亦可以順氣防風細辛菖蒲遠志丹皮石斛均味辛之品也能療氣聾風聾性之毒者可以開結毒亦可以療久痹蛇床桂心附子乾薑均辛溫微毒之品也能療毒聾久聾治三十年久聾方故鐵三十斤以水七斗浸三日取汁入曲釀米七斗如常造酒法候熟取磁石一斤研末浸酒中三日乃可飲取醉以綿裹磁石內耳中覆頭一臥酒醒去磁石即瘥昆謂磁石引鐵物類之相感也金石之性寒可使主內熱金石之性重可使鎮怯氣共釀於酒欲其無所不之既飲其酒復以磁石內耳欲其內外交感而聽戶隨開爾耳膿方人發燒灰存性每用分許吹入耳中即瘥此濕者燥之之意而必以人發者近取諸身而自足也他如白礬赤石脂鴿糞皆可枯灰用之鼻疾門第六十三敘曰鼻居五官之中疾非美觀也記曰盡飾之道斯其行者遠矣故考五方以治鼻蒼耳散白芷一兩辛夷仁蒼耳子炒各二錢五分薄荷五錢共為末食後蔥湯下二錢鼻淵者此方主之鼻流濁涕不止者名曰鼻淵乃風熱在腦傷其腦氣腦氣不固而液自滲泄也此方四件皆辛涼之品辛可以驅風涼可以散熱其氣輕清可使透於巔頂巔頂氣清則腦液自固鼻淵可得而治矣辛夷散辛夷川芎防風木通去節細辛洗去土藁本升麻白芷甘草等分共為末每服三錢茶清調下鼻生息肉氣息不通香臭莫辨者此方主之鼻者氣之竅氣清則鼻清氣熱則鼻塞熱盛則塞盛此息肉之所以生也故治之宜清其氣是方也辛夷細辛川芎防風藁本升麻白芷皆輕清辛香之品也可以清氣可以去熱可以疏邪可以利竅乃木通之性可使通中甘草之緩可使瀉熱瓜蒂散搐息肉法先將鼻中息肉用針微刺令患人含水一口後以瓜蒂散和麝香少許用水數滴吹鼻內出涎水則愈此苦能湧泄也能瀉其實則息肉愈矣補腦散天雄炮辛夷仁蒼耳茸等分共為末飯後酒下二錢陽虛腦寒鼻淵者此方主之人身之上天之陽也故六陽之氣皆會於首若陽氣自虛則陰氣湊之令人腦寒面流清涕是方也天雄辛熱而上浮辛熱者太陽之象故可以溫腦而補陽虛辛夷仁蒼耳茸皆輕清徹腦之劑可以佐天雄而透腦大朴散大黃朴硝等分為末鼻赤如榴者將此二物為末酒調敷之鼻赤者熱也所以赤者血也大黃之寒能瀉熱朴硝之咸能敗血是證也耽於酒者而後有之若不絶其酒而徒用其藥抱薪救火何益於事口齒舌疾門第六十四敘曰君子無尺寸之膚不愛焉則無尺寸之膚不養也口也齒也舌也何莫而非吾身之膚則亦何莫而非吾之所當養矣故考十五方以治口齒舌口糜散黃柏黃連各一兩雄黃沒藥各二錢片腦五分五件共為細末每用分許著於瘡上良口瘡糜爛者此方主之口糜本於濕熱濕熱不去必至疳蝕寒可以勝熱苦可以堅膚故用黃連黃柏乃雄黃之悍殺蟲而利氣冰腦之竄殺蟲而入腠沒藥之苦散血而愈瘡薔薇煎取薔薇濃汁含之又稍稍咽之日三夜一冬用根夏用葉孫真人千金方云薔薇根口瘡之神藥人不知之故其口齒一門用薔薇根者蓋六方焉今嘗其藥氣平而味苦內經曰氣薄為陽中之陰又曰味厚則泄如此言之固清氣泄熱之藥也柴胡地骨皮湯柴胡地黃皮各三錢實者加大黃朴硝氣厥論曰膀胱移熱於小腸膈腸不便上為口糜此方主之膀胱者水道之所出小腸者清濁泌別之區也膀胱移熱於小腸則清濁不能泄別濕熱不去勢必上蒸故令口中糜爛而瘡乃灶底燃薪籠中肉糜之象也是方也柴胡辛溫所以升其清陽地骨皮苦寒所以降其濁陰清濁既判則干清坤寧膈腸利而口糜愈矣實者加大黃朴硝謂大便祕澀邪氣自實二陰皆祕地道不通故用大黃苦寒以瀉實朴硝鹹寒以軟堅乃灶底抽薪之法也益膽湯人參炙甘草黃芩各一錢官桂半錢苦參茯神各一兩遠志肉七分謀慮不決肝膽氣虛口苦舌瘡者此方主之肝主謀慮膽主決斷勞於謀慮決斷故令氣虛咽門為膽之使膽汁上溢於咽故令口苦木能生火故令舌瘡是方也人參甘草所以補其氣虛苦參黃芩所以清其氣熱經曰主明則十二官各得其職故用茯神遠志以養心又曰微者正治甚者從治故用官桂之辛熱滋陰大補丸加鹿茸方熟地黃二兩川牛膝去蘆杜仲姜炒去絲巴戟天去心山茱萸去核小茴香略炒五味子炒遠志去心肉蓯蓉白茯苓山藥各一兩紅棗肉蒸熟十四兩石菖蒲枸杞子各五錢鹿茸炙酥腎虛齒長而動者此方主之腎主骨腎虛則髓弱髓弱則骨枯骨枯則不能固齒故令齒長而動譬之敗幾焉幾敗木枯則緊竇之寸木搖搖而出以水澤之則敗幾潤而寸木固故治此者宜滋陰補腎腎不虛則齦骨潤齦骨潤則齒固矣是方也熟地牛膝杜仲山萸五味枸杞皆味厚之品也可以滋陰益腎巴戟蓯蓉茴香遠志石蒲山藥茯苓皆甘溫之品也可以溫腎生精乃鹿茸者取其為血氣之屬得陰氣之最完故用之以為補腎填精益髓之品耳紅棗肉者味甘益脾故用之以劑丸也苦參湯齊大夫病齲齒倉公為之作苦參湯日漱三升五六日病已蓋取其苦能安齒蠹寒能去風熱也後人無風蠹有用苦參潔齒久而病腰重者降多故也此不知三軍之事而從三軍之政未有不敗者也煮牙散附子尖天雄尖各二錢全蠍七個皆生搗和勻點少許於痛處牙痛惡寒喜熱者此方主之凡人臥去之時開口引其風寒因致牙痛故得寒飲則助其邪而痛甚得熱飲則散其寒而少寬是方也附子尖天雄尖辛熱之品也用之所以溫寒乃全蠍者微毒之品也假之就寒毒之區兼療風邪云爾或用乾薑蓽茇細辛作湯以漱之亦治寒之意定風湯牙皂角炙一寸去皮白石膏五錢朴硝一錢荊芥一錢蔥白三寸風熱牙疼喜寒惡熱者此方漱之內生風熱並於一頰邪火自實因致牙疼故得寒飲則陰陽微和而痛少可得熱飲則以火濟火而痛益深是方也用牙皂荊芥蔥白之辛溫以散其風用朴硝石膏之鹹寒以驅其熱梧桐淚蟾酥莨菪子韭子石灰總考凡牙間有孔而痛者以上五件得一治之皆獲奇效梧桐淚主火毒風疳䘌齒王海藏常奇之矣蟾酥主牙蝕到處痛定林元禮常奇之矣莨菪子炮氣蒸齒去䘌孫真人常奇之矣韭子入艾燒煙燻䘌朱丹溪常奇之矣此皆古人之方也新得一方只是新燒石灰一物蜜丸著於齒蝕之處應手而愈此則古人之所未道也燒鹽灶突墨擦牙方凡人齒縫中出血只以燒鹽灶突墨二物研勻臨臥擦牙漱口良鹽勝血故用燒鹽血得黑則止故用灶突黑取牙不犯手方草烏蓽茇各半兩川椒細辛各二兩本事方云四件共為細末每用少許以針揩在患牙內外如此數次其牙自傷則易落矣蓋四物皆辛熱之品入齒齦而數傷之則齒肉日離此近理之方也蒲黃一物散本事方云一士人夜歸其妻熟寢士人撼之妻問何事不答又撼之其妻驚視之舌腫已滿口不能出聲急訪醫得一叟負囊而至用藥摻之比曉復舊問之乃蒲黃一物昆謂內經曰熱勝則腫此必心脾之火併於舌故令腫而滿口蒲黃性寒能清氣涼血故愈槐花一物散良方云一士人無故舌出血仍有小竅醫者不曉何疾炒槐花為末摻之而愈昆謂諸見血皆是火證槐花能療血中之熱故愈冰片熱證多舌出有病愈而舌不能入者以冰片分許末其舌上則入所以舌出者熱實於內而欲吐舌泄氣也所以不能入者邪氣久居舌強而不柔和也冰片味辛熱而氣清香可以利竅可以柔筋可以泄氣故得之而舌入矣萆麻油捻紙熏舌法有人舌腫舒出口外無敢醫者一村人云偶有此藥歸而取至乃二紙拈以燈燒之取煙燻隨即消縮衆問其方村人曰吾家舊有一牛亦舌腫脹出口人教以萆麻油蘸紙作拈燒煙燻之而愈因以治人亦驗昆謂舌腫舒出口外經所謂熱勝則腫也然舌者心之苗又脾之經絡連舌本散舌下其熱當責於心脾二經本草云萆麻主浮腫惡氣取油塗之葉主風腫不仁搗汁敷之則其能解風腫內熱也可知矣然用其煙猶有妙義煙乃輕清之物一入其口呼吸傳變可使徑達心脾匪微治標亦可療本村人用之而不達其理斯其所以為村人醫者聞之而不察其理則亦村人而已矣
