body:
  text: 卷四脾胃門第二十八敘曰脾胃人身之坤元也至哉坤元萬物資生故脾胃為百骸之母東垣所以擅名當世者無他長焉知脾胃之為要爾庸師治病壞人脾胃者多矣此欲養其子者先戕其母也豈豫養之道哉今考六方於下庶幾乎調元之補也參苓白朮散人參茯苓去皮白朮炒砂仁甘草炒山藥桔梗炒薏苡仁炒扁豆蓮肉脾胃虛弱不思飲食者此方主之脾胃者土也土為萬物之母諸臟腑百骸受氣於脾胃而後能強若脾胃一虧則衆體皆無以受氣日見羸弱矣故治雜證者宜以脾胃為主然脾胃喜甘而惡苦喜香而惡穢喜燥而惡濕喜利而惡滯是方也人參扁豆甘草味之甘者也白朮茯苓山藥蓮肉薏苡仁甘而微燥者也砂仁辛香而燥可以開胃醒脾桔梗甘而微苦甘則性緩故為諸藥之舟楫苦則喜降則能通天氣於地道矣錢氏益黃散陳皮十兩丁香一兩青皮訶子肉甘草各五錢每服末二錢小兒脾虛不實米穀不化滑腸滯頤者此方主之胃主受納脾主消磨故能納而不能化者責之脾虛滑腸者腸滑而飧泄也滯頤者頤頷之下多涎滯也皆土弱不能制水之象火能生土故用丁香甘能補土故用甘草香能快脾故用陳皮澀能去滑故用訶子用青皮者謂其快膈平肝能抑其所不勝爾補中益氣湯人參炙甘草各一錢黃耆一錢五分陳皮白朮當歸柴胡各五分升麻三分飢困勞倦中氣虛弱者此方主之中氣者脾胃之氣也五臟六腑百骸九竅皆受氣於脾胃而後治故曰土者萬物之母若飢困勞倦傷其脾胃則衆體無以受氣而皆病故東垣諄諄以脾胃為言也是方也人參黃耆甘草甘溫之品也甘者中之味溫者中之氣氣味皆中故足以補中氣白朮甘而微燥故能健脾當歸質潤辛溫故能澤土術以燥之歸以潤之則不剛不柔而土氣和矣復用升麻柴胡者升清陽之氣於地道也蓋天地之氣一升則萬物皆生天地之氣一降則萬物皆死觀乎天地之升降而用升麻柴胡之意從可知矣或曰東垣謂脾胃一虛肺氣先絶故用黃耆以益皮毛不令自汗而泄肺氣其辭切矣豫考古人之方而更其論何也余曰東垣以脾胃為肺之母故耳余以脾胃為衆體之母凡五臟六腑百骸九竅莫不受其氣而母之是發東垣之未發而廣其意耳豈曰更論調中益氣湯黃耆一錢升麻三分陳皮六分木香二分人參甘草炙蒼朮柴胡各五分脾胃不調而氣弱者此方主之脾胃不調者腸鳴飧泄膨脹之類也氣弱者語言輕微手足倦怠也補可以去弱故用人參黃耆甘草甘溫之性行則中氣不弱手足不倦矣蒼朮辛燥能平胃中敦阜之氣升麻柴胡輕清能升胃家陷下之氣木香陳皮辛香能去胃中陳腐之氣夫敦阜之氣平陷下之氣升陳腐之氣去寧有不調之中乎升陽順氣湯升麻陳皮去白柴胡草豆蔻當歸各一錢黃耆四分甘草柏皮各五分半夏薑製人參各三分神麯一錢五分清氣在下濁氣在上令人胸膈飽脹大便溏泄者此方主之上件病由於飲食傷其脾氣不能升清降濁故耳是方也升柴辛溫升其清清升則陽氣順矣柏皮苦寒降其濁濁降則陰氣順矣人參黃耆當歸甘草補其虛補虛則正氣順矣半夏陳皮利其膈膈利則痰氣順矣豆蔻神麯消其食食消則穀氣順矣故曰升陽順氣升陽益胃湯羌活獨活防風柴胡白朮茯苓澤瀉黃耆人參半夏陳皮黃連甘草白芍藥濕淫於內體重節痛口乾無味大便不調小便頻數飲食不消灑淅惡寒面色不樂者此方主之濕淫於內者脾土虛弱不能制濕而濕內生也濕流百節故令體重節痛脾胃虛衰不能運化精微故令口乾無味中氣既弱則傳化失宜故令大便不調小便頻數而飲食不消也灑淅惡寒者濕邪勝也濕為陰邪故令惡寒面色不樂者陽氣不伸也是方也半夏白朮能燥濕茯苓澤瀉能滲濕羌活獨活防風柴胡能升舉清陽之氣而搜百節之濕黃連苦而燥可用之以療濕熱陳皮辛而溫可用之以平胃氣乃人參黃耆甘草用之以益胃而白芍藥之酸收用之以和榮氣而協羌防柴獨辛散之性耳仲景於桂枝湯中用芍藥亦是和榮之意古人用辛散必用酸收所以防其峻厲猶兵家之節制也伏龍肝伏龍肝者灶中之土也土性可以益脾久於薪火可以溫中脾胃虛弱者藥內宜加入之傷食門第二十九敘曰食以養生夫人之所急也食以傷生夫人之所失也炎帝教民耒耜為養生也既而品嘗百藥懼傷生也養生之中而有傷生之患此君子所以慎口體之奉也今考方藥十九首衛生者其小補哉升陽順氣湯升麻柴胡當歸草豆蔻陳皮各一錢黃耆四錢半夏人參各三錢甘草炙柏皮炒各五分神麯炒各一錢五分食飲胸膈飽脹大便溏泄者此方主之內經曰清氣在下則生飧泄濁氣在上則生䐜脹此由飲食傷脾不能運化失其升清降濁之令故耳是方也用升麻柴胡以升其清陽之氣用柏皮以降其濁陰之䐜用半夏陳皮以利其膈用豆蔻神麯以消其食用人參黃耆當歸甘草以益其脾如此則清氣升濁氣降滯氣利食氣磨而脾胃之氣復其常矣保和丸山楂肉二兩神麯半夏茯苓各一兩蘿蔔子陳皮連翹各五錢飲食內傷令人惡食者此丸主之傷於飲食故令惡食諸方以厲藥攻之是傷而復傷也是方藥味平良補劑之例也故曰保和山楂甘而酸酸勝甘故能去肥甘之積神麯甘而腐腐勝焦故能化炮炙之膩卜子辛而苦苦下氣故能化面物之滯陳皮辛而香香勝腐故能消陳腐之氣連翹辛而苦苦瀉火故能去積滯之熱半夏辛而燥燥勝濕故能消水穀之氣茯苓甘而淡淡能滲故能利濕傷之滯枳朮丸白朮二兩土炒枳實一兩麩炒荷葉包陳米飯煨乾為末糊丸健脾消痞此方主之一消一補調養之方也故用白朮以補脾枳實以消痞燒飯取其香以益胃荷葉取其仰以象震象震者欲其升生甲膽之少陽也此易老一時之方來東垣末年之悟孰謂立方之旨易聞耶枳實導滯丸白朮土炒茯苓去皮黃芩酒炒黃連酒炒各三錢澤瀉二錢大黃一兩枳實麩炒神麯各五錢傷濕熱之物不得消化而作痞滿者此方主之濕熱之物酒面之類也燥以制濕淡以滲濕故用白朮茯苓澤瀉苦以下熱寒以勝熱故用芩連枳實大黃盦造變化者可以推陳而致新故用神麯紅丸子京三稜醋煮蓬莪朮醋煮陳皮去白青皮麩炒各五兩乾薑炮胡椒各二兩共為末醋糊為丸如梧桐子大礬紅為衣每服三十丸傷寒冷之物腹痛成積者此方主之三稜莪朮攻堅藥也故可以去積乾薑胡椒辛熱物也故可以去寒青皮陳皮快氣藥也故可以去痛而必以醋糊為丸者經曰酸勝甘故用之以療肥甘之滯必以礬紅為衣者取其咸能軟堅枯能著癖也附子理中湯附子去皮臍炮乾薑炮人參去蘆白朮炒甘草炙口食冷物客寒犯胃中焦痛甚脈沉遲者急以此方主之凡吞冰飲泉及一切冷物食之過其分量則寒氣凝於中焦故令肚腹大痛脈來沉者為里遲者為寒是方也乾薑附子之辛熱所以溫中散寒人參白朮甘草之甘溫所以益胃於被傷之後也葛花解酲湯葛花砂仁白豆蔻木香陳皮去白人參茯苓各五分神麯炒白朮炒乾生薑青皮去穰炒澤瀉各一分酒食內傷者此方主之葛花之寒能解中酒之毒茯苓澤瀉之淡能利中酒之濕砂仁豆蔻木香青皮陳皮之辛能行酒食之滯生薑所以開胃止嘔神麯所以消磨炙膩而人參白朮之甘所以益被傷之胃爾備急丸大黃巴豆去皮膜油乾薑各等分共為末作丸每服六分以利為度飲食自倍冷熱不調腹中急痛欲死者急以此方主之脾胃以飲食而養亦以飲食而傷故飲食自倍填塞至陰上焦不行下脘不通則令人腹痛欲死經曰升降息則氣立孤危是也以平藥與之性緩無益於治故用大黃巴豆奪門之將軍以主之佐以辛利之乾薑則其性益速而效益捷矣鹽湯探吐法燒鹽四合溫湯二升和勻飲之以指探吐飲食自倍胸膈飽脹宜以此法吐之經曰陰之所生本在五味陰之五宮傷在五味故飲食過之則胸膈飽脹者勢也與其脹而傷生孰若吐而去疾故用鹽湯之咸以軟堅復使探喉以令吐杏仁廚家造索粉杏仁近之即爛今後凡遇粉傷者宜加焉此惟醫余志之諸書皆未道也糯米客有貨瓜果者一遇糯米無不化爛今後凡遇傷於瓜果者宜入之醇酒內則志八珍以養老取牛肉必新殺者絶其理而薄切之湛諸美酒其朝而食之則酒之善於爛牛味也可知矣今後凡遇傷於牛味者宜使飲之橄欖舟人以橄欖木為檣凡魚觸之無有不死又嘗以橄欖木為桌以魚骨置之少時柔軟今後凡遇食魚而傷者及噎魚骨者皆宜用之白曲糯米一石得白曲一斤皆釀為酒今後凡遇傷於粽䊦者宜用之芽茶凡造飯成團以芽茶沃之粒粒散解今後凡遇傷於百穀者宜入之山楂即棠球子客有烹豬首者或告之曰是草豬母彘之首也皮厚而不易烹能多入山楂則易烹矣試之果然今後但遇傷於肉味者只此足矣淡豆豉凡食煎炙麵食肥甘椒辣等物令人焦煩消渴者宜以淡豆豉一物煎湯主之蓋萬物歸於腐又曰腐勝焦淡豉原經盦造而質已腐則能腐化諸味矣故稱其良麝香凡花果草木一觸麝香無不萎落今後凡遇傷於果實蔬菜者宜主之枳枸子俗呼雞距子門外植枳枸木者門內造酒必不熟屋內有此木作柱亦然故曰枳枸解酒過於葛花今後凡遇傷酒中酒者宜用之吞酸門第三十敘曰吞酸小疾也可暫而不可久或以疾小而忽之此不知其為翻胃之漸也語曰毫末不斫將尋斧柯是故慎之今考古方四首蓋曰防微杜漸云爾茱連丸黃連一兩酒炒黃芩酒炒吳茱萸煮少時曬乾陳皮各五錢蒼朮七錢五分泔浸七日胃中濕熱抑遏肝火令人吞酸者此方主之濕鬱則熱熱鬱則酸故夏月飲食之類以物覆冒之其味必酸曰肝火者洪範曰木曰曲直曲直作酸故責之肝是方也連芩治熱熱去則不吐酸蒼朮燥濕濕除則不生熱陳皮理氣氣行則濕不郁吳茱萸辛熱而氣臊辛熱可使就燥氣臊可使就肝故能引連芩入肝而瀉肝火此從治之義也他如火門左金丸亦良加味平胃散蒼朮泔浸七日陳皮去白厚朴薑汁炒甘草炙神麯炒麥芽宿食不化吞酸厄臭右關脈滑此方主之食經宿而不化有熱則令人吞酸無熱則但厄臭而已右關主脾胃脈滑主停食治此者宜寬中下氣健脾消食辛者可寬中故用蒼朮陳皮苦者可下氣故用厚朴甘者可健脾故用甘草盦造變化者能消食故用神麯麥芽火鬱越鞠丸山梔炒黑青黛飛香附童便浸五日撫芎神麯炒蒼朮米泔浸七日七情拂鬱吞酸小便赤脈來沉數者此方主之一念動處便是火故七情拂鬱皆能令人內熱吞酸小便赤為火脈沉為郁數為熱是方也山梔青黛之苦寒可以導熱香附蒼朮撫芎之辛芳可使解鬱神麯之陳腐可使推陳而致新茱萸六一散滑石六兩甘草一兩吳茱萸湯炮過一兩此亦治濕熱吞酸之方也滑石寒而淡寒能勝熱淡能導利故足以治濕熱吳茱萸味辛性熱能反佐以從治甘草性溫氣平能和中而瀉火痞門第三十一敘曰痞虛中之實也許學士云邪之所湊其氣必虛留而不去其病則實故治痞者一補一消考方二首表昔人之法爾枳實消痞丸枳實麩炒黃連炒各五錢厚朴姜炒四錢半夏曲人參白朮各三錢乾生薑甘草茯苓麥芽各二錢心下虛痞惡食懶倦右關脈弦者此方主之痞與否同不通泰也易曰天地不交而成痞故肺氣不降脾氣不運升降不通而名痞也脾為邪氣乘之不足以勝谷故令惡食脾者卑臟役氣於四肢而後肢體強健脾病則不能致氣於肢體故令懶倦肝脈也木來剋土故令右關脈弦是方也枳實黃連厚朴之苦可以下氣半夏曲乾生薑之辛可以行滯人參甘草白朮茯苓之甘可使健脾麥蘖善消則可以推陳而致新矣是疾也功在慎口經曰陰之五宮傷在五味奈何不慎乎木香化滯湯木香生薑陳皮各六分柴胡七分當歸梢枳實各四分半夏一錢五分紅花二分草豆蔻炙甘草各二錢憂氣鬱結腹皮里微痛心下痞滿不思飲食此方主之上件病證即六朝之醫所謂氣膈也今人謂之氣痞耳經曰脾主行氣於三陰三陰之脈皆行腹裡今憂氣鬱結營衛之行澀故令腹皮里微痛心下痞滿者升降之道乖也不思飲食者憂氣傷脾也辛香可以化氣故用木香豆蔻生薑陳皮半夏之輩以主之升降者交泰之道也故用柴胡之辛以升之枳實之苦以降之營衛澀而後腹皮痛故用歸尾紅花以和營炙甘草以和衛治男婦痞塊方白鴿一對不落水去毛腸雜小破急性子炒藜花子水炒大黃曬朴硝各五錢只為細末入鴿腹扎緊砂鍋陳酒煮熟待冷取出藥將鴿肉風曬半日打碎炙炒不宜焦枯同前藥磨細末篩淨將糯米粉掬為丸桐子大空心服五錢其塊化為膿血為魚凍為黏膠從大便出潛消默化妙難盡述嘈雜門第三十二敘曰嘈雜火證也而痰次之終身嘈雜者必夭天年此胡云哉熯萬物者莫若火也故考三方以療嘈雜痰火越鞠丸海石研水飛南星牛膽者栝蔞仁去油山梔炒黑青黛水飛過香附童便浸蒼朮泔浸七日撫芎痰因火動令人嘈雜此方主之嘈雜者痰火內動如粗食在膈令人不自安也是方也海石之咸可以軟頑痰南星之燥可以枯濕痰栝蔞之苦可以下逆痰山梔青黛苦寒之品也所以瀉火香附撫芎蒼朮辛香之品也所以發越鞠郁加味三補丸黃芩黃連黃柏香附醋浸五日蒼朮泔浸七日鬱火嘈雜此方亦良辛香能開鬱故用香附蒼朮苦寒能瀉火故用黃芩黃連黃柏然三黃之寒得蒼附而不滯蒼附之香得三黃而不燥其互以成功又如此二陳加黃連梔子湯半夏陳皮茯苓去皮甘草炙黃連梔子此治嘈雜之湯液也痰之生也本於濕故用半夏燥濕茯苓滲濕濕去則痰不生甘草能健脾脾健則能制濕陳皮能利氣氣行則痰亦行黃連梔子之加取其寒能勝熱苦能降火爾郁門第三十三敘曰天地以升生而萬物發陳故氣血以四布而百體敷榮一有拂鬱則象天地之閉藏矣是豈升生之道乎此諸病之所以生也今考名方六首而鬱之情狀見矣越鞠丸香附醋炒蒼朮米泔浸撫芎梔子炒黑神麯炒等分水丸小豆大每服百丸諸郁者此方主之越鞠者發越鞠郁之謂也香附理氣鬱蒼朮開濕鬱撫芎調血鬱梔子治火鬱神麯療食鬱此以理氣為主乃不易之品也若主濕鬱加白芷茯苓主熱鬱加青黛主痰鬱加南星海石栝蔞主血鬱加桃仁紅花主食鬱加山楂砂仁此因病而變通也如春加防風夏加苦參秋冬加吳茱萸乃經所謂升降浮沉則順之寒熱溫涼則逆之耳貝母詩曰陟彼阿丘言採其虻朱子曰虻貝母也採之以療鬱結之疾故療鬱結者每加之鹽湯探吐法燒鹽三兩溫湯二升和服探吐木鬱兩脅大痛脈代者此方主之木肝木也有垂枝布葉之象喜條達而惡抑鬱若膈間有停痰宿食抑其肝氣不得上達則肝木自實兩脅大痛脈來代者痛盛而脈止也得吐則生不吐則死故主鹽湯探吐鹽取潤下吐取肝木之宣暢而已經曰木鬱則達之此之謂也火鬱湯羌活葛根升麻芍藥人參各七分柴胡生甘草各三分防風五分蔥白五莖火鬱者內熱外寒脈沉而數此方主之火心火也稟炎上之體喜暢而惡郁郁之則火無焰故令身寒脈沉為在裡沉而數為裡熱是方也羌活防風升麻柴胡乾葛蔥白皆辛溫升舉之藥故足以揚無焰之火而令炎炎若芍藥人參甘草者乃所以和營衛於升發之餘爾經曰火鬱則發之此之謂也大承氣湯大黃芒硝厚朴枳實土鬱者痞滿燥實堅全俱脈來有力而實此方主之土脾胃土也為倉廩之官無物不受喜傳化而惡停滯若里邪作實則令人痞滿燥實堅全俱脈來實者為裡實是方也厚朴苦溫以去痞枳實苦寒以瀉滿芒硝鹹寒以潤燥軟堅大黃苦寒以瀉實去熱經曰土鬱則奪之此之謂也麻黃葛根湯麻黃去節赤芍藥各三錢葛根一錢五分淡豉半合金鬱者喘滿脈浮此方主之金肺金也為清虛之臟皮毛之合喜清虛而惡壅塞塞之則氣自實令人喘滿肺主皮毛故令脈浮是方也麻黃乾葛之輕可以去實淡豆豉之腐可以推陳赤芍藥之酸可以瀉壅經曰金鬱則泄之此之謂也大補丸黃柏一味炒褐色作丸水鬱者腰股痛足下熱此方主之水腎也水鬱者腎部有鬱火也腰者腎之府故令腰痛腎脈斜走足心上股內後廉故股內亦痛而足心熱黃柏苦而潤潤能益水苦能降下經曰水鬱則折之此之謂也五疸門第三十四敘曰疸黃疾也初學易談之此未遇盤根錯節耳以故芒利不若干將鮮有不斷其鋒者今即名人之方十三首而考之疸證之難易概可見矣丹溪治黃疸方黃芩炒黃連炒梔子炒黑茵陳豬苓澤瀉蒼朮制青皮去穰炒草龍膽各五分谷疸加三稜莪朮縮砂陳皮神麯丹溪云疸證不必分五同是濕熱故以此方主之疸病黃之名也五疸者黃汗黃疸酒疸谷疸女勞疸也疸分五證始於仲景之金匱要略此先聖示人以博也不必分五同是濕熱此後賢示人以略也是方也芩連梔子龍膽之苦所以去熱豬苓澤瀉之淡所以去濕茵陳蒿氣微寒而味苦平為陰中之陽則兼濕熱而治者也故為黃家君主之藥蒼朮所以燥濕青皮所以破滯而谷疸諸品之加乃推陳致新之意也雖然丹溪翁之言不能無弊使後之學者宗其言至於舉一而廢百宜乎視仲景之堂若登天也故古方治疸有吐者有汗者有下者有寒者有溫者有潤者有燥者有軟堅者有消導者有逐血者今曰不必分五則仲景之門猶不入奈何而窺百家之奧乎瓜蒂散瓜蒂赤小豆淡豆豉各五分疸證腹滿欲吐鼻燥脈浮者宜以此方吐之酒疸欲吐者同腹滿欲吐邪在上也鼻燥者邪在氣分也脈浮者邪未盡入於裡也吐中有發散之義故吐於浮脈正宜瓜蒂苦而善湧赤小豆平而解熱淡豆豉腐而勝燥此古人之宣劑也如頭額兩太陽痛者令病人噙水一口以瓜蒂散一字吹入鼻中泄出黃水而愈桂枝加黃耆湯桂枝芍藥生薑各三兩甘草黃耆各二兩大棗十一枚黃汗身體疼重發熱兩脛自冷此方主之黃汗者汗出皆黃沾衣有色也得之汗出時入水取浴水從汗孔入濕鬱於表故病黃邪傷其衛故自汗濕熱相搏故身體疼重而發熱病原寒水所傷寒氣屬陰水性就下故兩脛自冷客者除之故用桂枝之辛甘以解肌表之邪泄者收之故用芍藥之酸寒以斂榮中之液虛以受邪故用黃耆之甘溫以實在表之氣辛甘發散為陽故生薑甘草可以為桂枝之佐乃大棗者和脾益胃之物也茵陳五苓散茵陳豬苓茯苓澤瀉白朮等分桂少許發黃小便不利者此方主之熱病小便不利濕熱內蓄勢必發黃茵陳黃家神良之品也故諸方多用之豬苓澤瀉茯苓白朮味平而淡故可以導利小水官桂之加取有辛熱能引諸藥直達熱邪蓄結之處經曰甚者從治此之謂也茵陳茯苓湯茵陳二錢茯苓豬苓桂枝各一錢滑石一錢五分發黃小便澀煩躁而渴者此方主之實熱在內其熱不得泄越故發黃小便澀者熱之所注也煩躁者熱犯上焦清陽之分也渴者邪熱蒸灼不能生液潤喉也是方也茵陳主黃疸佐以茯苓豬苓則利水佐以滑石則利熱佐以桂枝則同氣相求直達熱邪之巢穴內熱既去則津液自生氣自化小便自利煩渴自除身黃自愈矣茵陳梔子大黃湯茵陳一兩梔子三枚大黃三錢五分發黃小便赤澀大便祕結此方主之茵陳苦寒能利黃疸梔子瀉火屈曲而下能療小便之赤澀大黃能攻大便之祕結此衆人之所共知大小既利則濕熱兩泄而黃自除矣梔子柏皮湯梔子十五枚黃柏二兩甘草一兩發黃身熱不止大小便利者此方主之發黃身熱不止者陽邪未去也大便利故不用大黃小便利故不用五苓但以梔子柏皮之苦勝其熱甘草之甘緩其勢則治法畢矣枳實梔子豆豉大黃湯枳實五枚梔子十四枚大黃一兩豆豉一升發黃身熱腹痛右關脈滑者名曰谷疸此方主之酒疸同發黃身熱少火鬱也腹痛右關脈滑水穀積也故用枳實大黃攻其水穀之積梔子豆豉解其少火之郁又曰梔子豆豉仲景嘗用之以吐懊憹枳實大黃仲景嘗用之以下胃實故酒疸欲吐谷疸腹痛此方皆主之茵陳四逆湯茵陳二兩附子一枚乾薑一兩半炙甘草一兩發黃脈沉而遲肢體冷逆腰以上自汗者此方冷服此陰證發黃也陰寒盛於下則戴陽於上故上體見陽證下體見陰證陰盛於下故見陰脈之沉遲兼陰證之四逆陽戴於上故見陽證之發黃上體之自汗也茵陳治黃之要藥故無分於寒熱而用之附子乾薑炙甘草回陽之要品也故有陰寒即用之然必冷服者恐薑附發於上焦陽盛之區而下部陰寒之分反不及也是方也韓祗和李思訓朱奉議咸用之矣使據丹溪翁不必分五同是濕熱之言而執其方以療之則藥與證不相反耶韓李事見湯液本草朱奉議見活人書硝石礬石散硝石礬石燒等分二共為末大麥粥湯和服方寸匕日三仲景金匱要略云黃家日晡所發熱而反惡寒此為女勞疸得之膀胱急小腹滿額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治此方主之陽邪傳至於胃熱無以越土色自見而發黃則日晡所必發熱所以然者土位旺於日晡故也今反惡寒則知其以女勞虛之矣女勞虛者責之腎膀胱者腎之腑前陰者腎之竅腎虛而陽邪襲之故令膀胱急小腹滿黑者北方腎水之色額上黑者腎病而色自見也足下熱者腎脈起於湧泉腎水一虛則相火湊之故足下熱也因作黑疸者陽邪盡陷於腎而腎色盡顯於外也腹脹者腎脈行於腹裡邪氣居之故令脹如水狀實非水也若是水病則大便澄徹而濡瀉今是腎病故大便必黑而時溏蓋腎主二便病故黑溏而失其常也此可以辨其為女勞之病而非水矣腹滿難治者腹滿與腹脹不同腹脹是腎脈行於腹故令脹於外腹滿是脾胃受邪不能健運而滿於中也脾胃屬土能克腎水故曰難治硝石礬石鹹寒者也咸能入腎寒能勝熱故以二物主之和以大麥粥湯者恐二物之損胃也嗚呼仲景公說證立方精良曲當大都如此譬之選將練兵知人善任則萬舉萬當罔不奏功彼用方不合證者譬則出師無名用藥不知性者譬則將不知兵其不喪師辱國者鮮矣惡乎建功抵當丸水蛭三十枚炒褐色虻蟲三十枚去翅足炒桃仁二十枚去皮尖大黃三兩酒浸蓄血發黃者此方主之陽邪瘀熱在裡少腹硬滿小便自利而發黃者為蓄血發黃苦走血咸軟堅故用水蛭虻蟲以逐敗血滑利腸寒下熱故用桃仁大黃以下血熱他如傷寒門桃仁承氣湯亦可酌用大溫中丸陳皮去白厚朴薑汁炒三稜醋炒蒼朮泔浸七日莪朮醋炒青皮各五兩甘草一兩炙香附一斤醋炒針砂二兩醋炒紅七次忌犬肉果菜此調理谷疽酒疸之方也方名溫中者主療濕鬱於中之義也水穀酒食無非濕化傳化得宜則治一或積於中宮則遏少火熱而病黃矣故用蒼朮香附陳皮青皮厚朴以平胃中之敦阜而利其氣氣利則水穀不滯用三稜莪朮以削堅削堅則積滯漸除用針砂者一借其兌金之令以伐土中之木邪一用其清肅之氣以除少火之蒸熱也甘草之用和中而協諸藥爾棗礬丸緑礬半斤火煅通紅棗肉二斤煮去皮搗爛丸平胃散四兩為衣每服三十丸薑湯下谷疸身目俱黃此方亦良水穀癖積於中抑遏肝腎之火久久鬱熱故身目俱黃是方也緑礬鹹寒能軟痰癖而勝濕熱棗肉甘溫能益脾胃而補中宮平胃散者蒼朮厚朴陳皮甘草也蒼朮厚朴所以平胃家敦阜之氣而除積飲陳皮甘草一以利氣一以和中乃調胃之意也消渴門第三十五敘曰消渴無水也易義曰火炎則水乾故消渴責之無水然證有三焦之判病有虛實之分常變不同治療亦異方藥十二考示人以一得耳丹溪消渴方黃連末栝蔞根末人乳汁藕汁生苄汁古稱三消上消者令人消渴此方主之氣厥論曰心移熱於肺傳為膈消夫心火也肺金也金得火而燥故令膈消燥者潤之故用栝蔞人汁藕汁生苄火原於心故瀉以黃連此言可治者爾又曰飲一溲二者死不治得非以火來賊金之故乎若時熱者主暑門人參白虎湯調胃承氣湯大黃四錢芒硝五錢甘草二錢中消者善食而溲此方主之經曰疸成為消中疸者熱也消中者善食而溲也大黃苦寒可以攻熱芒硝鹹寒可以潤燥甘草甘平可以調中大黃甘草飲子大黃一兩五錢甘草四兩大豆五升先煮二三沸去苦水再煮三物用井花水一桶煮熟冷服無時此治中上二焦消渴之方也大黃能去胃中實熱甘草能緩燥急之勢大豆能解諸家熱毒而必冷服者寒因寒用也六味地黃丸熟地黃八兩山茱萸山藥各四兩白茯苓牡丹皮澤瀉各三兩下消者煩渴引飲小便如膏此方主之先有消渴善飲而後小便如膏者名曰下消懼其燥熱漸深將無水矣故用此方以救腎水熟地山萸質潤味厚為陰中之陰故可以滋少陰之腎水丹皮澤瀉取其鹹寒能制陽光山藥茯苓取其甘淡能療膏濁八味丸熟地黃八兩山茱萸肉山藥各四兩白茯苓牡丹皮澤瀉各三兩肉桂炮附子炮去皮臍各一兩渴而未消者此方主之此即前方六味地黃丸加附子肉桂也渴而未消謂其人多渴喜得茶飲不若消渴之求飲無厭也此為心腎不交水不足以濟火故令亡液口乾乃是陰無陽而不升陽無陰而不降水下火上不相既濟耳故用肉桂附子之辛熱壯其少火用六味地黃丸益其真陰真陰益則陽可降少火壯則陰自生故灶底加薪枯籠蒸溽槁禾得雨生意維新惟明者知之昧者鮮不以為迂也昔漢武帝病渴張仲景為處此方至聖玄關今猶可想朽木湯取朽木方寸者三十枚煎湯飲之得水土中者良此消渴之良方也經曰熱中消中富貴人蓋以消渴之病責之肥甘炮炙嗜酒耽辛之所致也非富貴人何以得之朽木年深而質腐腐者水之氣水足以制火故腐足以勝焦熱中消中皆焦證也故此物主之葛花葛根傷酒消渴宜主葛花以其善解酒毒故耳或用葛根其功不相上下也淡豆豉喜食肥甘焦炙令人消渴者此物宜用蓋以豆豉由於盦造味苦而氣腐苦能勝熱腐能勝焦故耳烏梅前有梅林聞者生液故胃干暴渴者宜用之所謂酸能致液也香薷夏月消渴者多是暑邪入於心包絡宜以香薷君之北梨甘蔗富貴之人飲酒必多置酢醬海味酒能灼人真陰咸能喪人真液故每每病致消渴然酒以釀而濃以水而淡咸以燥而堅以濕而化故食北梨甘蔗可以解酒亦可以解咸冬月宜煮而啖之人參凡汗吐下後渴者皆胃液不足宜以人參補之蓋氣能蒸溽故耳水腫門第三十六敘曰水由地中行順道也懷山襄陵逆道也治之者行其所無事則智大矣故治水腫者亦因其勢而利導之宜汗宜下宜滲宜清宜燥而藥惟宜焉則醫之大智也考方八首而治水之大可知矣九味羌活湯羌活防風蒼朮細辛川芎白芷生苄黃芩甘草水病腰以上腫者此方微汗之即愈腰以上皆腫謂頭面俱病也內經曰上盛為風下盛為濕故腰以上皆腫必兼風治蓋無風則濕不能自上於高巔清陽之分也是方也羌活防風蒼朮細辛川芎白芷皆辛甘之品可以疏風亦可以除熱所謂辛藥能疏風風藥能勝濕也風濕相搏必有內熱故用生苄黃芩之涼而甘草者所以調和營衛使其相協而無相爭也加味五皮飲五加皮地骨皮生薑皮大腹皮茯苓皮薑黃木瓜水病腰以下腫者此方主之腰以下腫者水性就下之象也藥之為道辛者輕者可使走表枯者淡者可使滲利苦者寒者可使去熱味質厚重者可使走下是方七味或各一其性或兼而有之故可以滲利皮膚中之水而調其氣血也疏鑿飲子羌活秦艽商陸檳榔澤瀉木通大腹皮茯苓皮赤小豆椒目等分遍身水腫喘呼氣急煩渴大小便不利者此方主之遍身水腫則外而肌膚無一而不病矣喘呼氣急煩渴大小不利則內而三焦無一而不病矣是方也羌活秦艽疏表之藥也水邪之在表者得之由汗而泄澤瀉木通腹皮苓皮滲利之藥也水邪之在裡者得之由溺而泄商陸檳榔攻水之藥也水邪之壅塞者得之由後而泄赤小豆椒目燥濕之品也水氣之蒸溽者得之以熯而竭隨在而分其勢病其不衰去乎大橘皮湯陳皮一錢半木香二分半滑石六錢檳榔三分豬苓去皮白朮炒澤瀉肉桂炒各五分茯苓一錢去皮甘草二分濕熱內攻腹脹小便不利大便滑泄此方主之濕熱內攻故令腹脹小便不利故令大便滑泄陳皮木香檳榔行氣藥也氣行則濕行滑石甘草暑門之六一散也用之所以治濕熱茯苓豬苓澤瀉白朮肉桂傷寒門之五苓散也用之所以利水道二方各有正考嚴氏實脾散厚朴薑汁炒白朮附子大腹子白茯苓草果仁木香木瓜乾薑炮各一兩炙甘草半兩水氣肢體浮腫口不渴大便不祕小便不澀者陰水也此方主之脾胃虛寒不能制水則水妄行故肢體浮腫以無鬱熱故口不渴而大小皆利是方也用白朮茯苓甘草之甘溫者補其虛用乾薑附子之辛熱者溫其寒用木香草果之辛溫者行其滯用厚朴腹子之下氣者攻其邪用木瓜之酸溫者抑其所不勝名曰實脾散者實土以防水也雖其藥味不皆實土然能去其邪乃所以使脾氣之自實也舟車丸牽牛四兩炒大黃二兩酒浸甘遂麵裹煨大戟麵煨芫花炒青皮炒陳皮去白各一兩木香五錢水腫證病氣形氣皆實者此方主之通可以去塞牽牛大黃甘遂芫花大戟皆通劑之厲者也辛可以行滯陳皮青皮木香皆行滯之要藥也此方能下十二經之水下咽之後上下左右無所不至故曰舟車千金苦瓠圓取苦瓠白穰實捻如大豆以麵裹煮一沸空腹吞七枚至午當出水一升如此三四日水自出不止大瘦乃瘥三年內慎口味苦瓠須好無厭翳細理者不爾有毒不堪用大水頭面遍身腫脹者此方主之石水者亦主之經曰苦能湧泄故用之在上則令人湧用之在下則令人泄今以熟麵裹之空腹而吞蓋用之於下也宜乎水自泄矣石水者四肢皆瘦惟有少腹堅硬如石腫脹而便不利也麥門冬飲麥門冬五十枚去心姜炒糧米五十粒水出高源者此方主之肺非無為也主降下之令焉凡人飲入於胃之時脾氣散精上歸於肺肺熱失其降下之令不能通調水道下輸膀胱漬於高源淫於皮膚則作水腫諸醫罕明乎此實土導水皆不能愈故用麥門冬清肺以開其降下之源糧米益脾而培乎金之母氣此治病必求其本也或問此證何以辨之余曰肢體皆腫少腹不急初病便有喘滿此其候也鼓脹門第三十七敘曰鼓脹是虛中之實宜分氣血蟲食而治之以朝寬暮急能食不能食而辨之實者可攻虛者漸磨可也例之相道焉國內空虛則宜惠養元氣惡能黷武今考名方七首示大法耳或較形氣病氣而攻補兼施此在人之妙用初不必泥也大安丸山楂肉二兩炒白朮炒神麯炒半夏制茯苓各一兩陳皮去白連翹蘿蔔子生用各五錢飲食傷脾成鼓脹者此方主之鼓脹者腹皮虛大鼓之堅急而有聲也經曰陰之五宮傷在五味故飲食過其分量則傷脾脾傷則不能運化積其穀氣虛大而鼓脹矣然五味之變酸性甘腐勝焦苦勝熱香勝腐燥勝濕淡勝飲利勝滯氣勝味故用山楂之酸以消肥甘用神麯之腐以化焦炙用連翹之苦以磨積熱用陳皮之香以開腐穢用半夏之燥以勝土濕用茯苓之淡以利水飲用蘿蔔子之利以行食滯用白朮之氣以勝五味五味能勝則脾不傷脾不傷則中氣運行而無鼓脹矣此大安之旨也導氣丸青皮水蛭炒莪朮虻蟲炒三稜乾漆炒檳榔斑蝥炒吳茱萸牽牛炒乾薑硇砂炒胡椒茴香炒附子鹽炒赤芍藥川椒炒石菖蒲桃仁炒上件同炒藥熟去水蛭等不用研末酒糊為丸如梧桐子大每服五丸至七丸空心紫蘇湯下諸腹脹大痞塞不通大便虛祕此方主之青皮莪朮三稜菖蒲氣積藥也炒以水蛭虻蟲乾漆桃仁則逐敗血矣乾薑附子胡椒茱萸溫中藥也炒以硇砂食鹽茴香牽牛則軟堅而疏利矣檳榔炒以斑蝥下氣者得破氣者而益悍赤芍藥炒以川椒瀉肝者得疏肝者而益利制度之工如此以之而治氣實有餘之證斯其選矣大黃䗪蟲丸大黃十兩蒸黃芩二兩甘草三兩乾漆炒桃仁各一兩芍藥四兩杏仁去皮尖虻蟲去翅足炒蠐螬炒各一升䗪蟲半升炒水蛭百枚炙黃乾地黃半兩共為末蜜丸小豆大日三服每五丸腹脹有形塊按之而痛不移口不惡食小便自利大便黃色面黃肌錯者血證諦也此丸與之腹脹有形塊按之而痛移者氣與火也今痛不移則屬有形矣然食與血皆有形食而腹脹則惡食今不惡食則知其為血矣小便自利者血病而氣不病也大便黑色者病屬於陰也面黃肌錯者血病則不能榮養其容濡澤其膚故令萎黃甲錯耳大黃攻下之品也引以乾漆虻蟲蠐螬水蛭䗪蟲桃仁之輩則入血而攻血芍藥地黃生新血於去瘀之際杏仁甘草致新氣於逐敗之餘而黃芩之苦又所以厚腸堅胃而不為攻下所傷耳雞矢醴散大黃酒潤桃仁去皮尖雞屎白者酒炒等分共為末每服三錢薑湯下此方治血蠱良大黃苦寒利於攻下佐以桃仁逐敗血也佐以雞屎殺蠱蟲也腹中論曰有病心腹滿旦食則不能暮食此為何病岐伯對曰名為鼓脹黃帝曰治之奈何岐伯曰治之以雞矢醴一劑知二劑已王冰注曰雞屎利小便微寒此注還未妥香棗丸苦丁香一物為末熟棗肉作丸梧子大每三十丸空心棗湯下諸鼓脹內熱者此方主之苦丁香即苦瓜蒂也散用之則吐丸用之則瀉凡有形之邪無不出之亦良方也大戟棗子大戟連根葉一握大棗一斗二物同煮一時去大戟不用旋旋吃棗無時服盡決效此攻水證鼓脹之方也大戟氣大寒而味苦甘有小毒能下十二經之水大棗味甘取其大補脾胃而不為攻下所傷耳服此方大忌甘草以其與大戟相反故也六君子湯人參白朮茯苓半夏姜煮陳皮甘草脾虛鼓脹手足倦怠短氣溏泄者此方主之經曰脾主行氣於三陰三陰者太陰脾厥陰肝少陰腎也其脈皆行於腹裡脾病則三陰之氣不行故令鼓脹手足倦怠者四肢受氣於脾脾病則無以受氣故倦怠短氣者脾病而中氣弱也溏泄者土弱不能制濕也是方也人參白朮茯苓甘草甘溫益脾之物也半夏陳皮快脾利氣之物也然溫者益氣甘者守中下咽之後必增脹滿此勿疑之經曰塞因塞用故用補劑以治脹滿初服則脹久服則通此惟精達經旨者知之庸醫未足道也小便不通門第三十八敘曰溲溺不通匪細故也期朝不通便令人嘔名曰關格又日不通而死矣一見嘔證便不可救經曰出入廢則神機化滅升降息則氣立孤危此之謂也故考五方以通溲溺倒換散大黃一兩荊芥二兩每服末二錢內熱小便不通者此方主之內熱而小便不通者郁其少火而氣不化也內經曰膀胱者州都之官津液藏焉氣化則能出矣然化氣之道莫妙於升降天地以升而降化萬物奈何而昧於人乎故用荊芥之輕清者以升其陽用大黃之重濁者以降其陰清陽既出上竅則濁陰自歸下竅而小便隨泄矣方名倒換者小便不通倍用荊芥大便不通倍用大黃顛倒而用故曰倒換八正散加木香湯車前子瞿麥萹蓄滑石山梔子炒黑甘草梢木通大黃木香濕熱下注少腹急小便不通者此方主之濕熱下注令人少腹急則小便有可行之勢矣而卒不通者熱祕之也陶隱君曰通可以去滯瀉可以去祕滑可以去著故用木通瞿麥萹蓄通其滯用大黃山梔瀉其祕用車前滑石滑其著用甘草梢者取其堅實能瀉熱於下加木香者取其辛香能化氣於中鐵服丸大皂角一物炒焦為末煉蜜為丸梧子大每服七丸白湯下少腹急小便不通氣不化者此方亦良皂角之氣能通關開竅皂角之味能去垢滌汙故能化下焦之氣通膀胱之滯尉臍法用炒鹽熱尉臍腹冷復易之咸可以軟堅熱可以行滯此炒鹽之意也然必尉其臍者臍為吾身之樞有生之系也故能進氣以化滯探吐法燒鹽二兩溫水二升服之探吐經云升降出入無器不有故不升則不降而道器滅矣是以觀於注水之瓶上竅通則下竅自利此用吐之意也大螺著少腹法宋季饒醫熊彥誠年五十五歲病前後便溺不通五日腹脹如鼓同輩環視皆不能措力與西湖妙果僧慧月相善遣信邀至訣別月驚馳而往於釣橋逢一異客楫之曰方外高人何孑孑走趨若是月曰一善友久患祕結病危急欲往問客曰易事耳待奉施一藥即脫靴入水探一大螺而出曰事濟矣抵家以鹽半匙和殼生搗置病者臍下一寸三分用寬帛緊繫之仍辦溺器以須其通月未以為然姑巽謝之至熊家彥誠昏不知人妻子聚泣諸醫知無他策慢使試之曾未安席而暴下諸醫愧嘆而散月歸訪異人無所見矣熊後十六年乃終昆謂便溺不通者熱祕之也大螺性寒而善分清故濁水之中一著大螺便能澄徹劑之以鹽取其善潤而已小便不禁門第三十九敘曰溲溺惟宜形氣治也溲溺不禁形氣病也輕者脬中有痹氣重者大氣虛而且絶爾辨此者以他證合之姑考四方以志大法縮泉丸烏藥益智仁等分共為末山藥糊為丸梧子大每服七十丸空心鹽湯下脬氣虛寒小便頻數遺尿不止者此方主之脬氣者太陽膀胱之氣也膀胱之氣貴於沖和邪氣熱之則便澀邪氣實之則不出正氣寒之則遺尿正氣虛之則不禁是方也烏藥辛溫而質重重者墜下故能療腎間之冷氣益智仁辛熱而色白白者入氣故能壯下焦之脬氣脬氣復其天則禁固復其常矣八味丸熟地黃八兩山茱萸去核山藥各四兩牡丹皮白茯苓去皮澤瀉各三兩肉桂炒附子炮去皮臍各一兩腎間水火俱虛小便不調者此方主之腎具水火主二便而司開闔腎間之水竭則火獨治能闔而不能開令人病小便不出腎間之火熄則水獨治能開而不能闔令人小便不禁是方也以附子肉桂之溫熱益其火以熟地山萸之濡潤壯其水火欲實則丹皮澤瀉之酸鹹者可以收而瀉之水欲實則茯苓山藥之甘淡者可以制而滲之水火既濟則開闔治矣正考見虛損勞瘵門渴門四君子湯人參白朮茯苓甘草各三錢諸急病遺尿不禁者此方主之諸急病謂卒然暴僕諸疾也遺尿不禁者形氣將脫無形之氣不足以固有形之溺也甘溫為陽可使益氣故人參白朮茯苓甘草皆甘溫也可以用之或問茯苓淡滲當遺尿不禁之時可以去否余曰苓有二品枯而不澤者宜去若堅潔而潤者則亦不嫌其為苓也用之引人參以就下直補膀胱誰曰不可正考見氣門韭子一物丸大人遺濁小兒遺尿以韭子一物作丸服之神良經曰淫氣遺溺痹聚在腎痹聚者濕氣聚而為痹也韭子潤而辛熱辛熱則能散濕潤則能就下故孫真人每用之令其就下而療痹氣爾淋澀門第四十敘曰淋一也五疾判焉必剖析其病情治療如法始可奏功若冒厥禁忌縱若情欲則日藥之不足矣考方八首而治法之大者庶幾哉三生益元散生柏葉生藕節生車前各汁一杯益元散三錢調服此主血淋之方也丹溪云淋雖有五皆主於熱此知要之言也是方也三物之生皆能療熱析而論之則柏葉涼心藕節消血車前導利益元散者滑石甘草也滑石能清六腑之熱而甘草者和中瀉火能協木石之性者也木香湯木香木通檳榔茴香小者略炒赤芍藥炒當歸青皮炒澤瀉橘皮去白甘草各五分裡氣凝滯小便淋瀝身冷者名曰氣淋此方主之氣行則利氣滯則澀故里氣凝滯則小便淋瀝身冷者陽氣不舒也乃天地閉塞而成冬陽氣潛藏之象也藥味辛香而輕枯者陽勝故能理氣於陽木香茴香橘皮木通是也辛苦而潤實者陰勝故能理氣於陰青皮檳榔當歸赤芍是也澤瀉之咸能引諸藥直走膀胱甘草之甘能調諸藥以和六腑脬氣不滯則淋瀝愈矣萆薢分清飲川萆薢石菖蒲益智仁烏藥各三錢膏濁頻數漩白如油光彩不足者名曰膏淋此方主之膀胱者水瀆之區也胃中濕熱乘之則小便渾濁譬之濕土之令行而山澤昏瞑也陶隱君曰燥可以去濕故萆薢菖蒲烏藥益智皆燥物也可以平濕土之敦阜濕土既治則天清地明萬類皆潔矣而況於膀胱乎石葦散石葦去毛冬葵子各二兩瞿麥一兩滑石五兩車前子二兩每服三錢日二砂淋痛盛者此方主之砂淋者溺出砂石也此以火灼膀胱濁陰凝結乃煮海為鹽之象也通可以去滯故用石葦瞿麥滑可以去著故用滑石車前冬葵雖然治此證者必使斷鹽方能取效斷鹽有二妙一則淡能滲利一則無咸不作石也清心蓮子飲黃耆炙石蓮肉白茯苓人參各七分半炙甘草地骨皮黃芩炒車前子麥門冬各五分勞淋者此方主之遇勞即發者名曰勞淋此以體弱故不任勞然五臟各有勞勞者動也動而生陽故令內熱內熱移於膀胱故令淋閉是方也石蓮肉瀉火於心麥門冬清熱於肺黃芩瀉火於肝地骨皮退熱於腎黃耆人參茯苓甘草瀉火於脾皆所以療五臟之勞熱也惟車前子之滑乃以治淋去著云爾琥珀散滑石二錢木通當歸木香鬱金炒萹蓄琥珀各一錢氣淋血淋膏淋砂淋此方皆主滑可以去著故用滑石琥珀通可以去滯故用木通萹蓄用當歸者取其活血用木香鬱金者取其利氣也大補丸黃柏一味炒褐色為丸淋證遇房勞即發者此方主之房勞虛其腎水則火獨治故灼而為淋黃柏苦而潤苦能瀉火潤能補水參苓琥珀湯人參五分茯苓四分玄胡索七分川楝子炒生甘草各一錢柴胡澤瀉當歸梢琥珀各三分長流水煎脾氣不足小便淋瀝常有餘滴不盡者此方主之經曰壯者氣行則愈怯者著而成病是以房勞老弱之人多有此疾補可以去弱故用人參茯苓滑可以去著故用琥珀歸梢瀉可以去閉故用澤瀉生甘草用柴胡者使之升其陷下之清陽用玄胡川楝者使之平其敦阜之濁氣煎以長流水者取其就下之意也精濁門第四十一敘曰精濁腎之液也所以精濁者心為之也一動其心而天君搖搖則精濁走失矣所謂主不明則十二官危以此養生則殆是也故欲養其身者先正其心今考名方六首外來之藥耳若能正其心則吾身之大丹也九龍丹枸杞子金櫻子山楂肉石蓮肉蓮花須熟地黃芡實粉白茯苓川當歸等分精濁者此方主之精濁與便濁不同便濁是便溺渾濁即前之膏淋也乃是胃中濕熱滲入膀胱與腎經絶無相干精濁則牽絲黏膩雖不便溺亦是有之此是腎水不足淫火易動精離其位故令漸漬而出耳治此者宜滋腎清心健脾固脫是方也枸杞熟地當歸味厚者也可以滋陰滋陰則足以制陽光金櫻蓮鬚芡實味澀者也可以固脫固脫則無遺失石蓮肉苦寒可以清心心清則淫火不熾白茯苓甘平可以益土益土則制腎邪則山楂肉者又所以消陰分之障礙也珍珠粉丸牡蠣粉取血色者炙黃柏各一斤珍珠三錢濕熱在中下二焦令人便濁者此方主之燥可以去濕故用牡蠣粉苦可以勝熱故用黃柏滑可以去著故用珍珠水陸二仙丹金櫻膏二斤芡實粉一斤熟共為丸豆大空心服七十丸此主精濁之方也金櫻膏濡潤而味澀故能滋少陰而固其滑泄芡實粉枯澀而味甘故能固精濁而防其滑泄金櫻生於陸芡實生於水故曰水陸二仙妙香散人參五分山藥二兩薑汁炒麝香一錢另研木香二錢半煨黃耆遠志去心炒茯苓茯神各一兩桔梗甘草各二錢辰砂二錢另研共為細末每服二錢酒下此安神正氣而精自固之方也夢中遺矢者宜主之精氣神人身之三寶也神役氣氣役精三寶之用也是以神昏則氣蕩氣蕩則精離神明則氣正氣正則精固是方也不用固澀之劑以固精但用人參茯苓茯神遠志辰砂以安神用麝香木香黃耆桔梗甘草山藥以正氣神清氣正則淫夢不作邪火不起精不必澀而自固矣內經曰主明則下安以此養生則壽沒世不殆此之謂也治濁固本丸蓮花須黃連炒各二兩豬苓二兩五錢白茯苓砂仁益智半夏薑製黃柏炒各一兩炙甘草三兩胃中濕熱滲入膀胱濁下不禁者此方主之凡濁下不禁牽絲者責之精濁腎家之病也不牽絲者責之便濁胃中濕熱也是方也半夏所以燥胃中之濕茯苓豬苓所以滲胃中之濕甘草砂仁益智香甘益脾之品也益脾亦所以制濕而黃連黃柏之苦所以治濕熱蓮花須之澀所以止其滑泄耳名之曰固本者胃氣為本之謂也韭子千金方精極類用韭子以治遺精夢失小便白濁者蓋九方焉而單用韭子者居其半夫韭子辛熱物耳何孫思邈取之深也昆謂用之以治便濁者用其辛熱之氣燔其濕土使蒸溽上行而不下乃釜底加薪之法益火之原以消陰翳也用之以治遺精者用其辛熱之氣以壯真陽使之涵乎陰精而不漏乃益土防水之法衛外而為固也凡此方外不傳之祕惟可與知者道耳自汗門第四十二敘曰有因而自汗非病也所謂陽之汗以天地之雨名之乃陰陽和而雨澤降也惟無因而自汗則為病矣宜以甘劑補之今考古人四方率甘劑耳玉屏風散黃耆炙防風各一兩白朮二兩共為末每服三錢氣虛自汗者此方主之自汗者無因而自汗也常人不自汗者由衛氣固衛於外津液不得走泄所謂陽在外陰之衛也衛氣一虧則不足以固津液而自滲泄矣此自汗之由也白朮黃耆所以益氣然甘者性緩不能速達於表故佐之以防風東垣有言黃耆得防風而功愈大乃相畏而相使者也是自汗也與傷風自汗不同傷風自汗責之邪氣實雜證自汗責之正氣虛虛實不同攻補亦異臨證者宜詳別之大補黃耆湯黃耆炙人參肉蓯蓉山茱萸去核白朮炒當歸肉桂略炒五味子炒甘草炙川芎防風各一錢茯苓一錢五分熟地黃二錢氣血俱虛自汗者此方主之人參黃耆白朮茯苓甘草防風肉桂實表氣而止自汗當歸川芎熟芐肉蓯蓉山茱萸五味子生津液而收陰氣此氣血兩補之劑也調衛湯麻黃根黃耆各一錢麥門冬生地黃各三分生甘草當歸梢生黃芩半夏各五分羌活七分豬苓蘇木紅花各二分五味子七粒濕熱自汗一身盡痛脈濡者此方主之濕無熱不作汗濕得熱而蒸之則能令人自汗濕流百節故一身盡痛濕為陰氣故脈濡風能勝濕故用羌活辛能燥濕故用半夏淡能滲濕故用豬苓濕傷氣黃耆甘草麥冬所以益氣濕傷血蘇木紅花歸梢所以消瘀五味子麻黃根收汗液而固表虛生芐黃芩涼陰血而除濕熱艾煎茯苓散以艾煎湯調茯苓末一錢服別處無汗獨心孔一片有汗者此方主之此是心火自旺膈有停飲火熱蒸其濕飲故令此處有汗茯苓甘而淡甘能養心淡能滲濕艾葉香而澀香能利氣澀能固津盜汗門第四十三敘曰汗孔謂之鬼門故盜汗不止久久令人喪魄考名方五首而治盜汗之法大可知矣臨證而權度其宜焉可也當歸六黃湯當歸生地黃熟地黃黃芩黃連黃柏各等分黃耆倍用陰虛有火令人盜汗者此方主之醒而出汗曰自汗睡去出汗曰盜汗自汗陽虛盜汗陰虛也曰有火者謂其證有面赤口乾唇燥便赤聲音重脈來數也然陰虛所以盜汗者陰虛之人睡去則衛外之陽乘虛陷入於陰中表液失其固衛故濈濈然而汗出人覺則陽用事衛氣復出於表表實而汗即止矣當歸熟苄養陰之品也黃芩黃連去火之品也生芐黃柏可以養陰亦可以去火而黃耆者所以補表氣於盜汗之餘也是盜汗也與傷寒盜汗不同傷寒盜汗是半表半裡之邪未盡雜證盜汗則陰虛而已彼以和表為主此以補陰為主明者辨之黃耆六一湯黃耆六兩炙甘草一兩炙虛脫已後盜汗者此方主之虛脫者陰虛而形氣將脫如大病之餘新産失血之後也斯時也更有盜汗寧不復傷其氣血乎故用黃耆七之六甘草七之一大補其氣而汗自止或問何以不用養血之藥余曰太極之妙陰生於陽故無形能化有形無形者氣有形者血耳若虛脫之際而責養陰之藥以固脫是以陰及陰二女同居烏能衛外正氣湯黃柏炒知母炒各二錢五分甘草炙五分此治陰虛有火令人盜汗之方也陰虛則陽獨治故令有火火益亢則陰益虧陰虧則睡去之時衛外之陽乘虛而入衛虛無以固表故令盜汗經曰壯水之主以制陽光故用黃柏知母苦寒質潤之品以主之苦能瀉火寒能勝熱質潤能滋陰佐以甘草者和其陰陽耳麥煎散知母石膏人參白茯苓赤芍藥滑石葶藶杏仁地骨皮麻黃根甘草共為末浮小麥煎湯調下二錢濕熱內淫肺病喘急以致皮毛之氣不充令人盜汗四肢煩疼肌肉消瘦者此方主之內經曰肺主皮毛靈樞經曰衛氣者所以溫分肉充皮膚肥腠理司開闔者也今肺以喘而虛故皮毛之氣不充氣不充則腠理失肥開闔失宜而令盜汗是方也滑石茯苓可以瀉濕石膏知母可以消熱杏仁葶藶可以瀉喘人參甘草可以益肺地骨皮赤芍藥可以去熱於裡麻黃根浮小麥可以止汗於表柴葉此物能主五臟之風熱故焙乾研末空心米飲調服能止盜汗人所罕知積聚癥瘕門第四十四敘曰積聚癥瘕夫人心腹之疾也凡有此疾者宜與明醫攻療之失而不治復協他邪不可為矣譬之奸人蠹國乘人之危而利之雖有智者不能善其後爾倒倉法以肥嫩黃牯牛肉三十斤切成小片去筋膜取長流水煮糜爛以布濾去渣滓取淨汁再入鍋內慢火熬至琥珀色則成劑矣令病者預先斷肉食淡前一日不食晚飯設密屋一間明亮不通風處行之置穢桶瓦盆貯吐下之物一瓷瓶盛所出之溺令病者入室以汁飲一杯少時又飲一杯積數十杯寒月則重湯蕩而飲之任其吐利病在上者欲其吐多病在下者欲其利多病在中及在上覆在下者欲其吐利俱多全在活法而為之緩急多寡也視所出之物必盡病根乃止吐利後必渴甚不得與湯以所出之溺飲之非惟可以止渴抑且可以蕩滌余垢行後倦怠覺飢先與稠米飲次與淡稀粥三日後方可與菜羹調養半月或一月自覺精神渙發形體輕健沉疴悉能去矣自後須忌牛肉數年丹溪云牛坤土也黃土之色也此以順為性而效法乎干以為功牡之用也肉者胃之樂也熟而液無形之物也橫散入肉絡由腸胃而滲透肌膚毛竅爪甲無不入也積聚久則形質成依附腸胃回薄曲折處以為棲泊之窠臼阻礙氣血津液熏蒸燔灼成病自非刮腸剖骨之神妙可以銖兩丸散窺犯其藩牆戶牖乎肉液之泛溢腸胃受之其厚皆倍於前有似乎腫回薄曲折處肉液充滿流行有如洪水泛漲其浮槎陳朽皆推逐蕩漾不可停留在表者因吐而汗其清道者自吐而湧濁道者自泄而去凡屬滯礙一洗而盡牛肉全重厚和順之性盎然渙然潤澤枯槁補益虛損寧無精神渙發之樂乎正似武王克商散財發粟以賑殷人之仰望也其方得於西域之至人凡人於中年後行一二次亦卻疾養壽之一助也又嘗與人書曰全在自飲輪回酒十數杯以卻逐余垢迎接調勻新宿營衛使臟氣肓膜生意敷暢有脫胎換骨之功也多嫌其穢因致中輟而功虧一簣若非明物理造化者其肯視為美醞良味乎肥氣丸息賁丸伏梁丸痞氣奔豚丸五方總考東垣百世之師也其制肥氣丸以治肝積制息賁丸以治肺積制伏梁丸以治心積制痞氣丸以治脾積制奔豚丸以治腎積率以攻下溫熱之品類聚為丸夫五臟積氣闢在腸胃之外而用巴霜厚朴輩峻劑以攻腸胃之內非其治也人皆曰東垣方余直以為非東垣之劑也借曰東垣為之則無脾胃論矣明者辨之三因散聚湯半夏檳榔川歸各四分大黃酒浸陳皮杏仁桂心茯苓各一錢甘草附子川芎各五分枳殼厚朴吳茱萸各一錢五分聚氣在六腑隨其上下發作有時令人心腹㽲痛攻刺腰脅少腹䐜脹大小便不利者此方主之上件皆六腑之病也氣之所積名曰積氣之所聚名曰聚積者五臟之邪聚者六腑之病也是方名曰散聚者所以散六腑之聚氣耳蓋中氣之道熱則施張施張弗聚也寒則收引收引則氣斯聚矣故桂心附子吳朱萸辛熱之品也半夏陳皮辛溫之品也川芎當歸杏仁辛潤之品也辛則能散聚熱則能壯氣溫者能和中潤者能澤六腑乃茯苓甘草之甘平可以使之益胃而檳榔枳殼厚朴大黃則皆推陳之品也伏翼屎此即天鼠之糞也又名夜明沙古人治血積每用水蛭虻蟲輩以其善吮血耳然其性毒人多患之而伏翼屎者食蚊而化之者也蚊之吮血不減蛭虻故亦可以攻血積本草稱其能下死胎則其能攻血塊也何疑書此以待同志者用之古方治積聚藥總考古方有用曲蘖者化水穀也用硇砂阿魏者去肉食也用陳皮紫蘇生薑者化魚蟹也用丁香桂心者腐果菜也用牽牛芫花者攻水飲者用三稜鱉甲者去癥瘕也用附子硫黃者除痼冷也用水蛭虻蟲者攻血塊也用木香檳榔者攻滯氣也用雄黃膩粉者攻涎積也用礞石巴豆者攻痰食也甘遂甘草並用者假其相戰以去積也但立方之人未入神妙鮮有不類聚群毒以為丸者此之謂獵不知兔廣絡原野冀一人獲之術亦疏矣今考古人神異數事於下以廣見聞蟯瘕史記曰臨菑女子薄吾病甚衆醫以為寒熱篤當死臣意診其脈曰蟯瘕為病腹大上膚黃粗循之戚戚然臣意欲以芫花一撮即出蟯可數升病已三十日如故病蟯得之於寒濕寒濕氣鬱篤不發化為蟲所以知薄吾病者切其脈循其尺索刺粗而毛美奉發是蟲氣也其色澤者中臟無邪氣及重病昆謂倉公以病蟯得之寒濕者謂寒水濕土之氣也寒水濕土之氣鬱極而不能宣發則化為蟲所謂濕熱生蟲是也芫花氣身寒而味苦辛有毒能下十二經之水而攻積聚故能下水土生化之蟯雞子致積北齊褚澄善醫術建元中為吳郡太守民有李道念者以公事至郡澄遙見謂曰汝有奇疾道念曰果得冷疾五年矣澄診其脈曰非冷也由多食雞子所致令取蒜一升服之即吐物如升許涎裹之動抉涎出視乃一雞雛翅距已具而能走澄曰未也盍服其餘從之又吐十三枚疾乃瘳昆謂蒜性辛熱可以壯氣正氣壯則病邪不能容故上湧而出乃君子道長小人道消之象經曰壯者氣行則愈怯者著而成病此之謂也發瘕劉宋時徐文伯者徐嗣伯之兄也篤好醫術宮人有患腰痛牽心者發則氣絶衆醫以為肉瘕文伯視之曰此發瘕也以油灌之即吐物如發引之長三尺頭已成蛇又能搖動懸之柱上水盡瀝惟餘一發而已昆謂發者血氣之餘也入腹成蛇者乃無情而化有情離形而自成形也無情而化有情一腐草可以為螢離形而自成形一折枝可以植林文伯治之以油者投其先天之宜也油性善泛故哇之而出矣或問文伯何以便知其為發瘕余曰人患藝弗精耳精藝自然入神蛇瘕隋有患者嘗病吐食醫作噎氣膈疾翻胃三疾治之無驗任度視之曰非此三疾蓋因食蛇肉不消而致斯病但揣心腹上有蛇形是也病者曰素有大風常求蛇肉食風稍退復患此疾矣遂以芒硝雄黃治之愈芒硝取其軟堅雄黃解其蛇毒此本草之論世人之所共識也鱉瘕宋有溫革郎中者自少壯健無疾執不信醫見方書有云食鱉不可食莧者故並啖之自此苦腹痛每作時幾不知人始疑鱉莧所致而未審也復以二物令小蒼頭並食之遂得病與革類而委頓尤劇未幾遽死舁其尸置馬廄未斂也忽小鱉無數自上下竅湧出散走廄中惟遇馬溺輒化為水革聞自視之掊聚衆鱉以馬溺灌之皆化為水革乃自飲馬溺其疾亦愈巢元方亦謂有患鱉瘕者死其主破其腹得一白鱉鱉乃活有乘白馬來看者白馬遂尿隨落鱉上即縮頭乃以馬尿灌之隨化為水昆謂鱉莧並啖而成瘕者莧能回鱉之生氣故也瘕成遇馬溺而化者象數克之故也昔尼父系易系鱉於離以其外剛內柔肖其象也故鱉瘕者離象馬溺者坎象也離為火坎為水天地變化坎離交媾則火涵乎水水涵乎火而鱉生於水各正性命象數相制則火仇於水水制其火而鱉瘕化於馬溺然馬溺能化鱉瘕而不能化鱉者氣生者可化形生者可死而己他溺不可化而惟馬溺能化者馬得乾之剛其氣悍味厚非凡溺可例故耳京三稜本草云昔有人患癥瘕死遺言開腹取之如其言得塊乾硬如石文理有五色人謂異物私取削成刀柄後因以刀刈三稜柄消成水乃知此可療癥瘕也
