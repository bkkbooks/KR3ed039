body:
  text: 卷一中風門第一敘曰風者百病之長得行天之象故其發也暴然上世論風主於外感乃河間主火東垣主氣丹溪主濕而末世之論紛然矣今考名方二十三首為風為火為氣為濕皆時出而主之初不泥於一說也烏梅擦牙關方病人初中風筋急口噤不開便以鐵物開之恐傷其齒宜用烏梅肉擦其牙關牙關痠軟則易開矣此酸先入筋之故也其有中風證而口開不噤者筋先絕也不治稀涎散豬牙皂角四條去果皮炙白礬一兩枯共為末每進三字水下病人初中風暴僕痰涎湧盛此藥與之頻吐涎沫壅塞少疏續進他藥清陽在上濁陰在下則天冠地履無暴僕也若濁邪風湧而上則清陽失位而倒置矣故令人暴僕所以痰涎壅塞者風盛氣湧而然也經曰病發而不足標而本之先治其標後治其本故不與疏風補虛而先為之吐其涎沫白礬之味鹹苦咸能軟頑痰苦能吐涎沫皂角之味辛鹹辛能利氣竅咸能去汙垢名之曰稀涎固奪門之兵也師曰凡吐中風之痰使咽喉疏通能進湯液便止若攻盡其痰則無液以養筋能令人攣急偏枯此大戒也通頂散藜蘆生甘草川芎細辛人參各一錢石膏五錢共為末病人初中風不知人事口噤不能開用此藥一字吹入鼻中有嚏者肺氣未絕可治中風不知人事病則急矣以平藥與之不能開其壅塞故用藜蘆與人參細辛相反使其相反而相用也肺苦氣上逆故用石膏之重以墜之甘草之平以緩之乃川芎之用取其清氣利竅而已蘇合香丸沉香青木香烏犀角香附子丁香硃砂訶黎勒白檀香麝香蓽茇龍腦白朮安息香蘇合油各二兩薰陸香一兩病人初中風喉中痰塞水飲難通非香竄不能開竅故集諸香以利竅非辛熱不能通塞故用諸辛為佐使犀角雖涼涼而不滯訶黎雖澀澀而生津世人用此方於初中之時每每取效丹溪謂辛香走散真氣又謂腦麝能引風入骨如油入面不可解也醫者但可用之以救急慎毋令人多服也許胤宗黃耆防風湯熏蒸法許胤宗者唐時常州義興人也初仕陳為新蔡王外兵參軍時柳太后感風不能言脈沉而緊胤宗曰口不下藥宜以湯氣蒸之令藥入腠理周時可瘥遂造黃耆防風湯數十斛置於床下氣如煙霧次日便得語由是超拜義興太守昆謂鼻氣通乎天故無形之氣由鼻而入呼吸傳變無處不之黃耆甘而善補得防風而功愈速驅風補虛兩得之矣自非胤宗之通達不能主乎此法醫者能善用之則亦可以治乎今之人矣二陳湯半夏薑製陳皮去白白茯苓去皮各等分甘草炙減半風盛痰壅既用稀涎等藥開其氣道續以此方主之風乾於脾則痰壅然痰之生本於濕半夏所以燥濕也茯苓所以滲濕也濕去則痰無由以生痰之為患本於脾虛氣滯甘草所以補脾也陳皮所以利氣也補脾利氣則土又足以制濕而痰且無壅滯矣此二陳之旨也名曰二陳以橘半二物貴乎陳久耳正考見痰門四君子湯加竹瀝薑汁方人參白朮茯苓甘草竹瀝薑汁丹溪曰半身不遂在右者屬氣虛以此方主之經曰左右者陰陽之道路也故左屬血而右屬氣氣虛者補之以甘故用人參白朮茯苓甘草四件稱其為君子者謂其甘平有沖和之德而無克伐之性也其加竹瀝謂其行痰其加薑汁所以行竹瀝之滯而共成夫伐痰之功耳四物湯加桃仁紅花竹瀝薑汁方當歸酒洗川芎洗去土白芍藥酒炒熟地黃桃仁去皮尖紅花酒洗竹瀝薑汁丹溪曰半身不遂在左者屬瘀血以此方主之芎歸芍地生血藥也新血生則瘀血滑而易去桃仁紅花消瘀藥也瘀血去則新血清而易生然亦加夫竹瀝薑汁者以痰之為物靡所不之蓋無分於左右而為患也八味順氣散白朮炒白茯苓青皮去穰炒白芷陳皮去白臺烏藥人參各一錢甘草五分中風正氣虛痰涎壅盛者宜此方主之人參白朮茯苓甘草四君子湯也經曰邪之所湊其氣必虛故用四君子以補氣治痰之法利氣為先故用青皮白芷臺烏陳皮以順氣氣順則痰行而無壅塞之患矣此標本兼施之治也烏藥順氣散麻黃去節陳皮去白烏藥各一錢枳殼去穰麩炒二兩炙甘草白芷桔梗各一兩川芎洗去土白殭蠶炒乾薑炒黑半兩中風遍身麻痹語言謇澀口眼喎斜喉中氣急有痰者此方主之遍身麻痹表氣不順也故治以麻黃川芎語言謇澀裡氣不順也故治以烏藥陳枳口眼喎斜面部之氣不順也故治以白芷殭蠶喉中氣急甘草可緩肺氣上逆桔梗可下痰之為物塞則結滯熱則流行佐以乾薑行其滯也此治標之劑也然必邪實初病之人方可用之若氣虛病久者則勿之與也宜以補劑兼之牽正散白附子白殭蠶全蠍並生用為末每服酒調下二錢中風口眼喎斜無他證者此方主之艽防之屬可以驅外來之風而內生之風非其治也星夏之輩足以治濕土之痰而虛風之痰非其治也斯三物者療內主之風治虛熱之痰得酒引之能入經而正口眼又曰白附之辛可使驅風蠶蠍之咸可使軟痰辛中有熱可使從風蠶蠍有毒可使破結醫之用藥有用其熱以攻熱用其毒以攻毒者大易所謂同氣相求內經所謂衰之以屬也星香湯牛膽南星八錢木香一錢中風體肥痰盛口不渴者此方主之南星燥痰之品也曰體肥曰痰盛曰不渴則宜燥也可知矣故以南星主之而必入於牛膽者制其燥也佐以木香者利痰氣也省風湯防風去蘆半夏薑製各一錢全蠍二錢膽南星炙甘草生白附生川烏木香不見火各五分中風口眼喎僻痰涎壅盛者此方主之風湧其痰干於面部則口眼喎僻塞於胸中則痰涎壅盛是方也防風白附全蠍川烏可以活經絡之風痰而正口眼南星半夏甘草木香可以療胸次之風痰而開壅塞方名曰省風者省減其風之謂也改容膏蓖麻子一兩真冰片三分共搗為膏寒月加乾薑附子各一錢中風口眼喎僻在左以此膏敷其右喎僻在右以此膏敷其左今日敷之明日改正故曰改容若以蜣螂冰片敷之或以蟮血冰片敷之皆良蓋此三物者皆引風拔毒之品也佐以冰片取其利氣而善走竅佐以薑附取其溫熱而利嚴寒此惟冬月加之他時弗用也小續命湯麻黃去節人參去蘆黃芩酒炒芍藥酒炒川芎炙甘草杏仁去皮炒防己去皮桂枝淨洗防風去蘆各一錢附子炮去皮臍五分古人以此方混治中風未詳其證昆謂麻黃杏仁麻黃湯也仲景以之治太陽證之傷寒桂枝芍藥桂枝湯也仲景以之治太陽證之中風如此言之則中風而有頭疼身熱脊強者皆在所必用也人參甘草四君子之二也局方用之以補氣芍藥川芎四物湯之二也局方用之以養血如此言之則中風而有氣虛血虛者皆在所必用也風淫末疾故佐以防風濕淫腹疾故佐以防己陰淫寒疾故佐以附子陽淫熱疾故佐以黃芩蓋病不單來雜揉而至故其用藥亦兼該也熱者去附子用白附子筋急語遲脈弦者倍人參加薏苡當歸去黃芩芍藥以避中寒煩躁不大便去附桂倍加芍藥竹瀝日久大便不行胸中不快加枳殼大黃語言謇澀手足顫掉加石菖蒲竹瀝口渴加麥門冬栝蔞天花粉身疼發搐加羌活煩渴多驚加犀角羚羊角汗多去麻黃舌燥加石膏去附桂大秦艽湯秦艽去蘆石膏生用當歸酒洗芍藥酒炒羌活去蘆防風去蘆黃芩酒炒生芐洗去土音胡即生地熟芐甘草炙川芎洗白朮酒炒白芷茯苓去皮獨活各一錢北細辛去土五分中風手足不能運動舌強不能言語風邪散見不拘一經者此方主之中風虛邪也許學士云留而不去其病則實故用驅風養血之劑兼而治之用秦艽為君者以其主宰一身之風石膏所以去胃中總司之火羌活去太陽百節之風疼防風為諸風藥中之軍卒三陽數變之風邪責之細辛三陰內淫之風濕責之苓術去厥陰經之風則有川芎去陽明經之風則有白芷風熱干乎氣清以黃芩風熱干乎血涼以生芐獨活療風濕在足少陰甘草緩風邪上逆於肺乃當歸芍藥熟芐者所以養血於疏風之後一以濟風藥之燥一使手得血而能握足得血而能步也三化湯厚朴薑湯炒大黃酒浸枳實麩炒羌活等分中風二便數日不利邪氣內實者以此方微利之大黃厚朴枳實小承氣湯也上焦滿治以厚朴中焦滿破以枳實下焦實奪以大黃用羌活者不忘乎風也服後二便微利則三焦之氣無所阻塞而復其傳化之職矣故曰三化此方惟實者可用虛者勿妄與之若實者不用則又失乎通達之權是當大寇而亡九伐之法矣非安內之道也瀉青丸龍膽草川芎梔子炒黑當歸酒洗大黃酒蒸羌活防風等分中風發熱不能安臥者此方主之肝主風少陽膽則其腑也少陽之經行乎兩脅風熱相干故不能安臥此方名曰瀉青瀉肝膽也龍膽草味苦而厚故入厥陰而瀉肝少陽火實者頭角必痛故佐以川芎少陽火鬱者必生煩躁故佐以梔子肝者將軍之官風淫火熾勢不容易以治故又奪以大黃用當歸者培養乎血而不使其為風熱所燥也復用乎羌活防風者二物皆升散之品此火鬱發之木鬱達之之意乃上下分消其風熱皆所以瀉之也活絡丹膽南星川烏炮去皮臍草烏炮去皮各六兩地龍去土火干乳香去油沒藥各二兩二錢中風手足不用日久不愈者經絡中有濕痰死血此方主之南星之辛烈所以燥濕痰二烏之辛熱所以散寒濕地龍即蚯蚓也濕土所生用之者何易曰方以類聚欲其引星烏直達濕痰所聚之處所謂同氣相求也亦內經佐以所利和以所宜之意風邪注於肢節久久則血脈凝聚不行故用乳香沒藥以消瘀血蠲痹湯黃耆蜜炙防風去蘆羌活赤芍藥酒炒薑黃炒當歸酒炒各二錢五分甘草炙五分中風表虛手足頑痹者此方主之內經曰榮氣虛則不仁衛氣虛則不用故用黃耆以實表氣然黃耆與防風相畏用之者何潔古云黃耆得防風而功愈速故並用之欲其相畏而相使耳羌活驅散風邪得當歸不至燥血薑黃能攻痹血得赤芍足以和肝復用甘草調之取其味平也防風通聖散防風川芎當歸芍藥炒麻黃去節大黃蒸芒硝連翹薄荷梔子炒黑桔梗石膏生黃芩炒白朮炒荊芥穗滑石甘草風熱壅盛表裡三焦皆實者此方主之防風麻黃解表藥也風熱之在皮膚者得之由汗而泄荊芥薄荷清上藥也風熱之在巔頂者得之由鼻而泄大黃芒硝通利藥也風熱之在腸胃者得之由後而泄滑石梔子水道藥也風熱之在決瀆者得之由溺而泄風淫於膈肺胃受邪石膏桔梗清肺胃也而連翹黃芩又所以祛諸經之遊火風之為患肝木主之川芎歸芍和肝血也而甘草白朮又所以和胃氣而健脾劉守真氏長於治火此方之旨詳且悉哉史國公藥酒方防風去蘆秦艽去蘆油松節虎脛骨酥炙鱉甲醋炙白朮各二兩炒羌活萆薢晚蠶砂炒當歸酒洗去土川牛膝去蘆杜仲去皮姜炒各三兩蒼耳子四兩枸杞子五兩干茄根八兩去土中風之久語言謇澀半身不遂手足拘攣不堪行步痿痹不仁者此方神良語言謇澀風在舌本也半身不遂邪並於虛也手足拘攣風燥其筋也不堪行步風燥而血不濡也痿痹不仁風而濕也是方也干茄根蒼耳子羌活秦艽防風松節萆薢蠶砂可以去風亦可以去濕風去則謇澀拘攣之證除濕去則不遂不仁之患愈當歸牛膝杜仲枸杞所以養血亦所以潤燥養血則手得血而能攝足得血而能步潤燥則筋得血而能舒矣若虎骨者用之以驅入骨之風白朮者用之以致沖和之氣風痹之久血必留居鱉甲之用所以治風邪之固血也豨薟丸豨薟草不拘多少此草處處有之其葉似蒼耳對節而生用五月五日七月七日九月九日採來曬乾鋪入甑中用好酒層層勻灑蒸之復曬如此九次為末煉蜜為丸如梧桐子大每服五十丸空心無灰酒下病人骨節疼痛緩弱無力此方主之良骨節疼痛壅疾也壅者喜通此物味辛苦而氣寒用九蒸九曬則苦寒之濁味皆去而氣輕清矣本草云輕可以去實蓋輕清則無竅不入故能透骨驅風勁健筋骨若未之九蒸九曬或蒸曬之數不滿於九濁味猶存陰體尚在則不能透骨驅風而卻病也此陰陽清濁之義惟明者求之唐江陵節度使成訥進豨薟丸知益州張詠進豨薟丸事考並見痛風門傷寒門第二敘曰仲景傷寒方群方之祖也自晉唐而降歷朝醫哲罔不宗之初學之士能究其方識其證雖施之雜療不可勝用豈徒曰傷寒云爾哉今取其方七十五首考之如下有活人之志者幸教我焉桂枝湯桂枝三兩洗淨芍藥三兩炒甘草二兩生生薑三兩生棗十二枚擘頭痛發熱汗出惡風脈緩者太陽中風也此湯主之風之傷人也頭先受之故令頭痛風在表則表實故令發熱風為陽氣亦為陽同類相從則傷衛外之氣衛傷則無以固衛津液故令汗出其惡風者衛氣不能衛也其脈緩者衛氣不能鼓也上件皆太陽證故曰太陽中風桂枝味辛甘辛則能解肌甘則能實表經曰辛甘發散為陽故用之以治風然恐其走泄陰氣故用芍藥之酸以收之佐以甘草生薑大棗此發表而兼和里之意是方也惟表邪可以用之若陽邪去表入里里作燥渴二便秘結此宜承氣之時也而誤用之則反矣論曰桂枝下咽陽盛則斃蓋謂陽邪去表入里故也又曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也蓋以與之則表益實而汗益難出耳故申之以常須識此勿令誤也麻黃湯麻黃去節三兩桂枝洗淨二兩杏仁去皮尖七十枚甘草一兩生太陽傷寒頭痛發熱身疼腰痛骨節不利惡寒無汗而喘脈來尺寸俱緊者麻黃湯主之足太陽經起目內眥循頭背腰膕故所過疼痛不利寒邪外束人身之陽不得宣越故令發熱寒邪在表不復任寒故令惡寒寒主閉藏故令無汗人身之陽既不得宣越於外則必壅塞於內故令作喘寒氣剛勁故令脈緊麻黃之形中空而虛麻黃之味辛溫而薄空則能通腠理辛則能散寒邪故令為君佐以桂枝取其解肌佐以杏仁取其利氣入甘草者亦辛甘發散之謂抑太陽無汗麻黃之用固矣若不斟酌人品之虛實時令之寒暄則又有汗多亡陽之戒汗多者宜撲粉亡陽者宜附子湯葛根湯葛根四兩麻黃去節三兩桂枝洗淨二兩芍藥二兩炒甘草二兩生生薑三兩大棗十二枚太陽病項背強無汗惡風者名曰剛痓此方主之風寒傷經絡之經則所過但痛而已未至於強風寒傷筋骨之筋則所過筋急強直而成痓痓痙字之誤也曰剛痙者無汗之名也本草云輕可去實葛根麻黃形氣之輕者也此以風寒表實故加二物於桂枝湯中又太陽與陽明合病必自下利下利里證也今之庸醫皆曰漏底傷寒不治仲景則以此方主之蓋以邪氣並於陽則陽實而陰虛陰虛故下利也與此湯以散經中表邪則陽不實而陰氣平利不治而自止也斯妙也惟明者知之小青龍湯麻黃三兩去節桂枝三兩洗淨芍藥三兩炒五味子半斤炒半夏半升泡北細辛去土甘草生乾薑各三兩傷寒表不解心下有水氣乾嘔或咳或噎或喘小青龍湯主之表不解者頭痛發熱身疼尚在也傷寒曾渴飲水過多故心下有水氣有聲無物謂之乾嘔名曰水氣則有形之水已散但無形之氣仍在耳故無物可吐而但有聲或咳或噎或喘皆水寒射肺故也青龍者東方木神主發育萬物二方以發散為義故名之麻黃桂枝甘草發表邪也半夏細辛乾薑散水氣也芍藥所以和陰血五味所以收肺氣大青龍湯麻黃六兩去節杏仁四十枚去皮尖桂枝淨洗甘草生各二兩生薑三兩大棗十二枚石膏如雞子大一塊傷寒太陽證見風脈者此方主之仲景法太陽傷寒治以麻黃湯太陽中風治以桂枝湯今傷寒太陽證見風脈是有頭痛身熱無汗惡寒但脈來不緊而緩為傷寒且中風矣故二方並而用之風寒外盛則人身之陽郁為內熱此石膏之所加也名曰大青龍其發表之尤者乎而亡陽之戒筋惕肉瞤之弊則用青龍之過者也有此者急以大溫大補之劑主之又仲景救弊之方也升麻葛根湯升麻葛根芍藥炒甘草等分傷寒目痛鼻乾不眠無汗惡寒發熱者陽明經證也此方主之足陽明之脈抵目挾鼻故目痛鼻乾其不能眠者陽明之經屬於胃胃受邪則不能安臥此其受邪之初猶未及乎狂也無汗惡寒發熱者表有寒邪也藥之為性辛者可使達表輕者可使去實升麻葛根辛輕者也故用之達表而去實寒邪之傷人也氣血為之壅滯佐以芍藥用和血也佐以甘草用調氣也白虎湯石膏一斤捶不見鐵知母去浮皮六兩甘草二兩粳米六合傷寒傳入於胃不惡寒反惡熱有汗作渴脈大而長者此方主之傳入於胃邪入里矣表無其邪故不惡寒里有實熱故反惡熱熱越故有汗里燥故作渴邪盛故脈大邪在陽明故脈長白虎西方金神也五行之理將來者進功成者退如秋金之令行則夏火之炎息此方名曰白虎所以行清肅之令而除熱也石膏大寒用之以清胃知母味厚用之以生津大寒之性行恐傷胃氣故用甘草粳米以養胃是方也惟傷寒內有實熱者可用之若血虛身熱證象白虎誤服白虎者死無救又東垣之所以垂戒矣小柴胡湯柴胡半斤去蘆黃芩三兩人參三兩去蘆甘草三兩半夏半斤制生薑三兩大棗十二枚傷寒寒熱往來脅痛口苦脈弦者此邪在少陽經半表半裡之證也本方主之邪在表則惡寒邪在裡則發熱邪在半表半裡則惡寒且熱故令寒熱往來少陽之脈行於兩脅故令脅痛其經屬於膽膽汁上溢故口苦膽者肝之腑在五行為木有垂枝之象故脈弦柴胡性辛溫辛者金之味故用之以平木溫者春之氣故就之以入少陽黃芩質枯而味苦枯則能浮苦則能降君以柴胡則入少陽矣然邪之傷人常乘其虛用人參甘草者欲中氣不虛邪不得復傳入里耳是以中氣不虛之人雖有柴胡證俱而人參在可去也邪初入里裡氣逆而煩嘔故用半夏之辛以除嘔逆邪半在表則榮衛爭故用薑棗之辛甘以和榮衛仲景云胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏更加人參一兩五錢栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩溫覆取微汗若咳者去人參大棗生薑加五味子半斤乾薑二兩以上加減法皆去其所弊加其所宜茲惟明者求之不復贅也大柴胡湯柴胡半斤去節黃芩三兩炒芍藥三兩炒半夏半升泡七次生薑五兩枳實四兩麵煨大黃二兩酒浸大棗十二枚傷寒陽邪入里表證未除里證又急者此方主之表證未除者寒熱往來脅痛口苦尚在也里證又急者大便難而燥實也表證未除故用柴胡黃芩以解表里證燥實故用大黃枳實以攻裡芍藥能和少陽半夏能治嘔逆大棗生薑又所以調中而和榮衛也調胃承氣湯大黃四兩酒浸芒硝半升甘草二兩傷寒陽明證俱大便秘譫語脈實者此方主之陽明證俱者不惡寒反惡熱作渴是也傳至陽明則熱經數日矣熱久則五液乾涸故大便秘液亡則無水以制火故譫語譫語者呢喃而語妄見妄言也邪入於裡故脈實大黃苦寒可以蕩實芒硝鹹寒可以潤燥甘草甘平可以和中此藥行則胃中調而裡氣承順故曰調胃承氣然猶有戒焉表證未去而早下之則有結胸痞氣之患此大小陷胸湯之所以作也夫人惡可以不慎乎小承氣湯大黃四兩酒浸厚朴二兩炒枳實三枚麩炒傷寒腹脹滿潮熱狂言而喘者此方主之邪在上焦則作滿邪在中焦則作脹胃中實則作潮熱曰潮熱者猶潮水之潮其來不失時也陽乘於心則狂熱干胃口則喘枳樸去上焦之痞滿大黃蕩胃中之實熱此其里證雖成病未危急痞滿燥實堅猶未全俱以是方主之則氣亦順矣故曰小承氣大承氣湯大黃四兩酒浸厚朴半升薑湯炒枳實五枚麩炒芒硝三合傷寒陽邪入里痞滿燥實堅全俱者急以此方主之調胃承氣湯不用枳樸者以其不作痞滿用之恐傷上焦虛無氤氳之元氣也小承氣湯不用芒硝者以其實而未堅用之恐傷下焦血分之真陰謂不伐其根也此則上中下三焦皆病痞滿燥實堅皆全故主此方以治之厚朴苦溫以去痞枳實苦寒以泄滿芒硝鹹寒以潤燥軟堅大黃苦寒以泄實去熱雖然仲景言急下之證亦有數條如少陰屬腎水病則口燥舌乾而渴乃熱邪內炎腎水將絕宜急下之以救將絕之水又如腹脹不大便土勝水也宜急下之陽明屬土汗出熱盛急下以存津液腹滿痛者為土實急當下之熱病目不明熱不已者死此腎水將竭不能照物則已危矣須急下之此皆大承氣證也若病未危急而早下之或雖危急而下藥過之則又有寒中之患寒中者急溫之宜與理中湯桃仁承氣湯桃仁五十枚去皮尖桂枝二兩洗淨妊娠用炒大黃四兩酒浸芒硝二兩甘草二兩傷寒外證已解小腹急大便黑小便利其人如狂者有蓄血也此方主之無頭痛發熱惡寒者為外證已解小腹急者邪在下焦也大便黑者瘀血漬之也小便利者血病而氣不病也上焦主陽下焦主陰陽邪居上焦者名曰重陽重陽則狂今瘀熱客於下焦下焦不行則幹上部清陽之分而天君弗寧矣故其證如狂桃仁潤物也能澤腸而滑血大黃行藥也能推陳而致新芒硝咸物也能軟堅而潤燥甘草平劑也能調胃而和中桂枝辛物也能利血而行滯又曰血寒則止血熱則行桂枝之辛熱君以桃仁硝黃則入血而助下行之性矣斯其制方之意乎小陷胸湯黃連一兩去毛半夏泡七次半升栝蔞實一枚去皮傷寒下之早熱結胸中按之則痛者小結胸也此方主之三陽經表證未去而早下之則表邪乘虛而入故結胸結胸者陽邪固結於胸中不能解散為硬為痛也按之則痛者不按猶未痛也故用小陷胸湯黃連能瀉胸中之熱半夏能散胸中之結栝蔞能下胸中之氣然必下後方有是證若未經下後則不曰結胸大陷胸湯大黃六兩酒浸芒硝一升甘遂一錢傷寒下之早從心下至少腹硬滿而痛不可近者大結胸也此方主之三陽經表證未解而用承氣湯以攻裡者此下之早也下之早則裡虛裡虛則表邪乘之而入三焦皆實故心下至少腹硬滿而痛不可近也此其為證危急尋常藥餌不能平矣故用大黃以蕩實硝石以軟堅甘遂以直達噫人稱三物之峻矣抑孰稱其有起死之功乎用人之勇去其怒惟善將將者能之半夏瀉心湯即甘草瀉心湯半夏半升制黃芩炒乾薑人參去蘆甘草各三兩黃連一兩去毛大棗十二枚傷寒下之早胸滿而不痛者為痞此方主之傷寒自表入里傳至三陰三陰亦有在經表證如太陰有桂枝加芍藥湯少陰有麻黃附子細辛湯厥陰有當歸四逆湯之類若不治其表而用承氣湯下之則傷中氣而陰經之邪乘之矣以既傷之中氣而邪乘之則不能升清降濁痞塞於中如天地不交而成痞故曰痞瀉心者瀉心下之邪也薑夏之辛所以散痞氣芩連之苦所以瀉痞熱以下之後脾氣必虛人參甘草大棗所以補脾之虛附子瀉心湯附子去皮臍一枚大黃酒浸黃連去毛炒黃芩炒各一兩傷寒心下痞汗出惡寒者此方主之心下痞故用三黃以瀉痞惡寒汗出故用附子以回陽無三黃則不能以去痞熱無附子恐三黃益損其陽熱有附子寒有三黃寒熱並用斯為有制之兵矣張機氏謂醫家之善將將者也俗醫用寒則不用熱用熱則不用寒何以異於膠柱而鼓瑟乎生薑瀉心湯生薑四兩甘草炙人參去蘆黃芩炒各三兩半夏半升制黃連去毛乾薑各一兩大棗十二枚傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安者此方主之病在表而反下之則逆矣下面虛其中氣則表邪乘之而入虛不任邪故不利日數十行今人謂之挾熱利也火性急速谷雖入而未及化故穀不化虛陽奔迫故令腹中雷鳴中虛不能化氣故令痞硬而滿胃虛客氣上逆故令乾嘔心煩不得安人參甘草大棗胃虛之聖藥也生薑半夏乾薑嘔逆之聖藥也黃連黃芩痞熱之聖藥也十棗湯芫花熬甘遂大戟各五分大棗十枚傷寒表證已去其人漐漐汗出心下痞硬脅痛乾嘔短氣者此邪熱內蓄而有伏飲也本方主之芫花之辛能散飲戟遂之苦能泄水又曰甘遂能直達水飲所結之處三物皆峻利故用大棗以益土此戎衣之後而發巨橋之意也是方也惟壯實者能用之虛羸之人未可輕與也三物白散桔梗貝母各三分巴豆一錢炒黑傷寒寒實結胸無熱證者此方主之此證或由表解裡熱之時過食冷物故令寒實結胸然必無熱證者為是桔梗貝母之苦用之以下氣巴豆之辛用之以去實又曰病在膈上則吐病在膈下則利此桔貝主上巴豆主下之意服後不行者益以溫湯行之過多者止以涼粥大陷胸丸大黃酒浸半斤葶藶炒杏仁去皮尖芒硝各半升甘遂一錢白蜜二合為丸頓服之一宿乃下不下者更服之傷寒結胸項強如柔痙狀此方下之則和結胸項強者胸滿硬痛能仰而不能俯也有汗項強為柔痙此雖有汗其項強乃胸中滿實而不能俯非是中風痙急故曰如柔痙不用湯液而用丸劑何也湯主盪滌前用大陷胸湯者以其從心下至少腹皆硬痛三焦皆實故用湯以蕩之此惟上焦滿實用湯液恐傷中下二焦之陰故用丸劑以攻之大黃芒硝之苦寒所以下熱葶藶杏仁之苦甘所以泄滿甘遂取其直達白蜜取其潤利抵當湯丸水蛭三十枚炒褐色虻蟲去翅足炒三十枚桃仁三十枚去皮尖大黃三兩酒浸傷寒不結胸發狂少腹硬滿小便自利脈沉結者以太陽隨經瘀熱在裡而有瘀血也此方主之宜結胸而不結胸故曰不結胸瘀熱內實故令發狂發狂則重於桃仁承氣如狂矣少腹硬滿者下焦實也小便利者血病而氣不病也病深入里故脈沉內有積瘀故脈結脈行肌下謂之沉遲時一止謂之結自經而言則曰太陽自腑而言則曰膀胱陽邪由經而入結於膀胱故曰隨經瘀熱在裡熱結而燥是瘀血也經曰苦走血咸勝血虻蟲水蛭之鹹苦所以除蓄血滑能利腸苦能瀉熱桃仁大黃之苦滑所以利血熱梔子豉湯梔子十四枚炒香豉四合傷寒汗吐下後虛煩不得眠心中懊憹者此方主之汗吐下之後正氣不足邪氣乘虛而結於胸中故煩熱懊憹煩熱者煩擾而熱懊憹者懊惱憹悶也梔子味苦能湧吐熱邪香豉氣腐能剋制熱勢所謂苦勝熱腐勝焦也是方也惟吐無形之虛煩則可若用之以去實則非梔子所能宣矣宣實者以後方瓜蒂散主之瓜蒂散苦瓜蒂略炒赤小豆各五分傷寒胸中多痰頭痛者此方吐之胸中多痰便是實證與虛煩不同痰熱交淫故令頭痛經曰苦能湧泄瓜蒂苦物也故用之在上則湧胸中實痰陶隱君曰燥可去濕赤小豆之屬是也此用之為佐亦是燥其濕痰之意是方也吐痰誠為快利諸亡血虛象則又在所禁矣蓋血亡而復用吐則氣亦去虛象而復用吐則損其陰文蛤散文蛤為末方寸匕病在陽反噀以水熱攻於內寒更益堅欲飲水而不渴者此方主之不當與水而與飲之故曰反噀以水熱雖攻於內因水寒不散故欲飲而不渴此其有停水可知矣故用文蛤之咸以潤下而破水五苓散茯苓豬苓白朮各十八銖澤瀉一兩六銖桂半兩傷寒小便不利而渴者此方主之水道為熱所秘故令小便不利小便不利則不能運化津液故令渴水無當於五味故用淡以治水茯苓豬苓澤瀉白朮雖有或潤或燥之殊然其為淡則一也故均足以利水桂枝辛熱辛熱則能化氣經曰膀胱者州都之官津液藏焉氣化則能出矣此用桂之意也桂有化氣之功故並稱曰五苓濁陰既出下竅則清陽自出上竅又熱隨溺而泄則渴不治可以自除雖然小便不利亦有因汗下之後內亡津液而致者不可強以五苓散利之強利之則重亡津液益虧其陰故曰大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈師又曰太陽隨經之邪直達膀胱小便不利其人如狂者此太陽之邪不傳他經自入其腑也五苓散主之亦是使陽邪由溺而泄耳互考見霍亂門豬苓湯豬苓茯苓澤瀉滑石各三錢阿膠蚌粉炒一錢傷寒少陰下利而主此方者分其小便而下利自止也傷寒渴欲飲水小便不利而主此方者導其陽邪由溺而泄則津液運化而渴自愈也又曰豬苓質枯輕清之象也能滲上焦之濕茯苓味甘中宮之性也能滲中焦之濕澤瀉味鹹潤下之性也能滲下焦之濕滑石性寒清肅之令也能滲濕中之熱四物皆滲利則又有下多亡陰之懼故用阿膠佐之以存津液於決瀆爾茵陳蒿湯茵陳蒿半兩梔子四枚炒大黃三錢酒浸傷寒頭汗出渴飲水漿小便不利者身必發黃此方主之頭汗出者只是頭有汗躋頸而還皆無汗也內有實熱故渴飲水漿升降不交故小便不利濕熱鬱於中而不得越故必發黃經曰大熱之氣寒以取之故用茵陳苦入心而寒勝熱故用梔子推除邪熱必假將軍故用大黃又曰茵陳梔子能導濕熱由小便而出故用之甘桔湯桔梗一兩甘草二兩少陰病咽痛者此方主之口燥舌乾而渴脈來沉者少陰病也少陰之脈循喉嚨挾舌本病故咽痛甘草緩邪熱而兼發散桔梗下膈熱而治咽喉小建中湯桂甘草生薑各三兩芍藥六兩炒膠飴一升大棗十二枚傷寒腹中急痛者此方主之腹中急痛則陰陽乖於中而脾氣不建矣故立建中湯桂肉與桂枝不同枝則味薄故用之以解肌肉則味厚故用之以建里芍藥之酸收陰氣而健脾生薑之辛散寒邪而輔正經曰脾欲緩急食甘以緩之故用甘草大棗膠飴以緩急痛又曰嘔家不可用建中為其甘也則夫腹痛而兼嘔者又非建中所宜矣黃耆建中湯黃耆桂各一錢半白芍藥三錢甘草一錢傷寒汗後身痛脈遲弱者此方主之汗後身痛者此由汗多耗損陰氣不能榮養筋骨故令身痛陽虛故令脈遲汗後故令脈弱黃耆甘草之甘補中氣也然桂中有辛同用之足以益衛氣而實表芍藥之酸收陰氣也桂中有熱同用之足以利榮血而補虛此方以建中名者建立中氣使其生育榮衛通行津液則表不虛而身痛自愈矣黃芩湯黃芩三兩炒甘草二兩芍藥二兩炒大棗十二枚太陽與少陽合病必自下利者此方主之太陽與少陽合病者有太陽證頭痛身熱脊強而又有少陽證耳聾脅痛寒熱往來嘔而口苦也必自下利者表實裡虛邪熱漸攻於裡故也若太陽與陽明合病自下利為在表當與葛根湯發汗陽明少陽合病自下利為在裡可與承氣湯下之此太陽少陽合病自下利為在半表半裡非汗下所宜故與黃芩湯師曰虛而不實者苦以堅之酸以收之故用黃芩芍藥以堅斂腸胃弱而不實者甘以補之故用甘草大棗以補益腸胃其有加半夏者為其嘔也黃連湯黃連去毛炒乾薑炒桂枝炒甘草各三兩人參二兩半夏半升大棗十二枚傷寒胸中有熱而欲嘔胃中有寒而作痛者與此湯以升降陰陽黃連之苦以泄上熱而降陽薑桂半夏之辛以散中寒而升陰人參甘草大棗之甘可緩中急而益胃是方也以黃連之寒佐以薑桂之辛則寒者不滯以薑桂之熱君以黃連之苦則熱者不燥寒熱之相用猶奇正之相倚耳況夫人參甘草之益胃又所以宰中而建招搖矣乎炙甘草湯甘草四兩炙桂枝炒生薑各三兩生地黃一斤人參阿膠各二兩麥門冬麻仁各半升大棗十二枚傷寒脈結代心動悸者此方主之結與代皆止脈也此由氣血虛衰真氣不能相續故有此脈心動悸者動而不自安也亦由真氣內虛所致補虛可以去弱故用人參甘草大棗溫可以生陽故用生薑桂枝潤可以滋陰故用阿膠麻仁而生地麥冬者又所以清心而寧悸也茯苓甘草湯茯苓去皮桂枝炒各一兩生薑三兩甘草一兩傷寒水氣乘心心動悸者此方主之水氣乘心而悸者以水者心火之所畏也故乘之則為動悸此飲水過多之所致也淡可以滲水故用茯苓辛可以散飲故用薑桂益土可以制水故用甘草又曰飲之為悸甚於他邪雖有餘邪必先治悸蓋以水停心下不早治之浸於肺則為喘為咳傳於胃則為噦為噎溢於皮膚則為腫漬於腸間則為利下故也經曰厥而心下悸宜先治水後治其厥厥為邪之深者猶先治水則夫病淺於厥者可知矣茯苓桂枝甘草大棗湯茯苓半斤去皮桂枝四兩炒甘草二兩大棗十五枚甘瀾水煎傷寒汗後臍下悸欲作奔豚者此方主之汗後則心液虛腎者水臟欲乘心火之虛而克之故臍下悸俗作奔豚而上凌於心也茯苓甘淡可以益土而伐腎邪桂枝辛熱可以益火而平腎氣甘草大棗之甘可以益脾益脾所以制腎也煎以甘潤水者揚之無力取其不助腎氣爾真武湯茯苓去皮芍藥炒生薑各三兩白朮二兩炒附子一枚制傷寒發汗過多其人心下悸頭眩身瞤振振欲擗地者此方主之汗多而心下悸此心亡津液腎氣欲上而凌心也頭眩身瞤振振欲擗地者此汗多亡陽虛邪內動也真武北方之神司水火者也今腎氣凌心虛邪內動有水火奔騰之象故名此湯以主之茯苓白朮補土利水之物也可以伐腎而療心悸生薑附子益衛回陽之物也可以壯火而祛虛邪芍藥之酸收陰氣也可以和榮而生津液理中湯人參去蘆白朮炒乾薑炮甘草炮太陰自利不渴寒多而嘔腹痛鴨溏霍亂此太陰有真寒也本方主之太陰者脾也自利渴者為熱不渴者為寒脾喜溫而惡寒寒多故令嘔寒者肅殺之氣故令腹痛鴨溏者後便如鴨之溏亦是虛寒所致霍亂者邪在中焦令人上吐下瀉手足揮霍而目了亂也霍亂有陰陽二證此則由寒而致故耳病因於寒故用乾薑之溫邪之所湊其氣必虛故用人參白朮甘草之補吳茱萸湯吳茱萸一升泡過人參三兩去蘆生薑六兩大棗十二枚傷寒食谷欲嘔者屬陽明也此湯主之得湯反劇者屬上焦此非所宜也少陰犯真寒吐利手足厥冷煩躁欲死者此湯主之厥陰乾嘔吐沫頭痛者亦此湯主之陽明胃也為倉廩之官主納水穀有寒故令食谷欲嘔吳茱萸湯溫之宜矣若得湯反劇便非胃中寒乃是上焦火宜用涼劑而吳茱萸非宜矣少陰犯真寒者足少陰腎臟中寒與傳來陽證不同也腎間陰寒盛則上格乎陽而為吐經曰腎主二便故腎寒則大便不禁而為利手足得陽而溫受氣於內者也內有陰寒故令手足厥逆而冷煩躁者陰盛格陽陽氣內爭故令陽煩而陰躁斯其為證亦危矣故欲死厥陰者肝也寒氣內格故乾嘔吐沫厥陰與督脈會於巔故頭痛吳茱萸辛熱而味厚經曰味為陰味厚為陰中之陰故走下焦而溫少陰厥陰佐以生薑散其寒也佐以人參大棗補中虛也雖然張機氏立是方以治少陰厥陰之寒也固矣不又曰少陰病吐利煩躁四逆者死乎厥冷之與四逆無相違也臨病之工烏可不慎白通湯蔥白四莖乾薑一兩炮附子一枚炮少陰下利者此方主之少陰屬腎水臟也得天地閉藏之令主禁固二便寒邪居之則病而失其體矣故下利蔥白所以通陽氣也薑附所以散陰寒也是方也能散陰而通陽故即蔥白而名曰白通白通加人尿豬膽汁湯蔥白四莖乾薑一兩炮附子一枚炮人尿五合豬膽汁一合少陰下利脈微者與白通湯利不止厥逆無脈乾嘔煩者此方主之服湯脈暴出者死微續者生少陰下利脈微此少陰有真寒也故與白通湯散陰復陽若利不止厥逆無脈乾嘔煩者乃寒盛格拒乎陽藥不能達於少陰而陽逆亂於上故也加人尿豬膽者取其苦寒與陰同類可以引薑附入拒格之寒而調其逆內經曰必同其氣可使平也正此之謂入腹之後冷體既消熱性便發病氣隨去煩嘔皆除情且不違而致大益此奇正相伏之兵也惟明者知之其服湯脈暴出者正氣因發泄而脫也故死脈微續者陽氣漸復也故生附子湯附子二枚炮茯苓去皮芍藥炒各三兩人參二兩白朮四兩炒少陰病口中和背惡寒者此方主之少陰病身體痛手足寒骨節痛脈沉者亦此方主之傷寒以陽為主上件病皆陰勝幾於無陽矣辛甘皆陽也故用附朮參苓以養陽辛溫之藥過多則恐有偏陽之弊故又用芍藥以扶陰經曰火欲實水當平之此用芍藥之意也四逆湯甘草二兩乾薑兩半附子一枚煎成涼服太陰自利不渴陰證脈沉身痛與夫厥逆下利脈不至者此方皆主之論曰自利不渴屬太陰太陰主水穀病故自利內有真寒故不渴陰證者舉三陰而言則又非獨太陰矣病在裡故脈沉寒則血脈凝澀故身痛四肢受氣於裡裡寒則陽氣不能宣布於手足故四肢厥逆而冷下利亦是裡寒脈不至者寒極而脈藏伏也經曰寒淫於內治以甘熱故用甘草薑附大熱之劑申發陽氣祛散陰寒能溫經暖肌而回四逆因以名湯焉然必涼服者經曰治寒以熱涼而行之是也否則戴陽者反增上燥耳目口鼻皆血者有矣藥之難用也有如此乾薑黃連黃芩人參湯乾薑炮黃連炮黃芩炮人參去蘆各三兩傷寒誤吐下寒氣內格食入口即吐者此方主之不當吐下而吐下之故曰誤吐下如用梔子瓜蒂之類以吐又用承氣之類以下其性皆寒誤用之則損中氣中氣既虛且寒便惡穀氣故食入口即吐入口即吐者猶未下咽之謂也用乾薑之辛熱所以散寒用人參之甘溫所以補虛復用芩連之寒苦者所以假之從寒而通格也經曰有假其氣則無禁也正此之謂自非深得經旨故能通其變耶當歸四逆湯當歸去土桂枝芍藥炒各三兩細辛去土甘草炙通草各二兩大棗廿五枚論曰傷寒脈滑而厥者里有熱也白虎湯主之手足厥寒脈細欲絕者當歸四逆湯主之滑陽脈也故其厥為陽厥乃火極盛如乾之上九亢龍有悔之象也故用白虎白虎考見前若手足厥寒脈細欲絕則非白虎所宜矣手足厥寒則陽氣外虛不溫四末脈細欲絕則陰血內弱脈行不利陽氣外虛故用桂枝細辛以溫其表陰血內弱故用當歸芍藥以調其里通草通其陰陽大棗甘草和其營衛是證也自表入里雖曰傳至厥陰始終只是陽證與寒邪直中三陰不同故不用吳萸薑附輩而用桂枝湯加當歸細辛通草爾明者自得之當歸四逆加吳茱萸生薑湯當歸去土芍藥炒桂枝各三兩細辛去土甘草炙通草各二兩大棗廿五枚吳茱萸三錢泡生薑六錢論曰若其人內有久寒者當歸四逆加吳茱萸生薑湯主之此承上文言雖有手足厥寒脈細欲絕證候若其人內有久寒則加吳茱萸生薑以散久寒而行陽氣曰久寒者陳久之寒非時下直中之寒也明矣桂枝加芍藥湯桂枝三兩淨洗芍藥六兩炒甘草二兩生薑二兩大棗十二枚本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之表證未罷而醫下之邪乘裡虛當作結胸今不作結胸而作腹滿時痛是屬於太陰裡氣不和故腹滿時痛耳時痛者有時而痛非大實之痛也故但與桂枝湯以解表加芍藥以和里桂枝加大黃湯桂枝芍藥生薑各三兩甘草二兩大棗十二枚大黃一兩表證未罷因誤下而大實痛者此方主之大凡表證未罷仍當解表若誤下以虛其里則餘邪乘虛而入內作大實痛曰大實痛則非有時而痛者可例矣故前方但倍芍藥而此則加大黃加大黃者取其苦寒能蕩實也論又曰太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也則夫俗醫不辨虛實而執方治病者皆仲景之罪人矣桂枝加附子湯桂枝芍藥生薑各三兩大棗十二枚甘草二兩附子三枚太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者此方主之風濕相搏身體疼煩不能轉側者亦此方主之發汗遂漏不止則虛其表而亡陽陽虛則無以衛外故其人惡風小便難者經虛腑亦虛而膀胱之氣不化不化則不出故小便難汗多表亡津液則無以養筋故四肢微急難以屈伸用桂枝湯所以和在表之營衛加附子所以壯在表之元陽風濕相搏者風邪與濕邪相搏激也然何以知之若風邪為患必分六經今身體盡是疼煩不能轉側則無六經可辨之證故知其風濕相搏也與桂枝湯解在表之風加附子以溫寒濕麻黃附子細辛湯麻黃去節細辛去土各二兩附子一枚少陰病始得之反發熱脈沉者此方主之病發於陰者當無熱今少陰病始得之何以反發熱也此乃太陽經表裡相傳之證故耳蓋太陽膀胱經與少陰腎經相為表裡腎經虛則太陽之邪由絡直入腎臟餘邪未盡入里故表有發熱真寒入腎故里有脈沉有太陽之表熱故用麻黃以發汗有少陰之裡寒故用辛附以溫中黃連阿膠湯黃連去毛炒四兩黃芩一兩炒雞子黃二枚生用芍藥二兩炒阿膠蚌粉炒三兩少陰病心煩不得臥者此方主之寒邪徑中三陰者名曰陰證始終只是一經不復再傳今自三陽經傳來雖至三陰猶曰陽證所以有傳有不傳者以陰靜陽動也少陰病者有舌乾口燥欲寐諸證也欲寐而不行寐故曰心煩不得臥也少陰者水臟水為熱灼不足以濟火故心煩陽有餘者瀉之以苦故用黃芩黃連之苦陰不足者補之以甘故用雞黃阿膠之甘陰氣耗者斂之以酸故復佐以芍藥之酸桃花湯赤石脂一斤乾薑一兩粳米一升少陰病下利便膿血者此方主之此證自三陽傳來者純是熱證成無己因其下利而曰協熱因其用乾薑而曰裡寒昆謂不然蓋少陰腎水也主禁固二便腎水為火所灼不能濟火火熱克伐大腸金故下利且便膿血此方用赤石脂以其性寒而澀寒可以濟熱澀可以固脫用乾薑者假其熱以從治猶之白通湯加人尿豬膽乾薑黃連黃芩人參湯用芩連彼假其寒此假其熱均之假以從治爾內經曰寒者熱之熱者寒之微者逆之甚者從之逆者正治從者反治從少從多觀其事也正此之謂用粳米者恐石脂性寒損胃故用粳米以和之向使少陰有寒則乾薑一兩之寡豈足以溫而石脂一斤之多適足以濟寒而殺人矣豈仲景之方乎噫以聊攝之明猶且昧此則下聊攝者可知矣白頭翁湯白頭翁黃柏黃連秦皮傷寒熱利下重者此方主之熱利者協熱而利下重者下利頻數而重也藥之為性寒者能除熱苦者能厚腸四件皆苦寒故治熱利而療下重也四逆散甘草炙枳實麩炒柴胡去蘆芍藥炒少陰病四逆者此方主之此陽邪傳至少陰里有結熱則陽氣不能交接於四末故四逆而不溫用枳實所以破結氣而除裡熱用柴胡所以升發真陽而回四逆甘草和其不調之氣芍藥收其失位之陰是證也雖曰陽邪在裡甚不可下蓋傷寒以陽為主四逆有陰進之象若復用苦寒之藥下之則陽益虧矣是在所忌論曰諸四逆者不可下之蓋謂此也赤石脂禹餘糧湯赤石脂禹餘糧各一斤傷寒下之利不止病在下焦者此方主之下之利不止者下之虛其里邪熱乘其虛故利虛而不能禁固故不止更無中焦之證故曰病在下焦澀可以固脫故用赤石脂重可以鎮固故用禹餘糧然惟病在下焦者可以用之若病在中焦而誤與焉虛者則二物之寒益壞中氣實者固而澀之則邪無自而泄必增腹脹且痛矣慎之旋覆代赭石湯旋覆花甘草各三兩代赭石一兩人參二兩半夏半升生薑五兩大棗十二枚傷寒發汗若吐若下解後心下痞硬噫氣不除者此方主之汗吐下而解則中氣必虛虛則濁氣不降而上逆故作痞硬逆氣上干於心心不受邪故噫氣不除內經宣明五氣篇曰五氣所病心為噫是也旋覆之咸能軟痞硬而下氣代赭之重能鎮心君而止噫薑夏之辛所以散逆參草大棗之甘所以補虛或曰汗吐中虛肺金失令肝氣乘脾而作上逆逆氣於心心病為噫此方用代赭石固所以鎮心而亦所以平肝也亦是究理之論葛根黃芩黃連湯葛根半斤黃芩炒甘草各二兩黃連三兩太陽表證醫反下之利遂不止表證尚在喘而汗出者此方主之病在表而下之則虛其里陽邪乘虛而入故協熱而利不止表有頭疼發熱惡寒故曰表證尚在里有熱邪故喘而汗出表證尚在故用葛根甘草之辛甘以解表里有邪熱故用黃芩黃連之苦寒以清裡脾約丸麻仁二升去殼芍藥炒枳實麩炒各半斤厚朴薑湯炒大黃酒浸杏仁去皮尖各一斤傷寒瘥後胃強脾弱約束津液不得四布但輸膀胱致小便數而大難者主此方以通腸潤燥枳實大黃厚朴承氣物也麻仁杏仁潤腸物也芍藥之酸斂津液也然必胃強者能用之若非胃強則承氣之物在所禁矣竹葉石膏湯竹葉二把石膏一斤半夏制粳米各半升人參三兩去蘆甘草一兩炙麥門冬一升去心傷寒瘥後虛羸少氣氣逆欲吐者此方主之傷寒由汗吐下而瘥必虛羸少氣虛則氣熱而浮故逆而欲吐竹葉石膏門冬之寒所以清餘熱人參甘草之甘所以補不足半夏之辛所以散逆氣用粳米者恐石膏過寒損胃用之以和中氣也烏梅丸烏梅三十枚去核人參去蘆細辛去土黃柏去皮附子炮桂枝淨洗炮各六錢黃連一兩六錢炒乾薑一兩炮當歸洗淨蜀椒去目及閉目者各四錢胃虛臟寒得食而嘔蛔從上出者此方主之烏梅味酸蛔得之而軟連柏味苦蛔得之而伏椒細味辛蛔得之而死乾薑附桂溫臟寒也人參當歸補胃虛也燒褌散褌襠取隱處者燒灰方寸匕水和服男取女者女取男者傷寒陰陽易者此方主之傷寒男子新瘥未及平復婦人與之交得病名曰陽易婦人傷寒新瘥未及平復男子與之交得病名曰陰易以無病人染著餘毒而病如換易也取此物者亦以病因於陰陽感召而得故亦以陰陽之理治之又曰五味入口鹹入腎腐入腎穢入腎乃濁陰歸地之意也褌襠味鹹而腐穢故能入少陰燒之則溫故足以化氣灰之則濁故足以溺膀胱經曰濁陰歸六腑是也藥物雖陋而用意至微不因其陋而忽之則升仲景之階矣枳實梔子豆豉大黃湯枳實三枚梔子十四枚豆豉一升大黃一兩傷寒新瘥後食復者此方主之傷寒新瘥胃氣未復內傷飲食其熱復至名曰食復枳實大黃能奪胃中之食梔子香豉能祛胸中之熱蜜煎導法白蜜二合煎之作挺長如指許內便道中病人以手急抱欲大便時去之自汗大便秘者此法治之胃家實則自汗自汗亡其胃液則便秘若以下藥與之則益亡其液矣故用導法導法者迎而奪之之兵也豬膽導法大豬膽一枚入醋少許取竹管五寸許以一頭入膽一頭內入穀道中齎汁灌入肛內頃當大便出陽明自汗反小便利屎雖硬不可攻者宜行此法自汗則胃亡津液當小便不利今小便反利則熱猶未實屎雖硬不可攻也故以此法導之豬膽能澤大腸入醋能斂腸液故便難者得之則易經曰燥者濡之此法之謂也搐鼻法苦瓜蒂不拘多少為末令病人噙水一口將此藥搐一字入鼻中出黃水愈濕家鼻塞頭疼宜行此法濕家頭疼是濁邪干清陽之分也鼻者氣竅上通於腦下屬於肺濁邪干之故清竅不利瓜蒂苦而善湧瀉鼻竅受之則能出濁邪而瀉濕熱經曰客者除之此之謂也陰毒熏法大豆二升炒令極熱先以淨桶內置熱醋三升旋扶病人坐桶上蒸少時卻以熱豆傾桶中又蒸之有傾囊下卻與陰證藥服陰毒逆冷囊縮者此方主之陰毒者徑中三陰之寒毒也寒主收引故陰盛則囊縮熱主施張故熏蒸則囊縱豆味甘而醋味酸甘酸合則能感召厥陰肝木之氣而行宣發之令矣經曰開之發之適事為故此之謂也蔥熨法以索纏蔥白如臂大切去根及青留白二寸許先以火炙熱一面以著病人臍下上用熨斗貯火熨之令蔥並熱氣入腹內更作三四餅壞則易之若病人醒手足溫有汗則瘥否則不治行此法更當以四逆湯之類溫之陰毒四肢逆冷腹痛暴絕者此法主之凡人氣之呼出者心肺主之氣之吸入者肝腎主之陰寒中於肝腎則不能主吸入之氣故氣有出而無入令人逆冷腹痛暴絕而死宜外行蔥熨法內服四逆湯蔥有通中之妙火有回陽之功經曰熱因寒用此之謂也陰毒著艾法用干艾葉揉熟去灰作艾炷取臍下一寸五分名氣海二寸丹田三寸關元灸五十壯至二三百壯以手足漸溫人事稍蘇為可治陰毒手足厥冷不省人事者此法行之手足不自溫也受氣於中而後溫里有陰寒故手足厥冷陽氣明陰氣昏不省人事者乃陰盛而失神明之官也甲乙經曰氣海丹田任脈所發關元足三陰任脈之會是任脈實貫三陰而三陰之脈皆會於任脈也故陰毒中於三陰者取而灸之有寒谷回春之妙水漬法疊青布數重新水漬之稍捩去水搭於患人胸上須臾蒸熱又以別浸冷布易之頻換新水熱稍退可進陽毒藥陽毒漸深脈洪大內外結熱舌卷焦黑鼻如煙煤者此法行之陽毒者三陽熱證之毒也由表入里故曰漸深洪大皆陽脈表邪未去裡熱又甚故曰內外皆熱此由失汗之所致也舌卷者熱燥華池而筋縮急也舌焦而黑鼻如煙煤此火極而兼水化亢龍有悔之象也行此法者水可以滅火寒可以卻熱外可以安內經曰行水漬之和其中外可使畢已此之謂也灸少陰法少陰即太谿穴也在兩足內踝後跟骨上動脈陷中灸七壯少陰吐利手足不冷反發熱脈不至者此法行之少陰腎也寒中少陰陰寒格陽上逆故吐少陰主二便病寒故利陰在內拒陽於外故手足不冷而反發熱脈不至者陰盛於內而脈沉陷也太谿腎之俞也干焉而灸之所以引外格之陽使之歸原如易所謂不遠之復也接汗法薑蔥各半斤煎湯一斛傾大盆中用小板一塊橫加盆上令患人坐臥其上蒸之外以席被圍定露其口鼻外可進發汗藥朔方嚴寒之地腠理閉密汗不易泄故行此法蓋薑蔥能通腠理作湯以蒸之則表疏而汗易泄乃外合之兵也撲粉龍骨牡蠣糯米各等分為末服發汗藥出汗過多者以此粉撲之汗多有亡陽之戒故用龍骨牡蠣之澀以固脫入粳米者取其黏膩雲爾乃衛外之兵也刺期門期門穴名婦人屈乳頭向下盡處是穴乳小者以一指為率陷中有動脈刺之令病人吸五吸停針良久出針婦人熱入血室脅下滿如結胸狀譫語者此刺主之婦人傷寒發熱月事適來血室空虛邪熱乘虛而入名曰熱入血室血室衝脈也脅下滿如結胸狀者衝脈貫肝膈至胸中而散故所過皆病也譫語者邪熱內盛而神明亂也期門肝之募穴刺之出血乃隨其實而瀉之兵之迎奪者也大羌活湯羌活獨活防己防風蒼朮白朮黃連黃芩細辛川芎甘草各三錢生地黃一兩知母三錢傷寒兩感者此方主之兩感者一日太陽與少陰俱病謂有太陽證之頭疼身熱脊強而又有少陰證之口乾煩滿而渴也二日則陽明與太陰俱病謂有陽明證之身熱譫語而又有太陰證之腹滿不欲食也三日則少陽與厥陰俱病謂有少陽證之耳聾脅痛而又有厥陰證之囊縮厥逆也凡此兩感之證欲汗之則有里欲下之則有表表裡不能一治故內經仲景皆稱必死而無活法易老意曰證雖有表裡之殊而無陰陽之異傳經者皆為陽邪一於升陽散熱滋養陰臟則感之淺者尚或可平矣經曰氣薄則發泄故用羌活獨活防風蒼朮細辛川芎之氣薄者以升發其傳經之邪又曰寒勝熱故用黃連黃芩防己生地知母之寒苦者以培養其受傷之陰以升散諸藥而臣以寒涼則升者不峻以寒涼諸藥而君以升散則寒者不滯白朮甘草脾家藥也用之者所以益其脾胃而建中營之幟爾嗚呼於不可治之中而求為可治之策大羌活者其萬死一生之兵乎感冒門第三敘曰六氣襲人深者為中次者為傷輕者為感冒今世人之論也古昔明醫未嘗析此昆也生乎今之世則亦趨時人之論矣故考五方以治感冒香蘇散紫蘇香附醋製各二兩陳皮去白一兩甘草半兩四時感冒風邪頭痛發熱者此方主之南方風氣柔弱傷於風寒俗稱感冒感冒者受邪膚淺之名也內經曰卑下之地春氣常存故東南卑下之區感風之證居多所以令人頭痛發熱而無六經之證可求者所感人也由鼻而入實於上部不在六經故令頭痛發熱而已是方也紫蘇香附陳皮之辛芬所以疏邪而正氣甘草之甘平所以和中而輔正爾芎蘇散川芎七合半夏六錢制柴胡去蘆茯苓各五錢紫蘇葉乾葛各三錢五分陳皮去白枳殼去穰桔梗甘草各三錢外有頭痛發熱惡寒內有咳嗽吐痰氣洶者此方主之川芎蘇葉乾葛柴胡解表藥也表解則頭痛發熱惡寒自愈桔梗半夏陳皮枳殼茯苓甘草和里藥也里和則咳嗽吐痰氣洶自除十神湯川芎甘草麻黃乾葛赤芍藥升麻白芷陳皮香附紫蘇等分此治外感風寒之套劑也古人治風寒必分六經見證用藥然亦有隻是發熱頭痛惡寒鼻塞而六經之證不甚顯者故亦總以疏表利氣之藥主之而已是方也川芎麻黃乾葛升麻白芷紫蘇香附陳皮皆辛香利氣之品故可以解感冒氣塞之證乃赤芍者所以和陰氣於發汗之中而甘草者所以和陽氣於疏利之隊也參蘇飲人參去蘆紫蘇半夏制陳皮去白茯苓去皮木香枳殼炒乾葛前胡去蘆桔梗甘草各五錢勞倦感冒妊娠感冒並宜此方主之感冒宜解表故用紫蘇乾葛前胡勞倦妊娠宜補里故用人參茯苓甘草乃木香半夏枳殼桔梗陳皮所以和利表裡之氣氣和則神和神和則無病矣藿香正氣散大腹皮淨洗白芷茯苓去皮蘇莖葉藿香各三兩白朮炒陳皮去白厚朴薑湯炒桔梗半夏各二兩炙甘草一兩凡受四時不正之氣憎寒壯熱者此方主之風寒客於皮毛理宜解表四時不正之氣由鼻而入不在表而在裡故不用大汗以解表但用芬香利氣之品以主之白芷紫蘇藿香陳皮腹皮厚朴桔梗皆氣勝者也故足以正不正之氣白朮茯苓半夏甘草則甘平之品耳所以培養中氣而樹中營之幟者也暑門第四敘曰暑六氣之一也實者清其暑虛者益其氣此大都也至於雜病相揉則變通在我而已今考九方如下論證論藥可謂舉其大綱觸類而通弗可勝用矣黃連香薷飲香薷一兩厚朴炒白扁豆各半兩黃連三錢炒夏至後暑熱吐利煩心者此方冷服暑陽邪也干於脾則吐利干於心則煩心香薷之香入脾清暑而定吐利黃連之苦入心卻熱而治煩心暑邪結於胸中非厚朴不散暑邪陷於脾胃非扁豆無以和中然必冷服者經所謂治溫以清涼而行之是也是方也於伏熱之時自覺酷暑蒸炎若遠行而歸自覺傷於暑熱服一二劑誠為切當今人坐於高堂廣廈之中身與冰盤水閣相習口與浮瓜水果相厭暑邪原淺每求此藥服之甚者日日飲之是謂誅伐太過弱者寒中之疾作於旦暮壯者待時而病秋季為瀉為利矣慎之十味香薷飲香薷一兩用穗人參去蘆陳皮黃耆炙白朮炒白扁豆甘草炒白茯苓木瓜各半兩伏暑身體倦怠神昏頭重吐利者此方主之暑能傷氣故身體倦怠神思昏沉暑為陽邪故並於上而頭重暑邪干胃故既吐且利火熱橫流肺氣受病人參黃耆益肺氣也肺為子脾為母肺虛者宜補其母白朮茯苓扁豆甘草皆補母也火為母土為子火實者宜瀉其子厚朴陳皮平其敦阜即瀉子也香薷之香散暑邪而破濕熱木瓜之酸收陰氣而消脾濕脾氣調則吐利自息肺氣復則倦怠皆除人參白虎湯人參石膏知母甘草暑月中熱汗出惡寒身熱而渴脈虛者此方主之暑陽邪也中人則傷衛衛虛則不能固表故汗出且惡寒表有暑邪故身熱里有暑邪故口渴暑傷於氣故脈虛經曰壯火食氣故用人參甘草以補氣石膏性寒味甘辛寒則能除熱甘則能調胃辛則能解肌以其行清肅之令而除煩暑得西方金神之象故以白虎名之用之者經所謂折其鬱氣是也知母滋陰益腎易義曰火炎則水乾故用知母以益水經所謂滋其化源是也六一散滑石六兩甘草一兩共為末每用五錢冷水調服中暑身熱煩渴小便不利者此方主之身熱口渴陽明證也小便不利膀胱證也暑為熱邪陽受之則入六腑故見證若此滑石性寒而淡寒則能清六腑淡則能利膀胱入甘草者恐石性太寒損壞中氣用以和中耳經曰治溫以清涼而行之故用冷水調服是方也簡易而效捷暑途用之誠為至便但於老弱陰虛之人不堪與也此虛實之辨明者詳之否則蹈虛虛之戒惡乎不慎清暑益氣湯人參去蘆白朮炒陳皮去白神麯炒澤瀉各五分黃耆炙蒼朮制升麻各一錢麥門冬去心當歸酒洗黃柏炒甘草炙各三分五味子九粒麥皮麩炒乾葛各二分長夏濕熱蒸炎四肢困倦精神減少身熱氣高煩心便黃渴而自汗脈虛者此方主之暑令行於夏至長夏則兼濕令矣故此方兼而治之暑熱蒸炎表氣易泄而中氣者又諸氣之源黃耆所以實表而固易泄之氣白朮神麯甘草所以調中而培諸氣之原酷暑橫流肺金受病人參五味子麥冬一以補肺一以收肺一以清肺此三物名曰生脈散經所謂扶其所不勝也火盛則水衰故又以黃柏澤瀉滋其化源液亡則口渴故又以當歸乾葛生其胃液清氣不升升麻可升濁氣不降二皮可理蒼朮之用為兼長夏之濕也大順散甘草炙乾薑炮杏仁去皮尖肉桂去皮等分夏月引飲過多脾胃受濕清濁相干陰陽氣逆霍亂嘔吐者此方主之脾胃者喜燥而惡濕喜濕而惡寒時雖夏月過於飲冷吞寒則傷之矣故令氣逆霍亂而嘔吐也乾薑肉桂溫胃而建中甘草杏仁調脾而理氣此方非治暑乃治暑月飲冷受傷之脾胃爾若非飲冷而致諸疾則勿執方以治也桂苓甘露飲茯苓去皮澤瀉各一兩滑石四兩白朮炒豬苓去皮桂心炒各五錢石膏寒水石各二兩夏月引飲過多小便不利濕熱為患者此方主之三石所以清六腑之熱五苓所以利三焦之濕河間此方誠治濕熱之簡捷者張子和加人參甘草因其脈虛乾葛之加解其暑渴木香之加化其濕氣縮脾飲砂仁草果仁烏梅肉炙甘草各四兩扁豆炒乾葛各二兩夏月伏熱為酒食所傷者此方主之砂仁草果所以消肉食烏梅乾葛卻暑而除煩扁豆甘草助脾而益胃六和湯砂仁半夏杏仁人參白朮甘草藿香木瓜厚朴扁豆赤茯苓夏月病人霍亂轉筋嘔吐泄瀉寒熱交作倦怠嗜臥伏暑煩悶小便赤澀或利或渴中酒胎產皆可服之六和者和六腑也脾胃者六腑之總司故凡六腑不和之病先於脾胃而調之此知務之醫也香能開胃竅故用藿砂辛能散逆氣故用半杏淡能利濕熱故用茯瓜甘能調脾胃故用扁術補可以去弱故用參草苦可以下氣故用厚朴夫開胃散逆則嘔吐除利濕調脾則二便治補虛去弱則胃氣復而諸疾平蓋脾胃一治則水精四布五經並行雖百骸九竅皆太平矣況於六腑乎濕門第五敘曰濕有內外有陰陽有上下今考七方言其常耳未及其變也東南卑下之區十病九濕惡能盡其變耶此在臨證而加察焉可也二陳湯半夏薑製陳皮茯苓各一錢半甘草七分半炙脾弱不能制濕內生積飲者此方主之水穀入胃無非濕也脾土旺則能運化水穀上歸於肺下達膀胱無濕氣可留也惟夫脾弱不能制濕則積而為痰飲半夏之辛能燥濕茯苓之淡能滲濕甘草之甘能健脾陳皮之辛能利氣脾健則足以制濕氣利則積飲能行東南之人多有濕飲之疾故丹溪恆主之其曰加升提之劑者亦清氣升而濁氣自降之謂平胃散蒼朮泔浸七日五斤陳皮去白厚朴薑湯炒各三斤甘草炙三十兩濕淫於內脾胃不能剋制有積飲痞膈中滿者此方主之此濕土太過之證經曰敦阜是也蒼朮味甘而燥甘則入脾燥則勝濕厚朴味溫而苦溫則益脾苦則燥濕故二物可以平敦阜之土陳皮能泄氣甘草能健脾氣泄則無濕鬱之患脾強則有制濕之能一補一泄又用藥之則也是方也惟濕土太過者能用之若脾土不足及老弱陰虛之人皆非所宜也羌活勝濕湯羌活獨活各一錢藁本炙甘草防風川芎各五分蔓荊子三分外傷於濕一身盡痛者此方主之脾胃虛弱濕從內生者二陳平胃之類主之水停於膈濕盛濡瀉者六一五苓之類主之水滲皮膚肢腫黃脹者五皮茵陳之類主之今濕流關節非上件所宜矣經曰風勝濕故用羌防藁獨芎蔓諸風藥以治之以風藥而治濕如卑濕之地風行其上不終日而濕去矣又曰無竅不入惟風為能故凡關節之病非風藥不可用甘草者以風藥悍燥用以調之此之謂有制之兵也甘草附子湯炙甘草白朮各二錢附子一錢五分炮桂枝四錢炒風濕骨節疼煩不欲去衣小便不利大便反快者此方主之風濕相搏故骨節疼煩傷風則惡風故不欲去衣小便不利而大便燥者為熱今小便不利而大便反快則濕可知矣附子之熱可以散寒濕桂枝之辛可以解風濕甘草健脾則濕不生白朮燥脾則濕有制是方也以桂附之辛熱而治濕猶之潦了之地得太陽曝之不終朝而濕去亦治濕之一道也二妙散黃柏乳潤一宿蒼朮泔浸七日等分為末空心酒服三錢濕熱腰膝疼痛者此方主之濕性潤下病則下體受之故腰膝病然濕未嘗痛積久而熱濕熱相搏然後痛此方用蒼朮以燥濕黃柏以去熱又黃柏有從治之妙蒼朮有健脾之功一正一從奇正之道也四苓散白朮炒茯苓去皮豬苓澤瀉濕生於內水瀉小便不利者此方主之經曰濕勝則濡瀉故濕生於內者令人水瀉濕並於大腸故小便不利白朮燥而淡燥則能健脾淡則能利濕茯苓甘而淡甘則能補中而淡亦滲濕矣豬苓枯而淡澤瀉咸而淡枯者有滲利而無補益咸者直能潤下而兼滲利丹溪曰治濕不利小便非其治也故主此方不換金正氣散厚朴薑湯炒陳皮去白半夏制藿香去梗蒼朮制甘草炙凡受山嵐瘴氣及出遠方不服水土吐瀉下利者此方主之山嵐瘴氣穀氣也內經曰穀氣通於脾故令人不服水土而壞腹是方也蒼朮厚朴陳皮甘草前之平胃散也可以平濕土敦阜之氣而消嵐瘴乃半夏之燥所以醒脾藿香之芬所以開胃方名曰正氣者謂其能正不正之氣故爾瘟疫門第六敘曰瘟疫以六淫致疾證狀各各不同自非良醫鮮有明者吾嘗執贄遠邇而求學益叩及瘟疫諸證即擅名之士猶訥焉今考方十二首詳辨其證庶幾乎活人之補也敗毒散加黃芩湯羌活獨活柴胡前胡川芎黃芩桔梗枳殼人參茯苓甘草壯熱不惡風寒而渴者瘟病也此方主之冬時觸冒寒氣即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為熱病以其陽毒最深名曰瘟疫寒變為溫為熱故病壯熱不惡風寒而渴也經曰治溫以清又曰開之發之適事為故羌活獨活柴胡前胡川芎皆輕清開發之劑也故用之以解壯熱用黃芩枳殼桔梗者取其清膈而利氣也用人參茯苓甘草者實其中氣使瘟毒不能深入也培其正氣敗其邪毒故曰敗毒九味羌活湯羌活防風蒼朮細辛川芎白芷黃芩甘草生地黃觸冒四時不正之氣而成時氣病憎寒壯熱頭疼身痛口渴人人相似者此方主之謂春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似也藥之為性辛者得天地之金氣於人則為義故能匡正而黜邪羌防蒼細芎芷皆辛物也分經而主治邪在太陽者治以羌活邪在陽明者治以白芷邪在少陽者治以黃芩邪在太陰者治以蒼朮邪在少陰者治以細辛邪在厥陰者治以川芎而防風者又諸藥之卒徒也用生地所以去血中之熱而甘草者又所以和諸藥而除氣中之熱也易老自序云此方冬可以治寒夏可以治熱春可以治溫秋可以治濕是諸路之應兵也用之以治四時瘟癘誠為穩當但於陰虛氣弱之人在所禁爾三黃石膏湯石膏一兩五錢生用黃芩炒黃連炒黃柏各五錢山梔三十枚炒黑麻黃去節淡豉各二兩瘟毒表裡俱盛五心煩熱兩目如火鼻乾面赤大渴舌燥者此方主之寒毒藏於肌膚至夏變為熱病熱病未除更遇溫熱名曰瘟毒熱病之最重者寒能制熱故用石膏苦能下熱故用芩連梔柏佐以麻黃淡豉之發散者以溫熱至深表裡俱實降之則鬱揚之則越鬱則溫熱猶存兼之以發揚則炎炎之勢皆燼矣此內外分消其勢兵之分擊者也沃漬法瘟熱內外皆實喜飲水入水者取新汲井花水一大缸使病人坐其水中復以大杓盛水自頂沃之水熱則病減矣病人喜飲冷亦聽其大啜毋得阻也行此法者易義曰水盛則火減經曰行水漬之和其中外可使畢已此之謂也葳蕤湯葳蕤二錢半麻黃白薇青木香羌活杏仁川芎甘草各五分石膏甘菊花各一錢五分風溫憎寒壯熱頭疼身痛口渴面腫者此方主之寒毒藏於肌膚至春變為溫病溫熱未除更遇於風病為風溫表有邪故寒熱里有邪故口渴風之傷人也頭先受之故頭疼風盛則氣壅故面腫風溫壅盛甘能發之故用葳蕤甘草辛能散之故用羌活麻黃清能平之故用川芎甘菊寒能勝之故用石膏白薇佐以杏仁取其利氣而青木香者清熱下氣之物也白虎加蒼朮湯石膏一斤知母六兩蒼朮甘草各二兩粳米六合共分四服濕溫憎寒壯熱口渴一身盡痛脈沉細者此方主之溫毒藏於肌膚更遇於濕名曰濕溫濕為陰邪故憎寒溫為陽邪故壯熱溫熱入里故口渴濕流百節故一身盡痛濕為陰故脈沉細石膏知母甘草粳米白虎湯也所以解溫熱加蒼朮者取其辛燥能治濕也白虎考見傷寒門大青龍加黃芩湯麻黃六兩去節桂枝淨洗甘草各二兩杏仁四十枚去皮尖黃芩七錢生薑三兩石膏如雞子大大棗十二枚寒疫頭疼身熱無汗惡風煩躁者此方主之春分以後至秋分節前天有暴氣抑遏陽氣不得泄越有上件諸證者皆為時行寒疫表有風寒故見太陽證頭疼身熱無汗惡風里有溫熱故見煩躁麻黃桂枝甘草杏仁生薑大棗辛甘物也辛以解風寒甘以調營衛石膏黃芩寒苦物也寒以清溫熱苦以治煩躁升麻葛根湯升麻葛根芍藥甘草等分冬溫無汗發熱口渴者此方主之冬月應寒而反大溫民受其溫癘之氣名曰冬溫非時不正之氣由鼻而入皮毛未得受邪故無汗病由於溫故發熱口渴升麻葛根辛涼而發散者也故足以解冬溫芍藥味酸能養陰而退熱甘草味甘能調營而益衛太無神朮散蒼朮制厚朴制各一兩陳皮一兩石菖蒲炙甘草藿香各一兩五錢人受山嵐瘴氣憎寒壯熱一身盡痛者此方主之山嵐瘴氣謂山谷間障霧濕土敦阜之氣也濕氣蒸騰由鼻而入呼吸傳變邪正分爭陰勝則憎寒陽勝則壯熱流於百節則一身盡痛是方也用蒼朮之燥以剋制其障霧之邪用厚朴之苦以平其敦阜之氣菖蒲藿香辛香物也能匡正而辟邪甘草陳皮調脾物也能補中而泄氣內經曰穀氣通於脾故山谷之氣感則壞人脾太無此方但用理脾之劑而解瘴毒之妙自在其中使非深得經旨不能主此方也其高識若此誠不愧為丹溪之師矣漏蘆湯漏蘆升麻大黃藍葉黃芩玄參等分芒硝甚者加至二錢疫癘積熱時生疙瘩結毒俗稱流注面腫咽塞者此方主之經曰營氣不從逆於肉理乃生毒癰又曰熱勝則腫故疫癘之餘熱解之未盡逆留於分肉之間則作上件諸證藥之為性辛能解散苦能勝熱漏蘆升麻藍葉辛而且苦故足以解結熱咸能軟堅苦能瀉實大黃味苦芒硝味鹹故足以軟堅而瀉實玄參苦而潤黃芩苦而枯潤者去血中之熱而枯者去氣中之熱爾況與漏蘆升麻走散之藥同用之則又無所不至矣消毒丸大黃酒浸牡蠣炙殭蠶等分疫毒內郁時成疙瘩者此方主之內經曰陷脈為瘻留連肉腠謂陽毒乘脈之虛而陷入之便壅結而為瘻核留連於肉腠之間正此疫毒疙瘩之謂也苦能下熱故用大黃咸能軟堅故用殭蠶牡蠣闢瘟法凡覺天行時氣恐其相染須日飲雄黃酒一卮仍以雄黃豆許用綿裹之塞鼻一竅男左女右用之或用大蒜塞鼻或用阿魏塞鼻皆良雄黃氣悍能辟惡邪大蒜阿魏氣之至臭者臭勝則諸穢皆不足以加之矣但蒜大熱阿魏透腦虛人難用不若雄黃便於事爾大頭瘟門第七敘曰大頭瘟前古未之論也東垣始論之今上壬午北方病此者甚眾死者不啻數萬人昆居南土未嘗見其證鄉人自北來者皆言患者頭大如斗躋頭而還自若也今考三方觀其大略二黃湯黃芩酒炒黃連酒炒生甘草各一兩天行大頭疫病此方主之頭大者炎上作火之象也故用芩連之苦以瀉之甘草之甘以緩之普濟消毒飲子黃芩酒炒黃連酒炒各五錢柴胡五分桔梗三分人參三錢陳皮去白甘草玄參各二錢連翹板藍根馬勃鼠黏子各一錢白殭蠶升麻各七分便秘加大黃泰和二年四月民多疫癘初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭傷寒諸藥雜治終莫能愈漸至危篤東垣曰身半以上天之氣也邪熱客於心肺之間上攻頭面而為腫爾乃主是方為細末半用湯調時時呷之半用蜜丸噙化活者甚眾時人皆曰天方遂刻諸石以傳永久昆謂芩連苦寒用之以瀉心肺之火而連翹玄參板藍根鼠黏子馬勃殭蠶皆清喉利膈之物也緩以甘草之國老載以桔梗之舟楫則諸藥浮而不沉升麻升氣於右柴胡升氣於左清陽升於高巔則濁邪不得復居其位經曰邪之所湊其氣必虛故用人參以補虛而陳皮者所以利其壅滯之氣也又曰大便秘者加大黃從其實而瀉之則灶底抽薪之法爾五香麻黃湯麝香五分薰陸香雞舌香各一錢青木香沉香麻黃去節防風去蘆獨活去土白薇葳蕤枳實麩炒秦艽去蘆甘草各二錢凡傷寒熱病後忽發浮腫或著頭面或著唇口頸項或著胸背或著四肢或偏著兩足不痛不赤者此方主之腫而痛者為實邪不痛者為虛邪腫而赤者為結熱不赤者為留氣故知上件諸腫乃是餘邪未去營衛之行不相順接逆於肉理而為腫爾是方也用五香以開氣竅而麻黃防風獨活秦艽葳蕤白薇皆辛散也一以解其餘邪一以流其著氣乃甘草之補所以致新枳實之悍所以推陳
