body:
  text: 卷二火門第八敘曰水火人身之陰陽也陽常有餘故火證恆多所謂一水不勝五火是也人能攝理其火致其沖和則調元之手矣或者寒涼太過斯又弊焉自有五行以來不可以無火故知滅燼之為非今考古方二十餘首以治火豈曰滅火雲哉井花水水足以濟火故狂躁煩渴火實之證內以水飲之外以水漬之此既濟之妙自大易以來已有之矣甘梨漿甘梨漿水類也生之可平六腑之陽熟之可濟五臟之陰實火宜生虛火宜熟人屎人尿人中白牛屎豬屎馬通驢子小便總考孫思邈千金方凡療火證熱證率用上件取汁飲之往往稱其神良何也經曰清陽出上竅濁陰出下竅屎溺出於二陰則無分人類物類皆陰濁也惟其陰濁故足以制陽光或者鄙而遠之由夫未達醫之妙也煉秋石古昔神良之醫但用人尿溺白垽耳未嘗有用秋石之方也近時多用之夫藥有氣有味有精有魄秋石既經煎煉則其氣味已易精華已去所存者獨枯魄耳惡能與人尿溺白垽論功效耶此舉世尚奇之昧也或用陰秋石者為近之防風通聖散防風川芎川歸白芍藥大黃芒硝連翹薄荷麻黃石膏桔梗黃芩白朮梔子荊芥滑石甘草表裡客熱三焦火實者此方主之麻黃防風疏表藥也火熱之在表者得之由汗而泄大黃芒硝攻裡藥也火熱之在裡者得之由下而泄荊芥薄荷清上藥也火熱之在巔頂者得之由鼻而泄滑石梔子清下藥也火熱之在決瀆者得之由溺而泄乃石膏桔梗又所以清肺胃而連翹黃芩又所以去諸經之客熱也火熱灼其血則川芎當歸芍藥可以養之火熱壞其氣則白朮甘草可以益之導赤散生地黃木通去粗皮甘草梢等分為末心熱小便黃赤此方主之心與小腸為表裡故心熱則小腸亦熱而令便赤是方也生地黃可以涼心甘草梢可以瀉熱佐之以木通則直走小腸膀胱矣名曰導赤者導其丙丁之赤由溺而泄也三黃瀉心湯黃芩黃連大黃酒潤各等分心膈實熱狂躁面赤者此方主之味之苦者皆能降火黃芩味苦而質枯黃連味奪而氣燥大黃苦寒而味厚質枯則上浮故能瀉火於膈氣燥則就火故能瀉火於心味厚則喜降故能蕩邪攻實此天地親上親下之道水流濕火就燥之義也龍膽瀉肝湯柴胡一錢黃芩七分炒五味子九粒生甘草山梔炒黑知母去毛炒天門冬去心麥門冬去心黃連炒人參龍膽草各五分謀慮不決肝熱膽溢口苦熱盛者此方主之肝主謀慮膽主決斷謀慮則火起於肝不決則火起於膽柴胡性溫味苦而氣薄故入厥陰少陽黃芩黃連龍膽草山梔子得柴胡以君之則入肝膽而平之矣制肝者惟金故用天麥門冬五味知母以益肺畏肝者惟土故用人參甘草以益脾左金丸黃連六兩炒吳茱萸一兩湯泡二共為末作丸肝臟火實左脅作痛者此方主之左肝也左金者謂金令行左而肝平也黃連乃瀉心之物瀉去心火不得乘其肺金則清肅之令左行而肝有所制矣吳茱萸味辛熱而氣臊臊則入肝辛熱則疏利乃用之以為反佐經曰佐以所利和以所宜此之謂也當歸龍薈丸當歸龍膽草梔子黃連黃柏黃芩各一兩木香一錢麝香五分大黃酒浸青黛蘆薈各五錢蜜丸如豆大風熱蓄積時發驚悸筋惕搐搦嗌塞不利腸胃燥澀狂越等證此方主之肝火為風心火為熱心熱則驚悸肝熱則搐搦嗌塞不利者肺亦火也腸胃燥澀者脾亦火也狂越者狂妄而越禮也經曰狂言為失志又曰腎藏志如斯言之則腎亦火矣此一水不勝五火之謂也故用黃連以瀉心用黃芩以瀉肺青黛龍膽蘆薈以瀉肝大黃以瀉脾黃柏以瀉腎所以亟亟以瀉五臟之火者幾於無水故瀉火以存水耳用當歸者養五臟之陰於亢火之時用木香麝香者利五臟之氣於克伐之際也互考見咳嗽門瀉黃散藿香二錢山梔一兩炒黑石膏五錢甘草三兩防風四兩脾家伏火唇口乾燥者此方主之唇者脾之外候口者脾之竅故唇口乾燥知脾火也苦能瀉火故用山梔寒能勝熱故用石膏香能醒脾故用麝香甘能緩脾故用甘草用防風者取其發越脾氣而升散其伏火也或問何以不用黃連余曰黃連苦而燥此有唇口乾燥則非黃連所宜故惟梔子之苦而潤者為當耳又問曰既惡燥何以不去防風余曰東垣已言之矣防風乃風藥中之潤劑也故昔人審擇而用之升陽散火湯本方去獨活加蔥白名火鬱湯升麻去絲根葛根獨活羌活人參去蘆白芍各五錢柴胡八錢防風二錢五分生甘草二錢炙甘草三錢過食冷物抑遏少陽之火鬱於脾部者此方主之少陽者三焦與膽也經曰少火生氣丹溪曰天非此火不能生萬物人非此火不能以有生是少火也生物之本揚之則光遏之則滅今為飲食填塞至陰抑遏其上行之氣則生道幾於息矣故宜辛溫之劑以舉之升麻柴胡羌活獨活防風乾葛皆辛溫上行之物也故用之以升少陽之氣清陽既出上竅則濁陰自歸下竅而食物傳化自無抑遏之患芍藥味酸能瀉土中之木人參味甘能補中州之氣生甘草能瀉鬱火於脾從而炙之則健脾胃而和中矣東垣氏聖於脾胃者其治之也必主於升陽俗醫知降而不知升是撲其少火也安望其衛生耶瀉白散桑白皮地骨皮各一兩甘草五錢肺火為患喘滿氣急者此方主之肺苦氣上逆故喘滿上焦有火故氣急此丹溪所謂氣有餘便是火也桑白皮味甘而辛甘能固元氣之不足辛能瀉肺氣之有餘佐以地骨之瀉腎者實則瀉其子也佐以甘草之健脾者虛則補其母也此云虛實者正氣虛而邪氣實也又曰地骨皮之輕可使入肺生甘草之平可使瀉氣故名以瀉白白肺之色也阿膠散阿膠一兩半蛤粉炒鼠黏子二錢半炒香馬兜鈴半兩焙炙甘草五錢杏仁去皮尖七個粳米一兩肺虛有火嗽無津液咳而哽氣者此方主之燥者潤之今肺虛自燥故潤以阿膠杏仁金鬱則泄之今肺中鬱火故泄以兜鈴黏子土者金之母虛者補其母故入甘草粳米以補脾益胃大補丸黃柏一斤炮褐色為末水丸氣虛者四君子湯下血虛者四物湯下腎火從臍下起者腎水衰也此方主之腎非獨陰也命門之火寄焉腎水一虧則命門之火無所畏而自熾矣故龍雷之火從臍下動也經曰水鬱則折之水鬱者腎部有鬱火也折之者制其沖逆也柏皮味苦而厚為陰中之陰故能制腎經沖逆之火火去則陰生故曰大補王冰曰壯水之主以制陽光此之謂也氣虛下以四君子湯恐其寒涼而壞脾也血虛下以四物湯助其滋陰而制火也滋腎丸黃柏十兩酒浸知母六兩酒浸肉桂五錢腎火起於湧泉之下者此方主之熱自足心直衝股內而入腹者謂之腎火起於湧泉之下知柏苦寒水之類也故能滋益腎水肉桂辛熱火之屬也故能假之反佐此易所謂水流濕火就燥也三補丸黃芩黃連黃柏俱酒潤等分三焦有火嗌喉乾燥小便赤澀大便祕結此方主之少火之火無物不生壯火之火無物不耗內經曰壯火食氣是也故少火宜升壯火宜降今以三物降其三焦之壯火則氣得其生血得其養而三焦皆受益矣故曰三補黃芩苦而枯故清熱於上黃連苦而實故瀉火於中黃柏苦而潤故瀉火於下雖然火有虛實是方但可以治實火若虛者用之則火反盛謂降多亡陰也丹溪曰虛火可補人參黃耆之類則虛實之辨若天淵矣明者幸求之證焉益元散即暑門六一散又名天水散滑石六兩甘草一兩共為末用蜜水調下三錢六腑有實火上有煩渴下有便祕赤澀者此方主之滑石性寒故能清六腑之熱甘草性平故能緩諸火之勢涼膈散黃芩酒炒梔子仁炒黑薄荷各一兩連翹四兩大黃酒浸芒硝甘草各二兩共為末每服五錢火鬱上焦大熱面赤者此方主之黃芩梔子味苦而無氣故瀉火於中連翹薄荷味薄而氣薄故清熱於上大黃芒硝鹹寒而味厚故諸實皆瀉用甘草者取其性緩而戀膈也不作湯液而作散者取其泥膈而成功於上也清咽太平丸薄荷葉十兩川芎甘草防風烏犀角柿霜各一兩桔梗三兩蜜丸噙化膈上有火早間咯血兩頰常赤咽喉不清者此方主之消風清熱莫如薄荷故用以為君佐以烏犀解心熱也入以柿霜生津液也用川芎有清上之功用防風有解散之效恐諸藥之下流故載以舟楫因火勢之急速故緩以國老師云咽者膽之候若只咽間痰熱膈內和者宜以平膽之方主之溫膽湯竹茹枳實麩炒半夏制甘草各二兩陳皮去白生薑各四兩膽熱嘔痰氣逆吐苦夢中驚悸者此方主之膽甲木也為陽中之少陽其性以溫為常候故曰溫膽竹茹之清所以去熱半夏之辛所以散逆枳實所以破實陳皮所以消滯生薑所以平嘔甘草所以緩逆傷寒解後多有此證是方恆用之珍珠散琥珀珍珠粉鐵粉天花粉硃砂寒水石牙硝大黃酒浸生甘草各等分為末每用薄荷湯調下三錢男婦小兒五臟積熱心胸悶亂口乾舌燥精神恍惚癲狂等證此方主之明可以安神琥珀珍珠皆明物也故用之以安神魄重可以去怯鐵粉硃砂皆重物也故用之以定驚狂寒可以去熱硝黃水石皆寒物也故用之以除積熱熱之盛者必渴天花粉可以生津火之熾者必急生甘草所以緩急人參黃耆白朮甘草考實火可瀉宜用芩連梔柏虛火可補宜用人參黃耆白朮甘草所謂溫能除大熱也或者誤用芩連梔柏以治虛火則火益熾何以然哉四件皆降下之品降多則亡陰陰亡則不足以濟火故令火益熾天雄附子川烏硫黃考諸證無火者宜於四件斟酌之壯火固不可有少火亦不可無所謂天非此火不足以生萬物人非此火不足以有生故凡諸證寒涼太過幾於無陽者宜審擇而用之昔人以附子一物為太陽丹以天雄附子川烏為三建湯以硫黃為金液丹皆所以養其真陽壯其真火而存此身之生氣耳明變之士幸教我哉斑疹門第九敘曰無熱不斑無濕不疹此二言者斑疹之大觀也其致疾之由則有風寒暑濕之殊辨證之法則有表里虛實之異此在人之自悟非可以紙上盡也防風通聖散防風川芎當歸大黃芒硝白芍藥連翹薄荷麻黃石膏桔梗黃芩白朮梔子荊芥滑石甘草失下發斑者此方主之失下者腸胃燥實當下而失於下也失下則熱無所泄而結於胃胃主肌肉故肌肉之間見紅斑也紅者火之色熱之熾也方中有大黃芒硝甘草乃傷寒門調胃承氣湯也所以瀉腸胃之實熱加連翹梔子黃芩薄荷乃火門之涼膈散也所以散胸膈之熱邪全方除芒硝大黃各曰雙解散解表有防風麻黃薄荷荊芥川芎解里有石膏滑石黃芩梔子連翹復有當歸芍藥以和血桔梗白朮甘草以調氣營衛皆和表裡俱暢故曰雙解本方名曰通聖散極言其用之妙也正考見中風門葛根橘皮湯葛根橘皮杏仁知母麻黃黃芩甘草冬月肌中斑爛咳而心悶者此方主之冬月腠理閉密故用麻黃以發表肌屬陽明故用葛根以解肌咳為肺氣不利故用橘皮杏仁以利氣悶為心膈有熱故用黃芩知母以清熱辛甘發散為陽故佐以甘草且調諸藥而和中也陽毒升麻湯升麻半兩生犀角鎊麝香黃芩炒人參甘草各二錢五分傷寒吐下後狂言面赤陽毒發斑者此方主之吐下後中氣必虛故用人參甘草以補中升麻犀角寒而不滯故為散斑之要藥佐以麝香利氣竅也佐以黃芩清陽毒也玄參升麻湯玄參升麻甘草各等分發斑咽痛者此方主之升麻能散斑甘草玄參能清咽散斑者取其辛溫謂辛能散而溫不滯也清咽者取其甘苦謂甘能緩可苦能降也消毒犀角飲子牛蒡子六錢荊芥二錢防風三錢甘草一錢皮膚有斑疹無里證者此方主之辛甘發散為陽故用防風甘草斑之為患熱藥治之則血溢而益盛寒藥治之則血凝而不散惟辛涼之藥為宜故用牛蒡荊芥無犀角而名犀角者謂其功用同乎犀角也升麻葛根湯升麻葛根白芍藥甘草麻疹已出未出此方皆主之諸疹未出升麻葛根能出之諸疹已出升麻葛根能散之芍藥和營甘草和衛消風散荊芥穗炙甘草陳皮厚朴薑湯炒藿香蟬蛻人參白殭蠶炒茯苓防風芎藭羌活風熱丹疹此方主之風熱則表實實者宜散之荊芥芎藭防風羌活皆辛散也表實則裡虛虛者宜補之人參甘草茯苓皆甘補也風盛則氣壅厚朴所以下氣陳藿所以泄氣風熱生痰治以殭蠶表熱留連治以蟬蛻化斑湯石膏人參知母甘草胃熱發斑脈虛者此方主之胃熱者口燥煩渴也胃主肌肉故胃熱則肌肉斑爛脈虛者壯火食氣而脈無力以充實也惟其胃熱故用石膏之寒惟其脈虛故用人參之補知母養其營甘草養其衛此方即人參白虎湯爾調中湯蒼朮一錢半陳皮砂仁藿香甘草芍藥炒桔梗半夏白芷枳殼炒羌活各一錢川芎麻黃桂枝各五分內外外感熱而成斑者此方主之內傷則裡熱外感則表熱兩熱而無泄故令斑爛外傷者調其中蒼陳砂藿半芍枳桔皆調中藥也外感者疏其表麻桂羌芎芷草皆疏表藥也表裡治而斑自愈矣大建中湯人參黃耆炙當歸芍藥酒炒桂心甘草炙半夏制黑附子制中氣不足無根失守之火出於肌表而成斑者此方主之此是汗吐下後之證中氣虛乏則餘邪無所歸附隱隱然見於肌表其色淡紅而不甚顯為辨也人參黃耆所以補中半夏甘草所以調中此皆健脾藥也復有當歸芍藥之活血則外溢之斑流而不滯有桂心附子之溫中則失位之火引而歸原此中營之幟一端而失伍之師各就其列也是方也以附桂參耆而治斑法之變者也醫而未至於可以權則不足以語此瘧門第十敘曰瘧之理難言矣知五運六氣十四經絡始能粗知其證知陰陽進退消長之理然後知夫瘧疾變遷之妙苟非精研斯道則所知者膚淺而已一有問難猶然袖手解頤今考名方十八首說證用藥可為初學之啓蒙也麻黃羌活湯麻黃去節羌活防風甘草各三錢瘧發時頭疼身熱脊強脈浮者名曰寒瘧此方主之寒熱一日一發間日一發三日一發皆名曰瘧此雲頭疼身熱脊強脈浮皆太陽證也太陽乃寒水所化故機要名為寒瘧麻黃羌活太陽經之汗藥也故以為君防風乃諸風藥之卒徒故以為佐甘草能和諸藥而兼解散故以為使是方乃攻實之劑若臨病用藥則血虛者宜加四物氣虛者宜加參術全在活法不徒執也白芷湯白芷二錢知母石膏各五錢瘧發時目痛鼻乾口渴自汗不得眠脈長有熱無寒或熱多寒少者名曰熱瘧此方主之此條皆陽明證也以其有熱而無寒或熱多而寒少故機要名為熱瘧白芷所以解陽明之經石膏所以清陽明之腑知母所以養陽明之陰虛者宜加人參質實便燥者此方不足與也宜下之用傷寒門大柴胡湯後以本方調之小柴胡湯柴胡去蘆黃芩炒人參甘草半夏法制生薑大棗瘧發時耳聾脅痛寒熱往來口苦喜嘔脈弦者名曰風瘧此方主之此條皆少陽證也以少陽為甲木在天為風故機要名為風瘧柴胡黃芩能和解少陽經之邪半夏生薑能散少陽經之嘔人參甘草能補中氣之虛補中所以防邪之入里也正考見傷寒門清脾飲青皮去穰炒厚朴薑湯炒白朮炒黃芩炒半夏制柴胡去蘆茯苓去皮草果甘草瘧發時熱多寒少口苦咽乾大小赤澀脈來弦數者此方主之此條皆太陰證也太陰脾主濕濕生痰痰生熱故見上件諸證脈來弦數弦為痰飲數為熱也方曰清脾者非清涼之謂乃攻去其邪而脾部為之一清也故青皮厚朴清去脾部之痰半夏茯苓清去脾中之濕柴胡黃芩清去脾中之熱白朮甘草清去脾臟之虛而草果仁又所以清膏粱之痰也劉宗厚先生因草果仁之溫熱而譏焉蓋未達嚴用和氏之清矣機要云瘧在三陰經總謂之濕瘧當從太陰經論之此言可謂知要今即古方審擇而用焉則本方為切當矣麻黃杏子甘草石膏湯麻黃去節四兩杏仁去皮尖五十枚甘草二兩石膏半斤傷寒例云若脈陰陽俱盛重感於寒者變為溫瘧溫瘧先熱後寒宜此方主之脈陰陽俱盛者舊有熱也重感於寒者新有寒也凡瘧寒熱相搏邪正分爭並於表則陽實而陰虛陰虛生內熱陽實生外熱中外皆熱故見其煩渴而身熱惡熱莫任也並於里則陰實而陽虛陽虛生外寒陰實生內寒中外皆寒故見其鼓頷而戰栗惡寒莫任也若其邪正分爭並之未盡則寒熱交集鼓頷戰栗煩渴身熱並至矣此論常瘧寒熱之理也溫瘧先熱後寒者以其先有舊熱而後傷寒也方中有麻黃杏仁可以解重感之寒有石膏甘草可以解舊有之熱仲景主白虎加桂枝湯亦良香薷湯香薷二兩白扁豆厚朴薑汁炒茯神各一兩炙甘草半兩瘧發時獨熱無寒者名曰疸瘧當責之暑宜此方主之暑陽邪也內經曰脈虛身熱得之傷暑又曰因於暑汗煩則喘喝靜則多言體若燔炭故獨熱無寒之瘧責其因於暑也香薷味薄而氣清能解表裡之暑扁豆味甘而性平能解腸胃之暑厚朴苦辛破暑飲也甘草性平解暑毒也易曰火就燥則暑邪中人先就於心茯神之用乃所以寧心耳或問風亦陽邪也疸瘧何以不責之風余曰風為少陽又為厥陰在六氣猶未純陽若臨證主方處治辛熱固不可用如辛涼發散之劑用之未為不可此在醫者潛心初不必泥於一方也七棗湯附子一枚鹽水煮去皮臍大棗七枚瘧發時獨寒無熱脈遲者名曰牝瘧當責之寒宜此方主之牝陰也王冰曰益火之原以消陰翳故獨寒無熱之瘧用附子之辛以主之佐以大棗七枚取其能和附熱且引之入至陰耳蜀漆散蜀漆燒去腥雲母燒二日夜龍骨煅各等分共為末於未發前漿水服下半錢此仲景治牝瘧之方也病原於頑痰癥瘕者此方主之牝陰也無陽之名頑痰乃至陰所化癥瘕乃凝結之陰故令人有寒無熱蜀漆雲母龍骨既經燒煉則味澀而辛熱味澀可以固既脫之陽辛熱可以消固結之陰仲景治火劫亡陽之證於桂枝湯去芍藥加蜀漆龍骨輩名曰救逆湯是二物之為純陽可知雲母燒二日夜則寒性亦去而純陽矣宜仲景之用之也補中益氣湯人參一錢升麻三分甘草一錢黃耆一錢五分陳皮去白當歸白朮柴胡各五分瘧疾經年不愈者名曰痎瘧宜此方主之痎老也經年不愈則氣血皆虛瘧邪深入矣氣虛則有參耆朮草以補氣血虛則有當歸以養血瘧邪深入則有柴胡升麻以升舉之邪氣可漸出之表也方內有陳皮可以消痰泄氣能助升柴而成功若瘧發於夜者丹溪所謂入陰分血分也宜於本方倍入當歸或兼四物可也正考見脾胃門互考見虛損門柴胡去半夏加栝蔞根湯柴胡八兩人參黃芩甘草各三兩栝蔞根四兩生薑二兩大棗十二枚瘧疾微勞不任經年不瘥前後復發者名曰勞瘧此方主之任事之勞責之筋力筋屬肝少陽膽則其腑也方中有柴胡黃芩可以清少陽之邪熱有栝蔞根可以生液養筋有人參甘草可以補虛祛勞有大棗生薑可以調榮益胃又曰參草薑棗胃家藥也能精於肝淫氣於筋惟胃能之故用此方以調勞瘧柴平湯柴胡人參半夏陳皮黃芩甘草厚朴蒼朮生薑大棗瘧發時一身盡痛手足沉重寒多熱少脈濡者名曰濕瘧此方主之上件皆濕證也故用小柴胡以和解表裡平胃散以健脾制濕二方合而為一故名曰柴平小柴胡湯正考見傷寒門平胃散正考見濕門紅丸子蓬莪朮京三稜醋煮一伏時各二兩胡椒一兩阿魏二分醋化青皮三兩共為末作丸礬紅為衣瘧疾口亡五味飲食腹痛膨脹者名曰食瘧此方主之食瘧者食積成瘧也內經曰留者攻之故用蓬朮三稜阿魏以攻積積之為患氣快則行氣滯則止得熱則行得寒則結故用青皮之辛以快氣胡椒之溫以散結復用礬紅為衣者假其土性以培脾胃云爾人參養胃湯人參茯苓甘草半夏陳皮蒼朮厚朴藿香烏梅草果瘧因飲食飢飽傷胃而成者名曰胃瘧此方主之內經曰陰之所生本在五味陰之五宮傷在五味故飢則胃氣弱而陰無所生飽則胃氣強而五宮因以損是飢飽皆足以傷胃也胃傷則營衛虛而穀氣乖乖則爭爭則邪正分寒熱作而成瘧矣方中有人參茯苓甘草之甘可以補胃之不足有陳皮蒼朮厚朴之辛可以平胃之有餘半夏之辛可使醒脾藿香之香可使開胃烏梅之酸可使收陰草果之溫可使消滯太無神朮散蒼朮泔浸厚朴姜炒各一兩陳皮三兩去白藿香石菖蒲甘草炙各一兩五錢瘧疾因感山嵐瘴氣發時乍寒乍熱一身沉重者名曰瘴瘧此方主之山嵐瘴氣穀氣也內經曰穀氣通於脾故此方主以治脾蒼朮厚朴平脾家之敦阜也陳皮甘草調脾家之虛實也藿香石蒲開脾家之障礙也經曰治病必求其本此之謂也正考見瘟疫門五神丸塞鼻法東方青黛五錢麝香二分西方白礬五錢白芷二錢南方官桂五錢硃砂一錢北方巴豆四十九粒去殼黑豆三十六粒中央硫黃五錢雄黃一錢上件各依方位以瓷盤盛之於五月初一日虔誠安於本家侍奉神前至初五日午時共研為末用五家粽角為丸如梧桐子大陰乾收貯聽用凡遇患瘧之人於瘧發之日清晨用綿包裹塞於鼻中男左女右用之瘧疾一歲之中長幼相似者名曰疫瘧此法主之神良疫者天地不正之氣也六位勝復之氣也禽蟲吐毒之氣也大氣之來無人不受壯者逸者居者則不病怯者勞者出者遇之則無形之氣由鼻而入藏於分肉之間與正氣分爭則成瘧矣是方也位按五方藥按五色氣按五氣味按五味月按五月日按五日粽用五家此醫流而兼陰陽家之識也故瘧邪入於肝則青黛之涼可以清肝麝香之臊可使直達瘧邪入於肺則白芷之辛可以瀉肺礬石之腥可以清燥瘧邪干於心則丹砂之重可以鎮心官桂之焦可以益火瘧邪干於腎則黑豆甘鹹可以益腎巴豆之腐可以瀉邪瘧邪干於脾則硫黃之溫可使建中雄黃之悍可使闢穢以疫氣無形由鼻而入故亦就鼻而塞之塞其一竅露其一竅者圍師必缺之道也修劑之期必於五者病原於陰陽不正之氣故亦以陰陽之理勝之蓋曰五者中宮甲己之數南面之政也諸氣之變雖有勝復亢制之殊要皆北面而臣守位秉命之道也故率以五數修劑焉三解湯麻黃去節柴胡去蘆澤瀉各三錢此治瘧之套劑也時行之瘧長幼相似者主之神良病有三在在表在裡在半表半裡也人在氣交之中鼻受無形之氣藏於分肉之間邪正分爭並於表則在表並於里則在裡未有所並則在半表半裡是方也麻黃之辛能散表邪由汗而泄澤瀉之咸能引里邪由溺而泄柴胡之溫能使半表半裡之邪由中以解則病之三在此方率治之矣雖然此方但可以瀉實耳虛者猶當辨其氣血而補之所謂虛者十補勿一瀉也截瘧七寶飲常山厚朴青皮陳皮甘草檳榔草果等分先期用水酒各一種煎熟以絲綿裹之露一宿於當發之早溫服瘧疾三四發後寸口脈來弦滑浮大者此方吐之三四發後可截之時也脈弦為飲滑為實浮為表大為陽故在可吐師云無痰不作瘧瘧痰為患常山善吐檳榔善墜草果善消厚朴青皮亦理氣行痰之要藥陳皮甘草乃消痰調胃之上材也是方也惟脈來浮大弦滑者可用若脈來沉澀細微者與之則逆矣慎之鱉甲煎丸鱉甲十三片蜂窠四分炙蜣螂炙柴胡各六分烏羽瞿麥桃仁乾薑各二分牡丹皮芍藥䗪蟲各五分赤硝十二分黃芩鼠婦炙桂枝石葦去毛厚朴紫盛阿膠炒大黃各三分葶藶熬半夏人參各一分上二十三味取煅灶下灰一斗清灑一斛五斗浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥煎為丸如梧子大空心服七丸日三瘧疾久不愈內結癥瘕欲成勞瘵者名曰瘧母此丸主之凡瘧疾寒熱皆是邪氣與正氣分爭久之不愈則邪正之氣結而不散按之有形名曰瘧母始雖邪正二氣及其固結之久則頑痰死血皆有之矣然其為患或在腸胃之中或薄腸胃之外不易攻去仲景公先取灰酒便是妙處蓋灰從火化能消萬物今人取十灰膏以作爛藥其性可知漬之以酒取其善行若鱉甲鼠婦䗪蟲蜣螂蜂窠者皆善攻結而有小毒以其為血氣之屬用之以攻血氣之凝結同氣相求功成易易耳乃柴胡厚朴半夏皆所以散結氣而桂枝丹皮桃仁皆所以破滯血水穀之氣結則大黃葶藶石葦瞿麥可以平之寒熱之氣交則乾薑黃芩可以調之人參者所以固元於克伐之場阿膠芍藥者所以養陰於峻厲之隊也烏羽赤硝紫盛隋唐醫哲皆不知之故以烏羽作烏扇赤硝更海藻紫盛更紫葳紫菀今詳四物亦皆攻頑散結之品更之未為不可然依舊本仍録烏羽赤硝紫盛者不欲遽然去之蓋曰愛禮存羊云爾痢門第十一敘曰始痢宜下夫人之所共知也久痢宜補亦夫人之所共知也至如二陽合病皆下痢太陽陽明合病自下痢者宜發汗太陽少陽合病自下痢者宜和解陽明少陽合病自下痢者宜攻裡非得傷寒之玄關者不足以語此也今考十方於後大都口耳之見而已芍藥湯加芒硝方白芍藥二錢當歸尾黃連黃芩各一錢木香不見火桂心檳榔甘草各五分大黃七分芒硝一錢痢疾便膿血裡急後重者此方主之痢滯下也患痢大都責於濕熱熱傷氣故下白熱傷血故下赤熱傷大腸則大腸燥澀故里急後重河間云行血則便膿自愈故用歸芍硝黃以行血和氣則後重自除故用木香檳榔甘草以和氣苦能堅腸寒能勝熱故用芩連厚腸胃而去熱有假其氣則無禁也故假桂心之辛熱為反佐桃仁承氣湯桃仁二十五枚去皮尖桂枝七分炒大黃五錢酒浸芒硝五錢甘草二錢痢疾初起質實者此方主之若初間失下反用固澀之藥以致邪熱內蓄血不得行腹痛欲死者急以此方主之內經曰通因通用又曰暴者奪之故用大黃芒硝之鹹寒以蕩滌邪熱用桃仁之苦以逐敗血甘草之甘以調胃氣乃桂枝則辛熱物也用之者何經曰微者逆之甚者從之故用其引大黃芒硝直達瘀熱之巢穴乃嚮導之兵也清六丸滑石六兩甘草一兩紅曲五錢血痢者此方主之滑石能清六腑之熱甘草能調六腑之氣紅曲能和六腑之血溫六丸滑石六兩甘草一兩乾薑五錢薑汁為丸白痢者此方主之白痢為寒中世之謬論也劉守真氏出始以白痢責之熱傷氣可謂開發群曚是方也滑石寒而淡寒則能除六腑之熱淡則能利六腑之濕甘草得天地衝和之氣故性平而調六腑乾薑得天地正義之氣故入氣而闢濕邪又曰乾薑性溫可使從治經曰佐以所利是故用之香連丸黃連二十兩吳茱萸湯潤過炒木香四兩八錢不見火治噤口痢加石蓮肉八兩下痢赤白相雜裡急後重者此方主之黃連苦而燥若能勝熱燥能勝濕木香辛而苦辛能開滯苦能瀉實石蓮肉味苦而厚為陰中之陰故能破噤口痢之結熱經曰有餘者折之此之謂也木香檳榔丸木香檳榔青皮去穰炒陳皮去白枳殼去穰麩炒黃柏炒醜末莪朮醋煮三稜醋煮當歸酒洗香附黃芩酒炒大黃酒浸黃連吳茱萸湯潤過炒水丸梧子大每服五六十丸痢疾初作裡急後重腸胃中有積滯者此丸主之內經曰濕淫所勝平以苦熱故用木香熱者寒之故用黃連黃芩黃柏抑者散之故用青陳香附強者瀉之故用大黃醜末逸者行之故用檳榔枳殼留者攻之故用莪朮三稜燥者濡之故用當歸是方也惟質實者堪與之虛者非所宜也故曰虛者十補勿一瀉之敗毒散羌活獨活柴胡前胡川芎人參茯苓枳殼桔梗甘草等分痢疾表熱裡虛者此方主之皮膚受外感之邪則表實而裡虛表實則發熱故用羌活獨活柴胡前胡川芎以解表裡虛則痢不禁故用人參甘草茯苓以補里桔梗可以理氣枳殼可以破滯昔人立此方非以治痢而醫者善用則取之左右逢其源矣仲景以葛根湯治太陽陽明合病自痢亦是妙處舉此一例余可類推清暑益氣湯人參去蘆白朮炒陳皮去白神麯炒澤瀉各五分黃耆炙蒼朮制升麻各一錢麥門冬去心當歸酒洗黃柏炒甘草炙各二分五味子九粒青皮麩炒乾葛各二分痢疾已愈元氣虛弱暑令尚在者此方主之痢疾已愈則不當用行血理氣之物矣中氣虛弱理宜補之參耆歸朮甘草皆補虛也暑令尚在法宜清之麥冬五味皆清藥也黃柏澤瀉可以養陰水升麻乾葛可以散暑邪青陳蒼曲可以消滯氣正考見暑門十全大補湯人參白朮炒白芍藥炒茯苓去皮黃耆炙當歸甘草炙熟地黃川芎各一錢桂心二分痢疾已愈氣血大虛者此方主之大虛者必大補故用人參黃耆白朮茯苓甘草以補氣用當歸川芎芍藥地黃桂心以補血真人養臟湯人參白朮炒白芍藥炒肉桂炒訶子麵裹煨粟殼甘草炒木香不見火肉豆蔻麵裹煨下痢日久赤白已盡虛寒脫肛者此方主之甘可以補虛故用人參白朮甘草溫可以養臟故用肉桂豆蔻木香酸可以收斂故用芍藥澀可以固脫故用粟殼訶子是方也但可以治虛寒氣弱之脫肛耳若大便燥結努力脫肛者則屬熱而非寒矣此方不中與也與之則病益甚泄瀉門第十二敘曰泄瀉似乎易識一遇盤根錯節良手猶難之所以然者脾為萬物之母泄瀉能壞人之母氣故也今考名方十五首用之者宜變通焉白朮茯苓湯白朮土炒白茯苓去皮各七錢五分脾胃虛弱不能剋制水穀濕盛作瀉者此方主之脾胃者土也土虛則不能四布津液水穀常留於胃而生濕矣經曰濕盛則濡瀉故知水瀉之疾原於濕也白朮甘溫而燥甘則入脾燥則勝濕茯苓甘溫而淡溫則益脾淡則滲濕土旺濕衰瀉斯止矣戴氏云水瀉腹不痛者為濕痛者為食積河間云瀉而水穀變色者為熱水穀不變色澄徹清冷者為寒皆妙論也若肛門燥澀小便黃赤則水穀雖不變猶為熱也此由火性急速食下即出無容變化仲景所謂邪熱不殺穀是也茲在臨證精察而加藥物之所宜者爾胃苓湯蒼朮厚朴陳皮甘草白朮茯苓豬苓澤瀉桂此方亦治濕盛泄瀉者也蒼朮厚朴陳皮甘草平胃散也所以燥濕白朮茯苓豬苓澤瀉桂五苓散也所以利濕脾胃強健者宜主此方怯弱者宜主前方白朮茯苓湯平胃散正考見濕門五苓散正考見傷寒門益黃散丁香麵煨木香青皮炒陳皮訶子麵裹微煨胃寒泄瀉脈遲者此方主之腸胃熱則大便燥結腸胃寒則洞泄不禁大都然也脈遲驗其為寒是方也二香之辛熱所以溫中二皮之辛利所以快脾訶子之固澀所以止瀉升陽除濕防風湯蒼朮四錢制防風二錢白朮茯苓芍藥各一錢泄瀉頭痛者此方主之陽陷於下則成飧泄濕犯於上則令頭痛此清濁倒置而然也風能勝濕故用防風燥能制濕故用二術淡能利濕故用茯苓土病木乘故用芍藥又曰久風入中則為腸風飧泄故用防風伐肝疏脾非酸不可故用芍藥錢氏白朮散人參白朮茯苓甘草木香藿香乾葛脾虛肌熱泄瀉者此方主之脾虛者補之以甘故用人參白朮茯苓甘草肌熱者療之以清故解以葛根脾困者醒之以香故佐以藿木戊己丸黃連十兩吳茱萸泡白芍藥炒各二兩脾胃熱瀉不止者此方主之熱瀉者糞色黃褐肛門斂澀也苦從火化火能生土故用黃連厚腸胃而益土臊酸從木化木能疏土故茱萸辛燥能疏亢盛之肝芍藥味酸能瀉土中之木戊為胃土己為脾土用是方以調脾胃故曰戊己丸訶黎勒散訶子仁肉豆蔻麵裹煨青皮各四兩附子一兩肉桂五錢腸胃虛寒滑泄腹痛者此方主之虛寒者中氣虛而生內寒也滑泄者土虛不足以防水也腹痛者濕淫而木氣抑也寒者溫之故用附子肉桂滑者澀之故用訶子肉蔻抑者疏之故用青皮漿水散半夏一斤制甘草炙附子肉桂乾薑各五錢良薑二錢五分每服三錢水瀉澄徹清冷者此方主之漿水者瀉利漿水而澄徹也河間云水液澄徹清冷皆屬於寒寒者溫之故是方率用辛溫之劑析而論之半夏炙草可使健脾脾健則能防水矣乾薑附子可使回陽陽回則氣上升矣良薑肉桂可使化氣氣化則能泌別清濁矣劉草窗痛瀉要方炒白朮三兩炒芍藥二兩防風一兩炒陳皮一兩半痛瀉不止者此方主之瀉責之脾痛責之肝肝責之實脾責之虛脾虛肝實故令痛瀉是方也炒術所以健脾炒芍所以瀉肝炒陳所以醒脾防風所以散肝或問痛瀉何以不責之傷食余曰傷食腹痛得瀉便減今瀉而痛不止故責之土敗木賊也五味子散五味子二兩炒香吳茱萸五錢炒共為末每服二錢腎虛子後泄瀉者此方主之腎主二便開竅於二陰受時於亥子腎臟虛衰故令子後常作泄瀉五味子有酸收固澀之性炒香則益腸胃吳茱萸有溫中暖下之能炒焦則益命門命門火旺可以生土土生則泄瀉自止酸收固澀可以生津津生則腎液不虛椒附丸椒紅炒桑螵蛸炙龍骨火煅存性山茱萸炒附子炮鹿茸酒蒸焙腎臟虛寒大便滑瀉者此方主之虛者腎精不足也寒者命門火衰也腎主二便腎臟虛寒則不能禁固故令大便滑瀉味厚為陰中之陰故用山茱萸鹿茸以益腎家之陰辛熱為陽中之陽故用椒紅附子以壯命門之火味澀可以固脫故用螵蛸龍骨以治滑瀉之脫二神丸破故紙四兩炒肉豆蔻二兩煨棗肉為丸脾腎二臟俱虛泄瀉不止者此方主之脾主水穀腎主二便脾弱則不能消磨水穀腎虛則不能禁固二便故令泄瀉不止肉豆蔻辛溫而澀溫能益脾澀能止瀉破故紙味辛而溫辛則散邪溫則暖腎脾腎不虛不寒則泄瀉止矣補中益氣湯去當歸方人參甘草炙各一錢升麻三分黃耆炙一錢五分白朮炒陳皮去白柴胡各五分滑瀉痞悶者此方主之內經曰清氣在下則生飧泄濁氣在上則生䐜脹病由中氣不足而不能升清降濁故耳是方也有人參黃耆甘草白朮所以補中有陳皮所以利氣有柴胡升麻所以升舉陷下之陽清陽升則濁陰自降濁降則痞悶自除清升則飧泄自止去當歸者惡其滑利而非飧泄所宜也若西北高燥之區則不必去矣青州白丸子半夏七兩南星白附子各三兩川烏去皮臍五錢共為末水中浸數日為丸痰積滑泄不止者此方主之肥人滑泄責之痰脈滑不調責之痰不食不飢責之痰昔肥今瘦責之痰痰之為物濕土所化故用半夏南星以燥之白附微溫能治風痰川烏辛熱能攻痰積木香豆蔻丸青木香肉豆蔻棗肉為丸每下梧子大二十丸稽神録云江南司農少卿崔萬安常苦脾泄困甚家人為之禱於後土祠萬安夢一婦人簪珥珠履授以此方如其言服之而愈昆謂青木香能伐肝肉豆蔻能溫中棗肉能健脾久泄脾虛中氣必寒肝木必乘其虛而剋制之此方之用宜其效也祕結門第十三敘曰祕結燥證也然有火燥有風燥有水竭之燥有血虛之燥從容養血清燥為上手急遽攻下通腸為下手今考方藥六條古人之醫法見矣潤腸丸即脾約丸麻仁十兩入百沸湯內泡浸一宿次日曝乾礱之粒粒皆完大黃四兩酒蒸杏仁一兩二錢去皮尖炒芍藥酒炒枳實麩炒厚朴薑汁炒各三兩胃強脾弱不能四布津液濡潤大腸後便燥結者此方主之潤可以去燥麻仁杏仁芍藥是也苦可以勝燥枳實厚朴大黃是也潤燥湯熟地黃當歸梢大黃酒浸煨桃仁去皮尖生甘草麻仁各一錢紅花五分生地黃升麻各二分大腸燥結便出堅黑者此方主之大腸得血則潤亡血則燥故用熟地當歸以養血初燥動血久燥血瘀故用桃仁紅花以去瘀麻仁所以潤腸大黃所以通燥血熱則涼以生地黃氣熱則涼以生甘草微入升麻消風熱也通幽湯生地黃熟地黃當歸梢大黃酒浸煨桃仁泥紅花升麻結燥腹痛者此方主之此即前方潤燥湯去生甘草麻仁也胃之下口名曰幽門此方服之可以通其留滯故曰通幽大便燥結升降不通故令腹痛燥者濡之生地熟地皆濡物也逸者行之大黃歸梢皆行物也留者攻之桃仁紅花皆攻物也抑者散之升麻之用散抑鬱也大補丸黃柏一味炒褐色為末作丸大便燥結睡中口渴者此方主之腎主五液腎水一虧則五液皆涸故上見口渴下見燥結也黃柏味苦而厚質潤而濡為陰中之陰故能滋少陰補腎水此經所謂燥者濡之又謂之滋其化源也他如六味地黃丸虎潛丸皆益腎之藥均可選用二方見虛損門玄明粉散玄明粉三錢當歸尾五錢煎湯調服血熱便祕者此方主之玄明粉鹹寒取其軟堅當歸尾辛利取其破血此攻下之劑也宜量人之虛實而用之導法燥在廣腸欲其速出氣弱不能傳送而出者宜用蜜煎導法或豬膽導法二法皆見傷寒門霍亂門第十四敘曰霍亂有陰陽二證夫人共知之若霍亂未顯之時及霍亂始定之際醫者不察而以逆劑左之病者不識而以膩食啖之則死道也今考古方八首以治霍亂大都喜通而惡塞爾理中丸人參白朮炒乾薑炒甘草炙各二兩共為末蜜丸如雞黃大每服一丸沸湯和下寒犯太陰腹痛吐瀉霍亂寒多不飲水者此方主之寒犯太陰脾臟非止外感寒徑中太陰凡吞寒飲冷皆是寒氣塞於中宮中下二焦之陽不得宣發則乖隔而腹痛而吐瀉而霍亂也霍亂與吐瀉有別乃吐瀉之久亡其津液手足抽掣而揮霍眼目旋視而了亂也寒者溫之故用乾薑之辛熱邪之湊也其氣必虛故用人參白朮甘草之溫補五苓散茯苓豬苓白朮各十八銖澤瀉一兩六銖桂半兩霍亂熱多欲飲水者陽邪也此方主之邪在上焦則吐邪在下焦則瀉邪在中焦則既吐且瀉名曰霍亂霍亂責之裡邪里邪責之水穀是方也桂能建中術能安穀茯苓豬苓澤瀉能安水水穀得其安則霍亂自止矣此五苓治霍亂之意也正考見傷寒門回生散陳皮去白藿香各五錢為末中氣不和吐瀉霍亂者此方主之中氣者脾氣也喜疏利而惡閉塞喜香竄而惡腐穢故用陳皮之辛以醒之藿香之竄以開之冷香飲子草果仁三兩附子一兩橘紅一兩甘草五錢姜煎冷服夏月飲食雜以水果寒冰之物食之胸腹大痛霍亂者此方主之肉食得冰寒水果而冷冰寒水果因肉食而滯由是填塞至陰乖隔而成霍亂草果辛溫善消肉食附子辛熱能散沉寒橘紅之辛可調中氣甘草之溫堪以益脾而必冷服者假其冷以從治內經所謂必伏其所主而先其所因也華他危病方吳茱萸木瓜食鹽各一錢夏月過用水果填塞至陰抑遏肝氣霍亂轉筋者此方主之水果得食鹽則收斂而不為患肝部得茱萸則疏利而不為抑轉筋得木瓜則筋舒而不復痛六和湯砂仁半夏杏仁人參甘草各一兩厚朴木瓜藿香白朮白扁豆赤茯苓各二兩夏月飲食後六腑不和霍亂轉筋者此方主之六和者和六腑也食飲為患和以砂仁夾涎吐逆和以半夏膈氣不利和以杏仁胃虛不調和以參術中氣不快和以藿香伏暑傷脾和以扁朴轉筋為患和以木瓜三焦蓄熱和以赤苓氣逆急吐和以甘草正考見暑門藿香正氣散藿香三錢白朮炒厚朴薑湯炒茯苓紫蘇半夏制大腹皮淨洗桔梗陳皮去白甘草炙白芷各一錢內傷外感而成霍亂者此方主之內傷者調其中藿香白朮茯苓陳皮甘草半夏厚朴桔梗大腹皮皆調中藥也調中則能正氣於內矣外感者疏其表紫蘇白芷疏表藥也疏表則能正氣於外矣若使表無風寒二物亦能發越脾氣故曰正氣三因吐法燒鹽十兩熱飲十五升三飲而三吐之欲吐不得吐欲瀉不得瀉腹中大痛者名曰乾霍亂令人暴死急以此方探吐之鹽咸物也多則苦矣經曰咸能軟堅故可以開宿食頑痰苦能湧泄故探之則易吐矣此法能回生起死幸勿輕而忽之痰門第十五敘曰痰證顯於外夫人之所易知也痰涎隱於內而怪證百出夫人之所難知也顯於外者只依常法調理而治隱於內者非控涎丹神祐丸與夫倒倉之法不能空其巢穴也今考古方十一首以治痰變而通之在乎人耳二陳湯半夏制陳皮去白茯苓去皮各一錢五分甘草炙七分濕痰為患此方主之濕痰者痰之原生於濕也水飲入胃無非濕化脾弱不能剋制停於膈間中下二焦之氣熏蒸稠黏稀則曰飲稠則曰痰痰生於濕故曰濕痰也是方也半夏辛熱能燥濕茯苓甘淡能滲濕濕去則痰無由以生所謂治病必求其本也陳皮辛溫能利氣甘草甘平能益脾益脾則土足以制濕利氣則痰無能留滯益脾治其本利氣治其標也又曰有痰而渴半夏非宜宜去半夏之燥而易貝母栝蔞之潤余曰尤有訣焉渴而喜飲水者宜易之渴而不能飲水者雖渴猶宜半夏也此濕為本熱為標故見口渴所謂濕極而兼勝已之化實非真象也惟明者知之氣弱加人參白朮名六君子湯千緡湯半夏七枚皂角一寸炙甘草一寸炙痰涎上湧喉中有聲不渴者此方主之萹濕土生痰故用半夏以燥濕氣塞則痰滯故用皂角以利氣肺苦氣上逆故用甘草以緩急又甘草能益脾皂角能去垢半夏能破逆曰千緡者重其效也導痰湯半夏四物錢制陳皮去白枳殼麩炒膽南星赤茯苓炙甘草各一錢風痰湧盛者此方主之風痰者濕土生痰痰生熱熱生風也半夏陳皮茯苓甘草前之二陳湯耳加南星以治風痰入枳殼去痰如倒壁九蒸蒼朮散蒼朮一味九蒸九曬為極細末每服漿水調下一錢濕痰腹痛者此方主之濕痰腹痛是土實也經曰土欲實木當平之蒼朮九蒸九曬則其氣輕清而薄風木勝濕之品也故治濕痰腹痛神良三子養親湯紫蘇子沉水者白芥子蘿蔔子各三錢年高痰盛氣實者此方主之痰不自動也因氣而動故氣上則痰上氣下則痰下氣行則痰行氣滯則痰滯是方也卜子能耗氣蘇子能降氣芥子能利氣氣耗則邪不實氣降則痰不逆氣利則膈自寬奚痰患之有飛霞子此方為人子事親者設也雖然治痰先理氣此治標之論耳終不若二陳有健脾去濕治本之妙也但氣實之證則養親湯亦徑捷之方矣潤下丸陳皮一斤去白鹽水洗甘草二兩炙共為末所丸上而痰吐下而痰瀉此方皆良陳皮有消痰泄氣之功食鹽具咸能潤下之性甘草有和藥調中之妙炙之有健脾益胃之能丹溪翁微加星夏者燥其生痰之源微加芩連者撲其動痰之焰順氣消食化痰丸製半夏膽南星各三斤神麯炒杏仁去皮尖陳皮去白蘿蔔子生用葛根山楂肉炒青皮去穰炒蘇子沉水者香附制麥芽各一兩飲食生痰胸膈膨悶者此方主之星夏之辛能燥濕痰葛根之清能解酒熱山楂麥芽神麯之消能療飲食之痰青皮陳皮蘇子杏仁卜子香附之利能行氣滯之痰痰去則胸膈之膨悶亦去矣青州白丸子半夏七兩南星白附子各三兩川烏去皮臍五錢共為末浸水數日為丸濕痰作眩者此方主之痰之生也由於濕故用半夏南星之燥痰之滯也本於寒故用烏頭白附之溫浸以數日殺其毒也清氣化痰丸陳皮去白杏仁去皮尖枳實麩炒黃芩酒炒栝蔞仁去油茯苓各一兩膽南星製半夏各一兩半薑汁為丸此痰火通用之方也氣之不清痰之故也能治其痰則氣清矣是方也星夏所以燥痰濕杏陳所以利痰滯枳實所以攻痰積黃芩所以消痰熱茯苓之用滲痰濕也若栝蔞者則下氣利痰云爾指迷茯苓丸半夏二兩制茯苓一兩風化硝二錢五分枳殼五錢薑汁糊丸中脘停痰伏飲者此方主之半夏燥濕茯苓滲濕濕去則飲不生枳殼削堅化硝軟堅堅去則痰不固滾痰丸大黃酒蒸黃芩去朽各半斤礞石硝煅黃金色一兩沉香五錢共為丸實熱老痰此方主之大黃能推蕩黃芩能去熱沉香能下氣礞石能墜痰是方乃攻擊之劑必有實熱者始可用之若與虛寒之人則非宜矣又礞石由焰硝煅煉必陳久為妙若新煅火毒未除則不宜服控涎丹甘遂去心紫大戟去皮真白芥子各等分痰涎在心膈上下使人胸背手足頸項腰膝引痛手足冷痹氣脈不通者此方主之甘遂直達涎結之處大戟能攻胸脅之涎芥子能散支痛之飲此攻痰之厲劑也又曰驚痰加硃砂痛者加全蠍酒痰加雄黃全蠍驚氣成塊者加穿山甲鱉甲玄胡索蓬莪朮臂痛加木鱉霜桂心痰熱加盆硝寒痰加丁香胡椒肉桂因其病證而藥加焉兵政之便宜也三花神祐丸甘遂麵裹煨大戟拌濕炒芫花各半兩炒輕粉一分大黃一兩黑醜二兩取頭末前藥為末滴水為丸如小豆大初服五丸每服加五丸溫水下日三服以利為度服後痞悶極甚者此痰涎壅塞頓攻不開轉加痛悶即初服三丸每加二丸至快利即止痰飲變生諸病風熱鬱燥肢體麻痹走注疼痛痰嗽氣血壅滯不得宣通人壯氣實者此方主之甘遂能達痰涎窠匿之處大戟芫花能下十二經之飲黑醜亦逐飲之物大黃乃推蕩之劑佐以輕粉者取其無竅不入且逐風痰積熱而解諸藥之辛烈耳此大毒類聚為丸善用之則能定禍亂於升平不善用之則虛人真氣慎之哮喘門第十六敘曰膈有膠固之痰外有非時之感內有壅塞之氣然後令人哮喘能溫之汗之吐之皆是良法若逡巡調理則虛喘宜之人而羸瘦氣弱則宜灸其背腧今考古方七首而哮喘之大目可知矣麻黃湯麻黃去節三錢桂枝洗淨二錢杏仁去皮尖七枚甘草一錢肺部原有風痰背腧復感寒邪而成哮喘者此方主之背腧者背間之腧穴主輸臟氣者也一受風寒則臟氣為寒邪所閉不得宣越故作哮喘麻黃之辛能開腠散寒桂枝之溫能解肌疏表杏仁微辛入肺利氣甘草甘平調中發散瓜蒂散甜瓜蒂七枚為末大豆煎湯調下五分凡病齁䶎氣塞不通者此方三吐之苦能湧泄故用瓜蒂以吐之甘能調胃故用大豆以和之定喘湯白果二十一枚炒黃色黃芩炒杏仁去皮尖各一錢五分桑白皮五錢蜜炙蘇子二錢甘草一錢麻黃去節半夏法制款冬花各三錢肺虛感寒氣逆膈熱作哮喘者此方主之聲粗者為哮外感有餘之疾也宜用表藥氣促者為喘肺虛不足之證也宜用里藥寒束於表陽氣不得泄越故上逆氣並於膈為陽中之陽故令熱是方也麻黃杏仁甘草辛甘發散之物也可以疏表而定哮白果款花桑皮清金保肺之物也可以安里而定喘蘇子能降氣半夏能散逆黃芩能去熱五味子湯五味子半兩炒人參去蘆麥門冬去心杏仁去皮尖陳皮去白生薑各二錢肺虛作喘脈大者此方主之喘則氣耗五味子所以收之虛則喘促人參所以補之肺喜潤故用麥冬杏仁氣喜利故用陳皮生薑附子理中湯人參甘草炙附子制乾薑炒白朮炒各一錢脾肺虛寒痰涎壅塞少有動作喘嗽頻促脈來遲細者此方主之此證為虛而脈為寒也虛則宜補參朮甘草所以補虛寒則宜溫乾薑附子所以溫寒六君子湯人參白朮茯苓甘草半夏陳皮氣虛痰喘者此方主之氣壯則痰行氣虛則痰滯痰遮氣道故令人喘甘者可以補氣參苓朮草皆甘物也辛者可以治痰半夏陳皮皆辛物也用甘則氣不虛用辛則痰不滯氣利痰行胡喘之有或惡人參之補而去之此不知虛實之妙者也久喘良方用青皮一枚展開去穰入江子一個將麻線系定火上燒盡煙留性為末生薑汁和酒一杯呷服之名醫録云李翰林天台人有莫生患喘病求醫李云病日久矣我與治之乃用前方過口便定實神方也昆謂久喘者肺分有頑痰結氣青皮能破氣江子能攻痰然其性悍厲善於走下耳未可以療上部也今用燒灰存性則大毒已去所存者幾希耳新燒火性炎上可使成功於膈佐之以薑汁則頑痰易利行之以酒則無所不之薑酒既行二物善降久喘之患可使愈於一旦非良方而何咳嗽門第十七敘曰新咳易愈久咳難愈所以難愈者病邪傳變而深入也經曰五臟六腑皆令人咳非獨肺也是受邪之原亦多矣豈可以易與乎今考十五方率舉其大耳至於諸邪雜揉則輕重標本在人心權度而已烏能編簡盡耶消風百解散荊芥麻黃去節陳皮去白蒼朮泔浸七日白芷甘草等分傷風咳嗽者此方主之有頭疼發熱鼻寒聲重者傷風咳嗽也傷風宜解肌咳嗽宜利氣荊芥白芷麻黃可以解肌陳皮蒼朮甘草可以利氣經曰辛甘發散為陽夫六物皆辛甘則皆解散矣然能解散便能利氣能利氣便能解散其理恆相通者也金沸草散前胡旋覆花各一兩赤芍藥炒甘草各一錢半夏五錢制荊芥穗一兩半赤茯苓六錢半因風咳嗽生痰者此方主之風盛則氣壅氣壅則痰上痰上則咳嗽前胡旋覆治風而兼行痰荊芥甘草消風而兼利氣半夏治痰兼破氣逆赤芍調榮兼能制急茯苓用赤入丙丁也五苓散茯苓豬苓澤瀉白朮桂心水寒射肺而成咳者此方主之上焦有火渴飲涼水水為火格不得潤下停留於膈水寒射肺故令人咳淡足以滲水故用茯苓豬苓澤瀉白朮辛溫足以散寒故用桂心向非水寒為患則五苓非所宜矣有表證者以傷寒門小青龍湯主之丁香半夏丸檳榔三錢細辛乾薑炒人參各五錢丁香半夏各一兩脾胃虛寒痰飲積於胸膈之間令人咳嗽者此方主之脾胃溫暖則能運行痰飲脾胃虛寒則痰飲停於胸膈肺氣因之不利乃作咳嗽咳是有聲嗽是有痰有聲有痰名曰咳嗽經曰治病必求其本證本於脾胃虛寒則脾胃為本咳嗽為標故半夏之辛所以燥脾人參之甘所以養胃脾胃治則不虛丁姜之溫所以行痰細辛之辛所以散飲辛溫用則不寒不虛不寒則脾胃治而痰飲散咳嗽止矣用檳榔者取其性重可以墜痰經所謂高者抑之是也人參蛤蚧散人參二兩真蛤蚧一對全者河水浸五日每換水洗炙黃杏仁去皮尖甘草各五兩茯苓知母炒桑白皮蜜炙貝母各二兩二三年肺氣上喘咳嗽膿血滿面生瘡者此方主之二三年肺氣上喘則病久而肺損矣咳嗽出膿者氣病出血者脈病也面為清陽之分六陽之氣皆會於面其氣常實不易受邪今滿面生瘡此正氣衰而邪氣盛乃小人道長君子道消之象也是方也人參益氣蛤蚧補真杏仁利氣二母清金桑皮瀉喘若甘草茯苓乃調脾而益金之母也又曰蛤蚧為血氣之屬能排血氣之毒故此方用之調膿理血亦假其性而伏奇於正也補肺湯人參黃耆蜜炙川五味炒紫菀洗去土各一兩桑白皮蜜炙熟地黃各二兩咳嗽肺虛者此方主之參耆脾胃藥也肺虛而益脾胃乃虛則補其母也地黃滋腎藥也肺虛而益腎恐其失養而盜氣於母也五味子酸收藥也咳多必失氣故用酸以收之紫菀涼肺中之血桑皮清肺中之氣所謂隨其實而瀉也益其所利去其所害則肺受益故曰補肺犀角地黃湯生犀角鎊牡丹皮各二錢五分白芍藥二錢生地黃一兩五錢心移熱於肺而咳嗽出血者此方主之心火也肺金也火者金之畏心移熱於肺乃咳嗽見火證如吐血面赤是也名曰賊邪甚是難治是方也生犀能解心熱生地能涼心血丹皮芍藥性寒而酸寒則勝熱酸則入肝用之者以木能生火故使二物入肝而瀉肝此拔本塞源之治也當歸龍薈丸當歸酒洗梔子炒黑龍膽草酒洗黃連炒黃柏炒黃芩各一兩木香一錢麝香五分大黃酒浸青黛水飛蘆薈各半兩煉蜜丸之肝移熱於肺而咳嗽者此方主之咳嗽而兩肋痛多怒脈弦者病原於肝也肝者將軍之官氣常有餘氣有餘便是火故宜瀉之是方也芩連梔柏草龍青黛大黃皆能瀉火而未必入肝肝氣臊諸藥得蘆薈麝香之臊同氣相求可以入肝而平肝矣然肝木為生火之本而諸臟之火不無相扇諸藥雖因蘆薈麝香之引而入肝然其性各有所屬則能兼五火而治之矣用當歸為君者以其能和五臟之陰以木香為佐者以其能行諸藥之滯也正考見火門左金丸黃連六兩吳茱萸一兩湯泡肝熱左脅痛咳嗽此方主之左金者黃連瀉去心火則肺金無畏得以行金令於左以平肝故曰左金吳茱萸氣臊味辛性熱故用之以為反佐此方君一臣一制小其服者肝邪未盛也前方證邪盛矣故用龍薈諸藥以平之彼之為患滋甚自不得不用夫大隊之兵也六味地黃丸熟地黃八兩山藥山茱萸各四兩淨肉牡丹皮澤瀉白茯苓各三兩腎虛移熱於肺咳嗽者此方主之有足心熱內股熱腰痛兩尺脈虛大者病原於腎虛也熟地黃山茱萸味厚者也味厚為陰中之陰故能益腎腎者水臟虛則水邪歸之故用山藥茯苓以利水邪水邪歸之則生濕熱故用澤瀉丹皮以導坎中之熱滋其陰血去其熱邪則精日生而腎不虛病根既去咳嗽自寧矣正考見虛損門順氣消食化痰丸製半夏膽南星各一斤陳皮去白香附制蘇子沉水者青皮去穰炒神麯炒蘿蔔子生用棠球肉炒麥糵炒杏仁去皮尖葛根各一兩酒食生痰五更咳嗽胸膈膨悶者此方主之痰之原生於濕故用半夏南星以燥之痰之滯原於氣故用香附以開之杏仁以利之青皮陳皮以快之蘇子卜子以降之食痰原於酒食故用葛根以解酒神麯麥糵棠球以磨食瓊玉膏生地黃四斤白茯苓十三兩人參六兩白蜜二斤四共熬膏乾咳嗽者此方主之乾咳嗽者有聲無痰之名也火乘於肺喉嚨淫淫而癢故令有聲病原於脾者有痰病不由脾故無痰也易曰燥萬物者莫熯乎火相火一熯則五液皆涸此乾咳之理也生地黃能滋陰降火白蜜能潤肺生津損其肺者益其氣故用人參虛則補其母故用茯苓又地黃白蜜皆潤銖兩又多茯苓甘而屬土用之以佐二物此水位之下土氣乘之之義乃立方之道也他如火門阿膠散主此證亦良潤肺湯訶子五味子五倍子黃芩甘草咳而失聲音此方主之咳而失聲危證也有肺絶之兆酸者能收澀者能固三子酸而澀則能收其肺氣而固其脫矣故此方用之黃芩能清肺熱甘草能調肺氣此方乃劫嗽之劑也劫嗽丸訶子仁百藥煎荊芥穗等分共為末蜜丸噙化久咳失氣此藥亦宜用之新咳者不宜用也內經曰薄之劫之薄者雷風相薄之薄藥病摩蕩之名也劫者曹沫劫盟之劫取之不以正也久咳失氣不用補劑而用訶子藥煎之澀肺有火邪不用潤劑而用荊芥穗之辛故曰劫也粉黛散蚌粉新瓦炒紅青黛少許用淡齏水滴麻油數點調服綬帶李防禦京師人初為入內醫官值嬪御閣妃苦痰嗽終夕不寐面浮如盤時方有甚寵徽宗幸其閣見之以為慮馳遣呼李先數用藥弗應詔令往內東門供狀若三日不效當誅李憂技窮與妻對泣忽聞門外叫云咳嗽藥一文錢一帖吃了今夜得睡李使人市藥十帖其色淺碧用淡齏水滴麻油數點調服李疑草藥性厲並三為一自試之既而無他於是取三帖合為一攜入禁庭授妃請分兩服以餌是夕嗽止比曉面腫亦消內侍走白天顏絶喜錫金帛厥值萬緡李雖幸其安而念必宣索方書何辭以對殆亦死爾命僕侍賣藥人過邀入坐飲以巨盅語之曰我見鄰里服嗽藥多效意欲得方倘以傳我諸物為銀百兩皆以相贈不吝曰一文藥安得其值如此防禦要得方當便奉告只蚌粉一物新瓦炒令通紅拌青黛少許耳扣其所從來曰壯而從軍老而停汰頃見主帥有此故剽得之以其易辦姑藉以度餘生無他長也李給之終身焉昆謂蚌粉咸而枯能軟堅痰而燥濕青黛寒而苦能清肺膈而除熱齏汁酸鹹亦以軟痰麻油之加欲其就火而為嚮導之驅爾
