body:
  text: 卷六蟲門第六十五敘曰為國者必欲去夫蠹國之小人故為醫者必欲去夫蠹身之𧈟蝕身國不同理相須也因著六考以療蟲君子用之庶幾乎保安之一策也化蟲丸鶴蝨去土胡粉炒苦楝根東引不出土者檳榔各一兩蕪荑使君子各五分白礬枯二錢五分量人大小服一歲兒可五分腸胃中諸蟲為患此方主之經曰腸胃為市故無物不包無物不容而所以生化諸蟲者猶腐草為螢之意乃濕熱之所生也是方也鶴蝨檳榔苦楝根胡粉白礬蕪荑使君子皆殺蟲之品古方率單劑行之近代類聚而為丸爾靈砂丹水銀一斤硫黃四兩二物於新銚內炒成砂更入水火鼎內煅煉為末糯米糊丸如麻子大每服三丸加至五七丸忌豬羊血緑豆粉冷滑之物腸胃諸蟲此方主之良嘗謂濕熱生蟲故知濕熱者蟲之天也是方用硫黃以燥濕用水銀以驅熱是奪蟲之天矣蟲失其天未有不殺蟲藥總考昆按古方殺蟲如雷丸貫衆乾漆蠟塵百部鉛灰皆其所常用也有加附子乾薑者壯正氣也加苦參黃連者蟲得苦而安也加烏梅訶子者蟲得酸而軟也加藜蘆瓜蒂者欲其帶蟲而吐也加芫花黑醜者欲其帶蟲而下也用雄黃川椒蛇床樟腦水銀檳榔者治疥瘡之蟲也用胡桐淚莨菪子韭子蟾酥者治齲齒之蟲也用川槿皮海桐皮者治風癬之蟲也用青葙子覆盆葉者治九竅𧈟蝕之蟲也用敗鼓心桃符板虎糞骨死人枕獺爪鶴骨者驅瘵蟲也或用桃柳東南枝者以其得天地春生夏長之氣而假之以為吾身之助也或用吳茱萸東引根或用酸石榴東引根煎湯吞藥者一以此物亦能殺蟲一以東方者生物之始諸蟲受氣之所也東引根能引諸藥東行奪其生生之氣乃伐根之斧也蘭泊宅編云永州通宅聽軍員毛景得奇疾每語喉中必有物作聲相應有道人教之讀本草藥名至蘭而默然遂取蘭捩汁而飲之少頃吐出肉塊長二寸余人形悉具劉思在永州親見其事千金翼云蘭主疳蝕則固殺蟲物爾雷丸陳正敏遁齋間覽云楊勔中年得異疾每發言應答腹中有小蟲效之數年間其聲浸大有道士見而驚曰此應聲蟲也久不治延及妻子宜讀本草遇蟲不應者當取服之勔如言讀至雷丸蟲忽無聲乃頓服數粒遂愈檳榔散石榴根煎蔡定夫戡之子康積苦寸白蟲醫者教之以月初三日前先炙豬肉一臠置口中咀咽其津而勿食諸蟲聞香爭咂如箭攻攢卻以檳榔細末一兩取石榴東引根煎湯調服之蔡如其言不兩時腹中雷鳴急瀉蟲下如傾以杖挑之皆連綿成串其長几丈尚蠕蠕能動乃悉置之於火宿患頓愈古稱九蟲一曰伏蟲長四寸為群蟲之長二曰白蟲相生至多形長一寸其母長至四五尺三曰肉蟲狀如爛杏令人煩悶四曰肺蟲其狀如蠶令人咳而聲嘶五曰胃蟲狀如蛤蟆令人吐逆嘔噦六曰弱蟲狀如瓜瓣令人多唾七曰赤蟲狀如生肉令人腸鳴八曰蟯蟲至微細狀如菜蟲居洞腸間居則為痔漏癰疽諸瘡九曰蛔蟲長一尺貫心則殺人又有三尸蟲狀如大馬尾薄筋依脾而居乃有頭尾皆長三寸又有勞蟲膈噎蟲癩蟲蠱蟲狐惑蟲未易悉舉醫者推類而治之可也痔漏門第六十六敘曰察痔漏者瘍醫之事也君子鄙談之然擇疾而療非醫之任者也故考二方以大其規詳論藥物以要其變四物湯加黃芩黃柏槐花方當歸芍藥川芎生地黃酒黃芩酒黃柏炒槐花內熱痔漏下血者此方主之痔漏廣腸之毒也內經曰因而飽食經脈橫解腸癖為痔是以痔漏之疾多見於膏粱富貴之人而藜藿之腹未見其多也一有病根則勞思便作飲酒便用所以然者內熱而血妄行也是方也生地槐花黃芩黃柏清其熱也當歸芍藥川芎調其血也四君子湯人參白朮炒茯苓甘草炙年高氣弱痔血不止者此方主之誤服攻痔之藥致血大下不止而虛脫者亦此方主之血有形之陰也必賴無形之氣以固之故年高而氣弱則血下久藥損氣則血下是方也人參白朮茯苓甘草皆甘溫益氣之品也大氣充盈自足以固有形之血譬之乾元充溢於兩間自能舉乎大地而無傾陷之危者也痔漏諸藥總考昆按古方醫痔漏下血有用槐角灰者有用柏葉灰者有用蝟皮灰者有用露蜂房灰者有用牛角腮灰者有用胡桃灰者俱以方寸匕酒調下此皆枯痔之法也湯液之中有用防風者有用秦艽者有用皂角仁者有用荊芥白芷者此皆責之風熱入臟也有用芒硝大黃者有用檳榔枳實者此皆責之實熱可下也有用胡黃連者有用酒苦參者有用石蓮肉者有用番木鱉者此皆責之實熱可清也有用桃仁紅花者有用蒲黃蘇木者此皆責之瘀血未消也有用杏仁麻仁者有用地黃黃柏者此皆責其燥金無液也有用地榆蘄艾者有用枯龍骨鹿角霜者此欲強止其血也有用象牙螳螂者有用人爪蟹爪者此欲放出其肛而外施藥以愈之也有用熏法者有用洗法者有用藥坐者無非枯痔止血之品也有用插藥者有用挂線者無非爛肌去腐之輩也嗚呼任醫猶任將用藥猶用兵神於兵者疊石可以為營驅牛可以破敵神於藥者心解而機自靈見超而術自神有不拘拘於紙上之陳言矣疥瘡門第六十七敘曰人以弗病為安疥瘡雖曰小疾然流連其癢弗息其搔則亦非可觀之度矣因著六考以主之庶幾乎無瘡痍也防風通聖散防風川芎川歸黃芩炒麻黃去節連翹薄荷石膏白朮炒梔子炒黑大黃芒硝桔梗荊芥白芍藥滑石甘草表有疥瘡內有實熱此方主之諸痛瘍瘡癢皆屬心火故表有疥瘡必里有實熱是方也用防風麻黃泄熱於皮毛用石膏黃芩連翹桔梗泄熱於肺胃用荊芥薄荷川芎泄熱於七竅用大黃芒硝滑石梔子泄熱於二陰所以各道分消其勢也乃當歸白芍者用之於和血而白朮甘草者用之以調中爾互考見中風門火門玉燭散川芎當歸生地黃赤芍藥大黃甘草朴硝各等分疥瘡作痛者此方主之諸痛屬實實者可瀉故用朴硝大黃瀉其實生地赤芍涼其血川芎當歸和其營甘草調其衛是方為攻下之劑必形氣病氣兩實者始可用之若病氣有餘形氣不足者以前方防風通聖散去大黃芒硝可也當歸補血湯加防風連翹方當歸防風各一錢黃耆五錢連翹二錢疥瘡有血無膿瘙癢不止者此方主之有血無膿此表氣不足也諸癢屬虛虛者可補故用當歸黃耆大補其氣血乃防風者引歸耆直達於表二物得之而效愈速也若連翹者解諸經之客熱而已此藥服之數劑諸瘡化毒生膿又更服之得膿滿毒盡則去病根而無溫瘢之患若膿日久不幹者去黃耆加白朮茯苓以燥之如治爛豆之法則善矣十全大補湯人參黃耆白朮茯苓熟地黃當歸川芎芍藥甘草等分桂心少許瘡久血氣虛弱頸面腹背皆瘡者此方主之瘡疥生於手足者為輕生於頸面腹背者氣血虛羸之盛乃小人道長之象故用人參黃耆白朮茯苓甘草大補其氣用當歸川芎白芍熟苄桂心大補其血氣血得其補則腹背之瘡先愈而君子道長小人道消矣脾胃門參苓白朮散亦可酌用加品古方有苦參沙參忍冬花皂角刺者此皆治瘡善藥若依前法則此輩不用變愈必欲用之苦參宜用酒炒疥瘡塗藥總考古方塗藥有用蛇床子川椒雄黃樟腦水銀檳榔者有少入人言者皆殺蟲也有用木鱉子大風子者皆去風也有用枯礬硫黃者為燥濕也有用大黃黃柏輕粉鉛粉黃丹者為解熱者或以桕油塗者或以麻油塗者或以豬脂塗者豫少時常自用之率驗於此而違於彼今月少愈再月即發竟以服藥而瘳終無益於塗也然病淺者間有塗之而愈故塗藥亦所不廢暴死門第六十八敘曰幻化之軀不能無死但曰暴死則非正命矣君子順受其正胡然以非命歸耶故考方法八條以拯暴死六君子湯加天麻方人參白朮茯苓甘草半夏陳皮天麻暴死口噤吐沫身體溫暖脈來虛大者中風暴死也此方主之暴死者卒然而倒不省人事也風燥則筋急故令口噤吐沫者風盛氣湧使然乃風來潮洶之象風為陽邪故令身體溫暖脈來虛大者正氣虛而邪氣盛也斯時也主辛散之劑以驅風則懨懨之氣必絶非其治也故用人參白朮茯苓甘草之甘溫者急固其氣復用半夏陳皮之辛利者以平其沫天麻之加定風邪爾附子理中湯附子乾薑人參甘草白朮腹痛額頭黧黑手足收引脈來沉下無氣以息者中寒暴死也此方主之腹痛病因固有數種但額頭黧黑手足收引脈來沉下則中寒之驗也所以無氣以息者呼出主陽吸入主陰三陰受其真寒則病不能吸吸亡則呼不能獨存矣故令人暴死寒者溫之故用附子乾薑乃人參白朮甘草所以生其呼吸之氣也進藥後更著艾灸其關元此內外交治之法是證也有死一日夜而治之復蘇者幸勿因其危而忽之生脈散加香薷方人參麥門冬五味子香薷人本陰虛復遇暑途飲困勞倦暴僕昏絶者此方主之人本陰虛則陽獨治復遇暑途則陽易亢加之飢困勞倦則陰益虧所以暴僕昏絶者一則陰虛而孤陽欲脫一則暑邪乘虛而犯神明之府也故用人參益元而固脫香薷辟邪而卻暑麥冬之清所以扶其不勝之肺五味之酸所以斂其欲脫之真四君子湯加竹瀝薑汁方人參白朮茯苓甘草竹瀝薑汁暴死有痰聲者名曰痰厥此方主之痰厥者虛陽載痰上逆之名所以令人暴死者頑痰塞其清陽呼吸之道也痰既塞之氣欲通之故令喉中有聲經曰壯者氣行則愈怯者著而成病故用人參白朮茯苓甘草之溫補者以壯氣佐之竹瀝薑汁以行痰獨參湯人參二兩去蘆煎行立之間暴眩僕絶喉無痰聲身無邪熱者陰虛陽暴絶也此方主之陰陽之在人身互為其根而不可離者也若陰道虧乏則孤陽無所依附亦自飛越故令人暴眩僕絶過不在痰故無痰聲病不因感故無體熱斯時也有形之陰血不能急生無形之呼吸所宜急固況夫陰生於陽又太極之妙乎故以獨參主之取其為固元益氣之聖品爾五磨飲子木香沉香檳榔枳實臺烏藥五件等分白酒磨服暴怒暴死者名曰氣厥此方主之怒則氣上氣上則上焦氣實而不行下焦氣逆而不吸故令暴死氣上宜降之故用沉香檳榔氣逆宜順之故用木香烏藥佐以枳實破其滯也磨以白酒和其陰也火醋熏鼻法凡感臭穢瘴毒暴絶者名曰中惡不治即死宜燒炭火一杓以醋沃之令患人鼻受醋氣則可復蘇既蘇以感冒門藿香正氣散主之補拜法凡遇尸喪玩古廟入無人所居之室及造天地鬼神壇場歸來暴絶面赤無語者名曰尸疰亦曰鬼疰即中祟之謂也進藥便死宜移患人東首使主人焚香北面禮拜之更行火醋熏鼻法則可復蘇否者七竅迸血而死凡男婦交感死在男子名曰脫陽在女子名曰脫陰男子雖死陽事猶然不萎女子雖死陰器猶然不閉亦有夢中脫死者其陽必舉陰必泄尸容有喜色為可辨也皆在不救痘門第六十九敘曰小兒壯熱呵欠煩悶時發驚悸或吐或瀉手足時冷面頰腮赤嗽嚏者為痘證也蓋痘出於五臟由內達外是以各顯其證呵欠煩悶肝之證也時發驚悸心之證也或吐或瀉手足時冷者脾之證也頰赤嗽嚏肺之證也錢氏謂獨有腎臟無證此大不然若腰痛喜寐則腎之證矣五臟之證盡顯者其痘必多但顯一二證者其痘必少魏氏以痘本於淫火其言高出前古雖其主方近於執一然録古人一十四方則示人以變通也可知矣今世之醫率以是短之使諸子者並作於九原昆遇魏氏則北面而師之遇錢陳則肩隨而已所以然者二子之資不及魏也茲考群方則以百家而出入之初不拘拘於三子矣痘證三四日前諸方考升麻葛根湯升麻葛根各二錢白芍藥一錢半甘草一錢小兒初間發熱壯盛為風寒為痘瘡莫能的辨此方穩當宜主用之表熱壯盛此邪實於表也經曰輕可以去實故用升麻葛根以疏表甘草佐之可以和在表之氣芍藥佐之可以和在表之榮去其實邪和其營衛風寒則解痘疹則出誠初間之良劑也如至四五日痘中夾疹者亦此方主之疹散只依常法治痘參蘇飲紫蘇陳皮半夏茯苓乾葛前胡桔梗各一錢甘草五分人參七分風寒壯熱體重頭痛痰嗽壅盛者此方主之風寒客於外故用紫蘇乾葛以發表痰嗽壅於內故用半夏前胡桔梗陳皮茯苓以安里邪去之後中外必虛人參甘草急固其虛此則表和而痘易出里和而氣不虛表裡無矣斯良劑矣麻黃湯麻黃杏仁甘草桂枝天寒腠密表熱壯盛者此方主之解表之藥有三品辛涼辛溫辛熱也夏月表氣易泄宜用辛涼春秋表氣平調宜用辛溫若天寒之時表氣閉密辛涼辛溫不能解散故以麻黃桂枝之辛熱者以主之亦各當其可而已佐以杏仁利其氣也佐以甘草和其氣也惺惺散人參白朮甘草細辛白茯苓天花粉白芍藥桔梗各七分發熱之初未明是痘形體怯弱者此方主之人參白朮茯苓甘草防其虛也乃細辛桔梗所以疏其陽天花粉白芍藥所以和其陰加味紅綿散天麻麻黃荊芥穗全蠍薄荷紫草蟬蛻等分風熱驚搐者以此藥調抱龍丸痘之出也自內達外心熱則驚肝熱則搐所以搐者風也所以驚者熱也是方也麻黃荊芥薄荷天麻全蠍蟬蛻所以消風解熱乃紫草者所以解毒發痘而活血也抱龍丸天竺黃一兩膽南星二兩辰砂五錢水飛七次雄黃琥珀珍珠各三錢麝香二錢五分檀香人參各二錢木香沉香各一錢金箔二十葉甘草汁為丸如大豆大每服一丸嬰兒半丸痘前發驚者此方主之明者可以安神故用琥珀珍珠重者可以去怯故用辰砂金箔氣竄可以利竅故用雄黃沉檀木麝甘溫可以固元故用人參辛燥可使開痰故用南星寒涼可使清熱故用竺黃羌活透肌湯羌活陳皮柴胡前胡半夏茯苓甘草桔梗川芎當歸山楂痘出見點未盡者此方主之表氣未疏則出有不盡故用羌活柴胡前胡川芎以疏表裡氣未利則出有不速故用半夏茯苓陳皮甘草桔梗以調里當歸活表裡之血山楂消表裡之滯血活滯消則痘之出也易易矣透肌散紫草二錢木通一錢半白芍藥酒炒人參蟬蛻升麻甘草各五分氣弱痘出不盡者此方主之人參甘草能益氣而補中紫草木通能透肌而起痘升麻蟬蛻能退熱而消風乃芍藥者所以調陰氣而和營衛也甘桔湯甘草二錢桔梗三錢咽喉腫痛者此方主之甘草之甘瀉實火而補虛火桔梗之苦清喉熱而瀉氣熱消毒飲牛蒡子二錢荊芥穗一錢生甘草防風各五分咽喉腫痛膈上熱盛者此方主之牛蒡子疏喉中風壅之痰荊芥穗清膈間風壅之熱生甘草緩喉中風壅之氣乃防風者散諸風不去之邪也加味如聖散桔梗二錢牛蒡子麥門冬各一錢五分甘草玄參荊芥各一錢防風七分生犀角黃芩各五分痰嗽風熱聲啞喉痛者此方主之牛蒡子麥門冬療風痰而清肺熱荊芥防風散風邪而升鬱熱甘草桔梗黃芩利咽喉而清氣熱犀角玄參涼心膈而療結熱熱去則金清金清則聲啞瘥矣紫草化毒湯紫草二錢陳皮一錢升麻甘草各五分小便赤加木通痘已出未出熱壅不快並宜服之紫草活竅利血化毒陳皮快膈消痰利氣升麻消風發散瘡痍甘草補虛和中解熱木通之加為導熱邪則由溺而泄爾前胡化斑散酒紅花當歸各一錢前胡八分荊芥四分白芷甘草節赤芍藥陳皮各五分鬱金七分酒浸胡荽子三十粒痘中夾斑之輕者此方主之斑之淡紅色者斑之輕也治痘中之斑與傷寒雜證不同傷寒之斑宜主寒涼痘中之斑寒之則血凝而痘不起雜證之斑間用溫補痘中之斑補之則血溢而斑愈盛此方用酒紅花當歸赤芍藥所以活斑中之血前胡白芷陳皮荊芥所以利表裡之氣乃胡荽子甘草節酒鬱金皆所以散滯氣爾此其為藥利營調衛不寒不熱誠得治痘斑之理也師云斑證之原由初間不能清熱解毒若能於初間清熱解毒胡然有斑再造丸生玳瑁一兩半片腦三錢水蛭炒黃一錢蜈蚣炒三錢麻黃去節一兩豬尾血為丸龍眼大每服一丸日二得微汗吉痘中有赤黑斑狂言煩躁者此丸主之原是實熱之證失於清熱化毒則令痘中夾斑治之失道則熱益盛而斑赤黑矣若以手按之血散者可治是方也生玳瑁能解毒而化斑蜈蚣能從毒而化毒水蛭能散瘀而破血片腦能化氣而利竅麻黃能透肌而達表和之以豬尾血取其動而不滯爾黃連解毒湯黃連炒黃柏炒黃芩炒梔子炒黑等分裡熱壅盛者此方主之無熱固不化毒熱壅則毒亦不化故用黃連瀉心火黃芩瀉肺肝之火黃柏瀉腎火梔子瀉上下之火無他證而惟熱壅故用藥亦精專焉人參白虎湯石膏三錢人參甘草桔梗各一錢知母二錢裡熱渴甚者此方主之石膏清裡熱胃清則不渴人參知母甘草桔梗化氣而生津液液生則渴自除辰砂益元散滑石飛過六錢甘草淨末一錢辰砂二錢水飛裡熱小便黃赤神氣不清者此方主之滑石清利六腑甘草解熱調中辰砂安神去怯加味導赤散生地黃人參麥門冬木通甘草等分竹葉十片燈芯七根小便黃赤口乾煩渴者此方主之內熱故用生地黃小便黃赤故導以木通竹葉燈芯口乾煩渴故潤以人參麥冬甘草乃氣化而津液自生也七正散車前子赤茯苓山梔仁生甘草梢木通萹蓄龍膽草小便祕澀者此方主之治痘而必欲利小便者水循其道而後地平天成故也是方也車前能滑竅赤苓能滲熱木通能通滯山梔能瀉火草梢能通莖萹蓄能利水膽草能利熱七物者導其熱邪正其中氣故曰七正四順清涼飲大黃當歸芍藥甘草實熱內壅腹脹祕結痘不能出者此方主之痘以熱而出固不能以無熱若實熱內壅腹脹便祕則三焦之氣不化而痘不能以出矣故用大黃通其滯當歸活其血芍藥養其陰甘草調其胃通利之後表裡氣血皆承順矣故曰四順蜜棗導法形質虛弱而大便祕結不堪下者用蜜熬滴水成珠捻作棗子狀用雞翎為心少黏皂角末納入穀道中病人以手急抱即出之便隨通矣此以正氣怯弱不堪攻下故爾痘證五六日間方藥考活血散木香二錢當歸尾酒浸焙乾赤芍藥酒浸炒川芎紫草酒紅花各五錢血竭一錢每服三錢痘中氣血凝滯者此方主之氣貴利而不貴滯血貴活而不貴凝木香川芎調其氣滯芍藥歸尾紫草紅花血竭理其血凝退火回生散滑石水飛辰砂水飛各一錢冰片三釐每用冷水調服一錢痘證血熱枯澀者此方主之火炎則水乾是故枯澀用滑石辰砂導去其熱此灶底抽薪之意入冰片者欲其速達而無壅滯也犀角地黃湯犀角生者牡丹皮白芍藥生地黃等分諸見血失血血熱者此方主之心主血生地黃所以涼心血肝納血白芍藥所以和肝血火能載血牡丹皮所以去血中之火熱能行血生犀角所以解諸經之熱白朮茯苓澤瀉湯白朮茯苓澤瀉各一錢痘而水泡者此方主之中有實熱膈有停水濕熱外行初則痘色晶亮頃則痘皆水泡矣此乃水不能潤下灶底燃薪釜中發泡之義是方也白朮甘而燥能益土以防水茯苓甘而淡能益土以決防澤瀉咸而潤能潤下而利水水利濕消泡自瘥矣補中益氣湯人參黃耆白朮當歸柴胡升麻陳皮甘草中氣虛弱痘不起脹者此方主之難經曰氣主煦之故氣者噓長萬物者也痘不起脹氣之弱也可矣故用人參黃耆白朮甘草以補氣用柴胡升麻以升陽有當歸可以活其血陳皮可以利其氣保元湯人參二錢黃耆三錢甘草一錢炙肉桂每用五分至七分氣虛陷頂者此方主之氣者長養萬物者也氣盛即物壯氣弱即物衰故痘瘡陷頂者責之氣虛也魏桂岩自論云人參益內甘草和中實表宜用黃耆助陽須憑官桂前三味得三才之道體後一味扶一命之顛危四物湯當歸川芎白芍藥熟地黃痘根淡血弱者此方主之痘至五六日氣尊血附之時痘根淡者為血弱故用當歸活血川芎行血熟地補血芍藥斂血當歸活血湯當歸川芎赤芍藥紅花紫草各一錢生地黃一錢五分取汁更良血熱壅滯者用此方活血涼血色紫為血熱色枯為血滯熱者涼之枯者澤之調血之道也是方也生地黃涼血之品也當歸川芎赤芍藥紅花紫草滑血之品也涼者性寒滑者質潤氣利而已內托散人參黃耆甘草當歸川芎白芍藥厚朴防風白芷肉桂木香桔梗表虛里實氣血皆弱者此方主之在表者痘頂灰陷為氣虛痘根色淡為血虛若息重氣粗則為裡實氣虛故用人參黃耆甘草血虛故用當歸芍藥川芎然防風白芷肉桂能引諸藥自內而托之於外木香桔梗厚朴能調壅實以歸於和加減法紅紫黑陷屬熱毒者去桂加紫草紅花黃芩淡白灰陷屬虛寒者加丁香溫里肉桂溫表當貫膿而不貫膿者倍參耆當歸糯米煎熟入人乳好酒八珍湯人參白朮茯苓甘草當歸川芎芍藥地黃氣體虛弱痘證雖順此方主之醫貴未然之防痘證雖順若氣體虛弱不補恐有後失故用人參白朮茯苓甘草以補氣當歸川芎芍藥地黃以養血獨聖散穿山甲炒一兩麝香一錢紫草湯調下一錢五六日間黑陷者此方主之黑陷危證也黑者穢惡觸之而變其色也陷者正氣下陷不能起脹也穿山甲麝香膻腥穢惡之屬也何以用之蓋痘之為物外觸穢惡則向里而陷內觸穢惡則向外而凸原其血氣虛怯故令如此人牙散亦是此意挑疔散紫草雄黃巴豆各等分共為細末油胭脂調用有痘疔痘母者用針挑破以此藥少許著之痘疔之色有二紫疔白疔也痘疔之見有三先疔見在面次疔見在腹後疔見在足也是方也紫草解毒利竅雄黃解毒利氣巴豆化毒拔疔乃挑疔之捷劑也所謂痘母者初出之時遍身光潤稀少綻凸其間有一二顆起發脹大如八九日痘者名曰痘母急以此藥挑破著之否則諸痘日漸隱沒以至於無皮膚之外僅存渣滓身冷自汗吐瀉煩躁而死矣痘證七日八日九日間所用方藥考內解散人參黃耆甘草白芍藥穿山甲當歸川芎木香金銀花皂角刺山楂乾薑七八日間痘色枯淡不起無漿者此方主之痘至七八日灌膿起脹之時也若根窩色淡者責其血弱不起無漿者責其氣虛故用人參黃耆甘草大補其氣又用當歸川芎白芍大補其血穿山甲皂角刺金銀花長於化毒乾薑木香山楂長於化滯托裡散人參黃耆甘草肉桂白芍藥當歸川芎連翹貝母山楂陳皮桔梗木香補虛托裡此方通用人參黃耆甘草補氣藥也佐之以山楂木香則氣不滯當歸川芎芍藥補血藥也佐之以肉桂則血不滯桔梗連翹流氣清熱陳皮貝母利氣開痰肉豆蔻丸肉豆蔻赤石脂各三錢木香枯礬各一錢訶子砂仁龍骨各二錢七八日間大瀉者此方主之痘至七八日灌膿起脹之時也若大瀉而虛其中則痘必陷下而不可為矣然有濕而瀉有滑而瀉有積而瀉濕而瀉者宜燥之枯礬石脂是也滑而瀉者宜澀之龍骨訶子是也積而瀉者宜消之豆蔻砂仁是也乃木香者調其滯氣和其腹中而已黃芩芍藥湯條芩芍藥升麻等分甘草減半腸胃熱瀉者此方主之糞色黃褐為熱瀉條芩可以清之芍藥可以寒之升麻可以舉之甘草可以調之附子理中湯附子人參甘草白朮乾薑胃中虛寒或又誤服涼藥瀉而手足厥冷者此方主之人參甘草白朮之甘溫所以補虛乾薑附子之辛熱所以回陽砂仁益黃散陳皮青皮各二錢訶子一錢丁香木香砂仁各五分食傷胃寒嘔吐而瀉者此方主之仲景云邪既中焦則既吐且瀉故用陳皮青皮理其脾丁香木香溫其胃訶子所以止瀉砂仁所以消食十二味異功散人參豆蔻白白朮當歸丁香肉桂厚朴陳皮半夏茯苓附子木香痘出不光澤不起脹根窠不紅表虛里盛者此方主之中氣有餘氣血充滿則痘光澤起發根窠紅活表無癢塌之患中氣不足則表亦虛而諸證作矣是方也人參白朮茯苓當歸所以補胃附子肉桂丁香豆蔻所以溫胃半夏木香陳皮厚朴所以調胃胃陽明也陳氏云陽明主肌肉胃氣充足則肌肉溫暖自然光澤起脹而無癢塌之患亦見道之論也十一味木香散木香丁香肉桂人參青皮大腹皮半夏甘草前胡訶子赤茯苓裡虛泄瀉而渴者此方主之胃虛而寒則生泄瀉瀉失津液則令人渴是方也人參甘草所以補胃木香丁香肉桂所以溫胃腹皮青皮半夏前胡赤苓所以調胃乃訶子者所以止瀉而生津也此亦以胃氣為主蓋胃不虛寒則瀉自止津液自生而渴自除矣陳文仲云腹脹渴者瀉渴者足指冷渴者驚悸渴者身溫渴者身熱面㿠白色渴者寒戰渴不止者氣急咬牙渴者飲水轉水瀉不已者以上九證即非熱也乃津液少脾胃肌肉虛故耳宜木香散治之如不愈更加丁香肉桂昆謂痘色㿠白手足寒小便利如是渴者虛也本方主之若痘色紅赤大便祕小便赤如是渴者熱也非此方所宜慎勿與之二神散丁香九粒乾薑一錢痘色灰白不起者此方主之氣血原實或以飲食涼劑寒其中氣致痘不起故只用丁香乾薑以溫中而不必參耆等也救生散即無比散豶豬尾血臘月取以新瓦瓶盛挂於當風陰乾為末牛黃冰片麝香膩粉各一分硃砂研馬牙硝各一錢上為細末一歲者服一字大者五分溫水和乳少許調服痘陷色黑危困惡候此方主之痘之為物外感穢氣則陷而入內食穢物則凸而出故豬血牛黃麝香原皆穢物可以起痘乃馬牙硝者所以攻結毒硃砂膩粉者所以攻結熱冰片則神於行滯而已是方也為熱毒倒入臟腑不得已而用之以少臥時許取下惡物如魚腦為吉然非平劑也南金散紫背荷葉取霜後搭水者白殭蠶取直者炒去絲各等分共為末每服五分胡荽汁和酒調下痘已出而復隱其勢甚危者此方主之小兒氣體怯弱外感不正之氣則痘已出而復隱荷葉芬香可以卻穢得震卦仰盂之象可以升其生生之氣而長養痘瘡佐以白殭蠶一以取其就毒化毒一以取其疏利風痰爾水楊柳洗法春夏用葉秋冬用根痘出陷頂漿滯不行或為風久克者用水楊柳枝葉五升水一大釜煎湯先將三分之一置於盆內以手試之勿使甚熱亦勿使過冷先服宜用湯藥然後入湯浴洗漸漸添易不可太冷浴洗久許乃以油紙捻燃燈照之纍纍然有起勢陷處暈暈有絲此漿影也漿必滿足如不滿又浴如前若體弱者只浴洗頭面手足可也桂岩云此猶黃鐘一動而凍蟄啓戶東風一吹而堅冰解腹始雖二物竟則同一春也痘症十日以後宜用諸方考十全大補湯人參黃耆白朮茯苓白芍藥當歸川芎肉桂甘草熟地黃痘證十日以上血氣虛弱者此方主之參耆苓朮甘草大補氣也芎歸芍地肉桂大補血也氣血平補故曰十全止痛活血散白芍藥酒炒一錢加細末酒調下痘漿已滿血滯疼痛不可忍者此方主之諸病癢者為虛痛者為實癢者宜補痛者宜瀉此痛為血實而滯故用芍藥以平血酒調以行滯如神散當歸官桂玄胡索等分為末酒調下一錢血滯腰痛者此方主之當歸活血官桂散血玄胡理血血行而利腰痛自除四聖挑疔散珍珠豌豆灰血餘灰各五分冰片三釐油胭脂調用痘中有疔者此方主之凡痘中有獨黑獨白獨陷下獨疼痛者名曰痘疔雖以針挑破令人吸盡惡血以此藥敷之失治則余痘皆陷矣珍珠能出毒止痛二灰能爛毒化血胭脂能利血拔毒冰片能利竅行滯人牙散人牙一枚燒存性麝香少許共為末酒調下痘證黑陷者此方主之痘之為物外感穢氣則陷入內食穢物則凸出牙灰麝香亦穢物耳故用之託起陷下之痘錢氏云變黑歸腎而用骨余以治之非通論也蟬蛻散蟬蛻地骨皮白芷等分每服三五分酒調下表有風熱而痘色滯者此方主之蟬蛻白芷消風熱於表地骨皮退風熱於裡大連翹飲連翹白芍藥炒當歸酒洗各一錢防風滑石柴胡黃芩木通各八分荊芥車前子梔子炒黑牛蒡子略炒各五分蟬蛻甘草各三分痘後蘊熱者此方主之痘焦之後蘊熱不去則生痘毒是方也防風柴胡蟬蛻解熱於表表有熱者自皮毛汗孔而泄荊芥牛蒡解熱於上頭目咽喉有熱者從口鼻而泄滑石木通梔子車前解熱於裡里有熱者導之從小便而泄連翹去諸經之客熱黃芩去諸經之遊火乃甘草者所以解熱於氣而芍藥當歸所以調熱於血也十三味敗毒散當歸陳皮白芷赤芍藥穿山甲乳香沒藥貝母金銀花皂角刺防風甘草天花粉痘後腫毒此方主之實證補之則生癰毒是方也防風白芷解表而泄其熱乳香沒藥散血而消其毒穿山甲皂角刺能引諸藥至有毒之處金銀花赤芍藥能解熱毒於瘀壅之中痰中諸熱貝母天花粉可除氣血不調甘草陳皮當歸可療瀉肝散當歸川芎防風荊芥白芍藥甘草黃連木賊蔓荊子白蒺藜甘菊花痘後肝經蘊熱目痛者此方主之目者肝之竅肝木臟也喜散而惡郁故散之則條達郁之則熱痛此方用防風蒺藜荊芥木賊蔓荊菊花雖所以清肝經之風熱而實所以散之使其條達也和肝部之血有當歸芍藥和肝部之氣有甘草川芎復有黃連瀉心火也實則瀉其子以故用之復明散當歸川芎白芍藥防風生地黃荊芥柴胡蔓荊子白芷痘後目痛紅絲翳膜者此方主之日月中天光明者也一為雲物蔽之明者晦矣風行天上則蔽障去而日月復明此方用防風荊芥柴胡白芷蔓荊子諸風藥以治目翳亦是道也復用當歸川芎芍藥地黃養血之品者經曰目得血而能視是故用之清胃湯升麻二錢當歸一錢二分黃連牡丹皮生地黃各一錢牙疳腫痛者此方主之牙疳責胃熱腫毒血熱痛責心熱升麻能清胃黃連能瀉心丹皮生地能涼血乃當歸者所以益陰使陽不得獨亢爾犀角黃連湯生犀角水磨臨飲加入一錢烏梅一枚木香二分黃連一錢痘後牙疳此方互用諸痛瘍瘡癢皆屬心火故用黃連瀉心生犀涼心乃烏梅者取其味酸可以收斂虛邪而木香者取其辛香可以輯和榮氣走馬牙疳敷藥方黃連一兩雄黃一錢膽礬三分冰片五釐患牙疳𧈟蝕此方為末摻之黃連之苦能堅厚肌肉雄礬之悍能殺𧈟蟲冰片之辛能利肌腠治痘瘡濕爛方或以敗草灰敷之或以蠶繭灰入枯礬少許敷之或以牆上白螺螄殼燒灰敷之或以蛤粉敷之四法者皆是濕者燥之之意妊娠患痘宜用方考罩胎散當歸川芎人參白朮茯苓甘草黃芩砂仁柴胡乾葛桔梗紫草阿膠防風荊芥白芷白芍藥孕婦出痘此方主之以孕婦而痘則血氣大虛矣故用當歸川芎芍藥阿膠以養血又用人參白朮茯苓甘草以補氣乃黃芩砂仁紫草桔梗所以安胎解毒柴胡乾葛防風荊芥白芷所以利表疏邪養血補氣則安其內解毒疏邪則利其外安內利外治道皆矣安胎獨聖散用砂仁炒為末酒調下五分妊娠出痘胎痛者此方主之胎痛者熱而氣滯之故也縮砂辛溫利而不滯故可以利氣可以安胎安胎飲人參白朮炒茯苓甘草芍藥酒炒當歸川芎砂仁紫蘇黃芩酒炒陳皮香附醋炒大腹皮淨洗孕娠出痘此方互用氣血虛則胎不安氣血熱則胎不安氣血滯則胎不安是方也人參白朮茯苓甘草所以補氣當歸川芎芍藥所以養血黃芩所以清熱砂仁香附紫蘇陳皮大腹皮所以行滯婦人門第七十敘曰婦人雜病與男子等惟月事胎産異焉今所考者亦考其月事胎産之方爾他證則向全方求其證治四物湯當歸酒洗川芎白芍藥酒炒熟地黃婦人月事不調以此方為主而變通之無極之真二五之精妙合而凝乾道成男坤道成女女以坤道用事故治婦人者以陰為主方其二七而癸至月事以時下者女子得坤之陰陰中必有陽故以七為紀一七而齒更二七而天癸至也人受天地之氣以生故能克肖天地月天之陰也以月而盈以月而虧故女子之血亦以三十日而一下也血之下也同於月故名之曰月事經曰月事以時下故能有子是以月事不調者宜以此方為主隨其寒熱虛實而斟酌加減之使月事調勻則陰陽和而萬物生有子之道也是方也當歸芍藥地黃皆味厚之品也味厚為陰中之陰故能益血析而論之當歸辛溫能活血芍藥酸寒能斂血熟地甘濡能補血又曰當歸入心脾芍藥入肝熟地入腎乃川芎者徹上徹下而行血中之氣者也此四物湯所以為婦人之要藥而調月者必以之為主也脈數血色紫黑為內熱本方加黃芩黃連脈遲血凝結者為寒本方加官桂附子人肥有痰加半夏陳皮南星人瘦有火加山梔黃柏知母有抑鬱者加香附蒼朮砂仁神麯有留滯者加桃仁紅花玄胡索肉桂先期者為熱後期者為寒為郁為氣為痰氣虛者加參耆氣實者加枳朴或問四物亦有不宜者乎余曰有之氣息幾微者不宜川芎恐其辛香益耗散真氣也大便溏泄不宜當歸恐其濡滑益增下注也脈遲腹痛不宜芍藥恐其酸寒益增中冷也胸膈痞塞不宜地黃恐其黏膩益增泥滯也明者解之昧者誤矣八珍湯人參白朮炒茯苓甘草炙當歸川芎熟地黃白芍藥酒炒月來血少者此方主之血盛則月來而多血衰則月來而少故用當歸川芎芍藥熟地四物以養血而又用人參白朮茯苓甘草以養氣也所以必兼養氣者太極之妙陰生於陽故也固經丸酒黃芩龜板白芍藥各一兩黃柏炒褐色三錢樗根白皮七錢半香附童便浸一宿焙乾三錢月來過多不止者此方主之月來過多不止是陰血不足以鎮守胞絡之火故血走失而越常度也是方也黃芩黃柏芍藥龜板皆滋陰制火之品所謂壯水之主以鎮陽光也樗皮之澀所以固脫香附之辛所以開其鬱熱爾白芷黃荊實瓦壟子治白帶考白帶者胃中濕熱下注而成猶之溺注於器而生溺底垽耳前古名醫有單用焦白芷而主者有單用焦荊實而主者有單用瓦壟粉而主者蓋以白芷之性香而升舉荊實之性辛而利氣瓦壟之性燥而勝濕炒而焦之則火可以生土土可以防水煉而粉之則燥可以勝濕勝濕則無以下注而白帶止矣此用三物之意也白葵花紅葵花治赤白帶下考凡人腰臍之間有帶脈奇經八脈之一也環腰一周如束帶焉下焦虛損督任有虧則下焦氣血乘虛而襲之陷於帶脈之下氣病為白血病為赤名曰赤白帶下也東垣曰白葵花治白帶紅葵花治赤帶赤治血燥白治氣燥此何言哉昆謂葵花乃朝陽之萼也稟草之陰涵天地之陽故能潤燥而升陽使營衛上行不復陷於帶脈之下而為帶下也或問帶下一疾耳此言氣血陷於帶脈之下為帶下前言胃中濕熱下注為帶下何相悖也余曰婦人無病容單下白者責之濕熱下注婦人久病赤白並下責之氣血下陷多成瘵也又曰有言白者屬寒赤者屬熱其説何如余曰曾見寒者固有赤帶熱者益多白帶此白寒赤熱之言不足徵矣必若所言則赤白並下者是寒熱並耶見道之言不如此千金白馬毛散白馬毛二兩椒和伏火一宿白馬毛治白帶赤馬毛治赤帶龜甲四兩醋炙鱉甲十八銖醋炙牡蠣一兩十銖火炙共為末每服酒下方寸匕日三治赤白帶下此方良氣陷於下焦則白帶血陷於下焦則赤帶以澀藥止之則未盡之帶留而不出以利藥下之則既損其中又傷其下皆非治也白馬得乾之剛毛得血之餘血餘可以固血乾剛可以利氣固血則赤止利氣則白愈此用馬毛之意也龜鱉牡蠣外剛而內柔離之象也去其柔而用其剛故可以化症可以固氣化症則赤白之成帶者無復中留固氣則營衛之行不復陷下營不陷則無赤衛不陷則無白矣半夏茯苓湯半夏生薑各三十銖乾地黃茯苓各十八銖旋覆花白芍藥人參芎藭細辛橘皮甘草桔梗各十二銖妊娠惡阻者此方主之惡阻者噁心而防阻飲食也此是下部氣血不足復盜脾胃之氣以固養胎元故令脾胃自弱不勝穀氣一聞穀氣便噁心而防阻也是方也半夏生薑能開胃而醒脾地黃芍藥芎藭能養陰而益血人參茯苓甘草能和中而益氣乃橘皮桔梗旋覆細辛皆辛甘調氣之品可以平惡逆之氣而進飲食者也或問半夏為妊娠所忌奈何用之余曰昔人恐久用而燥陰液故云忌爾若有惡阻之證則在所必用也故孫真人方之聖者也其養胎之劑用半夏者蓋五方焉橘皮湯橘皮竹茹人參白朮各十八銖生薑一兩厚朴十二銖妊娠嘔吐不下食者此方主之惡阻以聞食而惡責之脾虛嘔吐以食入復吐責之有火所謂諸逆衝上皆屬於火也此是厥陰之血既養其胎少陽之火虛而上逆竹茹能平少火厚朴能下逆氣橘皮生薑所以開胃人參白朮所以益脾開胃益脾欲其安穀云爾白朮條芩考先醫云白朮條芩安胎之聖藥此何云也蓋以白朮益脾能培萬物之母條芩瀉火能滋子戶之陰興其利而去其害故曰安胎聖藥膠艾湯熟地黃艾葉當歸川芎炙甘草真阿膠炒成珠各半錢黃耆二分半孕婦漏胎不安者此方主之漏胎者懷胎而點滴下血也此是陰虛不足以濟火氣虛不足以固血故有此證是方也阿膠熟地當歸川芎益血藥也黃耆甘草艾葉固氣藥也血以養之氣以固之止漏安胎之道畢矣砂仁蔥白湯砂仁一錢槌碎蔥白十枚煎湯吞下妊娠腹痛者此方主之痛者氣血滯澀不通使然故用砂仁順氣於下蔥白順氣於中氣行血利而痛自止有故而痛者各隨證以治之犀角散生犀角地骨皮麥門冬赤茯苓條芩生甘草子煩者此方主之子煩者懷子而煩悶也煩悶責心肺有熱故用犀角涼心骨皮退熱條芩瀉火麥冬清金赤苓導赤甘草和中四物湯加芩連薑夏方當歸川芎芍藥熟地黃黃芩黃連半夏生薑子癇者此方主之子癇者懷子而癇僕也此由血養其胎陰虛火亢痰氣厥逆故令癇僕是方也四物可以養血芩連可以降火薑夏可以破逆紫蘇飲紫蘇葉人參陳皮去白大腹皮黑豆汁洗過當歸尾川芎粉草白芍藥酒炒子懸者此方主之胎氣不和湊上心腹腹滿閉悶謂之子懸乃下焦氣實大氣舉胎而上也故用紫蘇腹皮陳皮川芎流其氣當歸芍藥利其血氣流血利而胎自下矣然必用夫人參甘草者邪之所湊其氣必虛也流氣之藥推其陳補氣之藥致其新爾地膚草湯地膚草四兩水四升煮取二升分三服取自然汁服亦可子淋者此方主之懷子而小便淋澀謂之子淋子淋之源本於濕熱地膚草能利膀胱能疏風熱以之而治子淋亦單劑之良也冬葵子湯冬葵子略炒柴胡桑白皮赤茯苓赤芍藥當歸各等分此亦子淋之方也滑可以去著故用冬葵子清升則濁自降故用柴胡氣化則能出故用桑皮辛利則能潤竅故用當歸而赤苓赤芍者取其入血而利丙丁也木通散木通紫蘇葉香葇桑白皮各一錢枳殼檳榔條芩各五分訶子皮木香各三分妊娠身體浮腫四肢脹急小便不利者此方主之妊娠氣血朝胎營衛之行澀故令身體浮腫四肢脹急而小便不利也是方也紫蘇流氣於表桑皮枳殼木通木香檳榔流氣於裡香葇流氣中之濕條芩流氣中之熱訶子流氣中之液服藥之後營衛流行氣血健運則浮腫諸疾可得而皆愈矣或問何以不利小便余曰內經有言氣化則能出矣故知本之醫只調其氣無用淡滲為也三合湯探吐法人參白朮茯苓甘草當歸川芎芍藥地黃半夏陳皮妊娠轉胞不得小便者此湯服之探吐數日愈胞非轉也由孕婦中氣怯弱不能舉胎胎壓其胞胞系了戾而小便不通耳故用二陳四物四君子三合煎湯而探吐之所以升提其氣上竅通而下竅自利也束胎丸白朮二兩茯苓七錢半陳皮三兩不見火黃芩夏一兩春秋七錢冬五錢妊娠七八月間服此胎氣斂束令人易産凡患産難者多由內熱灼其胞液以致臨産之際乾澀而難或脾氣怯弱不能運化精微而令胞液不足亦産難之道也故用白朮茯苓益其脾土而培萬物之母用黃芩清其胎熱瀉火而存胞液乃陳皮者取其辛利能流動中氣化其肥甘使胎氣不滯兒身勿肥耳此束胎之義也達生散大腹皮三錢黑豆汁洗曬乾入劑人參陳皮紫蘇當歸白芍藥白朮各一錢炙甘草二錢妊娠臨月此方服之令人易産詩云誕彌厥月先生如達朱子曰先生首生也達小羊也羊子易生而無留難故昔醫以此方名之然産難之故多是氣血虛弱營衛澀滯使然是方也人參白朮甘草益其氣當歸芍藥益其血紫蘇腹皮陳皮流其滯氣血不虛不滯則其産也猶之達矣車前子詩曰采采瞥苡薄言採之瞥苡車前也朱子曰採之未詳何用其子治産難昆得其説凡遇妊娠臨月於宜用湯液內加之每食催生諸藥考生不必催也催之則宋人之揠苗耳非惟無益而又害之矣古方有用兔腦者有用豬脂者有用油蜜蔥白者有用葵子者有用牛乳榆皮滑石者有用金風子者有用柞枝者取其滑澤之義耳猶近理也又有用弩牙灰者有用蛇蛻灰者有用筆頭灰者有用百草霜者有用伏龍肝者有用鑿頭灰者有用萆麻子貼於足心者有握石燕者雖曰各有深意但燒灰而服者徒劫燥其津液手握足貼者用之弗驗耳噫平時失於將理至於臨産艱難頻以雜藥催之皆惑也十全大補湯人參黃耆白朮白芍藥茯苓當歸川芎甘草熟地黃等分肉桂少許正産之後氣血虛耗者此方主之小産者亦此方主之氣虛宜補氣故用人參黃耆白朮茯苓甘草血虛宜補血故用當歸川芎芍藥地黃肉桂丹溪曰産後宜大補氣血此之謂也桃仁紅花蘇木玄胡索肉桂山楂蒲黃考産後有瘀血留於子戶作痛者宜四物湯加上件黑神散熟地黃炒蒲黃炒黑乾薑當歸白芍藥桂心各二兩炙甘草三錢黑豆炒去皮二合半上件共為末此方主之胎死者産難經日而胎死也法以妊娠舌頭青黑為用之方也蒲黃能逐敗血熟地芍藥當歸能養新血乾薑肉桂能引新血而逐敗血甘草黑豆能調正氣而逐敗氣師云此方更治胞衣不下産難血暈余血奔心兒枕疼痛乍見鬼神等證蓋諸證皆是瘀血為患故並治之千金神造湯蟹爪一升阿膠三兩甘草二兩婦人脈陰陽俱盛名曰雙軀若少陰微緊者血即凝濁經養不周胎卻偏夭其一獨死其一獨生不去其死害母失胎宜此方主之蟹爪能破胞而墮胎以其稟鋒利之質故耳非妊娠所宜也是方也蓋用蟹爪攻其死阿膠安其生甘草平其毒也或問蟹爪之毒手保其不傷彼生者乎余曰無死者則傷生有死者則毒以類從惟攻其死不犯其生此大易方以類聚物以群分水流濕火就燥之義也獨參湯人參二兩水一升煎半升溫服産後血暈不省人事者此方主之血暈者下血過多而眩暈也不省人事者氣血大脫而神不用也故用人參甘溫益元之品以主之此藥可以固氣可以生血可以益元身熱氣急者加童便一爵身寒氣弱者加附子三錢醋灰熏鼻法凡血暈不省人事者急治炭火以釅醋沃之使醋氣熏蒸入鼻則能收斂神氣自然精爽紅花酒紅花一兩炒清酒五爵沃之溫服胞衣不下此方主之胞衣不下者氣弱而瘀血盈於胞也故用清酒壯其氣紅花敗其瘀豬腎湯豬腎一具白糯米三合淡豉五合蔥白一升人參當歸各二兩産後蓐勞者此方主之蓐産中之名也産中虛羸喘乏乍寒乍熱病如瘧狀名曰蓐勞此是虛乏氣血不相順接虛故乍寒壅故乍熱寒熱無時休息症狀似瘧實非瘧也治宜大補氣血使其氣血順接則病愈矣故用人參補氣當歸補血糯米益胃蔥豉醒脾而豬腎者取其以類相從能補系胞之區也升陽舉經湯羌活藁本去土防風各二錢肉桂去皮夏勿用秋冬用白朮當歸黃耆柴胡各三錢人參熟地黃川芎各一錢細辛六分獨活炙甘草附子炮去皮臍各一錢五分桃仁十枚去皮尖白芍藥紅花各五分婦人經血崩下者此方主之陽主升陰主降陽根乎陰陰根乎陽一動一靜互為其根則一升一降循經而行無崩陷也若陽有餘則升者勝血從上竅而出陽不足則降者勝血從下竅而出是方也附子肉桂人參黃耆白朮甘草壯陽益氣之品也羌活獨活柴胡藁本防風細辛川芎升陽舉經之品也芍藥地黃紅花當歸桃仁滋陰入血之品也壯陽則氣不虛舉經則血不陷滋陰則血不燥誠如是則血為氣之守氣為血之衛血營於中氣衛於外升降上下一循其經矣胡然而崩也獨活湯獨活生薑各五兩防風秦艽桂心白朮甘草當歸附子各二兩葛根三兩防己一兩時人分作十服産後中風口噤背反者此方主之産後血氣俱虛易受風寒風傷乎筋則痙寒傷乎筋則疼故令口噤背反是方也獨活防風秦艽葛根防己疏風藥也桂心附子驅寒藥也風去則筋不痙寒去則筋不疼乃當歸者所以養血於驅風之後生薑白朮甘草者所以調氣於散寒之餘必欲養血調氣者産後不忘其虛也莨菪酒硝石飲史記災川王美人懷子而不乳召淳于意往視與莨菪藥一撮以酒飲之旋乳意復診其脈而脈燥燥者有餘病即飲以硝石一劑出血血如豆比五六枚乳産也懷子而不乳者氣血凝澀宜産而不産也莨菪能行痹氣酒性能行滯血故主之而旋乳復診其脈燥燥屬有力故為有餘有餘之疾宜攻矣故用硝石以下其積血當歸補血湯加蔥白方當歸二錢黃耆一兩蔥白十枚産後無乳者宜此方主之乳者氣血之所成也故氣血充盛之婦未嘗無乳凡見無乳者皆氣體怯弱之婦也是方也用當歸黃耆大補其氣血此養乳汁之源也蔥白辛溫直走陽明陽明達於乳房故用之為使此通乳汁之渠也如依古方用豬懸蹄漏蘆輩亦可免懷湯當歸尾赤芍藥酒紅花酒牛膝各五錢欲摘乳者此方主之婦人之血下則為月上則為乳欲摘乳者通其月事則乳汁下行免乳脹之苦矣是方也歸尾赤芍紅花牛膝皆下行導血之品也以故用之名曰免懷者子生三年然後免於父母之懷故也廣嗣門第七十一敘曰嗣以衍宗微嗣匪孝也君子恆重之故效禖之祀尼丘之禱古人胥急焉然有祈之藥之終身不一嗣者此何以故哉嗟夫天地有不毛之處故亦有無子之人靈樞所以泄其微也茲考方藥五條道其能嗣者爾長春廣嗣丹人參去蘆天門冬去心當歸酒洗澤瀉去毛山茱萸去核石菖蒲炒赤石脂五味子去梗覆盆子去萼白茯苓車前子廣木香柏子仁各一兩山藥薑汁炒川巴戟去心川椒去目與梗及閉口者炒出汗川牛膝去蘆酒洗生地黃熟地黃地骨皮去木與土杜仲各二兩遠志去蘆甘草湯泡去心肉蓯蓉酒洗去心膜曬乾枸杞子各三兩菟絲子酒洗去土仍用酒蒸搗餅曬乾四兩上藥草五味煉蜜作丸梧子大每服三十丸日三男婦艱嗣者此方主之二五之精妙合而凝然後成形孕育故求嗣者宜實其精世人益精專於補腎此求其末也經曰腎者主水受五臟六腑之精而藏之故五臟盛乃能寫如斯言之則腎主藏精耳而生精之原固本於五臟六腑也是方也人參天門冬五味子用之補肺石菖蒲柏子仁當歸遠志用之養心白茯苓懷山藥用之養脾山茱萸熟地黃覆盆杜仲牛膝巴戟蓯蓉枸杞菟絲用之補肝腎所以然者肝腎同一治也乃車前澤瀉利其灼陰之邪生地骨皮平其五臟之火石脂之澀所以固精木香之竄所以利六腑川椒之辛所以散濕痹也此則兼五臟六腑而調之五臟之精實六腑之氣和夫然後可以媾精而宜子矣非得內經之旨者不能識此延齡育子方天門冬去心麥門冬去心川巴戟去心人參白朮白茯苓川牛膝生地黃熟地黃肉蓯蓉去心枸杞子菟絲子去心蓮鬚白茯神山藥薑汁炒山茱萸去核沙苑疾藜炒柏子仁鹿角膠鹿角霜各五兩酸棗仁遠志五味子石斛各二兩上藥共為末蜜丸梧子大早晨鹽湯吞下百丸此亦廣嗣之方也男女媾精乃能有孕然精得五臟之所生而藏之腎者也故欲藏精於腎者必調五臟五臟盛而精生矣是方也人參五味天麥門冬補肺藥也茯神遠志柏仁棗仁生地補心藥也白朮茯苓山藥石斛補脾胃也熟地枸杞菟絲巴戟牛膝茱萸蓯蓉沙苑蒺藜補肝腎也鹿角膠氣血之屬用之所以生精角霜蓮鬚收澀之品用之所以固脫如是則五臟皆有養而精日生乃能交媾而宜子矣韭子小茴香蛇床子川椒天雄附子總考此六物者濕熱之品也取之者何凡人艱嗣者多有下虛而胃中之濕襲之內生胞痹腎痹白滯之疾故令精寒而不嗣也能於此數物酌而用之則痹去而宜子矣黃芩黃連黃柏梔子考世人謂精寒者不宜嗣辛以溫暖之劑主之此不可執也蓋天地衝和而萬物發育朔方寒勝固令不毛南服蒸炎亦令焦土明於精寒不嗣昧於血燥不胎非良手也故述芩連梔柏以為廣嗣者告能令氣血沖和則生生之道矣人胞鹿茸麋茸鹿脧蛤蚧龜板豬脊髓總考凡年高精弱難於生育草木無情不能補之故宜上件酌而入藥蓋取其為血氣之不屬補之易易爾延年門第七十二敘曰服食引年術之末也能寡欲以至無欲斯長生矣故欲不滅則苦亦不滅苦不滅宜生滅雖令太乙處方神皇品藥軒轅切問廣成烹調亦夭殃道耳胡年之延哉茲考方藥七條述醫云爾他如金丹玉液之術則吾不敢為斯世誑也九蒸地黃地黃味厚為陰中之陰故能滋養陰血必欲九蒸者欲其氣味純和云爾九蒸黃精黃精氣味與地黃等故可以生長陰精真人云久服能脫舊膚美顏色烏須黑髮長生引年百鍊松脂不見風日者良松亙千年不謝傲霜雪不凋以其脂實也服食家用之亦欲其松其身而千其年爾去母水方上白雲母二十斤薄擘以露水八斗作湯分半洮洗雲母二次又取二斗作湯內芒硝十斤以雲母水器中漬二十日陰乾於木石臼中揉挻極細得好粉五斗余者棄之每好粉一斗用崖蜜二斤攪令如粥入生竹筒中削去竹青漆固其口埋入地中入土六尺覆之春夏四十日秋冬三十日出之當如澤為成若洞洞不消者更埋三十日出之服時服水一合納藥一合攪和服之日三孫真人云此藥服十日小便變黃是先療勞氣風疹也二十日腹中寒癖消三十日齲齒更新生四十日不畏風寒五十日諸病皆除顏色日少長生延年自溺老人夜臥口乾亡泄取自己溲溺時進一杯能長生引年此以吾身之坎交吾身之離諺稱輪回酒是也玄黃丹硫黃制一斤青黛飛一兩六錢用硫黃為丸青黛為衣老人寒痰內盛者此方服之去疾延年硫黃火之精也人非此火不能以有生故用之以益火以青黛為衣者制其燥咽云爾硫黃詳論在虛損勞瘵門補火丸下鹿脧鹿血鹿角膠鹿茸麋茸豬脊髓總考老弱之軀木石不能榮養氣血故用上件血氣之屬入藥調和以配服食取其以類相從榮養易易耳七十非肉不飽亦是此意
