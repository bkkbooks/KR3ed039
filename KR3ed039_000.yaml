body:
  text: 序上醫治未病方無尚也垂經論焉經論醫之奧者中醫治已病於是乎始有方方醫之粗也非其得已視斯民之疾苦故因病以立方耳季世人知醫尚矣習方其簡也窮經其煩也乃率以方授受而求經論者無之舍斯道之奧寶斯道之粗安望其術之神良也餘年十五志醫術逮今十有八稔懼辱醫名蚤夜遑遑惟經論是搜不敢自是遊海內者數年就有道者而贄謁之見賤工什九良工什一不惟上古之經論眛焉雖中古之方猶弗達也弗明方之旨與方之證及諸藥升降浮沉寒熱溫平良毒之性與夫宣通補瀉輕重滑澀燥濕反正類從之理而徒執方以療病惡能保其不殃人乎乃為之憫惻取古昔良醫之方七百餘首揆之於經酌以心見訂之於證發其微義編為六卷題之端曰醫方考蓋以考其方藥考其見證考其名義考其事迹考其變通考其得失考其所以然之故匪徒苟然志方而已君子曰夫夫也弱齡譾陋輕議古人則昆有罪焉爾世有覺者觸目而疵之從而可否之吾幸吾之得師也遊藝者玩索而惜之存而左右之吾幸吾之朋與也如山野之陬湖海之遠求良醫而不速得開卷檢方能究愚論而斟酌自藥焉則吾濟人之一念也或者尚論千古末張孫而本軒岐劣群方而優經論則孟軻氏所謂遊於聖人之門者難為言矣安用夫斯籍之贅也皇明萬曆十二年歲次甲申孟冬月古歙吳昆序
